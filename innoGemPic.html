class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, errorInfo: "" }; }
  static getDerivedStateFromError(error) { return { hasError: true, errorInfo: error.toString() }; }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ padding: 40, textAlign: 'center', color: '#c62828' }}>
          <h2>เกิดข้อผิดพลาดในการแสดงผลหน้าจอ (Render Error)</h2><p>กรุณาตรวจสอบโครงสร้างข้อมูลที่ใช้งาน</p>
          <pre style={{ background:'#fff', padding:10, borderRadius:8, textAlign:'left', maxWidth:800, margin:'0 auto' }}>{this.state.errorInfo}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

    info:   { bg: darkMode?"#001a3e":"#e3f2fd", border:"#2196f3", icon:"💡", text: darkMode?"#82b1ff":"#0d47a1" },
    success:{ bg: darkMode?"#002200":"#e8f5e9", border:"#4caf50", icon:"✅", text: darkMode?"#b9f6ca":"#1b5e20" },
  };
  return (
    <div style={{ marginTop:12 }}>
      <div style={{ fontSize:12, fontWeight:800, color: darkMode?"#80deea":GOLD.dark, marginBottom:6 }}>🔍 Gap Analysis</div>
      {gaps.map((gap,i) => {
        const c = colors[gap.level];
        return (
          <div key={i} style={{ background:c.bg, border:`1px solid ${c.border}`, borderRadius:10, padding:"8px 12px", marginBottom:6, display:"flex", gap:8, alignItems:"start" }}>

            <span style={{ fontSize:11, color:c.text, lineHeight:1.5 }}>{gap.msg}</span>
          </div>
        );
      })}
    </div>
  );
};

const CRIT_COLORS = ["#004d40", "#00838f", "#00acc1", "#0097a7", "#26c6da"];

const ScoreBar = ({ val, max=20, color="#00838f", idx=0 }) => {

  const handleImport = () => { try { const data = JSON.parse(text); if(Array.isArray(data)){ onImport(data); onClose(); } else alert("ไฟล์ JSON ต้องเป็น array ของผลงาน"); } catch(e){ alert("ไฟล์ JSON ไม่ถูกต้อง"); } };

const Dashboard = ({ items, onSelect }) => {
  const sorted = [...items].sort((a,b)=>getScore(b) - getScore(a));
  const avg = (items.reduce((s,x)=>s+getScore(x),0)/items.length).toFixed(1);
  const passed = items.filter(x=>getScore(x)>=70).length;
  const top5 = sorted.slice(0,5);

  const byAmphoe = Object.entries(
    items.reduce((acc,x)=>{ if(!acc[x.amphoe])acc[x.amphoe]={sum:0,n:0}; acc[x.amphoe].sum+=getScore(x); acc[x.amphoe].n++; return acc; },{})
  ).map(([name,{sum,n}])=>({ name, avg:+(sum/n).toFixed(1), count:n, n:n })).sort((a,b)=>b.n-a.n || b.avg-a.avg);

  const byType = Object.entries(
    items.reduce((acc,x)=>{ acc[x.type]=(acc[x.type]||0)+1; return acc; },{})
  ).map(([name,value])=>({ name, value })).sort((a,b)=>b.value-a.value);

  const top10 = sorted.slice(0,10).map(x=>({ name:x.name?x.name.substring(0,14)+"…":"", score:getScore(x), id:x.id }));

  const KPI = ({val,sub,grad,icon,textColor}) => (

        <KPI val={top5.length > 0 ? getScore(top5[0]) : "-"} sub="คะแนนสูงสุด" grad="linear-gradient(135deg,#00acc1,#4dd0e1)" icon="⭐" />

          <div style={{ display:"flex", alignItems:"center" }}>
            <ResponsiveContainer width={160} height={160}><PieChart><Pie data={byType} cx="50%" cy="50%" innerRadius={40} outerRadius={70} dataKey="value" paddingAngle={3}>{byType.map((e,i)=><Cell key={i} fill={CHART_COLORS[i%CHART_COLORS.length]} />)}</Pie><Tooltip /></PieChart></ResponsiveContainer>
            <div style={{ flex:1, paddingLeft:8, maxHeight:150, overflowY:"auto" }}>{byType.slice(0,10).map((e,i)=><div key={i} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}><div style={{ width:10, height:10, borderRadius:2, background:CHART_COLORS[i%CHART_COLORS.length], flexShrink:0 }} /><span style={{ fontSize:10, color:"#555" }}>{e.name}: {e.value}</span></div>)}</div>
          </div>
        </div>
        <div style={{ background:"#fff", borderRadius:16, padding:"16px 12px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
          <div style={{ fontSize:14, fontWeight:700, color:GOLD.amber, marginBottom:12, paddingLeft:8 }}>🔬 สถานะงานวิจัย</div>
          <ResponsiveContainer width="100%" height={200}><BarChart data={statusData} layout="vertical" margin={{left:0,right:24}}><CartesianGrid strokeDasharray="3 3" stroke="#f5f5f5" horizontal={false} /><XAxis type="number" tick={{fontSize:10}} /><YAxis type="category" dataKey="name" width={130} tick={{fontSize:9}} /><Tooltip /><Bar dataKey="value" radius={[0,6,6,0]}>{statusData.map((e,i)=><Cell key={i} fill={CHART_COLORS[(i+4)%CHART_COLORS.length]} />)}</Bar></BarChart></ResponsiveContainer>
        </div>
      </div>

      {/* Amphoe Summary Table */}
      <div style={{ background:"#fff", borderRadius:16, padding:20, marginBottom:16, boxShadow:"0 2px 12px rgba(0,131,143,0.1)", border:"2px solid #80deea" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div style={{ fontSize:15, fontWeight:700, color:GOLD.dark }}>🗺️ สรุปผลงานนวัตกรรมรายอำเภอ</div>
          <div style={{ fontSize:12, color:GOLD.main, fontWeight:600 }}>รวมทั้งสิ้น {items.length} ผลงาน · {byAmphoe.length} อำเภอ</div>
        </div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:16 }}>
          {byAmphoe.map((a,i)=>{
            const ampItems = items.filter(x=>x.amphoe===a.name);
            const passCount = ampItems.filter(x=>getScore(x)>=70).length;
            const pct = Math.round((a.n/items.length)*100);
            return (
              <div key={i} style={{ flex:"1 1 130px", background:`linear-gradient(135deg,${CHART_COLORS[i%CHART_COLORS.length]}18,${CHART_COLORS[i%CHART_COLORS.length]}08)`, borderRadius:12, padding:"12px 14px", border:`1.5px solid ${CHART_COLORS[i%CHART_COLORS.length]}60`, textAlign:"center" }}>
                <div style={{ fontSize:22, fontWeight:900, color:CHART_COLORS[i%CHART_COLORS.length], lineHeight:1 }}>{a.n}</div>
                <div style={{ fontSize:9, color:"#999", marginTop:1 }}>ผลงาน ({pct}%)</div>
                <div style={{ fontSize:12, fontWeight:800, color:GOLD.dark, marginTop:4 }}>อ.{a.name}</div>
                <div style={{ marginTop:6, background:"#f5f5f5", borderRadius:4, height:5, overflow:"hidden" }}><div style={{ width:`${(a.n/items.length)*100}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:4 }} /></div>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}><span style={{ fontSize:10, color:GOLD.main, fontWeight:700 }}>เฉลี่ย {a.avg}</span><span style={{ fontSize:10, color:passCount===a.n?"#2e7d32":GOLD.amber, fontWeight:700 }}>ผ่าน {passCount}/{a.n} ({Math.round((passCount/a.n)*100)}%)</span></div>
              </div>
            );
          })}
        </div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", minWidth:560 }}>
            <thead><tr style={{ background:`linear-gradient(135deg,${GOLD.dark},${GOLD.main})` }}>{["อันดับ","อำเภอ","จำนวนนวัตกรรม","สัดส่วน (%)","เฉลี่ย","สูงสุด","ผ่านเกณฑ์ (≥70)","ดีเด่น (≥85)"].map((h,i)=><th key={i} style={{ padding:"8px 10px", color:"#b2ebf2", fontSize:11, fontWeight:700, textAlign:i<=1?"left":"center", whiteSpace:"nowrap" }}>{h}</th>)}</tr></thead>
            <tbody>
              {byAmphoe.map((a,i)=>{
                const ampItems = items.filter(x=>x.amphoe===a.name);
                const maxScore = Math.max(...ampItems.map(x=>getScore(x)));
                const passCount = ampItems.filter(x=>getScore(x)>=70).length;
                const excellCount = ampItems.filter(x=>getScore(x)>=85).length;
                const pct = ((a.n/items.length)*100).toFixed(1);
                const allPass = passCount === a.n;
                return (
                  <tr key={i} style={{ background:i%2===0?"#e0f7fa":"#e0f7fa", borderBottom:`1px solid ${CHART_COLORS[i%CHART_COLORS.length]}20` }}>
                    <td style={{ padding:"9px 10px", fontSize:13, fontWeight:800, color:CHART_COLORS[i%CHART_COLORS.length], textAlign:"center" }}>{["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣"][i]||`${i+1}`}</td>
                    <td style={{ padding:"9px 10px", fontSize:13, fontWeight:700, color:GOLD.dark }}>อ.{a.name}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}><div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}><span style={{ background:CHART_COLORS[i%CHART_COLORS.length], color:"#fff", borderRadius:20, padding:"3px 14px", fontSize:14, fontWeight:900 }}>{a.n}</span><span style={{ fontSize:10, color:"#999" }}>ผลงาน</span></div></td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}><div style={{ background:"#f5f5f5", borderRadius:6, height:10, overflow:"hidden", width:80, margin:"0 auto" }}><div style={{ width:`${(a.n/items.length)*100}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:6 }} /></div><div style={{ fontSize:11, color:CHART_COLORS[i%CHART_COLORS.length], fontWeight:700, marginTop:2 }}>{pct}%</div></td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:15, fontWeight:900, color:GOLD.main }}>{a.avg}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:14, fontWeight:700, color:GOLD.dark }}>{maxScore}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}><span style={{ background:allPass?"#e8f5e9":"#fff8e1", color:allPass?"#2e7d32":GOLD.amber, borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:800, border:`1px solid ${allPass?"#66bb6a":"#fbbf24"}` }}>{passCount} / {a.n} ({Math.round((passCount/a.n)*100)}%) {allPass?"✅":""}</span></td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}>{excellCount > 0 ? <span style={{ background:"#fff8e1", color:GOLD.dark, borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:800, border:`1px solid #4dd0e1` }}>⭐ {excellCount} ผลงาน</span> : <span style={{ color:"#ddd", fontSize:12 }}>—</span>}</td>
                  </tr>
                );
              })}
              <tr style={{ background:`linear-gradient(135deg,${GOLD.dark}15,${GOLD.main}10)`, borderTop:`2px solid ${GOLD.border}` }}>
                <td colSpan="2" style={{ padding:"9px 10px", fontSize:12, fontWeight:800, color:GOLD.dark }}>รวมทั้งจังหวัด</td>
                <td style={{ padding:"9px 10px", textAlign:"center" }}><span style={{ background:GOLD.dark, color:"#fff", borderRadius:20, padding:"3px 14px", fontSize:14, fontWeight:900 }}>{items.length}</span></td>
                <td style={{ padding:"9px 10px", textAlign:"center", fontSize:12, fontWeight:700, color:GOLD.main }}>100%</td>
                <td style={{ padding:"9px 10px", textAlign:"center", fontSize:15, fontWeight:900, color:GOLD.main }}>{(items.reduce((s,x)=>s+getScore(x),0)/items.length).toFixed(1)}</td>
                <td style={{ padding:"9px 10px", textAlign:"center", fontSize:14, fontWeight:700, color:GOLD.dark }}>{Math.max(...items.map(x=>getScore(x)))}</td>
                <td style={{ padding:"9px 10px", textAlign:"center" }}><span style={{ background:"#e8f5e9", color:"#2e7d32", borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:800, border:"1px solid #66bb6a" }}>{items.filter(x=>getScore(x)>=70).length} / {items.length} ({Math.round((items.filter(x=>getScore(x)>=70).length/items.length)*100)}%)</span></td>
                <td style={{ padding:"9px 10px", textAlign:"center" }}><span style={{ background:"#fff8e1", color:GOLD.dark, borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:800, border:`1px solid #4dd0e1` }}>⭐ {items.filter(x=>getScore(x)>=85).length} ผลงาน</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ── PAGE: PRODUCT LIST ──────────────────────────────────────────────────────
const ProductList = ({ items, onSelect, onEdit, onImageUpdate, darkMode, herbFilter, onClearHerbFilter }) => {
  const [search, setSearch] = useState("");
  const [filterAmphoe, setFilterAmphoe] = useState("ทั้งหมด");
  const [filterType, setFilterType] = useState("ทั้งหมด");
  const [filterStatus, setFilterStatus] = useState("ทั้งหมด");
  const [sortBy, setSortBy] = useState("id");

  const amphoes = ["ทั้งหมด",...[...new Set(items.map(x=>x.amphoe))]];
  const types = ["ทั้งหมด",...[...new Set(items.map(x=>x.type))]];
  const statuses = ["ทั้งหมด",...[...new Set(items.map(x=>x.status))]];

  const filtered = items.filter(x=>{
    // 🌿 Herb filter (สมุดหน้าเหลือง)
    if (herbFilter) {
      const ings = (x.ingredients||[]).join(" ").toLowerCase();
      if (!ings.includes(herbFilter.toLowerCase())) return false;
    }
    const sc = search.toLowerCase();
    if (search && !(x.name && x.name.toLowerCase().includes(sc)) && !(x.unit && x.unit.toLowerCase().includes(sc))) return false;
    if (filterAmphoe!=="ทั้งหมด" && x.amphoe!==filterAmphoe) return false;
    if (filterType!=="ทั้งหมด" && x.type!==filterType) return false;
    if (filterStatus!=="ทั้งหมด" && x.status!==filterStatus) return false;
    return true;
  }).sort((a,b)=>{
    if(sortBy==="score") return getScore(b) - getScore(a);
    if(sortBy==="id") return a.id - b.id;
    if(sortBy==="name") return (a.name || "").localeCompare(b.name || "","th");
    return 0;
  });

  const handleImg = (id, e) => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader(); r.onload=(ev)=>{ if(onImageUpdate) onImageUpdate(id, ev.target.result); }; r.readAsDataURL(f);
  };

  const DD = ({val,opts,onChange,label}) => (
    <select value={val} onChange={e=>onChange(e.target.value)} style={{ padding:"8px 12px", border:"1px solid #80deea", borderRadius:10, fontSize:12, color:"#00838f", background:"#fff", cursor:"pointer" }}>
      {opts.map(o=><option key={o}>{o}</option>)}
    </select>
  );

  return (
    <div>
      {/* 🌿 HERB FILTER BANNER */}
      {herbFilter && (
        <div style={{ background: darkMode?"#1c2128":"#e8f5e9", border:"2px solid #66bb6a", borderRadius:14, padding:"10px 16px", marginBottom:12, display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:20 }}>🌿</span>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:800, color: darkMode?"#a5d6a7":"#1b5e20" }}>
              สมุดหน้าเหลือง: กรองผลงานที่มี "{herbFilter}"
            </div>
            <div style={{ fontSize:11, color: darkMode?"#8b949e":"#555" }}>
              พบ {filtered.length} ผลงาน ที่มีส่วนประกอบนี้
            </div>
          </div>
          <button onClick={onClearHerbFilter} style={{ background:"#e53935", color:"#fff", border:"none", borderRadius:20, padding:"5px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
            ✕ ล้างตัวกรอง
          </button>
        </div>
      )}
      <div style={{ background:"#fff", borderRadius:16, padding:"14px 16px", marginBottom:16, boxShadow:"0 2px 8px rgba(0,131,143,0.08)", border:"1px solid #e0f7fa", display:"flex", flexWrap:"wrap", gap:10, alignItems:"center" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ค้นหาชื่อ / หน่วยงาน..." style={{ flex:"1 1 180px", padding:"8px 14px", border:"1px solid #80deea", borderRadius:10, fontSize:13, outline:"none" }} />
        <DD val={filterAmphoe} opts={amphoes} onChange={setFilterAmphoe} label="อำเภอ" />
        <DD val={filterType} opts={types} onChange={setFilterType} label="ประเภท" />
        <DD val={filterStatus} opts={statuses} onChange={setFilterStatus} label="สถานะ" />
        <DD val={sortBy} opts={["score","id","name"]} onChange={setSortBy} label="เรียงโดย" />
        <span style={{ fontSize:12, color:"#888", fontWeight:700 }}>แสดง {filtered.length} รายการ</span>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:14 }}>
        {filtered.map(item=>{
          const score = getScore(item); const g = GRADE_SOLID(score); const img = item.image;
          return (
            <div key={item.id} style={{ background:"#fff", borderRadius:16, overflow:"hidden", boxShadow:"0 3px 14px rgba(0,0,0,0.08)", border:`1.5px solid ${g.border}20`, cursor:"pointer", transition:"transform 0.15s", display:"flex", flexDirection:"column" }}
              onMouseEnter={e=>{ e.currentTarget.style.transform="translateY(-4px)"; e.currentTarget.style.boxShadow=`0 8px 24px ${g.border}40`; }} onMouseLeave={e=>{ e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="0 3px 14px rgba(0,0,0,0.08)"; }}>
              <div onClick={()=>onSelect(item)} style={{ height:120, background:TYPE_BG[item.type]||"linear-gradient(135deg,#f1f8e9,#dcedc8)", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", position:"relative" }}>
                {img ? <img src={img} alt={item.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : <div style={{ textAlign:"center" }}><div style={{ fontSize:40, marginBottom:4 }}>{TYPE_EMOJI[item.type]||"🌿"}</div><div style={{ fontSize:10, color:"rgba(0,0,0,0.45)", fontWeight:600 }}>{item.type}</div></div>}
                <div style={{ position:"absolute", top:8, right:8 }}><label onClick={e=>e.stopPropagation()} htmlFor={`img-${item.id}`} style={{ background:"rgba(255,255,255,0.92)", borderRadius:8, padding:"4px 8px", fontSize:10, cursor:"pointer", color:"#555", fontWeight:600 }}>📷</label><input id={`img-${item.id}`} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>handleImg(item.id,e)} /></div>
                <div style={{ position:"absolute", top:8, left:8, background:"rgba(0,0,0,0.35)", borderRadius:6, padding:"2px 7px", fontSize:10, color:"#fff", fontWeight:700 }}>#{item.id}</div>
              </div>
              <div onClick={()=>onSelect(item)} style={{ padding:"12px 14px", flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"start", marginBottom:6 }}><div style={{ fontSize:11, color:"#888" }}>{item.amphoe}</div><span style={{ background:g.bg, color:g.color, borderRadius:20, padding:"2px 9px", fontSize:11, fontWeight:700, border:`1px solid ${g.border}` }}>{g.label}</span></div>
                <div style={{ fontSize:13, fontWeight:700, color:"#1a1a1a", lineHeight:1.4, marginBottom:4 }}>{item.name}</div>
                <div style={{ fontSize:11, color:"#666", marginBottom:8 }}>{item.unit}</div>
                <div style={{ display:"flex", gap:3, marginBottom:8 }}>{[item.c1,item.c2,item.c3,item.c4,item.c5].map((v,i)=><div key={i} style={{ flex:1, background:"#f5f5f5", borderRadius:3, height:5, overflow:"hidden" }}><div style={{ width:`${((v||0)/20)*100}%`, background:CRIT_COLORS[i], height:"100%" }} /></div>)}</div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}><span style={{ fontSize:10, color:"#999", background:"#f5f5f5", borderRadius:8, padding:"2px 8px" }}>{item.status}</span><span style={{ fontSize:26, fontWeight:800, color:g.color }}>{score}</span></div>
              </div>
              <div style={{ padding:"0 14px 12px" }}><button onClick={e=>{ e.stopPropagation(); onEdit(item); }} style={{ width:"100%", padding:"7px 0", background:g.bg, color:g.color, border:`1px solid ${g.border}`, borderRadius:10, fontSize:11, cursor:"pointer", fontWeight:700 }}>✏️ แก้ไขคะแนน</button></div>
            </div>
          );
        })}
      </div>
    </div>
  );
};


// ── PAGE: COMPARE ────────────────────────────────────────────────────────────
const COMPARE_COLORS = ["#00acc1","#ff7043","#ab47bc","#66bb6a","#ffa726"];
const COMPARE_FILLS  = ["#00bcd420","#ff704320","#ab47bc20","#66bb6a20","#ffa72620"];

const CompareView = ({ items, darkMode }) => {
  const [selected, setSelected] = React.useState([]);
  const bg    = darkMode ? "#0d1117" : "#e0f7fa";
  const card  = darkMode ? "#1c2128" : "#fff";
  const surf  = darkMode ? "#161b22" : "#f0fdfe";
  const txt   = darkMode ? "#c9d1d9" : "#1a1a1a";
  const txt2  = darkMode ? "#8b949e" : "#666";
  const bdr   = darkMode ? "#30363d" : "#80deea";

  const sorted = [...items].sort((a,b) => (b.userScore??b.total)-(a.userScore??a.total));

  const toggle = (item) => {
    setSelected(prev => {
      const exists = prev.find(x => x.id === item.id);
      if (exists) return prev.filter(x => x.id !== item.id);
      if (prev.length >= 3) return prev; // max 3
      return [...prev, item];
    });
  };

  const radarData = ["นวัตกรรม","ความเหมาะสม","ความปลอดภัย","ประสิทธิผล","การนำไปใช้"].map((name, idx) => {
    const keys = ["c1","c2","c3","c4","c5"];
    const obj = { name };
    selected.forEach((item, i) => { obj[`v${i}`] = item[keys[idx]] || 0; });
    return obj;
  });

  const CRIT_LABELS = ["ค.1 ความเป็นนวัตกรรม","ค.2 ความเหมาะสมต่อบริบท","ค.3 ความปลอดภัย","ค.4 ประสิทธิผล","ค.5 การนำไปใช้"];

  return (
    <div>
      {/* Header */}
      <div style={{ background:card, borderRadius:16, padding:"14px 18px", marginBottom:14, border:`1px solid ${bdr}`, display:"flex", alignItems:"center", flexWrap:"wrap", gap:10 }}>
        <div style={{ fontSize:15, fontWeight:800, color: darkMode?"#80deea":GOLD.dark }}>⚖️ เปรียบเทียบผลงาน</div>
        <div style={{ fontSize:12, color:txt2 }}>เลือกสูงสุด 3 ผลงานจากรายการด้านล่าง</div>
        {selected.length > 0 && (
          <button onClick={()=>setSelected([])} style={{ marginLeft:"auto", padding:"5px 12px", background:"#fce4ec", color:"#c62828", border:"1px solid #ef9a9a", borderRadius:20, fontSize:11, fontWeight:700, cursor:"pointer" }}>
            ✕ ล้างทั้งหมด
          </button>
        )}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"300px 1fr", gap:14, alignItems:"start" }}>

        {/* LEFT: Selection list */}
        <div style={{ background:card, borderRadius:16, overflow:"hidden", border:`1px solid ${bdr}`, maxHeight:600, overflowY:"auto" }}>
          <div style={{ padding:"10px 14px", background: darkMode?"#161b22":GOLD.dark, color:"#fff", fontSize:12, fontWeight:800, position:"sticky", top:0 }}>
            📋 เลือกผลงาน ({selected.length}/3)
          </div>
          {sorted.map(item => {
            const s = item.userScore ?? item.total;
            const g = GRADE_SOLID(s);
            const selIdx = selected.findIndex(x => x.id === item.id);
            const isSelected = selIdx >= 0;
            const isDisabled = !isSelected && selected.length >= 3;
            return (
              <div key={item.id} onClick={() => !isDisabled && toggle(item)}
                style={{ padding:"10px 14px", borderBottom:`1px solid ${bdr}`, cursor: isDisabled?"not-allowed":"pointer", opacity: isDisabled ? 0.4 : 1,
                  background: isSelected ? (darkMode ? COMPARE_COLORS[selIdx]+"20" : COMPARE_COLORS[selIdx]+"15") : "transparent",
                  transition:"background 0.15s" }}
                onMouseEnter={e => { if(!isDisabled && !isSelected) e.currentTarget.style.background = darkMode?"#21262d":"#f0fdfe"; }}
                onMouseLeave={e => { if(!isSelected) e.currentTarget.style.background = "transparent"; }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  {/* Color indicator */}
                  <div style={{ width:14, height:14, borderRadius:"50%", border:`2px solid ${isSelected ? COMPARE_COLORS[selIdx] : bdr}`,
                    background: isSelected ? COMPARE_COLORS[selIdx] : "transparent", flexShrink:0 }} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:txt, lineHeight:1.3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      #{item.id} {item.name}
                    </div>
                    <div style={{ fontSize:9, color:txt2, marginTop:1 }}>{item.unit}</div>
                  </div>
                  <span style={{ fontSize:14, fontWeight:800, color:g.color, flexShrink:0 }}>{s}</span>
                </div>
              </div>
            );
          })}
        </div>

        {/* RIGHT: Comparison panel */}
        <div>
          {selected.length === 0 ? (
            <div style={{ background:card, borderRadius:16, border:`2px dashed ${bdr}`, padding:"50px 24px", textAlign:"center" }}>
              <div style={{ fontSize:48, marginBottom:12 }}>⚖️</div>
              <div style={{ fontSize:15, fontWeight:700, color:txt2, marginBottom:6 }}>ยังไม่ได้เลือกผลงาน</div>
              <div style={{ fontSize:12, color:txt2 }}>คลิกเลือก 2–3 ผลงานจากรายการทางซ้าย</div>
            </div>
          ) : (
            <div>
              {/* Selected item headers */}

const getIndicationGroup = (item) => {
  const ind = item.indication || "";
  if (ind.includes("ปวด") || ind.includes("อักเสบ") || ind.includes("เมื่อย") || ind.includes("ตึง") || ind.includes("ชา")) return "บรรเทาปวดและอักเสบ";
  if (ind.includes("หวัด") || ind.includes("วิงเวียน") || ind.includes("ไอ") || ind.includes("ระคายคอ") || ind.includes("คลื่นไส้") || ind.includes("คัดจมูก")) return "ทางเดินหายใจและวิงเวียน";
  if (ind.includes("ผิว") || ind.includes("ทำความสะอาด") || ind.includes("เซลล์ผิว")) return "เวชสำอางและบำรุงผิว";
  if (ind.includes("ถอนพิษ")) return "ถอนพิษสารเคมี";
  if (ind.includes("น้ำนม") || ind.includes("หลังคลอด") || ind.includes("บำรุงเลือด")) return "มารดาและทารก/บำรุงร่างกาย";
  if (ind.includes("ชะลอวัย") || ind.includes("บำรุงหัวใจ")) return "ส่งเสริมสุขภาพชะลอวัย";
  return "อื่นๆ";
};

const Rankings = ({ items, onSelect }) => {
  const [sortCol, setSortCol] = useState("total"); const [asc, setAsc] = useState(false);
  const [filterMode, setFilterMode] = useState("all"); const [filterValue, setFilterValue] = useState("");
  const indications = [...new Set(items.map(getIndicationGroup))].sort();
  const amphoes = [...new Set(items.map(x=>x.amphoe))].sort();

  useEffect(() => { if (filterMode === "indication") setFilterValue(indications[0]); else if (filterMode === "amphoe") setFilterValue(amphoes[0]); else setFilterValue(""); }, [filterMode]);
  const handleSort = (col) => { if(sortCol===col) setAsc(!asc); else { setSortCol(col); setAsc(false); }};

  const filteredItems = items.filter(x => { if(filterMode==="indication") return getIndicationGroup(x)===filterValue; if(filterMode==="amphoe") return x.amphoe===filterValue; return true; });
  const sortedForRank = [...filteredItems].sort((a,b)=>getScore(b) - getScore(a));

  const displayed = [...filteredItems].sort((a,b)=>{
    let va = sortCol==="total"?getScore(a):sortCol==="name"?(a.name||""):sortCol==="amphoe"?(a.amphoe||""):(a[sortCol]!=null?a[sortCol]:0);
    let vb = sortCol==="total"?getScore(b):sortCol==="name"?(b.name||""):sortCol==="amphoe"?(b.amphoe||""):(b[sortCol]!=null?b[sortCol]:0);
    if(typeof va==="string") return asc?va.localeCompare(vb,"th"):vb.localeCompare(va,"th");
    return asc?va-vb:vb-va;
  });

  const Th = ({col,label}) => (<th onClick={()=>handleSort(col)} style={{ padding:"10px 12px", background:"linear-gradient(135deg,#004d40,#00838f)", color:"#b2ebf2", fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", textAlign:"center", userSelect:"none" }}>{label} {sortCol===col?(asc?"↑":"↓"):""}</th>);

  return (
    <div>
      <div style={{ display:"flex", gap:10, marginBottom:16, alignItems:"center", background:"#fff", padding:"14px 20px", borderRadius:16, boxShadow:"0 2px 12px rgba(0,131,143,0.12)", border:"1px solid #e0f7fa", flexWrap:"wrap" }}>
        <div style={{ fontSize:14, fontWeight:800, color:GOLD.dark }}>📌 เลือกรูปแบบการจัดอันดับ:</div>
        <select value={filterMode} onChange={e=>setFilterMode(e.target.value)} style={{ padding:"8px 14px", borderRadius:10, border:"1px solid #80deea", outline:"none", cursor:"pointer", fontSize:13, color:GOLD.dark, fontWeight:700 }}><option value="all">🏆 คะแนนรวมทั้งหมด</option><option value="indication">🏷️ จัดอันดับตามกลุ่มสรรพคุณ</option><option value="amphoe">🗺️ จัดอันดับในอำเภอ</option></select>
        {filterMode === "indication" && <select value={filterValue} onChange={e=>setFilterValue(e.target.value)} style={{ padding:"8px 14px", borderRadius:10, border:"1px solid #80deea", outline:"none", cursor:"pointer", fontSize:13, color:GOLD.main, background:"#e0f7fa" }}>{indications.map(t=><option key={t} value={t}>สรรพคุณ: {t}</option>)}</select>}
        {filterMode === "amphoe" && <select value={filterValue} onChange={e=>setFilterValue(e.target.value)} style={{ padding:"8px 14px", borderRadius:10, border:"1px solid #80deea", outline:"none", cursor:"pointer", fontSize:13, color:GOLD.main, background:"#e0f7fa" }}>{amphoes.map(a=><option key={a} value={a}>อ.{a}</option>)}</select>}
        <div style={{ flex:1, textAlign:"right", fontSize:12, color:"#888" }}>จัดอันดับจาก <strong style={{color:GOLD.dark}}>{filteredItems.length}</strong> รายการ</div>
      </div>

      <div style={{ background:"#fff", borderRadius:16, overflow:"hidden", boxShadow:"0 2px 12px rgba(0,131,143,0.12)", border:"1px solid #e0f7fa" }}>
        <div style={{ padding:"16px 20px", borderBottom:"1px solid #e0f7fa" }}><div style={{ fontSize:15, fontWeight:700, color:"#00838f" }}>🏆 ตารางจัดอันดับผลงาน {filterMode==="all"?"ทั้งหมด":filterMode==="indication"?`กลุ่มสรรพคุณ: ${filterValue}`:`อำเภอ: ${filterValue}`}</div></div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr><th style={{ padding:"10px 12px", background:"#00838f", color:"#fff", fontSize:12, fontWeight:600 }}>อันดับ</th><Th col="name" label="ชื่อนวัตกรรม" /><Th col="unit" label="หน่วยงาน" /><Th col="amphoe" label="อำเภอ" /><th style={{ padding:"10px 12px", background:"#00838f", color:"#fff", fontSize:12 }}>หมวดหมู่</th><Th col="c1" label="ค.1" /><Th col="c2" label="ค.2" /><Th col="c3" label="ค.3" /><Th col="c4" label="ค.4" /><Th col="c5" label="ค.5" /><Th col="total" label="รวม" /><th style={{ padding:"10px 12px", background:"linear-gradient(135deg,#004d40,#00838f)", color:"#fff", fontSize:12 }}>ระดับ</th></tr></thead>
            <tbody>
              {displayed.map((item,idx)=>{
                const score = getScore(item); const rank = sortedForRank.findIndex(x=>x.id===item.id)+1; const g2 = GRADE_SOLID(score);
                return (
                  <tr key={item.id} onClick={()=>onSelect(item)} style={{ background:idx%2===0?"#fff":"#fafafa", cursor:"pointer" }} onMouseEnter={e=>e.currentTarget.style.background=g2.bg} onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"#fff":"#fafafa"}>

                    <td style={{ padding:"9px 12px", textAlign:"center" }}><div style={{fontSize:11, fontWeight:700, color:"#444"}}>{item.type}</div><div style={{fontSize:9, color:"#999", marginTop:2}}>{getIndicationGroup(item)}</div></td>
                    {[item.c1,item.c2,item.c3,item.c4,item.c5].map((v,i)=><td key={i} style={{ padding:"9px 8px", textAlign:"center", fontSize:12, fontWeight:700, color:CRIT_COLORS[i] }}>{v}</td>)}

                    <td style={{ padding:"9px 12px", textAlign:"center" }}><span style={{ background:g2.bg, color:g2.color, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:700, border:`1px solid ${g2.border}` }}>{g2.label}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ── PAGE: ANALYSIS (ADVANCED) ──────────────────────────────────────────────
const Analysis = ({ items }) => {
  const sorted = [...items].sort((a,b)=>getScore(b) - getScore(a));
  const avg = items.reduce((s,x)=>s+getScore(x),0)/items.length;
  const stdDev = Math.sqrt(items.reduce((s,x)=>s+Math.pow(getScore(x)-avg,2),0)/items.length);
  const passed = items.filter(x=>getScore(x)>=70); const failed = items.filter(x=>getScore(x)<70);

  const byAmphoe = Object.entries(items.reduce((acc,x)=>{ if(!acc[x.amphoe])acc[x.amphoe]={sum:0,n:0,items:[]}; acc[x.amphoe].sum+=getScore(x); acc[x.amphoe].n++; acc[x.amphoe].items.push(x); return acc; },{})).map(([name,v])=>({ name, avg:+(v.sum/v.n).toFixed(1), n:v.n, items:v.items, max:Math.max(...v.items.map(x=>getScore(x))), min:Math.min(...v.items.map(x=>getScore(x))), passed:v.items.filter(x=>getScore(x)>=70).length, stdDev:+(Math.sqrt(v.items.reduce((s,x)=>s+Math.pow(getScore(x)-v.sum/v.n,2),0)/v.items.length)).toFixed(1) })).sort((a,b)=>b.n-a.n || b.avg-a.avg);
  const byType = Object.entries(items.reduce((acc,x)=>{ acc[x.type]=(acc[x.type]||[]); acc[x.type].push(getScore(x)); return acc; },{})).map(([name,scores])=>({ name, count:scores.length, avg:+(scores.reduce((s,v)=>s+v,0)/scores.length).toFixed(1), max:Math.max(...scores) })).sort((a,b)=>b.count-a.count || b.avg-a.avg);

  const byIRL = [1,2,3,4].map(lvl=>({ lvl, label:["ไม่ระบุ","IRL1: แนวคิด","IRL2: R2R/เก็บข้อมูล","IRL3: วิจัยครบ","IRL4: จดแจ้ง อย."][lvl], items:items.filter(x=>(x.irl||2)===lvl), count:items.filter(x=>(x.irl||2)===lvl).length }));
  const maturity = { done: items.filter(x=>(x.status||"").includes("เสร็จสิ้น")||(x.status||"").includes("วิจัยเต็ม")).length, r2r: items.filter(x=>(x.status||"").toLowerCase().includes("r2r")).length, collecting: items.filter(x=>(x.status||"").includes("เก็บข้อมูล")||(x.status||"").includes("รวบรวม")).length, proposal: items.filter(x=>(x.status||"").includes("ข้อเสนอ")||(x.status||"").includes("กรอบ")).length, irl4: items.filter(x=>(x.irl||2)===4).length };
  
  const Card = ({children, style={}}) => (<div style={{ background:"#fff", borderRadius:16, padding:20, boxShadow:"0 2px 12px rgba(0,131,143,0.08)", border:"1px solid #b2ebf240", ...style }}>{children}</div>);
  const SectionTitle = ({icon,title,color=GOLD.dark}) => (<div style={{ fontSize:14, fontWeight:800, color, marginBottom:14, display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:18 }}>{icon}</span>{title}</div>);

  return (
    <div>
      <div style={{ background:`linear-gradient(135deg,${GOLD.dark},${GOLD.main},${GOLD.medium})`, borderRadius:20, padding:24, marginBottom:16, color:"#fff" }}>
        <div style={{ fontSize:16, fontWeight:800, marginBottom:10 }}>📋 Executive Summary — WISDOM PRODUCT 2569</div>
        <div style={{ fontSize:13, lineHeight:1.9, opacity:0.92 }}>ผลการประเมินนวัตกรรมภูมิปัญญาแพทย์แผนไทย จ.สมุทรปราการ ปี 2569 จำนวน <strong>{items.length} ผลงาน</strong> จาก <strong>{[...new Set(items.map(x=>x.amphoe))].length} อำเภอ</strong> พบคะแนนเฉลี่ย <strong>{avg.toFixed(1)}/100</strong> (S.D. = {stdDev.toFixed(1)}) ผ่านเกณฑ์ดี <strong>{passed.length} ผลงาน ({((passed.length/items.length)*100).toFixed(0)}%)</strong> และมีผลงานที่จดแจ้ง อย./ได้มาตรฐาน GMP แล้ว <strong>{maturity.irl4} ผลงาน</strong></div>
        <div style={{ display:"flex", gap:12, marginTop:16, flexWrap:"wrap" }}>{[ {l:"ค่าเฉลี่ย (x̄)", v:`${avg.toFixed(1)}`}, {l:"SD", v:stdDev.toFixed(1)}, {l:"ค่าสูงสุด", v:sorted.length>0?getScore(sorted[0]):"-"}, {l:"ผ่านเกณฑ์", v:`${passed.length}/${items.length}`}, {l:"อยู่ระหว่างพัฒนา", v:maturity.collecting+maturity.r2r} ].map((s,i)=><div key={i} style={{ background:"rgba(255,255,255,0.15)", borderRadius:10, padding:"8px 14px", textAlign:"center" }}><div style={{ fontSize:10, opacity:0.8 }}>{s.l}</div><div style={{ fontSize:17, fontWeight:800 }}>{s.v}</div></div>)}</div>
      </div>

            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => setDarkMode(d => !d)} title="สลับ Dark/Light Mode" style={{ background:"rgba(255,255,255,0.18)", color:"#fff", border:"1px solid rgba(255,255,255,0.35)", borderRadius:10, padding:"7px 12px", fontSize:16, cursor:"pointer" }}>{darkMode ? "☀️" : "🌙"}</button>
              <button onClick={() => { setIsAuthenticated(false); sessionStorage.removeItem('wisdom_auth'); setPin(''); }} style={{ background:"rgba(255,255,255,0.18)", color:"#fff", border:"1px solid rgba(255,255,255,0.35)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>🚪 ออกจากระบบ</button>
              <button onClick={handleOpenHTML} style={{ background:"rgba(255,215,0,0.35)", color:"#fff", border:"1px solid rgba(255,215,0,0.6)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:700 }}>🌐 เปิด HTML</button>
              <button onClick={() => setShowImport(true)} style={{ background:"rgba(255,255,255,0.18)", color:"#fff", border:"1px solid rgba(255,255,255,0.35)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>📥 นำเข้า</button>
            </div>
          </div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>{PAGES.map(p => <button key={p.id} onClick={() => setPage(p.id)} style={{ padding:"8px 16px", borderRadius:10, border:"none", cursor:"pointer", fontSize:12, fontWeight:700, background: page===p.id?"#fff":"rgba(255,255,255,0.12)", color: page===p.id?PAGE_COLORS[p.id]:"#b2ebf2" }}>{p.label}</button>)}</div>
        </div>
      </div>
      <div style={{ maxWidth:1100, margin:"0 auto", padding:16, minHeight:"80vh" }}>
        {page === "dashboard" && <Dashboard items={items} onSelect={setSelected} darkMode={darkMode} />}
        {page === "kanban"    && <KanbanBoard items={items} onSelect={setSelected} darkMode={darkMode} />}
        {page === "products"  && <ProductList items={items} onSelect={setSelected} onEdit={setEditing} onImageUpdate={handleImageUpdate} darkMode={darkMode} herbFilter={herbFilter} onClearHerbFilter={handleClearHerbFilter} />}
        {page === "compare"   && <CompareView items={items} darkMode={darkMode} />}
        {page === "rankings"  && <Rankings items={items} onSelect={setSelected} darkMode={darkMode} />}
        {page === "analysis"  && <Analysis items={items} darkMode={darkMode} />}
        {page === "about"     && <About items={items} onExport={handleExport} onPrint={handlePrint} onSaveHTML={handleSaveHTML} darkMode={darkMode} />}
      </div>
      <div style={{ textAlign:"center", padding:"20px 16px", color: darkMode?"#555":"#888", fontSize:11, borderTop: darkMode?"1px solid #21262d":"1px solid #e0e0e0", marginTop:8, background: darkMode?"#0d1117":"transparent" }}><div>🌿 <span style={{ color:"#00838f", fontWeight:700 }}>WISDOM PRODUCT 2569</span> · <span style={{ color:"#1565c0" }}>ภก.จีรภัทร พลายงาม</span> · <span style={{ color:"#8e24aa" }}>สสจ.สมุทรปราการ</span></div></div>
      {selected && !editing && <ProductModal item={selected} onClose={() => setSelected(null)} onEdit={setEditing} onHerbClick={handleHerbClick} />}
      {editing && <EditModal item={editing} onClose={() => setEditing(null)} onSave={handleSave} />}
      {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={handleImport} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
