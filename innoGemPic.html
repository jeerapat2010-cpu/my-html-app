// ERROR BOUNDARY
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, errorInfo: "" }; }
  static getDerivedStateFromError(error) { return { hasError: true, errorInfo: error.toString() }; }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ padding: 40, textAlign: 'center', color: '#c62828' }}>
          <h2>เกิดข้อผิดพลาดในการแสดงผลหน้าจอ (Render Error)</h2><p>กรุณาตรวจสอบโครงสร้างข้อมูลที่ใช้งาน</p>
          <pre style={{ background:'#fff', padding:10, borderRadius:8, textAlign:'left', maxWidth:800, margin:'0 auto' }}>{this.state.errorInfo}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

const ImportModal = ({ onClose, onImport }) => {
  const [text, setText] = useState(""); const fileRef = useRef();
  const handleFile = (e) => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload=(ev)=>setText(ev.target.result); r.readAsText(f); };
  const handleImport = () => { try { const data = JSON.parse(text); if(Array.isArray(data)){ onImport(data); onClose(); } else alert("ไฟล์ JSON ต้องเป็น array ของผลงาน"); } catch(e){ alert("ไฟล์ JSON ไม่ถูกต้อง"); } };
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:1100, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:20, width:"100%", maxWidth:500, padding:24 }}>
        <h3 style={{ color:"#00838f", margin:"0 0 8px" }}>📥 นำเข้าข้อมูล</h3><p style={{ fontSize:13, color:"#666", margin:"0 0 16px" }}>รองรับไฟล์ JSON หรือ paste JSON ตรงๆ ด้านล่าง</p>
        <input type="file" ref={fileRef} accept=".json" onChange={handleFile} style={{ marginBottom:12 }} />
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={6} placeholder='[{"id":26,"name":"ชื่อนวัตกรรม",...}]' style={{ width:"100%", padding:"10px 14px", border:"1px solid #80deea", borderRadius:10, fontSize:12, resize:"vertical", boxSizing:"border-box", fontFamily:"monospace" }} />
        <div style={{ display:"flex", gap:10, marginTop:12 }}>
          <button onClick={handleImport} style={{ flex:1, background:"#00838f", color:"#fff", border:"none", borderRadius:12, padding:"11px 0", fontSize:13, fontWeight:600, cursor:"pointer" }}>📥 นำเข้าข้อมูล</button>
          <button onClick={onClose} style={{ flex:1, background:"#f5f5f5", color:"#555", border:"1px solid #ddd", borderRadius:12, padding:"11px 0", fontSize:13, cursor:"pointer" }}>ยกเลิก</button>
        </div>
      </div>
    </div>
  );
};

              <div key={i} style={{ flex:"1 1 130px", background:`linear-gradient(135deg,${CHART_COLORS[i%CHART_COLORS.length]}18,${CHART_COLORS[i%CHART_COLORS.length]}08)`, borderRadius:12, padding:"12px 14px", border:`2px solid ${CHART_COLORS[i%CHART_COLORS.length]}40`, textAlign:"center" }}>
                <div style={{ fontSize:22, fontWeight:900, color:CHART_COLORS[i%CHART_COLORS.length], lineHeight:1 }}>{a.n}</div>
                <div style={{ fontSize:9, color:"#999", marginTop:1 }}>ผลงาน ({pct}%)</div>
                <div style={{ fontSize:12, fontWeight:800, color:GOLD.dark, marginTop:4 }}>อ.{a.name}</div>
                <div style={{ marginTop:6, background:"#f5f5f5", borderRadius:4, height:5, overflow:"hidden" }}><div style={{ width:`${(a.n/items.length)*100}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:4 }} /></div>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}><span style={{ fontSize:10, color:GOLD.main, fontWeight:700 }}>เฉลี่ย {a.avg}</span><span style={{ fontSize:10, color:passCount===a.n?"#2e7d32":GOLD.amber, fontWeight:700 }}>ผ่าน {passCount}/{a.n} ({Math.round((passCount/a.n)*100)}%)</span></div>
              </div>
            );
          })}
        </div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", minWidth:560 }}>
            <thead><tr style={{ background:`linear-gradient(135deg,${GOLD.dark},${GOLD.main})` }}>{["อันดับ","อำเภอ","จำนวนนวัตกรรม","สัดส่วน (%)","เฉลี่ย","สูงสุด","ผ่านเกณฑ์ (≥70)","ดีเด่น (≥85)"].map((h,i)=><th key={i} style={{ padding:"8px 10px", color:"#b2ebf2", fontSize:11, fontWeight:700, textAlign:i<=1?"left":"center", whiteSpace:"nowrap" }}>{h}</th>)}</tr></thead>
            <tbody>
              {byAmphoe.map((a,i)=>{
                const ampItems = items.filter(x=>x.amphoe===a.name);
                const maxScore = Math.max(...ampItems.map(x=>getScore(x)));
                const passCount = ampItems.filter(x=>getScore(x)>=70).length;
                const excellCount = ampItems.filter(x=>getScore(x)>=85).length;
                const pct = ((a.n/items.length)*100).toFixed(1);
                const allPass = passCount === a.n;
                return (
                  <tr key={i} style={{ background:i%2===0?"#e0f7fa":"#e0f7fa", borderBottom:`1px solid ${CHART_COLORS[i%CHART_COLORS.length]}20` }}>
                    <td style={{ padding:"9px 10px", fontSize:13, fontWeight:800, color:CHART_COLORS[i%CHART_COLORS.length], textAlign:"center" }}>{["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣"][i]||`${i+1}`}</td>
                    <td style={{ padding:"9px 10px", fontSize:13, fontWeight:700, color:GOLD.dark }}>อ.{a.name}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}><div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}><span style={{ background:CHART_COLORS[i%CHART_COLORS.length], color:"#fff", borderRadius:20, padding:"3px 14px", fontSize:14, fontWeight:900 }}>{a.n}</span><span style={{ fontSize:10, color:"#999" }}>ผลงาน</span></div></td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}><div style={{ background:"#f5f5f5", borderRadius:6, height:10, overflow:"hidden", width:80, margin:"0 auto" }}><div style={{ width:`${(a.n/items.length)*100}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:6 }} /></div><div style={{ fontSize:11, color:CHART_COLORS[i%CHART_COLORS.length], fontWeight:700, marginTop:2 }}>{pct}%</div></td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:15, fontWeight:900, color:GOLD.main }}>{a.avg}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:14, fontWeight:700, color:GOLD.dark }}>{maxScore}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}><span style={{ background:allPass?"#e8f5e9":"#fff8e1", color:allPass?"#2e7d32":GOLD.amber, borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:800, border:`1px solid ${allPass?"#66bb6a":"#fbbf24"}` }}>{passCount} / {a.n} ({Math.round((passCount/a.n)*100)}%) {allPass?"✅":""}</span></td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}>{excellCount > 0 ? <span style={{ background:"#fff8e1", color:GOLD.dark, borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:800, border:`1px solid #ffd700` }}>⭐ {excellCount} ผลงาน</span> : <span style={{ color:"#ddd", fontSize:12 }}>—</span>}</td>
                  </tr>
                );
              })}
              <tr style={{ background:`linear-gradient(135deg,${GOLD.dark}15,${GOLD.main}10)`, borderTop:`2px solid ${GOLD.border}` }}>
                <td colSpan="2" style={{ padding:"9px 10px", fontSize:12, fontWeight:800, color:GOLD.dark }}>รวมทั้งจังหวัด</td>
                <td style={{ padding:"9px 10px", textAlign:"center" }}><span style={{ background:GOLD.dark, color:"#fff", borderRadius:20, padding:"3px 14px", fontSize:14, fontWeight:900 }}>{items.length}</span></td>
                <td style={{ padding:"9px 10px", textAlign:"center", fontSize:12, fontWeight:700, color:GOLD.main }}>100%</td>
                <td style={{ padding:"9px 10px", textAlign:"center", fontSize:15, fontWeight:900, color:GOLD.main }}>{(items.reduce((s,x)=>s+getScore(x),0)/items.length).toFixed(1)}</td>
                <td style={{ padding:"9px 10px", textAlign:"center", fontSize:14, fontWeight:700, color:GOLD.dark }}>{Math.max(...items.map(x=>getScore(x)))}</td>
                <td style={{ padding:"9px 10px", textAlign:"center" }}><span style={{ background:"#e8f5e9", color:"#2e7d32", borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:800, border:"1px solid #66bb6a" }}>{items.filter(x=>getScore(x)>=70).length} / {items.length} ({Math.round((items.filter(x=>getScore(x)>=70).length/items.length)*100)}%)</span></td>
                <td style={{ padding:"9px 10px", textAlign:"center" }}><span style={{ background:"#fff8e1", color:GOLD.dark, borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:800, border:`1px solid #ffd700` }}>⭐ {items.filter(x=>getScore(x)>=85).length} ผลงาน</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};


const ProductList = ({ items, onSelect, onEdit, onImageUpdate, herbFilter, onClearHerbFilter }) => {
  const [search, setSearch] = useState("");
  const [filterAmphoe, setFilterAmphoe] = useState("ทั้งหมด");
  const [filterType, setFilterType] = useState("ทั้งหมด");
  const [filterStatus, setFilterStatus] = useState("ทั้งหมด");
  const [sortBy, setSortBy] = useState("id");

  const amphoes = ["ทั้งหมด",...[...new Set(items.map(x=>x.amphoe))]];
  const types = ["ทั้งหมด",...[...new Set(items.map(x=>x.type))]];
  const statuses = ["ทั้งหมด",...[...new Set(items.map(x=>x.status))]];

  const filtered = items.filter(x=>{
    if(herbFilter){ const ings=(x.ingredients||[]).join(" ").toLowerCase(); if(!ings.includes(herbFilter.toLowerCase())) return false; }
    const sc = search.toLowerCase();
    if (search && !(x.name && x.name.toLowerCase().includes(sc)) && !(x.unit && x.unit.toLowerCase().includes(sc))) return false;
    if (filterAmphoe!=="ทั้งหมด" && x.amphoe!==filterAmphoe) return false;
    if (filterType!=="ทั้งหมด" && x.type!==filterType) return false;
    if (filterStatus!=="ทั้งหมด" && x.status!==filterStatus) return false;
    return true;
  }).sort((a,b)=>{
    if(sortBy==="score") return getScore(b) - getScore(a);
    if(sortBy==="id") return a.id - b.id;
    if(sortBy==="name") return (a.name || "").localeCompare(b.name || "","th");
    return 0;
  });

  const handleImg = (id, e) => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader(); r.onload=(ev)=>{ if(onImageUpdate) onImageUpdate(id, ev.target.result); }; r.readAsDataURL(f);
  };

  const DD = ({val,opts,onChange,label}) => (
    <select value={val} onChange={e=>onChange(e.target.value)} style={{ padding:"8px 12px", border:"1px solid #80deea", borderRadius:10, fontSize:12, color:"#00838f", background:"#fff", cursor:"pointer" }}>
      {opts.map(o=><option key={o}>{o}</option>)}
    </select>
  );

  return (
    <div>
      {herbFilter && (<div style={{ background:"#e8f5e9",border:"2px solid #66bb6a",borderRadius:14,padding:"10px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:10 }}><span style={{ fontSize:20 }}>🌿</span><div style={{ flex:1 }}><div style={{ fontSize:13,fontWeight:800,color:"#1b5e20" }}>สมุดหน้าเหลือง: กรองผลงานที่มี "{herbFilter}"</div><div style={{ fontSize:11,color:"#555" }}>พบ {filtered.length} ผลงาน</div></div><button onClick={onClearHerbFilter} style={{ background:"#e53935",color:"#fff",border:"none",borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer" }}>✕ ล้างตัวกรอง</button></div>)}
      <div style={{ background:"#fff", borderRadius:16, padding:"14px 16px", marginBottom:16, boxShadow:"0 2px 8px rgba(0,131,143,0.08)", border:"1px solid #e0f7fa", display:"flex", flexWrap:"wrap", gap:10, alignItems:"center" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ค้นหาชื่อ / หน่วยงาน..." style={{ flex:"1 1 180px", padding:"8px 14px", border:"1px solid #80deea", borderRadius:10, fontSize:13, outline:"none" }} />
        <DD val={filterAmphoe} opts={amphoes} onChange={setFilterAmphoe} label="อำเภอ" />
        <DD val={filterType} opts={types} onChange={setFilterType} label="ประเภท" />
        <DD val={filterStatus} opts={statuses} onChange={setFilterStatus} label="สถานะ" />
        <DD val={sortBy} opts={["score","id","name"]} onChange={setSortBy} label="เรียงโดย" />
        <span style={{ fontSize:12, color:"#888", fontWeight:700 }}>แสดง {filtered.length} รายการ</span>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:14 }}>
        {filtered.map(item=>{
          const score = getScore(item); const g = GRADE_SOLID(score); const img = item.image;
          return (
            <div key={item.id} style={{ background:"#fff", borderRadius:16, overflow:"hidden", boxShadow:"0 3px 14px rgba(0,0,0,0.08)", border:`1.5px solid ${g.border}20`, cursor:"pointer", transition:"transform 0.15s", display:"flex", flexDirection:"column" }}
              onMouseEnter={e=>{ e.currentTarget.style.transform="translateY(-4px)"; e.currentTarget.style.boxShadow=`0 8px 24px ${g.border}40`; }} onMouseLeave={e=>{ e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="0 3px 14px rgba(0,0,0,0.08)"; }}>
              <div onClick={()=>onSelect(item)} style={{ height:120, background:TYPE_BG[item.type]||"linear-gradient(135deg,#f1f8e9,#dcedc8)", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", position:"relative" }}>
                {img ? <img src={img} alt={item.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : <div style={{ textAlign:"center" }}><div style={{ fontSize:40, marginBottom:4 }}>{TYPE_EMOJI[item.type]||"🌿"}</div><div style={{ fontSize:10, color:"rgba(0,0,0,0.45)", fontWeight:600 }}>{item.type}</div></div>}
                <div style={{ position:"absolute", top:8, right:8 }}><label onClick={e=>e.stopPropagation()} htmlFor={`img-${item.id}`} style={{ background:"rgba(255,255,255,0.92)", borderRadius:8, padding:"4px 8px", fontSize:10, cursor:"pointer", color:"#555", fontWeight:600 }}>📷</label><input id={`img-${item.id}`} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>handleImg(item.id,e)} /></div>
                <div style={{ position:"absolute", top:8, left:8, background:"rgba(0,0,0,0.35)", borderRadius:6, padding:"2px 7px", fontSize:10, color:"#fff", fontWeight:700 }}>#{item.id}</div>
              </div>
              <div onClick={()=>onSelect(item)} style={{ padding:"12px 14px", flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"start", marginBottom:6 }}><div style={{ fontSize:11, color:"#888" }}>{item.amphoe}</div><span style={{ background:g.bg, color:g.color, borderRadius:20, padding:"2px 9px", fontSize:11, fontWeight:700, border:`1px solid ${g.border}` }}>{g.label}</span></div>
                <div style={{ fontSize:13, fontWeight:700, color:"#1a1a1a", lineHeight:1.4, marginBottom:4 }}>{item.name}</div>
                <div style={{ fontSize:11, color:"#666", marginBottom:8 }}>{item.unit}</div>
                <div style={{ display:"flex", gap:3, marginBottom:8 }}>{[item.c1,item.c2,item.c3,item.c4,item.c5].map((v,i)=><div key={i} style={{ flex:1, background:"#f5f5f5", borderRadius:3, height:5, overflow:"hidden" }}><div style={{ width:`${((v||0)/20)*100}%`, background:CRIT_COLORS[i], height:"100%" }} /></div>)}</div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}><span style={{ fontSize:10, color:"#999", background:"#f5f5f5", borderRadius:8, padding:"2px 8px" }}>{item.status}</span><span style={{ fontSize:26, fontWeight:800, color:g.color }}>{score}</span></div>
              </div>
              <div style={{ padding:"0 14px 12px" }}><button onClick={e=>{ e.stopPropagation(); onEdit(item); }} style={{ width:"100%", padding:"7px 0", background:g.bg, color:g.color, border:`1px solid ${g.border}`, borderRadius:10, fontSize:11, cursor:"pointer", fontWeight:700 }}>✏️ แก้ไขคะแนน</button></div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// PAGE: RANKINGS
const getIndicationGroup = (item) => {
  const ind = item.indication || "";
  if (ind.includes("ปวด") || ind.includes("อักเสบ") || ind.includes("เมื่อย") || ind.includes("ตึง") || ind.includes("ชา")) return "บรรเทาปวดและอักเสบ";
  if (ind.includes("หวัด") || ind.includes("วิงเวียน") || ind.includes("ไอ") || ind.includes("ระคายคอ") || ind.includes("คลื่นไส้") || ind.includes("คัดจมูก")) return "ทางเดินหายใจและวิงเวียน";
  if (ind.includes("ผิว") || ind.includes("ทำความสะอาด") || ind.includes("เซลล์ผิว")) return "เวชสำอางและบำรุงผิว";
  if (ind.includes("ถอนพิษ")) return "ถอนพิษสารเคมี";
  if (ind.includes("น้ำนม") || ind.includes("หลังคลอด") || ind.includes("บำรุงเลือด")) return "มารดาและทารก/บำรุงร่างกาย";
  if (ind.includes("ชะลอวัย") || ind.includes("บำรุงหัวใจ")) return "ส่งเสริมสุขภาพชะลอวัย";
  return "อื่นๆ";
};

// DRUG INTERACTION CHECKER PAGE
const DrugInteractionChecker = ({ items, darkMode }) => {
  const [selectedHerbs, setSelectedHerbs] = React.useState([]);
  const [searchDrug, setSearchDrug] = React.useState("");
  const [viewMode, setViewMode] = React.useState("by_herb"); // by_herb | by_drug
  const card = darkMode ? "#1c2128" : "#fff";
  const surf = darkMode ? "#161b22" : "#f8fdff";
  const bdr  = darkMode ? "#30363d" : "#80deea";
  const txt  = darkMode ? "#c9d1d9" : "#1a1a1a";
  const txt2 = darkMode ? "#8b949e" : "#555";

  // Get unique herbs in database
  const allHerbs = [...new Set(HERB_DRUG_INTERACTIONS.map(x=>x.herb))].sort();

  // Get unique drugs in database
  const allDrugs = [...new Set(HERB_DRUG_INTERACTIONS.map(x=>x.drug))].sort();

  // Get all herbs used in innovations
  const innovHerbs = [];
  const HERB_DB_KEYS = typeof HERB_DB !== "undefined" ? Object.keys(HERB_DB) : [];
  items.forEach(item => {
    (item.ingredients||[]).forEach(ing => {
      const short = ing.split("(")[0].split("—")[0].trim().split(" ")[0];
      if (!innovHerbs.includes(short)) innovHerbs.push(short);
    });
  });

  // Find interactions
  const getInteractions = () => {
    let results = HERB_DRUG_INTERACTIONS;
    if (selectedHerbs.length > 0) {
      results = results.filter(x => selectedHerbs.some(h => x.herb.includes(h) || h.includes(x.herb.split(" ")[0])));
    }
    if (searchDrug) {
      results = results.filter(x => x.drug.toLowerCase().includes(searchDrug.toLowerCase()));
    }
    return results;
  };

  const interactions = getInteractions();
  const highRisk = interactions.filter(x=>x.severity==="high");
  const modRisk = interactions.filter(x=>x.severity==="moderate");
  const lowRisk = interactions.filter(x=>x.severity==="low");

  const severityStyle = {
    high:     { bg:darkMode?"#4a0000":"#fdecea", border:"#f44336", color:"#b71c1c", label:"⛔ ความเสี่ยงสูง" },
    moderate: { bg:darkMode?"#3d2200":"#fff8e1", border:"#ff9800", color:"#e65100", label:"⚠️ ความเสี่ยงปานกลาง" },
    low:      { bg:darkMode?"#001a3e":"#e3f2fd", border:"#2196f3", color:"#0d47a1", label:"ℹ️ ควรติดตาม" },
  };

  return (
    <div>
      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#4a0e8f,#7b2fa0,#ab47bc)",borderRadius:16,padding:"18px 20px",marginBottom:14,color:"#fff" }}>
        <div style={{ display:"flex",alignItems:"center",gap:12,marginBottom:10 }}>
          <span style={{ fontSize:32 }}>💊</span>
          <div>
            <div style={{ fontSize:17,fontWeight:900 }}>Drug Interaction Checker</div>
            <div style={{ fontSize:12,opacity:.85 }}>ตรวจสอบปฏิกิริยาสมุนไพร-ยาแผนปัจจุบัน | ฐานข้อมูล {HERB_DRUG_INTERACTIONS.length} คู่ปฏิกิริยา</div>
          </div>
          <div style={{ marginLeft:"auto",background:"rgba(255,255,255,0.15)",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:700 }}>
            {highRisk.length} ⛔ สูง | {modRisk.length} ⚠️ กลาง | {lowRisk.length} ℹ️ ต่ำ
          </div>
        </div>
        <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
          <input value={searchDrug} onChange={e=>setSearchDrug(e.target.value)}
            placeholder="🔍 ค้นหายา เช่น Warfarin, NSAIDs, Aspirin..."
            style={{ flex:1,minWidth:200,padding:"8px 14px",borderRadius:10,border:"none",fontSize:12,outline:"none",background:"rgba(255,255,255,0.92)",color:"#1a1a1a" }} />
          <button onClick={()=>{setSelectedHerbs([]);setSearchDrug("");}}
            style={{ padding:"8px 16px",borderRadius:10,border:"1px solid rgba(255,255,255,0.4)",background:"rgba(255,255,255,0.15)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer" }}>
            ล้างตัวกรอง
          </button>
        </div>
      </div>

      <div style={{ display:"grid",gridTemplateColumns:"240px 1fr",gap:14 }}>
        {/* Left: Herb selector */}
        <div style={{ background:card,borderRadius:14,overflow:"hidden",border:`1px solid ${bdr}` }}>
          <div style={{ padding:"10px 14px",background:darkMode?"#161b22":"#4a0e8f",color:"#fff",fontSize:12,fontWeight:800 }}>
            🌿 เลือกสมุนไพร
          </div>
          <div style={{ padding:10 }}>
            <div style={{ fontSize:10,color:txt2,marginBottom:6,fontWeight:700 }}>สมุนไพรในฐานข้อมูล ({allHerbs.length})</div>
            {allHerbs.map(herb=>{
              const isSelected = selectedHerbs.includes(herb);
              const isInInnov = innovHerbs.some(h=>herb.includes(h)||h.includes(herb.split(" ")[0]));
              const count = HERB_DRUG_INTERACTIONS.filter(x=>x.herb===herb).length;
              const hasHigh = HERB_DRUG_INTERACTIONS.some(x=>x.herb===herb&&x.severity==="high");
              return (
                <div key={herb} onClick={()=>setSelectedHerbs(prev=>prev.includes(herb)?prev.filter(h=>h!==herb):[...prev,herb])}
                  style={{ padding:"7px 10px",borderRadius:8,marginBottom:4,cursor:"pointer",border:`1px solid ${isSelected?"#ab47bc":bdr}`,
                    background:isSelected?(darkMode?"#2d0050":"#f3e5f5"):(darkMode?"#21262d":"#fafafa"),
                    transition:"all 0.15s" }}>
                  <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                    <span style={{ fontSize:11,fontWeight:isSelected?700:400,color:isSelected?"#6a1b9a":txt }}>{herb}</span>
                    <div style={{ display:"flex",gap:3 }}>
                      {isInInnov && <span title="ใช้ในนวัตกรรม" style={{ fontSize:9,background:"#e0f7fa",color:"#004d40",borderRadius:6,padding:"1px 4px",fontWeight:700 }}>📦</span>}
                      {hasHigh && <span style={{ fontSize:9,background:"#fdecea",color:"#b71c1c",borderRadius:6,padding:"1px 4px",fontWeight:700 }}>⛔{count}</span>}
                      {!hasHigh && <span style={{ fontSize:9,background:"#fff8e1",color:"#e65100",borderRadius:6,padding:"1px 4px" }}>{count}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Right: Results */}
        <div>
          {interactions.length === 0 ? (
            <div style={{ background:card,borderRadius:14,border:`2px dashed ${bdr}`,padding:"50px 24px",textAlign:"center" }}>
              <div style={{ fontSize:40,marginBottom:10 }}>✅</div>
              <div style={{ fontSize:14,fontWeight:700,color:txt2 }}>ไม่พบปฏิกิริยาที่ตรงกัน</div>
              <div style={{ fontSize:12,color:txt2,marginTop:4 }}>เลือกสมุนไพรจากรายการซ้าย หรือค้นหายาในช่องด้านบน</div>
            </div>
          ) : (
            <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
              {/* Summary badges */}
              <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                {[["high","⛔","สูง",highRisk.length],["moderate","⚠️","ปานกลาง",modRisk.length],["low","ℹ️","ควรติดตาม",lowRisk.length]].map(([sev,ic,lb,ct])=>(
                  ct > 0 && (
                    <div key={sev} style={{ background:severityStyle[sev].bg,border:`1px solid ${severityStyle[sev].border}`,borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:700,color:severityStyle[sev].color }}>
                      {ic} {lb}: {ct} คู่
                    </div>
                  )
                ))}
              </div>
              {/* Interaction cards */}
              {["high","moderate","low"].map(sev =>
                interactions.filter(x=>x.severity===sev).map((inter,i) => {
                  const st = severityStyle[sev];
                  return (
                    <div key={inter.herb+inter.drug+i} style={{ background:st.bg,borderRadius:14,padding:"14px 16px",border:`2px solid ${st.border}40` }}>
                      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:8 }}>
                        <div style={{ display:"flex",gap:8,alignItems:"center" }}>
                          <span style={{ fontSize:20 }}>{inter.icon}</span>
                          <div>
                            <span style={{ fontWeight:900,color:st.color,fontSize:13 }}>{inter.herb}</span>
                            <span style={{ fontSize:13,color:txt2,margin:"0 6px" }}>+</span>
                            <span style={{ fontWeight:900,color:"#333",fontSize:13,background:darkMode?"#30363d":"#fff",padding:"1px 8px",borderRadius:8,border:`1px solid ${st.border}` }}>{inter.drug}</span>
                          </div>
                        </div>
                        <span style={{ background:st.border,color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:800,flexShrink:0 }}>{st.label}</span>
                      </div>
                      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,fontSize:11 }}>
                        <div><div style={{ color:txt2,fontWeight:700,marginBottom:2 }}>ผลที่เกิดขึ้น</div><div style={{ color:txt,lineHeight:1.5 }}>{inter.effect}</div></div>
                        <div><div style={{ color:txt2,fontWeight:700,marginBottom:2 }}>กลไก</div><div style={{ color:txt,lineHeight:1.5 }}>{inter.mechanism}</div></div>
                        <div>
                          <div style={{ color:txt2,fontWeight:700,marginBottom:2 }}>คำแนะนำ</div>
                          <div style={{ color:st.color,lineHeight:1.5,fontWeight:600 }}>{inter.recommendation}</div>
                          <div style={{ color:txt2,fontSize:9,marginTop:3 }}>อ้างอิง: {inter.ref}</div>
                        </div>
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// DISTRICT HEAT MAP
const DistrictHeatMap = ({ items, darkMode }) => {
  const [hovered, setHovered] = React.useState(null);
  const [metric, setMetric] = React.useState("count"); // count | avg | irl
  const card = darkMode ? "#1c2128" : "#fff";
  const bdr  = darkMode ? "#30363d" : "#80deea";
  const txt  = darkMode ? "#c9d1d9" : "#1a1a1a";
  const txt2 = darkMode ? "#8b949e" : "#555";

  const AMPHOE_DATA = {
    "เมือง":         { x:220, y:180, w:120, h:90, label:"อ.เมือง\nสมุทรปราการ" },
    "พระประแดง":     { x:140, y:80,  w:100, h:85, label:"อ.พระประแดง" },
    "พระสมุทรเจดีย์":{ x:110, y:185, w:110, h:80, label:"อ.พระสมุทร\nเจดีย์" },
    "บางพลี":        { x:340, y:120, w:115, h:80, label:"อ.บางพลี" },
    "บางบ่อ":        { x:340, y:220, w:110, h:85, label:"อ.บางบ่อ" },
    "บางเสาธง":      { x:455, y:170, w:105, h:85, label:"อ.บางเสาธง" },
  };

  // Calculate stats per amphoe
  const amphoeStats = {};
  Object.keys(AMPHOE_DATA).forEach(amph => {
    const its = items.filter(x => x.amphoe === amph);
    const scores = its.map(x => x.userScore ?? x.total);
    const avg = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;
    const avgIRL = its.length ? its.reduce((s,x)=>s+(x.irl||2),0)/its.length : 0;
    amphoeStats[amph] = { count:its.length, avg:avg.toFixed(1), avgIRL:avgIRL.toFixed(1), items:its };
  });

  // Color function
  const getColor = (amph) => {
    const d = amphoeStats[amph];
    if (!d || d.count === 0) return darkMode ? "#2a3038" : "#e8eef2";
    const maxCount = Math.max(...Object.values(amphoeStats).map(x=>x.count));
    const maxAvg = Math.max(...Object.values(amphoeStats).map(x=>parseFloat(x.avg)));
    if (metric === "count") {
      const ratio = d.count / maxCount;
      const r = Math.round(0 + ratio * 0);
      const g = Math.round(131 + ratio * (180-131));
      const b = Math.round(143 + ratio * (80-143));
      return `rgb(${Math.round(4 + ratio*0)},${Math.round(77+ratio*154)},${Math.round(64+ratio*0)})`;
    } else if (metric === "avg") {
      const v = parseFloat(d.avg);
      if (v >= 80) return "#1b5e20";
      if (v >= 75) return "#2e7d32";
      if (v >= 70) return "#00838f";
      if (v >= 65) return "#0097a7";
      return "#e65100";
    } else {
      const v = parseFloat(d.avgIRL);
      if (v >= 3.5) return "#1b5e20";
      if (v >= 2.5) return "#00838f";
      if (v >= 1.5) return "#0097a7";
      return "#c62828";
    }
  };

  const getMetricValue = (amph) => {
    const d = amphoeStats[amph];
    if (!d) return "0";
    if (metric === "count") return d.count + " ผลงาน";
    if (metric === "avg") return "เฉลี่ย " + d.avg;
    return "IRL " + d.avgIRL;
  };

  const hoverData = hovered ? amphoeStats[hovered] : null;

  return (
    <div>
      {/* Header */}
      <div style={{ background:card,borderRadius:16,padding:"14px 18px",marginBottom:14,border:`1px solid ${bdr}`,display:"flex",alignItems:"center",flexWrap:"wrap",gap:12 }}>
        <div>
          <div style={{ fontSize:15,fontWeight:800,color:darkMode?"#80deea":GOLD.main }}>🗺️ แผนที่ความร้อน — การกระจายนวัตกรรม 6 อำเภอ</div>
          <div style={{ fontSize:11,color:txt2,marginTop:2 }}>วางเมาส์บนอำเภอเพื่อดูรายละเอียด</div>
        </div>
        <div style={{ display:"flex",gap:6,marginLeft:"auto" }}>
          {[["count","จำนวนผลงาน"],["avg","คะแนนเฉลี่ย"],["irl","ระดับ IRL"]].map(([k,l])=>(
            <button key={k} onClick={()=>setMetric(k)}
              style={{ padding:"6px 14px",borderRadius:20,border:`1px solid ${bdr}`,background:metric===k?GOLD.main:(darkMode?"#21262d":"#f0fdfe"),color:metric===k?"#fff":(darkMode?"#c9d1d9":GOLD.main),fontSize:11,fontWeight:700,cursor:"pointer" }}>
              {l}
            </button>
          ))}
        </div>
      </div>

      <div style={{ display:"grid",gridTemplateColumns:"1fr 320px",gap:14 }}>
        {/* SVG Map */}
        <div style={{ background:card,borderRadius:16,padding:16,border:`1px solid ${bdr}` }}>
          <svg viewBox="0 0 575 310" style={{ width:"100%",height:"auto" }}>
            {/* Sea / background */}
            <rect width="575" height="310" fill={darkMode?"#0d1117":"#e3f4ff"} rx="12"/>
            <text x="300" y="285" textAnchor="middle" fill={darkMode?"#2a5a7a":"#93c8e8"} fontSize="12" fontFamily="Sarabun">อ่าวไทย</text>

            {/* Province border hint */}
            <path d="M 105 60 Q 200 30 350 55 Q 480 70 570 130 L 565 290 Q 490 300 390 295 Q 260 305 100 295 Z"
              fill={darkMode?"#161b22":"#d4e9f5"} stroke={darkMode?"#30363d":"#b0cfe0"} strokeWidth="1.5"/>
            <text x="490" y="90" fill={darkMode?"#4a6a7a":"#5a8a9a"} fontSize="10" fontFamily="Sarabun">จ.ฉะเชิงเทรา</text>
            <text x="50" y="140" fill={darkMode?"#4a6a7a":"#5a8a9a"} fontSize="10" fontFamily="Sarabun">กรุงเทพฯ</text>

            {/* Districts */}
            {Object.entries(AMPHOE_DATA).map(([amph, d]) => {
              const isHov = hovered === amph;
              const col = getColor(amph);
              const stats = amphoeStats[amph];
              return (
                <g key={amph} onMouseEnter={()=>setHovered(amph)} onMouseLeave={()=>setHovered(null)}
                  style={{ cursor:"pointer", transition:"all 0.15s" }}>
                  <rect x={d.x} y={d.y} width={d.w} height={d.h} rx="10"
                    fill={col} stroke={isHov?"#fff":darkMode?"#30363d":"rgba(255,255,255,0.6)"} strokeWidth={isHov?3:1.5}
                    opacity={isHov?1:0.85} filter={isHov?"url(#glow)":""} />
                  {d.label.split("\n").map((line,i)=>(
                    <text key={i} x={d.x+d.w/2} y={d.y+d.h/2-(d.label.includes("\n")?7:0)+i*14}
                      textAnchor="middle" fill="#fff" fontSize="11" fontWeight="700" fontFamily="Sarabun">{line}</text>
                  ))}
                  <text x={d.x+d.w/2} y={d.y+d.h-10} textAnchor="middle"
                    fill="rgba(255,255,255,0.9)" fontSize="10" fontFamily="Sarabun">
                    {stats?.count||0} ผลงาน
                  </text>
                </g>
              );
            })}

            {/* Glow filter */}
            <defs>
              <filter id="glow">
                <feDropShadow dx="0" dy="0" stdDeviation="4" floodColor="#00acc1" floodOpacity="0.8"/>
              </filter>
            </defs>

            {/* Legend */}
            <g>
              <rect x="10" y="10" width="130" height="56" rx="8" fill={darkMode?"rgba(0,0,0,0.5)":"rgba(255,255,255,0.85)"} stroke={darkMode?"#30363d":"#e0f7fa"} strokeWidth="1"/>
              <text x="20" y="27" fontSize="9" fontFamily="Sarabun" fill={darkMode?"#80deea":"#004d40"} fontWeight="700">สีเข้ม = {metric==="count"?"ผลงานมาก":metric==="avg"?"คะแนนสูง":"IRL สูง"}</text>
              {["#1b5e20","#00838f","#0097a7","#e65100"].map((c,i)=>(
                <g key={i}>
                  <rect x="20" y={33+i*7} width="8" height="6" rx="2" fill={c}/>

                    {metric==="count"?[">3 ผลงาน","3 ผลงาน","2 ผลงาน","1 ผลงาน"][i]:metric==="avg"?["≥80","75-79","70-74","<70"][i]:["IRL 3-4","IRL 2.5","IRL 2","IRL 1"][i]}

                </g>
              ))}
            </g>
          </svg>
        </div>

        {/* Side stats */}
        <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
          {/* Hover detail card */}
          <div style={{ background:hovered?`${getColor(hovered)}18`:(darkMode?"#161b22":GOLD.surface),borderRadius:14,padding:"14px 16px",border:`1.5px solid ${hovered?getColor(hovered):bdr}`,minHeight:120,transition:"all 0.2s" }}>
            {hovered && hoverData ? (
              <>

                </div>
                <div style={{ fontSize:10,fontWeight:700,color:txt2,marginBottom:5 }}>ผลงานในอำเภอนี้:</div>
                {hoverData.items.sort((a,b)=>(b.userScore??b.total)-(a.userScore??a.total)).map(item=>{
                  const s=item.userScore??item.total; const g=GRADE_SOLID(s);

                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

const exportToCSV = (items) => {
  const headers = ["ลำดับ","ID","ชื่อนวัตกรรม","หน่วยบริการ","อำเภอ","ประเภท","สถานะ","IRL","ค.1","ค.2","ค.3","ค.4","ค.5","รวม","ระดับ","ต้นทุน(฿)","ราคาขาย(฿)","Margin(%)","USP"];
  const rows = items.map((item,i) => {
    const s = item.userScore ?? item.total;
    const g = GRADE_SOLID(s);
    const c = item.commercial;
    return [
      i+1, item.id, item.name, item.unit, item.amphoe, item.type||"", item.status||"", item.irl||2,
      item.c1, item.c2, item.c3, item.c4, item.c5, s, g.label,
      c?c.cost:"", c?c.price:"", c?c.margin:"", c?c.usp:""
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(",");
  });
  const csv = [headers.join(","), ...rows].join("\n");
  const bom = "\uFEFF"; // UTF-8 BOM for Thai in Excel
  const blob = new Blob([bom+csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "WISDOM_2569_Data.csv"; a.click();
  URL.revokeObjectURL(url);
};

const exportToJSON = (items) => {
  const data = JSON.stringify(items, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "WISDOM_2569_Backup.json"; a.click();
  URL.revokeObjectURL(url);
};

const AIAnalysisPanel = ({ item, darkMode }) => {
  const [loading, setLoading] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [expanded, setExpanded] = React.useState(false);
  const bg = darkMode ? "#1c2128" : "#fff";
  const bdr = darkMode ? "#30363d" : "#e0f7fa";
  const txt = darkMode ? "#c9d1d9" : "#1a1a1a";
  const txt2 = darkMode ? "#8b949e" : "#555";

  const analyze = () => {
    setLoading(true); setError(null); setResult(null); setExpanded(true);
    const prompt = "วิเคราะห์นวัตกรรม: " + item.name + " | หน่วย: " + item.unit + " อ." + item.amphoe +

      " | ค.1=" + item.c1 + " ค.2=" + item.c2 + " ค.3=" + item.c3 + " ค.4=" + item.c4 + " ค.5=" + item.c5 +
      " | ส่วนประกอบ: " + (item.ingredients||[]).slice(0,5).join(", ") +
      " | สถานะ: " + (item.status||"ไม่ระบุ") +
      (item.commercial ? " | USP: " + item.commercial.usp : "") +
      "\n\nกรุณาวิเคราะห์และตอบในรูปแบบ JSON เท่านั้น (ไม่มี markdown):\n" +
      JSON.stringify({
        next_step:"ขั้นตอนถัดไปเร่งด่วน",
        research_gap:"ช่องว่างงานวิจัยสำคัญ",
        safety_alert:"ประเด็นความปลอดภัย หรือ null",
        commercial_opportunity:"โอกาสเชิงพาณิชย์",
        irl_advice:"วิธียกระดับ IRL",
        quick_wins:["ข้อ 1","ข้อ 2","ข้อ 3"],
        score_weak:"จุดอ่อนและวิธีแก้ไข",
        benchmark:"เปรียบเทียบมาตรฐาน IRL"
      }, null, 2);

    fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        messages:[{role:"user",content:prompt}]
      })
    })
    .then(function(resp){ return resp.json(); })
    .then(function(data){
      if (data.error) throw new Error(data.error.message);
      const text = (data.content&&data.content[0]&&data.content[0].text)||"";
      const cleaned = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(cleaned);
      setResult(parsed);
    })
    .catch(function(e){ setError("เกิดข้อผิดพลาด: "+e.message); })
    .finally(function(){ setLoading(false); });
  };

  return (
    <div style={{ marginTop:14,border:`2px solid #0097a7`,borderRadius:16,overflow:"hidden" }}>
      {/* Header button */}
      <div onClick={()=>{ if(!result&&!loading) analyze(); else setExpanded(e=>!e); }}
        style={{ background:"linear-gradient(135deg,#004d40,#0097a7)",padding:"12px 18px",display:"flex",alignItems:"center",gap:10,cursor:"pointer" }}>
        <span style={{ fontSize:22 }}>🤖</span>
        <div style={{ flex:1 }}>
          <div style={{ color:"#fff",fontWeight:800,fontSize:14 }}>AI วิเคราะห์ช่องว่างวิจัย — Claude AI</div>
          <div style={{ color:"rgba(255,255,255,0.75)",fontSize:11 }}>
            {loading?"⏳ กำลังวิเคราะห์...":result?"✅ วิเคราะห์เสร็จแล้ว — คลิกเพื่อ"+(expanded?"ย่อ":"ขยาย"):"คลิกเพื่อให้ AI วิเคราะห์ผลงานนี้โดยอัตโนมัติ"}
          </div>
        </div>
        {!loading && (
          <button onClick={e=>{e.stopPropagation();analyze();}} style={{ background:"rgba(255,255,255,0.2)",color:"#fff",border:"1px solid rgba(255,255,255,0.4)",borderRadius:20,padding:"5px 14px",fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0 }}>
            {result?"🔄 วิเคราะห์ใหม่":"▶ เริ่มวิเคราะห์"}
          </button>
        )}
      </div>

      {/* Loading */}
      {loading && (
        <div style={{ padding:"24px",textAlign:"center",background:darkMode?"#161b22":"#f0fdff" }}>
          <div style={{ fontSize:32,marginBottom:10 }}>🔬</div>
          <div style={{ fontSize:13,color:darkMode?"#80deea":"#004d40",fontWeight:700 }}>Claude AI กำลังวิเคราะห์...</div>
          <div style={{ fontSize:11,color:txt2,marginTop:4 }}>ประมวลผลข้อมูลสมุนไพร ช่องว่างวิจัย และโอกาสเชิงพาณิชย์</div>
        </div>
      )}

      {/* Error */}
      {error && (
        <div style={{ padding:"16px 18px",background:darkMode?"#3c0000":"#fdecea",color:"#b71c1c",fontSize:12 }}>
          ❌ {error} <br/><span style={{ fontSize:11,opacity:0.7 }}>ตรวจสอบการเชื่อมต่ออินเทอร์เน็ตและ API Key</span>
        </div>
      )}

      {/* Result */}

        <div style={{ padding:"16px 18px",background:darkMode?"#0d1f2d":"#f0fdff" }}>

              { key:"commercial_opportunity", icon:"💰", label:"โอกาสเชิงพาณิชย์", color:"#1b5e20", bg:darkMode?"#002200":"#e8f5e9" },
              { key:"irl_advice", icon:"📈", label:"วิธียกระดับ IRL", color:"#e65100", bg:darkMode?"#3c1200":"#fff3e0" },
              { key:"score_weak", icon:"⚠️", label:"จุดอ่อนที่ต้องแก้ไข", color:"#6a1b9a", bg:darkMode?"#2d0050":"#f3e5f5" },

            ].map(({key,icon,label,color,bg: boxBg})=>(

                <div key={key} style={{ background:boxBg,borderRadius:12,padding:"11px 13px",border:`1px solid ${color}30` }}>

          {result.quick_wins?.length > 0 && (

                  <span style={{ fontSize:11.5,color:txt,lineHeight:1.5 }}>{w}</span>
                </div>
              ))}
            </div>
          )}

          {result.safety_alert && (
            <div style={{ marginTop:10,background:darkMode?"#4a0000":"#fdecea",borderRadius:12,padding:"10px 14px",border:"1px solid #ef9a9a",display:"flex",gap:8 }}>
              <span style={{ fontSize:18,flexShrink:0 }}>🚨</span>
              <div>
                <div style={{ fontSize:10,fontWeight:800,color:"#b71c1c",marginBottom:3 }}>แจ้งเตือนความปลอดภัย</div>
                <div style={{ fontSize:11.5,color:darkMode?"#ffcdd2":"#c62828",lineHeight:1.5 }}>{result.safety_alert}</div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const getGaps = (item) => GAP_RULES.filter(r=>r.check(item));


// GAP ALERTS COMPONENT
const GapAlerts = ({ item, darkMode }) => {
  const gaps = getGaps(item);
  if (!gaps.length) return null;
  const colors = {
    danger: { bg:darkMode?"#4a0000":"#fdecea", border:"#f44336", text:darkMode?"#ff8a80":"#b71c1c" },
    warn:   { bg:darkMode?"#3d2200":"#fff8e1", border:"#ff9800", text:darkMode?"#ffcc80":"#e65100" },
    info:   { bg:darkMode?"#001a3e":"#e3f2fd", border:"#2196f3", text:darkMode?"#82b1ff":"#0d47a1" },
    success:{ bg:darkMode?"#002200":"#e8f5e9", border:"#4caf50", text:darkMode?"#b9f6ca":"#1b5e20" },
  };
  return (
    <div style={{ marginTop:12 }}>
      <div style={{ fontSize:12,fontWeight:800,color:darkMode?"#80deea":GOLD.dark,marginBottom:6 }}>🔍 Gap Analysis</div>
      {gaps.map((gap,i) => {
        const c = colors[gap.lv] || colors.info;
        return (
          <div key={i} style={{ background:c.bg,border:"1px solid "+c.border,borderRadius:10,padding:"8px 12px",marginBottom:6,display:"flex",gap:8,alignItems:"start" }}>
            <span style={{ fontSize:16,flexShrink:0 }}>{gap.icon}</span>
            <span style={{ fontSize:11,color:c.text,lineHeight:1.5 }}>{gap.msg}</span>
          </div>
        );
      })}
    </div>
  );
};

const Rankings = ({ items, onSelect }) => {
  const [sortCol, setSortCol] = useState("total"); const [asc, setAsc] = useState(false);
  const [filterMode, setFilterMode] = useState("all"); const [filterValue, setFilterValue] = useState("");
  const indications = [...new Set(items.map(getIndicationGroup))].sort();
  const amphoes = [...new Set(items.map(x=>x.amphoe))].sort();

  useEffect(() => { if (filterMode === "indication") setFilterValue(indications[0]); else if (filterMode === "amphoe") setFilterValue(amphoes[0]); else setFilterValue(""); }, [filterMode]);
  const handleSort = (col) => { if(sortCol===col) setAsc(!asc); else { setSortCol(col); setAsc(false); }};

  const filteredItems = items.filter(x => { if(filterMode==="indication") return getIndicationGroup(x)===filterValue; if(filterMode==="amphoe") return x.amphoe===filterValue; return true; });
  const sortedForRank = [...filteredItems].sort((a,b)=>getScore(b) - getScore(a));

    }).join("");
    
    const html = '<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><title>WISDOM PRODUCT 2569</title><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:\'Sarabun\',sans-serif;background:#e0f7fa;padding:16px}</style></head><body><div style="max-width:1000px;margin:0 auto"><div style="background:linear-gradient(135deg,#004d40,#00838f,#00acc1);border-radius:20px;padding:24px;color:#fff;margin-bottom:20px;text-align:center"><div style="font-size:40px;margin-bottom:8px">🌿</div><h1 style="font-size:20px;font-weight:800;margin-bottom:4px">WISDOM PRODUCT 2569</h1><p style="font-size:13px;opacity:0.9">รายงานประเมินนวัตกรรมภูมิปัญญาแพทย์แผนไทย จ.สมุทรปราการ</p></div><div style="background:#fff;border-radius:16px;overflow:hidden;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06)"><div style="background:linear-gradient(135deg,#004d40,#00838f);padding:12px 18px"><div style="font-size:14px;font-weight:700;color:#fff">🏆 ตารางจัดอันดับผลงานทั้งหมด '+items.length+' รายการ</div></div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:600px"><thead><tr style="background:linear-gradient(135deg,#00acc1,#26c6da)"><th style="padding:8px 10px;color:#fff;font-size:11px;font-weight:700">อันดับ</th><th style="padding:8px 10px;color:#fff;font-size:11px;text-align:left">ชื่อนวัตกรรม</th><th style="padding:8px 10px;color:#fff;font-size:11px;text-align:left">หน่วยงาน</th><th style="padding:8px 10px;color:#fff;font-size:11px">อำเภอ</th><th style="padding:8px 10px;color:#ffd54f;font-size:11px">ค.1</th><th style="padding:8px 10px;color:#ffb74d;font-size:11px">ค.2</th><th style="padding:8px 10px;color:#80deea;font-size:11px">ค.3</th><th style="padding:8px 10px;color:#ce93d8;font-size:11px">ค.4</th><th style="padding:8px 10px;color:#80deea;font-size:11px">ค.5</th><th style="padding:8px 10px;color:#fff;font-size:11px">รวม</th></tr></thead><tbody>'+rankRows+'</tbody></table></div></div></div></body></html>';
    const blob = new Blob([html], { type: "text/html;charset=utf-8" }); const url = URL.createObjectURL(blob); window.open(url, "_blank");
  };

    analysis:     "#1565c0",   // 7 — Dark Blue (วิเคราะห์)

    return (

          <div style={{ fontSize:50, marginBottom:16 }}>🔒</div><h2 style={{ color:GOLD.dark, margin:"0 0 8px", fontSize:22, fontWeight:800 }}>WISDOM PRODUCT 2569</h2><p style={{ color:"#666", margin:"0 0 24px", fontSize:14 }}>กรุณาใส่รหัสผ่าน 4 หลัก (8888)</p>
          <form onSubmit={handleLogin}><input type="password" maxLength={4} value={pin} onChange={e => { setPin(e.target.value.replace(/[^0-9]/g, '')); setLoginError(false); }} placeholder="••••" style={{ width:"100%", padding:"14px", fontSize:32, letterSpacing:16, textAlign:"center", borderRadius:16, border:`2px solid ${loginError?'#e53935':'#80deea'}`, outline:"none", marginBottom:16, color:GOLD.dark, fontWeight:800, boxSizing:"border-box" }} autoFocus />{loginError && <div style={{ color:"#e53935", fontSize:13, fontWeight:700, margin:"-8px 0 16px" }}>รหัสผ่านไม่ถูกต้อง</div>}<button type="submit" style={{ width:"100%", background:`linear-gradient(135deg,${GOLD.main},${GOLD.medium})`, color:"#fff", border:"none", borderRadius:16, padding:"16px", fontSize:16, fontWeight:700, cursor:"pointer", boxShadow:"0 4px 12px rgba(154,122,0,0.2)" }}>เข้าสู่ระบบ</button></form>
        </div>
