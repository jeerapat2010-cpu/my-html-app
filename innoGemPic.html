// ── ERROR BOUNDARY ────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, errorInfo: "" }; }
  static getDerivedStateFromError(error) { return { hasError: true, errorInfo: error.toString() }; }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ padding: 40, textAlign: 'center', color: '#e11d48' }}>
          <h2>เกิดข้อผิดพลาดในการแสดงผลหน้าจอ (Render Error)</h2><p>กรุณาตรวจสอบโครงสร้างข้อมูลที่ใช้งาน</p>
          <pre style={{ background:'#fff', padding:10, borderRadius:8, textAlign:'left', maxWidth:800, margin:'0 auto' }}>{this.state.errorInfo}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

              {[["ค.1 ความเป็นนวัตกรรม",item.c1,0],["ค.2 ความเหมาะสมต่อบริบท",item.c2,1],["ค.3 ความปลอดภัย",item.c3,2],["ค.4 ประสิทธิผล",item.c4,3],["ค.5 การนำไปใช้",item.c5,4]].map(([l,v,i])=><div key={l} style={{ marginBottom:8 }}><div style={{ fontSize:11, color:"#666", marginBottom:2 }}>{l}</div><ScoreBar val={v} idx={i} /></div>)}
            </div>
            <ResponsiveContainer width="100%" height={160}>
              <RadarChart data={radarData}><PolarGrid stroke="#99f6e4" /><PolarAngleAxis dataKey="name" tick={{fill:"#555",fontSize:9}} /><PolarRadiusAxis angle={90} domain={[0,20]} tick={false} /><Radar dataKey="A" stroke="#14b8a6" fill="#2dd4bf" fillOpacity={0.3} /></RadarChart>
            </ResponsiveContainer>
          </div>
          <Section title="บทคัดย่อ / สาระสำคัญ" colorIdx={0}><p style={{ fontSize:13, color:"#444", lineHeight:1.7, margin:0 }}>{item.abstract}</p></Section>
          <Section title="ส่วนประกอบ" colorIdx={1}><div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>{(item.ingredients||[]).map((ing,i)=><span key={i} style={{ background:["#e0f2fe","#ffedd5","#f3e8ff","#f0fdfa","#ffe4e6","#ecfeff"][i%6], color:["#0369a1","#c2410c","#6d28d9","#0f766e","#be185d","#0e7490"][i%6], borderRadius:12, padding:"3px 10px", fontSize:12, fontWeight:600 }}>{ing}</span>)}</div></Section>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <Section title="วิธีการใช้" colorIdx={2}><p style={{ fontSize:13, color:"#444", margin:0 }}>{item.usage}</p></Section>
            <Section title="ข้อบ่งชี้" colorIdx={3}><p style={{ fontSize:13, color:"#444", margin:0 }}>{item.indication}</p></Section>
          </div>
          
          <Section title="จุดเด่น (Strengths)" colorIdx={4}><ul style={{ margin:0, paddingLeft:16 }}>{(item.strengths||[]).map((s,i)=><li key={i} style={{ fontSize:13, color:"#333", marginBottom:4 }}>{s}</li>)}</ul></Section>
          <Section title="จุดที่ต้องพัฒนา" colorIdx={5}><ul style={{ margin:0, paddingLeft:16 }}>{(item.improvements||[]).map((s,i)=><li key={i} style={{ fontSize:13, color:"#555", marginBottom:4 }}>{s}</li>)}</ul></Section>
          <Section title="ข้อเสนอแนะ" colorIdx={6}><ul style={{ margin:0, paddingLeft:16 }}>{(item.recs||[]).map((s,i)=><li key={i} style={{ fontSize:13, color:"#444", marginBottom:4 }}>{s}</li>)}</ul></Section>
          
          {item.questions && item.questions.length > 0 && (
            <Section title="คำถามจากคณะกรรมการ (Questions)" colorIdx={7}><ul style={{ margin:0, paddingLeft:16 }}>{item.questions.map((q,i)=><li key={i} style={{ fontSize:13, color:"#333", marginBottom:4 }}>{q}</li>)}</ul></Section>
          )}
          {item.market && item.market !== "-" && (
            <Section title="ศักยภาพการตลาด (Market)" colorIdx={2}><p style={{ fontSize:13, color:"#444", margin:0 }}>{item.market}</p></Section>
          )}

          <div style={{ background:THEME.pale, border:`1px solid ${THEME.border}`, borderRadius:12, padding:"12px 16px", marginTop:12 }}><p style={{ fontSize:13, color:THEME.dark, fontWeight:600, margin:0 }}>{item.summary}</p></div>
          {item.comments && item.comments.length > 0 && (
            <Section title="คอมเม้นท์เพิ่มเติม">
              {item.comments.map((c,i)=><div key={i} style={{ background:"#f9f9f9", borderRadius:8, padding:"8px 12px", marginBottom:6, fontSize:13 }}><div style={{ color:"#888", fontSize:11, marginBottom:2 }}>{c.date}</div><div style={{ color:"#333" }}>{c.text}</div></div>)}
            </Section>
          )}
          <div style={{ display:"flex", gap:10, marginTop:16 }}>
            <button onClick={()=>onEdit(item)} style={{ flex:1, background:THEME.main, color:"#fff", border:"none", borderRadius:12, padding:"10px 0", fontSize:13, fontWeight:600, cursor:"pointer" }}>✏️ แก้ไขคะแนน / เพิ่มคอมเม้นท์</button>
            <button onClick={onClose} style={{ flex:1, background:THEME.pale, color:THEME.main, border:`1px solid ${THEME.border}`, borderRadius:12, padding:"10px 0", fontSize:13, fontWeight:600, cursor:"pointer" }}>✕ ปิด</button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── MODALS: EDIT & IMPORT ──────────────────────────────────────────────────
const EditModal = ({ item, onClose, onSave }) => {
  const [userScore, setUserScore] = useState(getScore(item));
  const [comment, setComment] = useState("");
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:1100, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:20, width:"100%", maxWidth:450, padding:24 }}>
        <h3 style={{ color:THEME.main, margin:"0 0 16px" }}>✏️ แก้ไข: {item.name ? item.name.substring(0,30) : ""}...</h3>
        <div style={{ marginBottom:16 }}><label style={{ fontSize:13, color:"#555", display:"block", marginBottom:6 }}>คะแนนของคุณ (0-100)</label>
          <input type="number" min="0" max="100" value={userScore} onChange={e=>setUserScore(+e.target.value)} style={{ width:"100%", padding:"10px 14px", border:`1px solid ${THEME.border}`, borderRadius:10, fontSize:15, color:THEME.dark, fontWeight:700, boxSizing:"border-box" }} />
          <div style={{ fontSize:11, color:"#888", marginTop:4 }}>คะแนนเดิม: {item.total}/100</div>
        </div>
        <div style={{ marginBottom:16 }}><label style={{ fontSize:13, color:"#555", display:"block", marginBottom:6 }}>เพิ่มคอมเม้นท์</label>
          <textarea value={comment} onChange={e=>setComment(e.target.value)} rows={3} placeholder="พิมพ์คอมเม้นท์ของคุณที่นี่..." style={{ width:"100%", padding:"10px 14px", border:`1px solid ${THEME.border}`, borderRadius:10, fontSize:13, resize:"vertical", boxSizing:"border-box" }} />
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <button onClick={()=>onSave(item.id, userScore, comment)} style={{ flex:1, background:THEME.main, color:"#fff", border:"none", borderRadius:12, padding:"11px 0", fontSize:13, fontWeight:600, cursor:"pointer" }}>💾 บันทึก</button>
          <button onClick={onClose} style={{ flex:1, background:"#f5f5f5", color:"#555", border:"1px solid #ddd", borderRadius:12, padding:"11px 0", fontSize:13, cursor:"pointer" }}>ยกเลิก</button>
        </div>
      </div>
    </div>
  );
};

const ImportModal = ({ onClose, onImport }) => {
  const [text, setText] = useState(""); const fileRef = useRef();
  const handleFile = (e) => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload=(ev)=>setText(ev.target.result); r.readAsText(f); };
  const handleImport = () => { try { const data = JSON.parse(text); if(Array.isArray(data)){ onImport(data); onClose(); } else alert("ไฟล์ JSON ต้องเป็น array ของผลงาน"); } catch(e){ alert("ไฟล์ JSON ไม่ถูกต้อง"); } };
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:1100, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:20, width:"100%", maxWidth:500, padding:24 }}>
        <h3 style={{ color:THEME.main, margin:"0 0 8px" }}>📥 นำเข้าข้อมูล</h3><p style={{ fontSize:13, color:"#666", margin:"0 0 16px" }}>รองรับไฟล์ JSON หรือ paste JSON ตรงๆ ด้านล่าง</p>
        <input type="file" ref={fileRef} accept=".json" onChange={handleFile} style={{ marginBottom:12 }} />
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={6} placeholder='[{"id":26,"name":"ชื่อนวัตกรรม",...}]' style={{ width:"100%", padding:"10px 14px", border:`1px solid ${THEME.border}`, borderRadius:10, fontSize:12, resize:"vertical", boxSizing:"border-box", fontFamily:"monospace" }} />
        <div style={{ display:"flex", gap:10, marginTop:12 }}>
          <button onClick={handleImport} style={{ flex:1, background:THEME.main, color:"#fff", border:"none", borderRadius:12, padding:"11px 0", fontSize:13, fontWeight:600, cursor:"pointer" }}>📥 นำเข้าข้อมูล</button>
          <button onClick={onClose} style={{ flex:1, background:"#f5f5f5", color:"#555", border:"1px solid #ddd", borderRadius:12, padding:"11px 0", fontSize:13, cursor:"pointer" }}>ยกเลิก</button>
        </div>
      </div>
    </div>
  );
};

// ── PAGE: DASHBOARD ─────────────────────────────────────────────────────────
const Dashboard = ({ items, onSelect }) => {
  const sorted = [...items].sort((a,b)=>getScore(b) - getScore(a));
  const avg = (items.reduce((s,x)=>s+getScore(x),0)/items.length).toFixed(1);
  const passed = items.filter(x=>getScore(x)>=70).length;
  const top5 = sorted.slice(0,5);

  const byAmphoe = Object.entries(
    items.reduce((acc,x)=>{ if(!acc[x.amphoe])acc[x.amphoe]={sum:0,n:0}; acc[x.amphoe].sum+=getScore(x); acc[x.amphoe].n++; return acc; },{})
  ).map(([name,{sum,n}])=>({ name, avg:+(sum/n).toFixed(1), count:n, n:n })).sort((a,b)=>b.n-a.n || b.avg-a.avg);

  const byType = Object.entries(
    items.reduce((acc,x)=>{ acc[x.type]=(acc[x.type]||0)+1; return acc; },{})
  ).map(([name,value])=>({ name, value })).sort((a,b)=>b.value-a.value);

  const top10 = sorted.slice(0,10).map(x=>({ name:x.name?x.name.substring(0,14)+"…":"", score:getScore(x), id:x.id }));
  const statusData = Object.entries(items.reduce((acc,x)=>{ acc[x.status]=(acc[x.status]||0)+1; return acc; },{})).map(([name,value])=>({ name, value }));

  const KPI = ({val,sub,grad,icon,textColor}) => (
    <div style={{ background:grad, borderRadius:16, padding:"16px 20px", flex:"1 1 200px", boxShadow:"0 4px 16px rgba(0,0,0,0.08)", border:"none" }}>
      <div style={{ fontSize:24, marginBottom:4 }}>{icon}</div>
      <div style={{ fontSize:26, fontWeight:700, color:textColor||"#fff" }}>{val}</div>
      <div style={{ fontSize:12, color:"rgba(255,255,255,0.85)" }}>{sub}</div>
    </div>
  );

  return (
    <div>
      <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:20 }}>
        <KPI val={items.length} sub="ผลงานทั้งหมด" grad={`linear-gradient(135deg,${THEME.dark},${THEME.main})`} icon="🏺" />
        <KPI val={avg} sub="คะแนนเฉลี่ย / 100" grad={`linear-gradient(135deg,${THEME.main},${THEME.medium})`} icon="📊" />
        <KPI val={passed} sub={`ผ่านเกณฑ์ดี (≥70)`} grad={`linear-gradient(135deg,${THEME.medium},${THEME.light})`} icon="🏆" />
        <KPI val={top5.length > 0 ? getScore(top5[0]) : "-"} sub="คะแนนสูงสุด" grad={`linear-gradient(135deg,#0ea5e9,#38bdf8)`} icon="⭐" />
      </div>

      <div style={{ background:"#fff", borderRadius:16, padding:20, marginBottom:16, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
        <div style={{ fontSize:15, fontWeight:700, color:THEME.dark, marginBottom:14 }}>🏆 Top 5 ผลงานดีเด่น</div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
          {top5.map((item,idx)=>{
            const grads = ["linear-gradient(135deg,#0f766e,#0d9488)", "linear-gradient(135deg,#14b8a6,#2dd4bf)", "linear-gradient(135deg,#38bdf8,#7dd3fc)", "linear-gradient(135deg,#8b5cf6,#a78bfa)", "linear-gradient(135deg,#ec4899,#fb7185)"];
            const borders = ["#0d9488","#2dd4bf","#7dd3fc","#a78bfa","#fb7185"];
            return (
              <div key={item.id} onClick={()=>onSelect(item)} style={{ flex:"1 1 150px", background:grads[idx], borderRadius:14, padding:"14px 14px", cursor:"pointer", border:`2px solid ${borders[idx]}`, color:"#fff" }}>
                <div style={{ fontSize:22, marginBottom:4 }}>{["🥇","🥈","🥉","4️⃣","5️⃣"][idx]}</div>
                <div style={{ fontSize:26, fontWeight:800 }}>{getScore(item)}</div>
                <div style={{ fontSize:11, opacity:0.92, lineHeight:1.4, marginTop:2 }}>{item.name?item.name.substring(0,30):""}</div>
                <div style={{ fontSize:10, opacity:0.75, marginTop:2 }}>{item.unit}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
        <div style={{ background:"#fff", borderRadius:16, padding:"16px 12px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
          <div style={{ fontSize:14, fontWeight:700, color:THEME.dark, marginBottom:12, paddingLeft:8 }}>📊 Top 10 คะแนนรวม</div>
          <ResponsiveContainer width="100%" height={220}><BarChart data={top10} layout="vertical" margin={{left:0,right:24,top:0,bottom:0}}><CartesianGrid strokeDasharray="3 3" stroke="#f5f5f5" horizontal={false} /><XAxis type="number" domain={[0,100]} tick={{fontSize:10}} /><YAxis type="category" dataKey="name" width={90} tick={{fontSize:9}} /><Tooltip formatter={(v)=>[v+" คะแนน","คะแนน"]} /><Bar dataKey="score" radius={[0,6,6,0]} onClick={(d)=>onSelect(items.find(x=>x.id===d.id))}>{top10.map((e,i)=><Cell key={i} fill={CHART_COLORS[i%CHART_COLORS.length]} />)}</Bar></BarChart></ResponsiveContainer>
        </div>
        <div style={{ background:"#fff", borderRadius:16, padding:"16px 12px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
          <div style={{ fontSize:14, fontWeight:700, color:THEME.main, marginBottom:12, paddingLeft:8 }}>🗺️ คะแนนเฉลี่ยตามอำเภอ</div>
          <ResponsiveContainer width="100%" height={220}><BarChart data={byAmphoe} margin={{left:0,right:24,top:0,bottom:20}}><CartesianGrid strokeDasharray="3 3" stroke="#f5f5f5" /><XAxis dataKey="name" tick={{fontSize:9}} angle={-30} textAnchor="end" /><YAxis domain={[0,100]} tick={{fontSize:10}} /><Tooltip formatter={(v,n,p)=>[v.toFixed(1)+" คะแนน ("+p.payload.count+" ผลงาน)","เฉลี่ย"]} /><Bar dataKey="avg" radius={[6,6,0,0]}>{byAmphoe.map((e,i)=><Cell key={i} fill={CHART_COLORS[i%CHART_COLORS.length]} />)}</Bar></BarChart></ResponsiveContainer>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
        <div style={{ background:"#fff", borderRadius:16, padding:"16px 12px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
          <div style={{ fontSize:14, fontWeight:700, color:THEME.medium, marginBottom:12, paddingLeft:8 }}>🏷️ สัดส่วนตามประเภท</div>
          <div style={{ display:"flex", alignItems:"center" }}>
            <ResponsiveContainer width={160} height={160}><PieChart><Pie data={byType} cx="50%" cy="50%" innerRadius={40} outerRadius={70} dataKey="value" paddingAngle={3}>{byType.map((e,i)=><Cell key={i} fill={CHART_COLORS[i%CHART_COLORS.length]} />)}</Pie><Tooltip /></PieChart></ResponsiveContainer>
            <div style={{ flex:1, paddingLeft:8, maxHeight:150, overflowY:"auto" }}>{byType.slice(0,10).map((e,i)=><div key={i} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}><div style={{ width:10, height:10, borderRadius:2, background:CHART_COLORS[i%CHART_COLORS.length], flexShrink:0 }} /><span style={{ fontSize:10, color:"#555" }}>{e.name}: {e.value}</span></div>)}</div>
          </div>
        </div>
        <div style={{ background:"#fff", borderRadius:16, padding:"16px 12px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
          <div style={{ fontSize:14, fontWeight:700, color:THEME.amber, marginBottom:12, paddingLeft:8 }}>🔬 สถานะงานวิจัย</div>
          <ResponsiveContainer width="100%" height={200}><BarChart data={statusData} layout="vertical" margin={{left:0,right:24}}><CartesianGrid strokeDasharray="3 3" stroke="#f5f5f5" horizontal={false} /><XAxis type="number" tick={{fontSize:10}} /><YAxis type="category" dataKey="name" width={130} tick={{fontSize:9}} /><Tooltip /><Bar dataKey="value" radius={[0,6,6,0]}>{statusData.map((e,i)=><Cell key={i} fill={CHART_COLORS[(i+4)%CHART_COLORS.length]} />)}</Bar></BarChart></ResponsiveContainer>
        </div>
      </div>

      {/* Amphoe Summary Table */}
      <div style={{ background:"#fff", borderRadius:16, padding:20, marginBottom:16, boxShadow:`0 2px 12px rgba(20,184,166,0.1)`, border:`2px solid ${THEME.border}` }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div style={{ fontSize:15, fontWeight:700, color:THEME.dark }}>🗺️ สรุปผลงานนวัตกรรมรายอำเภอ</div>
          <div style={{ fontSize:12, color:THEME.main, fontWeight:600 }}>รวมทั้งสิ้น {items.length} ผลงาน · {byAmphoe.length} อำเภอ</div>
        </div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:16 }}>
          {byAmphoe.map((a,i)=>{
            const ampItems = items.filter(x=>x.amphoe===a.name);
            const passCount = ampItems.filter(x=>getScore(x)>=70).length;
            const pct = Math.round((a.n/items.length)*100);
            return (
              <div key={i} style={{ flex:"1 1 130px", background:`linear-gradient(135deg,${CHART_COLORS[i%CHART_COLORS.length]}18,${CHART_COLORS[i%CHART_COLORS.length]}08)`, borderRadius:12, padding:"12px 14px", border:`2px solid ${CHART_COLORS[i%CHART_COLORS.length]}40`, textAlign:"center" }}>
                <div style={{ fontSize:22, fontWeight:900, color:CHART_COLORS[i%CHART_COLORS.length], lineHeight:1 }}>{a.n}</div>
                <div style={{ fontSize:9, color:"#999", marginTop:1 }}>ผลงาน ({pct}%)</div>
                <div style={{ fontSize:12, fontWeight:800, color:THEME.dark, marginTop:4 }}>อ.{a.name}</div>
                <div style={{ marginTop:6, background:"#f5f5f5", borderRadius:4, height:5, overflow:"hidden" }}><div style={{ width:`${(a.n/items.length)*100}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:4 }} /></div>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}><span style={{ fontSize:10, color:THEME.main, fontWeight:700 }}>เฉลี่ย {a.avg}</span><span style={{ fontSize:10, color:passCount===a.n?"#059669":THEME.amber, fontWeight:700 }}>ผ่าน {passCount}/{a.n} ({Math.round((passCount/a.n)*100)}%)</span></div>
              </div>
            );
          })}
        </div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", minWidth:560 }}>
            <thead><tr style={{ background:`linear-gradient(135deg,${THEME.dark},${THEME.main})` }}>{["อันดับ","อำเภอ","จำนวนนวัตกรรม","สัดส่วน (%)","เฉลี่ย","สูงสุด","ผ่านเกณฑ์ (≥70)","ดีเด่น (≥85)"].map((h,i)=><th key={i} style={{ padding:"8px 10px", color:THEME.pale, fontSize:11, fontWeight:700, textAlign:i<=1?"left":"center", whiteSpace:"nowrap" }}>{h}</th>)}</tr></thead>
            <tbody>
              {byAmphoe.map((a,i)=>{
                const ampItems = items.filter(x=>x.amphoe===a.name);
                const maxScore = Math.max(...ampItems.map(x=>getScore(x)));
                const passCount = ampItems.filter(x=>getScore(x)>=70).length;
                const excellCount = ampItems.filter(x=>getScore(x)>=85).length;
                const pct = ((a.n/items.length)*100).toFixed(1);
                const allPass = passCount === a.n;
                return (
                  <tr key={i} style={{ background:i%2===0?"#fff":THEME.surface, borderBottom:`1px solid ${CHART_COLORS[i%CHART_COLORS.length]}20` }}>
                    <td style={{ padding:"9px 10px", fontSize:13, fontWeight:800, color:CHART_COLORS[i%CHART_COLORS.length], textAlign:"center" }}>{["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣"][i]||`${i+1}`}</td>
                    <td style={{ padding:"9px 10px", fontSize:13, fontWeight:700, color:THEME.dark }}>อ.{a.name}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}><div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}><span style={{ background:CHART_COLORS[i%CHART_COLORS.length], color:"#fff", borderRadius:20, padding:"3px 14px", fontSize:14, fontWeight:900 }}>{a.n}</span><span style={{ fontSize:10, color:"#999" }}>ผลงาน</span></div></td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}><div style={{ background:"#f5f5f5", borderRadius:6, height:10, overflow:"hidden", width:80, margin:"0 auto" }}><div style={{ width:`${(a.n/items.length)*100}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:6 }} /></div><div style={{ fontSize:11, color:CHART_COLORS[i%CHART_COLORS.length], fontWeight:700, marginTop:2 }}>{pct}%</div></td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:15, fontWeight:900, color:THEME.main }}>{a.avg}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:14, fontWeight:700, color:THEME.dark }}>{maxScore}</td>

                    <td style={{ padding:"9px 10px", textAlign:"center" }}>{excellCount > 0 ? <span style={{ background:THEME.pale, color:THEME.dark, borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:800, border:`1px solid ${THEME.light}` }}>⭐ {excellCount} ผลงาน</span> : <span style={{ color:"#ddd", fontSize:12 }}>—</span>}</td>

                <td style={{ padding:"9px 10px", textAlign:"center", fontSize:12, fontWeight:700, color:THEME.main }}>100%</td>
                <td style={{ padding:"9px 10px", textAlign:"center", fontSize:15, fontWeight:900, color:THEME.main }}>{(items.reduce((s,x)=>s+getScore(x),0)/items.length).toFixed(1)}</td>
                <td style={{ padding:"9px 10px", textAlign:"center", fontSize:14, fontWeight:700, color:THEME.dark }}>{Math.max(...items.map(x=>getScore(x)))}</td>
                <td style={{ padding:"9px 10px", textAlign:"center" }}><span style={{ background:"#dcfce7", color:"#166534", borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:800, border:"1px solid #86efac" }}>{items.filter(x=>getScore(x)>=70).length} / {items.length} ({Math.round((items.filter(x=>getScore(x)>=70).length/items.length)*100)}%)</span></td>

};

// ── PAGE: PRODUCT LIST ──────────────────────────────────────────────────────
const ProductList = ({ items, onSelect, onEdit, onImageUpdate }) => {

  const [sortBy, setSortBy] = useState("หมายเลข");

  const amphoes = ["ทั้งหมด",...[...new Set(items.map(x=>x.amphoe))]];
  const types = ["ทั้งหมด",...[...new Set(items.map(x=>x.type))]];
  const statuses = ["ทั้งหมด",...[...new Set(items.map(x=>x.status))]];

  const filtered = items.filter(x=>{
    const sc = search.toLowerCase();
    if (search && !(x.name && x.name.toLowerCase().includes(sc)) && !(x.unit && x.unit.toLowerCase().includes(sc))) return false;
    if (filterAmphoe!=="ทั้งหมด" && x.amphoe!==filterAmphoe) return false;
    if (filterType!=="ทั้งหมด" && x.type!==filterType) return false;
    if (filterStatus!=="ทั้งหมด" && x.status!==filterStatus) return false;
    return true;
  }).sort((a,b)=>{
    if(sortBy==="คะแนน" || sortBy==="score") return getScore(b) - getScore(a);
    if(sortBy==="หมายเลข" || sortBy==="id") return a.id - b.id;

      {opts.map(o=><option key={o}>{o}</option>)}

  );

  return (
    <div>
      <div style={{ background:"#fff", borderRadius:16, padding:"14px 16px", marginBottom:16, boxShadow:"0 2px 8px rgba(20,184,166,0.08)", border:`1px solid ${THEME.surface}`, display:"flex", flexWrap:"wrap", gap:10, alignItems:"center" }}>

        <span style={{ fontSize:12, color:"#888", fontWeight:700 }}>แสดง {filtered.length} รายการ</span>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:14 }}>
        {filtered.map(item=>{
          const score = getScore(item); const g = GRADE_SOLID(score); const img = item.image;
          return (
            <div key={item.id} style={{ background:"#fff", borderRadius:16, overflow:"hidden", boxShadow:"0 3px 14px rgba(0,0,0,0.08)", border:`1.5px solid ${g.border}20`, cursor:"pointer", transition:"transform 0.15s", display:"flex", flexDirection:"column" }}
              onMouseEnter={e=>{ e.currentTarget.style.transform="translateY(-4px)"; e.currentTarget.style.boxShadow=`0 8px 24px ${g.border}40`; }} onMouseLeave={e=>{ e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="0 3px 14px rgba(0,0,0,0.08)"; }}>
              <div onClick={()=>onSelect(item)} style={{ height:120, background:TYPE_BG[item.type]||"linear-gradient(135deg,#f0fdfa,#ccfbf1)", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", position:"relative" }}>
                {img ? <img src={img} alt={item.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : <div style={{ textAlign:"center" }}><div style={{ fontSize:40, marginBottom:4 }}>{TYPE_EMOJI[item.type]||"🌿"}</div><div style={{ fontSize:10, color:"rgba(0,0,0,0.45)", fontWeight:600 }}>{item.type}</div></div>}
                <div style={{ position:"absolute", top:8, right:8 }}><label onClick={e=>e.stopPropagation()} htmlFor={`img-${item.id}`} style={{ background:"rgba(255,255,255,0.92)", borderRadius:8, padding:"4px 8px", fontSize:10, cursor:"pointer", color:"#555", fontWeight:600 }}>📷</label><input id={`img-${item.id}`} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>handleImg(item.id,e)} /></div>
                <div style={{ position:"absolute", top:8, left:8, background:"rgba(0,0,0,0.35)", borderRadius:6, padding:"2px 7px", fontSize:10, color:"#fff", fontWeight:700 }}>#{item.id}</div>
              </div>
              <div onClick={()=>onSelect(item)} style={{ padding:"12px 14px", flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"start", marginBottom:6 }}><div style={{ fontSize:11, color:"#888" }}>{item.amphoe}</div><span style={{ background:g.bg, color:g.color, borderRadius:20, padding:"2px 9px", fontSize:11, fontWeight:700, border:`1px solid ${g.border}` }}>{g.label}</span></div>
                <div style={{ fontSize:13, fontWeight:700, color:"#1a1a1a", lineHeight:1.4, marginBottom:4 }}>{item.name}</div>
                <div style={{ fontSize:11, color:"#666", marginBottom:8 }}>{item.unit}</div>
                <div style={{ display:"flex", gap:3, marginBottom:8 }}>{[item.c1,item.c2,item.c3,item.c4,item.c5].map((v,i)=><div key={i} style={{ flex:1, background:"#f5f5f5", borderRadius:3, height:5, overflow:"hidden" }}><div style={{ width:`${((v||0)/20)*100}%`, background:CRIT_COLORS[i], height:"100%" }} /></div>)}</div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}><span style={{ fontSize:10, color:"#999", background:"#f5f5f5", borderRadius:8, padding:"2px 8px" }}>{item.status}</span><span style={{ fontSize:26, fontWeight:800, color:g.color }}>{score}</span></div>
              </div>
              <div style={{ padding:"0 14px 12px" }}><button onClick={e=>{ e.stopPropagation(); onEdit(item); }} style={{ width:"100%", padding:"7px 0", background:g.bg, color:g.color, border:`1px solid ${g.border}`, borderRadius:10, fontSize:11, cursor:"pointer", fontWeight:700 }}>✏️ แก้ไขคะแนน</button></div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── PAGE: RANKINGS ──────────────────────────────────────────────────────────
const getIndicationGroup = (item) => {
  const ind = item.indication || "";
  if (ind.includes("ปวด") || ind.includes("อักเสบ") || ind.includes("เมื่อย") || ind.includes("ตึง") || ind.includes("ชา")) return "บรรเทาปวดและอักเสบ";
  if (ind.includes("หวัด") || ind.includes("วิงเวียน") || ind.includes("ไอ") || ind.includes("ระคายคอ") || ind.includes("คลื่นไส้") || ind.includes("คัดจมูก")) return "ทางเดินหายใจและวิงเวียน";
  if (ind.includes("ผิว") || ind.includes("ทำความสะอาด") || ind.includes("เซลล์ผิว")) return "เวชสำอางและบำรุงผิว";
  if (ind.includes("ถอนพิษ")) return "ถอนพิษสารเคมี";
  if (ind.includes("น้ำนม") || ind.includes("หลังคลอด") || ind.includes("บำรุงเลือด")) return "มารดาและทารก/บำรุงร่างกาย";
  if (ind.includes("ชะลอวัย") || ind.includes("บำรุงหัวใจ")) return "ส่งเสริมสุขภาพชะลอวัย";
  return "อื่นๆ";
};

const Rankings = ({ items, onSelect }) => {
  const [sortCol, setSortCol] = useState("total"); const [asc, setAsc] = useState(false);
  const [filterMode, setFilterMode] = useState("all"); const [filterValue, setFilterValue] = useState("");
  const indications = [...new Set(items.map(getIndicationGroup))].sort();
  const amphoes = [...new Set(items.map(x=>x.amphoe))].sort();

  useEffect(() => { if (filterMode === "indication") setFilterValue(indications[0]); else if (filterMode === "amphoe") setFilterValue(amphoes[0]); else setFilterValue(""); }, [filterMode]);
  const handleSort = (col) => { if(sortCol===col) setAsc(!asc); else { setSortCol(col); setAsc(false); }};

  const filteredItems = items.filter(x => { if(filterMode==="indication") return getIndicationGroup(x)===filterValue; if(filterMode==="amphoe") return x.amphoe===filterValue; return true; });
  const sortedForRank = [...filteredItems].sort((a,b)=>getScore(b) - getScore(a));

  const displayed = [...filteredItems].sort((a,b)=>{
    let va = sortCol==="total"?getScore(a):sortCol==="name"?(a.name||""):sortCol==="amphoe"?(a.amphoe||""):(a[sortCol]!=null?a[sortCol]:0);
    let vb = sortCol==="total"?getScore(b):sortCol==="name"?(b.name||""):sortCol==="amphoe"?(b.amphoe||""):(b[sortCol]!=null?b[sortCol]:0);
    if(typeof va==="string") return asc?va.localeCompare(vb,"th"):vb.localeCompare(va,"th");
    return asc?va-vb:vb-va;
  });

  const Th = ({col,label}) => (<th onClick={()=>handleSort(col)} style={{ padding:"10px 12px", background:`linear-gradient(135deg,${THEME.dark},${THEME.main})`, color:THEME.pale, fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", textAlign:"center", userSelect:"none" }}>{label} {sortCol===col?(asc?"↑":"↓"):""}</th>);

  return (
    <div>
      <div style={{ display:"flex", gap:10, marginBottom:16, alignItems:"center", background:"#fff", padding:"14px 20px", borderRadius:16, boxShadow:"0 2px 12px rgba(20,184,166,0.12)", border:`1px solid ${THEME.surface}`, flexWrap:"wrap" }}>
        <div style={{ fontSize:14, fontWeight:800, color:THEME.dark }}>📌 เลือกรูปแบบการจัดอันดับ:</div>
        <select value={filterMode} onChange={e=>setFilterMode(e.target.value)} style={{ padding:"8px 14px", borderRadius:10, border:`1px solid ${THEME.border}`, outline:"none", cursor:"pointer", fontSize:13, color:THEME.dark, fontWeight:700 }}><option value="all">🏆 คะแนนรวมทั้งหมด</option><option value="indication">🏷️ จัดอันดับตามกลุ่มสรรพคุณ</option><option value="amphoe">🗺️ จัดอันดับในอำเภอ</option></select>
        {filterMode === "indication" && <select value={filterValue} onChange={e=>setFilterValue(e.target.value)} style={{ padding:"8px 14px", borderRadius:10, border:`1px solid ${THEME.border}`, outline:"none", cursor:"pointer", fontSize:13, color:THEME.main, background:THEME.surface }}>{indications.map(t=><option key={t} value={t}>สรรพคุณ: {t}</option>)}</select>}
        {filterMode === "amphoe" && <select value={filterValue} onChange={e=>setFilterValue(e.target.value)} style={{ padding:"8px 14px", borderRadius:10, border:`1px solid ${THEME.border}`, outline:"none", cursor:"pointer", fontSize:13, color:THEME.main, background:THEME.surface }}>{amphoes.map(a=><option key={a} value={a}>อ.{a}</option>)}</select>}
        <div style={{ flex:1, textAlign:"right", fontSize:12, color:"#888" }}>จัดอันดับจาก <strong style={{color:THEME.dark}}>{filteredItems.length}</strong> รายการ</div>
      </div>

      <div style={{ background:"#fff", borderRadius:16, overflow:"hidden", boxShadow:"0 2px 12px rgba(20,184,166,0.12)", border:`1px solid ${THEME.surface}` }}>
        <div style={{ padding:"16px 20px", borderBottom:`1px solid ${THEME.surface}` }}><div style={{ fontSize:15, fontWeight:700, color:THEME.main }}>🏆 ตารางจัดอันดับผลงาน {filterMode==="all"?"ทั้งหมด":filterMode==="indication"?`กลุ่มสรรพคุณ: ${filterValue}`:`อำเภอ: ${filterValue}`}</div></div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr><th style={{ padding:"10px 12px", background:THEME.main, color:"#fff", fontSize:12, fontWeight:600 }}>อันดับ</th><Th col="name" label="ชื่อนวัตกรรม" /><Th col="unit" label="หน่วยงาน" /><Th col="amphoe" label="อำเภอ" /><th style={{ padding:"10px 12px", background:THEME.main, color:"#fff", fontSize:12 }}>หมวดหมู่</th><Th col="c1" label="ค.1" /><Th col="c2" label="ค.2" /><Th col="c3" label="ค.3" /><Th col="c4" label="ค.4" /><Th col="c5" label="ค.5" /><Th col="total" label="รวม" /><th style={{ padding:"10px 12px", background:`linear-gradient(135deg,${THEME.dark},${THEME.main})`, color:"#fff", fontSize:12 }}>ระดับ</th></tr></thead>
            <tbody>
              {displayed.map((item,idx)=>{
                const score = getScore(item); const rank = sortedForRank.findIndex(x=>x.id===item.id)+1; const g2 = GRADE_SOLID(score);
                return (
                  <tr key={item.id} onClick={()=>onSelect(item)} style={{ background:idx%2===0?"#fff":THEME.surface, cursor:"pointer" }} onMouseEnter={e=>e.currentTarget.style.background=g2.bg} onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"#fff":THEME.surface}>
                    <td style={{ padding:"9px 12px", textAlign:"center", fontWeight:700, color:rank<=5?["#e65100","#546e7a","#6d4c41","#0f766e","#115e59"][rank-1]:"#555", fontSize:13 }}>{rank<=5?["🥇","🥈","🥉","4️⃣","5️⃣"][rank-1]:rank}</td>
                    <td style={{ padding:"9px 12px", fontSize:12, fontWeight:600 }}>{item.name}</td>
                    <td style={{ padding:"9px 12px", fontSize:11, color:"#666" }}>{item.unit}</td><td style={{ padding:"9px 12px", fontSize:11, textAlign:"center" }}>{item.amphoe}</td>
                    <td style={{ padding:"9px 12px", textAlign:"center" }}><div style={{fontSize:11, fontWeight:700, color:"#444"}}>{item.type}</div><div style={{fontSize:9, color:"#999", marginTop:2}}>{getIndicationGroup(item)}</div></td>
                    {[item.c1,item.c2,item.c3,item.c4,item.c5].map((v,i)=><td key={i} style={{ padding:"9px 8px", textAlign:"center", fontSize:12, fontWeight:700, color:CRIT_COLORS[i] }}>{v}</td>)}
                    <td style={{ padding:"9px 12px", textAlign:"center", fontSize:18, fontWeight:800, color:g2.color }}>{score}</td>
                    <td style={{ padding:"9px 12px", textAlign:"center" }}><span style={{ background:g2.bg, color:g2.color, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:700, border:`1px solid ${g2.border}` }}>{g2.label}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ── PAGE: ANALYSIS (ADVANCED) ──────────────────────────────────────────────
const Analysis = ({ items }) => {
  const sorted = [...items].sort((a,b)=>getScore(b) - getScore(a));
  const avg = items.reduce((s,x)=>s+getScore(x),0)/items.length;
  const stdDev = Math.sqrt(items.reduce((s,x)=>s+Math.pow(getScore(x)-avg,2),0)/items.length);
  const passed = items.filter(x=>getScore(x)>=70); const failed = items.filter(x=>getScore(x)<70);

  const byAmphoe = Object.entries(items.reduce((acc,x)=>{ if(!acc[x.amphoe])acc[x.amphoe]={sum:0,n:0,items:[]}; acc[x.amphoe].sum+=getScore(x); acc[x.amphoe].n++; acc[x.amphoe].items.push(x); return acc; },{})).map(([name,v])=>({ name, avg:+(v.sum/v.n).toFixed(1), n:v.n, items:v.items, max:Math.max(...v.items.map(x=>getScore(x))), min:Math.min(...v.items.map(x=>getScore(x))), passed:v.items.filter(x=>getScore(x)>=70).length, stdDev:+(Math.sqrt(v.items.reduce((s,x)=>s+Math.pow(getScore(x)-v.sum/v.n,2),0)/v.items.length)).toFixed(1) })).sort((a,b)=>b.n-a.n || b.avg-a.avg);
  const byType = Object.entries(items.reduce((acc,x)=>{ acc[x.type]=(acc[x.type]||[]); acc[x.type].push(getScore(x)); return acc; },{})).map(([name,scores])=>({ name, count:scores.length, avg:+(scores.reduce((s,v)=>s+v,0)/scores.length).toFixed(1), max:Math.max(...scores) })).sort((a,b)=>b.count-a.count || b.avg-a.avg);

  const byIRL = [1,2,3,4].map(lvl=>({ lvl, label:["ไม่ระบุ","IRL1: แนวคิด","IRL2: R2R/เก็บข้อมูล","IRL3: วิจัยครบ","IRL4: จดแจ้ง อย."][lvl], items:items.filter(x=>(x.irl||2)===lvl), count:items.filter(x=>(x.irl||2)===lvl).length }));
  const maturity = { done: items.filter(x=>(x.status||"").includes("เสร็จสิ้น")||(x.status||"").includes("วิจัยเต็ม")).length, r2r: items.filter(x=>(x.status||"").toLowerCase().includes("r2r")).length, collecting: items.filter(x=>(x.status||"").includes("เก็บข้อมูล")||(x.status||"").includes("รวบรวม")).length, proposal: items.filter(x=>(x.status||"").includes("ข้อเสนอ")||(x.status||"").includes("กรอบ")).length, irl4: items.filter(x=>(x.irl||2)===4).length };
  
  const Card = ({children, style={}}) => (<div style={{ background:"#fff", borderRadius:16, padding:20, boxShadow:"0 2px 12px rgba(20,184,166,0.08)", border:`1px solid ${THEME.border}`, ...style }}>{children}</div>);
  const SectionTitle = ({icon,title,color=THEME.dark}) => (<div style={{ fontSize:14, fontWeight:800, color, marginBottom:14, display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:18 }}>{icon}</span>{title}</div>);

  return (
    <div>
      <div style={{ background:`linear-gradient(135deg,${THEME.dark},${THEME.main},${THEME.medium})`, borderRadius:20, padding:24, marginBottom:16, color:"#fff" }}>
        <div style={{ fontSize:16, fontWeight:800, marginBottom:10 }}>📋 Executive Summary — WISDOM PRODUCT 2569</div>
        <div style={{ fontSize:13, lineHeight:1.9, opacity:0.92 }}>ผลการประเมินนวัตกรรมภูมิปัญญาแพทย์แผนไทย จ.สมุทรปราการ ปี 2569 จำนวน <strong>{items.length} ผลงาน</strong> จาก <strong>{[...new Set(items.map(x=>x.amphoe))].length} อำเภอ</strong> พบคะแนนเฉลี่ย <strong>{avg.toFixed(1)}/100</strong> (S.D. = {stdDev.toFixed(1)}) ผ่านเกณฑ์ดี <strong>{passed.length} ผลงาน ({((passed.length/items.length)*100).toFixed(0)}%)</strong> และมีผลงานที่จดแจ้ง อย./ได้มาตรฐาน GMP แล้ว <strong>{maturity.irl4} ผลงาน</strong></div>

          '<div style="background:'+gbg+';border:1px solid '+gc+'40;border-radius:10px;padding:10px 14px">' +

        '<td style="padding:7px 10px;font-size:11px;text-align:center">'+(item.amphoe||'')+'</td>' +

        '<td style="padding:7px 10px;text-align:center;font-weight:700;color:#8b5cf6">'+item.c5+'</td>' +

      '</tr>';
    }).join("");

    const html = '<!DOCTYPE html>\n<html lang="th">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>WISDOM PRODUCT 2569 — รายงานนวัตกรรมภูมิปัญญาแพทย์แผนไทย จ.สมุทรปราการ</title>\n<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:\'Sarabun\',sans-serif;background:#f0fdfa;color:#1a1a1a;font-size:14px;line-height:1.6}\n  .container{max-width:1000px;margin:0 auto;padding:20px}\n  .no-print{display:flex;gap:10px;justify-content:flex-end;margin-bottom:16px;}\n  @media print{\n    body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}\n    .no-print{display:none!important}\n    .page-break{page-break-before:always}\n    *{max-width:100%!important;overflow:visible!important}\n  }\n</style>\n</head>\n<body>\n<div class="container">\n  <!-- PRINT BUTTON -->\n  <div class="no-print">\n    <button onclick="window.print()" style="background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;border:none;border-radius:12px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:\'Sarabun\',sans-serif">🖨️ พิมพ์ / Export PDF</button>\n    <button onclick="window.history.back()" style="background:#f5f5f5;color:#555;border:1px solid #ddd;border-radius:12px;padding:10px 22px;font-size:13px;cursor:pointer;font-family:\'Sarabun\',sans-serif">← กลับ</button>\n  </div>\n  <!-- HEADER -->\n  <div style="background:linear-gradient(135deg,'+THEME.dark+','+THEME.main+','+THEME.medium+');border-radius:20px;padding:28px;color:#fff;margin-bottom:20px;text-align:center">\n    <div style="font-size:42px;margin-bottom:8px">🌿</div>\n    <h1 style="font-size:22px;font-weight:800;margin-bottom:6px">WISDOM PRODUCT 2569</h1>\n    <p style="font-size:14px;opacity:0.9;margin-bottom:2px">รายงานผลการประเมินนวัตกรรมภูมิปัญญาแพทย์แผนไทย</p>\n    <p style="font-size:13px;opacity:0.8">จังหวัดสมุทรปราการ · ปีงบประมาณ พ.ศ. 2569</p>\n    <div style="display:flex;justify-content:center;gap:16px;margin-top:16px;flex-wrap:wrap">\n      '+[["🌿","ผลงานทั้งหมด",items.length+" ผลงาน","rgba(255,255,255,0.15)"],["📊","คะแนนเฉลี่ย",avg+"/100","rgba(255,255,255,0.15)"],["🏆","ผ่านเกณฑ์ดี",passed+" ผลงาน","rgba(255,255,255,0.15)"],["⭐","คะแนนสูงสุด",(sorted[0]?getScore(sorted[0]):0)+"/100","rgba(255,255,255,0.15)"]].map(function(arr){ return '<div style="background:'+arr[3]+';border-radius:12px;padding:10px 18px;text-align:center"><div style="font-size:20px">'+arr[0]+'</div><div style="font-size:10px;opacity:0.8;margin-top:2px">'+arr[1]+'</div><div style="font-size:16px;font-weight:800">'+arr[2]+'</div></div>'; }).join("")+'\n    </div>\n  </div>\n  <!-- RANKING TABLE -->\n  <div style="background:#fff;border-radius:16px;overflow:hidden;margin-bottom:20px;box-shadow:0 2px 12px rgba(20,184,166,0.06)">\n    <div style="background:linear-gradient(135deg,'+THEME.dark+','+THEME.main+');padding:14px 18px">\n      <div style="font-size:15px;font-weight:700;color:#fff">🏆 ตารางจัดอันดับผลงานทั้งหมด '+items.length+' รายการ</div>\n    </div>\n    <div style="overflow-x:auto">\n      <table style="width:100%;border-collapse:collapse;min-width:700px">\n        <thead>\n          <tr style="background:linear-gradient(135deg,'+THEME.main+','+THEME.medium+')">\n            <th style="padding:9px 10px;color:#fff;font-size:12px;font-weight:700">อันดับ</th>\n            <th style="padding:9px 10px;color:#fff;font-size:12px;font-weight:700;text-align:left">ชื่อนวัตกรรม</th>\n            <th style="padding:9px 10px;color:#fff;font-size:12px;font-weight:700;text-align:left">หน่วยงาน</th>\n            <th style="padding:9px 10px;color:#fff;font-size:12px;font-weight:700">อำเภอ</th>\n            <th style="padding:9px 10px;color:'+THEME.pale+';font-size:12px;font-weight:700">ค.1</th>\n            <th style="padding:9px 10px;color:'+THEME.pale+';font-size:12px;font-weight:700">ค.2</th>\n            <th style="padding:9px 10px;color:'+THEME.pale+';font-size:12px;font-weight:700">ค.3</th>\n            <th style="padding:9px 10px;color:'+THEME.pale+';font-size:12px;font-weight:700">ค.4</th>\n            <th style="padding:9px 10px;color:'+THEME.pale+';font-size:12px;font-weight:700">ค.5</th>\n            <th style="padding:9px 10px;color:#fff;font-size:12px;font-weight:700">รวม</th>\n            <th style="padding:9px 10px;color:#fff;font-size:12px;font-weight:700">ระดับ</th>\n          </tr>\n        </thead>\n        <tbody>'+rankRows+'</tbody>\n      </table>\n    </div>\n  </div>\n  <!-- ITEM DETAILS -->\n  <div style="margin-bottom:16px">\n    <h2 style="font-size:16px;font-weight:800;color:'+THEME.dark+';margin-bottom:16px;border-left:4px solid '+THEME.main+';padding-left:12px">📋 รายละเอียดผลการประเมินรายผลงาน</h2>\n    '+itemCards+'\n  </div>\n  <!-- FOOTER -->\n  <div style="text-align:center;padding:20px;color:#888;font-size:12px;border-top:1px solid #e0e0e0">\n    <div>🌿 <span style="color:'+THEME.main+';font-weight:700">WISDOM PRODUCT 2569</span> · <span style="color:#1565c0;font-weight:700">ภก.จีรภัทร พลายงาม</span> · <span style="color:#8e24aa;font-weight:700">สสจ.สมุทรปราการ</span></div>\n    <div style="margin-top:3px">จัดทำโดย: กลุ่มงานการแพทย์แผนไทยและการแพทย์ทางเลือก · อัปเดต: '+today+'</div>\n  </div>\n</div>\n</body>\n</html>';

    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const newWin = window.open(url, "_blank");
    if (!newWin) {
      const a = document.createElement("a");
      a.href = url; a.download = `WISDOM_2569_Report_${new Date().toISOString().slice(0,10)}.html`;
      a.style.display = "none"; document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
    }
  };

  const handleSaveHTML = handleOpenHTML; 
  const handlePrint = () => window.print();

  const PAGES = [ { id:"dashboard", label:"🏠 หน้าหลัก" }, { id:"products", label:"📋 รายการ" }, { id:"rankings", label:"🏆 จัดอันดับ" }, { id:"analysis", label:"📊 วิเคราะห์" }, { id:"about", label:"ℹ️ เกี่ยวกับ" } ];
  const PAGE_COLORS = { dashboard:THEME.main, products:THEME.medium, rankings:THEME.dark, analysis:THEME.amber, about:THEME.rust };

  if (!isAuthenticated) {
    return (
      <div style={{ fontFamily:"'Sarabun', 'TH SarabunIT๙', sans-serif", background:"#f0fdfa", minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
        <div style={{ background:"#fff", padding:"40px 30px", borderRadius:24, boxShadow:"0 10px 40px rgba(20,184,166,0.15)", textAlign:"center", maxWidth:400, width:"100%", border:`2px solid ${THEME.border}` }}>
          <div style={{ fontSize:50, marginBottom:16 }}>🔒</div><h2 style={{ color:THEME.dark, margin:"0 0 8px", fontSize:22, fontWeight:800 }}>WISDOM PRODUCT 2569</h2><p style={{ color:"#666", margin:"0 0 24px", fontSize:14 }}>กรุณาใส่รหัสผ่าน 4 หลัก (8888)</p>
          <form onSubmit={handleLogin}><input type="password" maxLength={4} value={pin} onChange={e => { setPin(e.target.value.replace(/[^0-9]/g, '')); setLoginError(false); }} placeholder="••••" style={{ width:"100%", padding:"14px", fontSize:32, letterSpacing:16, textAlign:"center", borderRadius:16, border:`2px solid ${loginError?'#e11d48':THEME.border}`, outline:"none", marginBottom:16, color:THEME.dark, fontWeight:800, boxSizing:"border-box" }} autoFocus />{loginError && <div style={{ color:"#e11d48", fontSize:13, fontWeight:700, margin:"-8px 0 16px" }}>รหัสผ่านไม่ถูกต้อง</div>}<button type="submit" style={{ width:"100%", background:`linear-gradient(135deg,${THEME.main},${THEME.medium})`, color:"#fff", border:"none", borderRadius:16, padding:"16px", fontSize:16, fontWeight:700, cursor:"pointer", boxShadow:"0 4px 12px rgba(20,184,166,0.2)" }}>เข้าสู่ระบบ</button></form>
        </div>
      </div>
    );
  }

  return (
    <div style={{ fontFamily:"'Sarabun', 'TH SarabunIT๙', sans-serif", background:"#f0fdfa", minHeight:"100vh" }}>
      <div style={{ background:`linear-gradient(135deg,${THEME.dark} 0%,${THEME.main} 40%,${THEME.medium} 100%)`, padding:"12px 20px", position:"sticky", top:0, zIndex:900, boxShadow:"0 3px 20px rgba(15,118,110,0.35)" }}>
        <div style={{ maxWidth:1100, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10, flexWrap:"wrap", gap:8 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}><div style={{ fontSize:28 }}>🌿</div><div><div style={{ color:"#fff", fontWeight:800, fontSize:16, lineHeight:1 }}>WISDOM PRODUCT 2569</div><div style={{ color:THEME.pale, fontSize:11 }}>นวัตกรรมภูมิปัญญาแพทย์แผนไทย · สมุทรปราการ</div></div></div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => { setIsAuthenticated(false); sessionStorage.removeItem('wisdom_auth'); setPin(''); }} style={{ background:"rgba(255,255,255,0.18)", color:"#fff", border:"1px solid rgba(255,255,255,0.35)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>🚪 ออกจากระบบ</button>
              <button onClick={handleOpenHTML} style={{ background:"rgba(255,255,255,0.3)", color:"#fff", border:"1px solid rgba(255,255,255,0.6)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:700 }}>🌐 เปิด HTML</button>
              <button onClick={() => setShowImport(true)} style={{ background:"rgba(255,255,255,0.18)", color:"#fff", border:"1px solid rgba(255,255,255,0.35)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>📥 นำเข้า</button>
            </div>
          </div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>{PAGES.map(p => <button key={p.id} onClick={() => setPage(p.id)} style={{ padding:"8px 16px", borderRadius:10, border:"none", cursor:"pointer", fontSize:12, fontWeight:700, background: page===p.id?"#fff":"rgba(255,255,255,0.12)", color: page===p.id?PAGE_COLORS[p.id]:THEME.pale }}>{p.label}</button>)}</div>
        </div>
      </div>
      <div style={{ maxWidth:1100, margin:"0 auto", padding:16 }}>
        {page === "dashboard" && <Dashboard items={items} onSelect={setSelected} />}
        {page === "products" && <ProductList items={items} onSelect={setSelected} onEdit={setEditing} onImageUpdate={handleImageUpdate} />}
        {page === "rankings" && <Rankings items={items} onSelect={setSelected} />}
        {page === "analysis" && <Analysis items={items} />}
        {page === "about" && <About items={items} onExport={handleExport} onPrint={handlePrint} onSaveHTML={handleSaveHTML} />}
      </div>
      <div style={{ textAlign:"center", padding:"20px 16px", color:"#888", fontSize:11, borderTop:"1px solid #e0e0e0", marginTop:8 }}><div>🌿 <span style={{ color:THEME.main, fontWeight:700 }}>WISDOM PRODUCT 2569</span> · <span style={{ color:"#1565c0" }}>ภก.จีรภัทร พลายงาม</span> · <span style={{ color:"#8e24aa" }}>สสจ.สมุทรปราการ</span></div></div>
      {selected && !editing && <ProductModal item={selected} onClose={() => setSelected(null)} onEdit={setEditing} />}
      {editing && <EditModal item={editing} onClose={() => setEditing(null)} onSave={handleSave} />}
      {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={handleImport} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
