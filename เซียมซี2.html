<style>
*{box-sizing:border-box;margin:0;padding:0}
body,html{width:100%;font-family:var(--font-sans)}
#app{display:flex;flex-direction:column;align-items:center;padding:1rem .75rem 2rem;width:100%}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

.hdr{text-align:center;margin-bottom:1rem;width:100%;background:#7F11E0;border-radius:16px;padding:14px 12px 10px}
.hdr-title{font-size:28px;font-weight:500;color:#FFE066;letter-spacing:.06em;display:block;text-shadow:0 0 12px #ff6b0088}
.hdr-sub{font-size:13px;color:#FFD0F5;margin-top:3px}

#perm-box{width:100%;background:#1A1A2E;border:2px solid #E040FB;border-radius:16px;padding:1.25rem;text-align:center;margin-bottom:1rem}
#perm-box p{font-size:13px;color:#FFD0F5;margin-bottom:.75rem;line-height:1.6}
#perm-btn{font-size:15px;padding:12px 32px;cursor:pointer;border-radius:12px;background:linear-gradient(135deg,#E040FB,#7F11E0);color:#fff;border:none;font-weight:500}

.canister-area{position:relative;width:92%;max-width:340px;height:300px;margin:0 auto .75rem;cursor:pointer;user-select:none;flex-shrink:0}
.canister-area.shaking .csub{animation:bigShake .65s ease}
@keyframes bigShake{
  0%{transform:rotate(0) translateY(0)}
  8%{transform:rotate(-24deg) translateY(-14px)}
  20%{transform:rotate(26deg) translateY(-20px)}
  32%{transform:rotate(-21deg) translateY(-15px)}
  44%{transform:rotate(23deg) translateY(-18px)}
  56%{transform:rotate(-16deg) translateY(-10px)}
  68%{transform:rotate(13deg) translateY(-6px)}
  82%{transform:rotate(-7deg) translateY(-2px)}
  100%{transform:rotate(0) translateY(0)}
}
.csub{width:100%;height:100%;filter:drop-shadow(0 4px 16px #E040FB66)}

.stick-out{position:absolute;top:-34px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;animation:popOut .45s cubic-bezier(.34,1.56,.64,1) forwards}
.stick-out.vis{display:flex}
@keyframes popOut{from{transform:translateX(-50%) translateY(32px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.stick-num{background:#FFE066;color:#7F11E0;font-size:14px;font-weight:500;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;flex-shrink:0;border:2px solid #E040FB}
.stick-line{width:7px;height:68px;background:linear-gradient(180deg,#FFE066,#EF9F27);border-radius:4px}

.sparkle-ring{position:absolute;top:50%;left:50%;pointer-events:none;display:none}
.sparkle-ring.active{display:block}
.spark{position:absolute;border-radius:50%;animation:sparkFly .75s ease forwards;opacity:0}
@keyframes sparkFly{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translate(var(--tx),var(--ty))}}

.hint{font-size:14px;color:#B388FF;text-align:center;margin-bottom:.75rem;font-weight:500}
.hint i{font-size:18px;vertical-align:-3px;color:#E040FB}

.tap-btn{font-size:14px;padding:12px 32px;border-radius:12px;cursor:pointer;background:#1A1A2E;border:2px solid #E040FB;color:#FFE066;margin-bottom:1.25rem;font-weight:500;width:92%;max-width:340px}
.tap-btn:active{transform:scale(.97)}

#result-card{width:100%;background:#1A1A2E;border:2px solid #7F11E0;border-radius:18px;padding:1.25rem;display:none;animation:fadeUp .5s ease forwards}
#result-card.vis{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.rc-head{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.lot-badge{background:#FFE066;color:#7F11E0;font-size:13px;font-weight:500;padding:5px 12px;border-radius:10px}
.luck-badge{font-size:13px;padding:5px 12px;border-radius:10px;font-weight:500}
.l-great{background:#00E676;color:#003300}
.l-good{background:#00B0FF;color:#002244}
.l-mid{background:#FFE066;color:#5B3A00}
.l-low{background:#FF5252;color:#2D0000}

.prophecy{font-size:15px;font-weight:500;color:#FFE066;line-height:1.9;margin-bottom:1rem;font-family:var(--font-serif);border-left:4px solid #E040FB;padding-left:12px;border-radius:0}

.domains{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.domain-row{background:#0D0D1F;border:1.5px solid;border-radius:12px;padding:11px 13px}
.domain-row.work{border-color:#00B0FF}
.domain-row.love{border-color:#FF4081}
.domain-row.health{border-color:#00E676}
.domain-row.family{border-color:#FFE066}
.domain-row.money{border-color:#69F0AE}

.domain-label{font-size:12px;font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.domain-label i{font-size:16px}
.domain-row.work .domain-label{color:#00B0FF}
.domain-row.love .domain-label{color:#FF4081}
.domain-row.health .domain-label{color:#00E676}
.domain-row.family .domain-label{color:#FFE066}
.domain-row.money .domain-label{color:#69F0AE}

.domain-text{font-size:13px;color:#E0D0FF;line-height:1.65}
.stars{display:flex;gap:2px}
.star-fill{font-size:13px;color:#FFE066}
.star-empty{font-size:13px;color:#44334A}

.action-row{display:flex;gap:8px;margin-top:.75rem}
.action-row button{flex:1;font-size:13px;padding:11px 12px;border-radius:12px;cursor:pointer;border:2px solid #7F11E0;background:transparent;color:#B388FF;font-weight:500}
.action-row button:hover{background:#1A1A2E}
.share-btn{background:#FFE066 !important;border-color:#FFE066 !important;color:#7F11E0 !important}

.hist-sec{width:100%;margin-top:1.25rem}
.hist-title{font-size:12px;color:#B388FF;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.hist-title i{font-size:14px;color:#E040FB}
.hist-list{display:flex;flex-direction:column;gap:6px}
.hist-item{background:#0D0D1F;border:1px solid #7F11E040;border-radius:10px;padding:9px 11px;font-size:12px;display:flex;align-items:flex-start;gap:8px}
.h-badge{background:#FFE066;color:#7F11E0;font-size:10px;padding:3px 7px;border-radius:6px;flex-shrink:0;font-weight:500;margin-top:1px}
.h-txt{color:#E0D0FF;line-height:1.5}

.flash-overlay{position:absolute;inset:0;background:#E040FB;border-radius:50%;opacity:0;pointer-events:none;animation:flashOut .55s ease forwards}
@keyframes flashOut{0%{opacity:.5;transform:scale(.5)}100%{opacity:0;transform:scale(3)}}
</style>

let history=[],lastShake=0,listening=false;

function renderStars(n){
  let s='';
  for(let i=1;i<=5;i++) s+=i<=n?'<span class="star-fill">★</span>':'<span class="star-empty">★</span>';
  return s;
}

function playShakeSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,55,110,170,230,290].forEach(d=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=180+Math.random()*500;
      o.type=['sine','triangle','sawtooth'][Math.floor(Math.random()*3)];
      const t=ctx.currentTime+d/1000;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.18,t+0.025);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
      o.start(t);o.stop(t+0.15);
    });
    setTimeout(()=>ctx.close(),600);
  }catch(e){}
}

function spawnSparkles(){
  const ring=document.getElementById('sparkleRing');
  ring.innerHTML='';ring.classList.add('active');
  const colors=['#E040FB','#FFE066','#00E676','#00B0FF','#FF4081','#FF6D00','#fff'];
  const sizes=[8,10,12,6,14];
  for(let i=0;i<22;i++){
    const sp=document.createElement('div');
    sp.className='spark';
    const angle=Math.random()*Math.PI*2;
    const dist=70+Math.random()*110;
    const sz=sizes[i%sizes.length];
    sp.style.cssText=`--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;background:${colors[i%colors.length]};width:${sz}px;height:${sz}px;animation-delay:${Math.random()*.25}s;left:${110+Math.cos(angle)*12}px;top:${150+Math.sin(angle)*12}px`;
    ring.appendChild(sp);
  }
  const flash=document.createElement('div');
  flash.className='flash-overlay';
  flash.style.cssText='width:200px;height:200px;top:50px;left:10px;position:absolute';
  document.querySelector('.canister-area').appendChild(flash);
  setTimeout(()=>{flash.remove();ring.innerHTML='';ring.classList.remove('active')},900);
}

function triggerFortune(){
  const now=Date.now();
  if(now-lastShake<1100)return;
  lastShake=now;
  playShakeSound();
  const area=document.getElementById('canisterArea');
  area.classList.remove('shaking');void area.offsetWidth;area.classList.add('shaking');
  setTimeout(()=>area.classList.remove('shaking'),680);
  spawnSparkles();
  setTimeout(()=>{
    const f=fortunes[Math.floor(Math.random()*fortunes.length)];
    showResult(f);
  },560);
}

function showResult(f){
  document.getElementById('stickNum').textContent=f.num;
  document.getElementById('stickOut').classList.add('vis');
  document.getElementById('lotLabel').textContent='ไม้เบอร์ '+f.num;
  const lb=document.getElementById('luckBadge');
  lb.className='luck-badge '+f.luckClass;lb.textContent=f.luck;
  document.getElementById('prophecyText').textContent=f.prophecy;
  document.getElementById('domainsEl').innerHTML=f.domains.map(d=>`
    <div class="domain-row ${d.cls}">
      <div class="domain-label"><i class="ti ${d.icon}" aria-hidden="true"></i>${d.label}<div class="stars">${renderStars(d.stars)}</div></div>
      <div class="domain-text">${d.text}</div>
    </div>`).join('');
  const card=document.getElementById('result-card');
  card.classList.remove('vis');void card.offsetWidth;card.classList.add('vis');
  addHistory(f);
}

function addHistory(f){
  history.unshift(f);if(history.length>3)history.pop();
  if(history.length<2)return;
  document.getElementById('histSec').style.display='block';
  document.getElementById('histList').innerHTML=history.slice(1).map(h=>`
    <div class="hist-item"><span class="h-badge">#${h.num}</span><span class="h-txt">${h.prophecy.substring(0,42)}…</span></div>`).join('');
}

function copyResult(){
  const f=history[0];if(!f)return;
  let txt=`🎋 เซียมซีดิจิทัล — ไม้เบอร์ ${f.num} (${f.luck})\n\n${f.prophecy}\n\n`;
  f.domains.forEach(d=>{txt+=`【${d.label}】 ${'★'.repeat(d.stars)}\n${d.text}\n\n`;});
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{
      const btn=document.querySelector('.share-btn');
      const orig=btn.innerHTML;
      btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> คัดลอกแล้ว';
      setTimeout(()=>{btn.innerHTML=orig},1600);
    });
  }
}

function manualShake(){triggerFortune();}

function requestPerm(){
  const box=document.getElementById('perm-box');
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(res=>{
      if(res==='granted'){box.style.display='none';startListening();}
      else{box.querySelector('p').textContent='ไม่ได้รับอนุญาต — แตะที่กระบอกได้เลยค่ะ';}
    }).catch(()=>{box.style.display='none';});
  }else{box.style.display='none';startListening();}
}

function startListening(){
  if(listening)return;listening=true;
  let prev=0;
  window.addEventListener('devicemotion',e=>{
    const a=e.accelerationIncludingGravity;if(!a)return;
    const tot=Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z);
    if(Math.abs(tot-prev)>22)triggerFortune();
    prev=tot;
  },true);
}

window.addEventListener('load',()=>{
  if(typeof DeviceMotionEvent==='undefined'||typeof DeviceMotionEvent.requestPermission!=='function'){
    document.getElementById('perm-box').style.display='none';
    startListening();
  }
});
