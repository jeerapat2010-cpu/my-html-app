<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem;font-family:var(--font-sans)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

.hdr{text-align:center;margin-bottom:1.25rem}
.hdr-title{font-size:24px;font-weight:500;color:#BA7517;letter-spacing:.05em;display:block}
.hdr-sub{font-size:12px;color:var(--color-text-secondary);margin-top:3px}

#perm-box{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1rem;text-align:center;margin-bottom:1.25rem}
#perm-box p{font-size:13px;color:var(--color-text-secondary);margin-bottom:.75rem;line-height:1.6}
#perm-btn{font-size:14px;padding:10px 28px;cursor:pointer;border-radius:var(--border-radius-md);background:#BA7517;color:#fff;border:none;font-weight:500}

.canister-area{position:relative;width:160px;height:220px;margin:0 auto 1rem;cursor:pointer;user-select:none;flex-shrink:0}
.canister-area.shaking .csub{animation:bigShake .6s ease}
@keyframes bigShake{
  0%{transform:rotate(0) translateY(0)}
  8%{transform:rotate(-22deg) translateY(-10px)}
  20%{transform:rotate(25deg) translateY(-16px)}
  32%{transform:rotate(-20deg) translateY(-12px)}
  44%{transform:rotate(22deg) translateY(-14px)}
  56%{transform:rotate(-15deg) translateY(-8px)}
  68%{transform:rotate(12deg) translateY(-5px)}
  82%{transform:rotate(-6deg) translateY(-2px)}
  100%{transform:rotate(0) translateY(0)}
}
.csub{width:100%;height:100%}

.stick-out{position:absolute;top:-26px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;animation:popOut .45s cubic-bezier(.34,1.56,.64,1) forwards}
.stick-out.vis{display:flex}
@keyframes popOut{from{transform:translateX(-50%) translateY(28px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.stick-num{background:#BA7517;color:#fff;font-size:12px;font-weight:500;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;flex-shrink:0}
.stick-line{width:6px;height:54px;background:#FAC775;border-radius:3px}

.sparkle-ring{position:absolute;top:50%;left:50%;pointer-events:none;display:none}
.sparkle-ring.active{display:block}
.spark{position:absolute;width:8px;height:8px;border-radius:50%;background:#FAC775;animation:sparkFly .7s ease forwards;opacity:0}
@keyframes sparkFly{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translate(var(--tx),var(--ty))}}

.hint{font-size:13px;color:var(--color-text-secondary);text-align:center;margin-bottom:1rem}
.hint i{font-size:16px;vertical-align:-2px}

.tap-btn{font-size:13px;padding:10px 24px;border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);margin-bottom:1.5rem}
.tap-btn:active{transform:scale(.97)}

#result-card{width:100%;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;display:none;animation:fadeUp .5s ease forwards}
#result-card.vis{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.rc-head{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.lot-badge{background:#FAEEDA;color:#633806;font-size:12px;font-weight:500;padding:4px 10px;border-radius:var(--border-radius-md)}
.luck-badge{font-size:12px;padding:4px 10px;border-radius:var(--border-radius-md);font-weight:500}
.l-great{background:#EAF3DE;color:#27500A}
.l-good{background:#E1F5EE;color:#085041}
.l-mid{background:#FAEEDA;color:#633806}
.l-low{background:#FAECE7;color:#712B13}

.prophecy{font-size:16px;font-weight:500;color:var(--color-text-primary);line-height:1.8;margin-bottom:1rem;font-family:var(--font-serif);border-left:3px solid #FAC775;padding-left:12px;border-radius:0}

.domains{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.domain-row{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.domain-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.domain-label i{font-size:14px}
.domain-text{font-size:13px;color:var(--color-text-primary);line-height:1.6}
.domain-label.work{color:#185FA5}
.domain-label.love{color:#993556}
.domain-label.health{color:#0F6E56}
.domain-label.family{color:#854F0B}
.domain-label.money{color:#3B6D11}

.stars{display:flex;gap:2px;margin-top:4px}
.star-fill{color:#BA7517;font-size:12px}
.star-empty{color:var(--color-text-secondary);font-size:12px;opacity:.35}

.action-row{display:flex;gap:8px;margin-top:.75rem}
.action-row button{flex:1;font-size:13px;padding:9px 12px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary)}
.action-row button:hover{background:var(--color-background-secondary)}
.share-btn{background:#FAEEDA !important;border-color:#FAC775 !important;color:#633806 !important}

.hist-sec{width:100%;margin-top:1.25rem}
.hist-title{font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.hist-title i{font-size:13px}
.hist-list{display:flex;flex-direction:column;gap:6px}
.hist-item{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:12px;display:flex;align-items:flex-start;gap:8px}
.h-badge{background:#FAEEDA;color:#BA7517;font-size:10px;padding:2px 6px;border-radius:4px;flex-shrink:0;font-weight:500;margin-top:1px}
.h-txt{color:var(--color-text-primary);line-height:1.5}

.flash-overlay{position:absolute;inset:0;background:#FAEEDA;border-radius:50%;opacity:0;pointer-events:none;animation:flashOut .5s ease forwards}
@keyframes flashOut{0%{opacity:.6;transform:scale(.8)}100%{opacity:0;transform:scale(2.5)}}
</style>

let history=[], lastShake=0, listening=false;

function renderStars(n){
  let s='';
  for(let i=1;i<=5;i++) s+= i<=n ? '<span class="star-fill">★</span>' : '<span class="star-empty">★</span>';
  return s;
}

function playShakeSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,60,120,180,240,300].forEach(d=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=200+Math.random()*400;
      o.type=['sine','triangle','sawtooth'][Math.floor(Math.random()*3)];
      const t=ctx.currentTime+d/1000;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.15,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      o.start(t); o.stop(t+0.15);
    });
    setTimeout(()=>ctx.close(),600);
  }catch(e){}
}

function spawnSparkles(){
  const ring=document.getElementById('sparkleRing');
  ring.innerHTML='';
  ring.classList.add('active');
  const colors=['#BA7517','#FAC775','#EF9F27','#FFF3DC','#993C1D'];
  for(let i=0;i<16;i++){
    const sp=document.createElement('div');
    sp.className='spark';
    const angle=Math.random()*Math.PI*2;
    const dist=60+Math.random()*80;
    sp.style.cssText=`--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.2}s;left:${80+Math.cos(angle)*10}px;top:${110+Math.sin(angle)*10}px`;
    ring.appendChild(sp);
  }
  const flash=document.createElement('div');
  flash.className='flash-overlay';
  flash.style.cssText='width:160px;height:160px;top:30px;left:0;position:absolute';
  document.querySelector('.canister-area').appendChild(flash);
  setTimeout(()=>{flash.remove();ring.innerHTML='';ring.classList.remove('active')},900);
}

function triggerFortune(){
  const now=Date.now();
  if(now-lastShake<1000)return;
  lastShake=now;
  playShakeSound();
  const area=document.getElementById('canisterArea');
  area.classList.remove('shaking');
  void area.offsetWidth;
  area.classList.add('shaking');
  setTimeout(()=>{area.classList.remove('shaking')},650);
  spawnSparkles();
  setTimeout(()=>{
    const f=fortunes[Math.floor(Math.random()*fortunes.length)];
    showResult(f);
  },550);
}

function showResult(f){
  document.getElementById('stickNum').textContent=f.num;
  document.getElementById('stickOut').classList.add('vis');
  document.getElementById('lotLabel').textContent='ไม้เบอร์ '+f.num;
  const lb=document.getElementById('luckBadge');
  lb.className='luck-badge '+f.luckClass;
  lb.textContent=f.luck;
  document.getElementById('prophecyText').textContent=f.prophecy;
  const dom=document.getElementById('domainsEl');
  dom.innerHTML=f.domains.map(d=>`
    <div class="domain-row">
      <div class="domain-label ${d.cls}"><i class="ti ${d.icon}" aria-hidden="true"></i>${d.label} <div class="stars">${renderStars(d.stars)}</div></div>
      <div class="domain-text">${d.text}</div>
    </div>
  `).join('');
  const card=document.getElementById('result-card');
  card.classList.remove('vis');
  void card.offsetWidth;
  card.classList.add('vis');
  addHistory(f);
}

function addHistory(f){
  history.unshift(f);
  if(history.length>3)history.pop();
  if(history.length<2)return;
  const sec=document.getElementById('histSec');
  const list=document.getElementById('histList');
  sec.style.display='block';
  list.innerHTML=history.slice(1).map(h=>`
    <div class="hist-item">
      <span class="h-badge">#${h.num}</span>
      <span class="h-txt">${h.prophecy.substring(0,40)}…</span>
    </div>
  `).join('');
}

function copyResult(){
  const f=history[0];
  if(!f)return;
  let txt=`🎋 เซียมซีดิจิทัล — ไม้เบอร์ ${f.num} (${f.luck})\n\n${f.prophecy}\n\n`;
  f.domains.forEach(d=>{ txt+=`【${d.label}】 ${'★'.repeat(d.stars)}\n${d.text}\n\n`; });
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{
      const btn=document.querySelector('.share-btn');
      const orig=btn.innerHTML;
      btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> คัดลอกแล้ว';
      setTimeout(()=>{btn.innerHTML=orig},1600);
    });
  }
}

function manualShake(){ triggerFortune(); }

function requestPerm(){
  const box=document.getElementById('perm-box');
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(res=>{
      if(res==='granted'){ box.style.display='none'; startListening(); }
      else{ box.querySelector('p').textContent='ไม่ได้รับอนุญาต — แตะที่กระบอกได้เลยค่ะ'; }
    }).catch(()=>{ box.style.display='none'; });
  } else { box.style.display='none'; startListening(); }
}

function startListening(){
  if(listening)return; listening=true;
  let prev=0;
  window.addEventListener('devicemotion',e=>{
    const a=e.accelerationIncludingGravity;
    if(!a)return;
    const tot=Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z);
    if(Math.abs(tot-prev)>22){ triggerFortune(); }
    prev=tot;
  },true);
}

window.addEventListener('load',()=>{
  if(typeof DeviceMotionEvent==='undefined'||typeof DeviceMotionEvent.requestPermission!=='function'){
    document.getElementById('perm-box').style.display='none';
    startListening();
  }
});
</script>
