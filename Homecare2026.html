        // --- Helpers ---
        function getAreaColor(area) {
            switch(area) {
                case 'ห้องนั่งเล่น (Living Room)': return 'bg-amber-50 border-amber-300 hover:bg-amber-100 print:border-amber-400';
                case 'ห้องนอน (Bedrooms)': return 'bg-blue-50 border-blue-300 hover:bg-blue-100 print:border-blue-400';
                case 'ห้องน้ำ (Bathrooms)': return 'bg-cyan-50 border-cyan-300 hover:bg-cyan-100 print:border-cyan-400';
                case 'ห้องครัว (Kitchen)': return 'bg-orange-50 border-orange-300 hover:bg-orange-100 print:border-orange-400';
                case 'ห้องใต้บันได': return 'bg-stone-50 border-stone-300 hover:bg-stone-100 print:border-stone-400';
                default: return 'bg-purple-50 border-purple-300 hover:bg-purple-100 print:border-purple-400';
            }

        function getAreaBadgeColor(area) {
            switch(area) {
                case 'ห้องนั่งเล่น (Living Room)': return 'bg-amber-200 text-amber-800 border-amber-300';
                case 'ห้องนอน (Bedrooms)': return 'bg-blue-200 text-blue-800 border-blue-300';
                case 'ห้องน้ำ (Bathrooms)': return 'bg-cyan-200 text-cyan-800 border-cyan-300';
                case 'ห้องครัว (Kitchen)': return 'bg-orange-200 text-orange-800 border-orange-300';
                case 'ห้องใต้บันได': return 'bg-stone-200 text-stone-800 border-stone-300';
                default: return 'bg-purple-200 text-purple-800 border-purple-300';
            }
        }

        function getCategoryBadgeColor(category) {
            switch(category) {
                case 'Cleaning': return 'bg-emerald-100 text-emerald-700 border-emerald-200';
                case 'Deep Clean': return 'bg-rose-100 text-rose-700 border-rose-200';
                case 'Maintenance': return 'bg-sky-100 text-sky-700 border-sky-200';
                case 'Pet Care': return 'bg-teal-100 text-teal-700 border-teal-200';
                case 'Organization': return 'bg-indigo-100 text-indigo-700 border-indigo-200';
                default: return 'bg-slate-100 text-slate-700 border-slate-200';

        // --- Initialization & Render Logic ---
        function initApp() {
            // Populate dropdown options
            populateSelect('filter-area', AREAS, true, 'ทุกพื้นที่ (All Areas)');
            populateSelect('filter-frequency', FREQUENCIES, true, 'ทุกความถี่ (All Frequencies)');
            populateSelect('form-area', AREAS);
            populateSelect('form-frequency', FREQUENCIES);
            populateSelect('form-category', CATEGORIES);

            // Listeners for filters
            document.getElementById('filter-area').addEventListener('change', (e) => { state.filterArea = e.target.value; renderTasks(); });
            document.getElementById('filter-frequency').addEventListener('change', (e) => { state.filterFrequency = e.target.value; renderTasks(); });
            
            // Enter key on new agent
            document.getElementById('form-new-agent').addEventListener('keydown', (e) => {
                if(e.key === 'Enter') { e.preventDefault(); addNewAgent(); }
            });

            renderTasks();
        }

        function populateSelect(id, array, includeAll = false, allText = '') {
            const select = document.getElementById(id);
            select.innerHTML = '';
            if (includeAll) select.innerHTML += `<option value="All">${allText}</option>`;
            array.forEach(item => select.innerHTML += `<option value="${item}">${item}</option>`);
        }

        function updateProgress() {
            const total = state.tasks.reduce((acc, t) => acc + t.subTasks.length, 0);
            const completed = state.tasks.reduce((acc, t) => acc + t.subTasks.filter(st => st.isCompleted).length, 0);
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            document.getElementById('progress-text').innerText = `${percent}%`;
            document.getElementById('print-progress-text').innerText = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        function renderTasks() {
            const container = document.getElementById('task-list-container');
            const filtered = state.tasks.filter(t => {
                return (state.filterArea === 'All' || t.area === state.filterArea) &&

            updateProgress();

                container.innerHTML = `

                            </div>
                        </div>

                        <div class="flex items-center gap-1 sm:gap-2 self-start sm:self-center print:hidden">
                            <button onclick="openModal(${task.id})" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-white/50 rounded-lg transition-colors"><i data-lucide="pen" class="w-4.5 h-4.5"></i></button>

        // --- Task Interactions ---
        function toggleExpand(taskId) {
            // Prevent toggling when printing logic is active (checked via CSS anyway)
            if (state.expandedTasks.has(taskId)) state.expandedTasks.delete(taskId);
            else state.expandedTasks.add(taskId);
            renderTasks();
        }

        function toggleSubTask(taskId, subId) {
            const task = state.tasks.find(t => t.id === taskId);
            if (task) {
                const sub = task.subTasks.find(s => s.id === subId);
                if (sub) {
                    sub.isCompleted = !sub.isCompleted;
                    task.status = task.subTasks.every(st => st.isCompleted) ? 'completed' : 'pending';
                    renderTasks();
                }
            }
        }

        function toggleMainTask(taskId) {
            const task = state.tasks.find(t => t.id === taskId);
            if (task) {
                const newStatus = task.status === 'pending' ? 'completed' : 'pending';
                task.status = newStatus;
                task.subTasks.forEach(st => st.isCompleted = (newStatus === 'completed'));
                renderTasks();
            }
        }

        function deleteCurrentTask() {
            if (state.editingTaskId && confirm('ยืนยันการลบรายการนี้?')) {
                state.tasks = state.tasks.filter(t => t.id !== state.editingTaskId);
                closeModal();
                renderTasks();
            }
        }

        // --- Modal Interactions ---
        function showError(msg) {
            const errDiv = document.getElementById('form-error');
            if (msg) {
                errDiv.innerText = msg;
                errDiv.classList.remove('hidden');
            } else {
                errDiv.classList.add('hidden');
            }
        }

        function openModal(taskId = null) {
            showError('');
            state.editingTaskId = taskId;
            const modal = document.getElementById('task-modal');
            const titleEl = document.getElementById('modal-title');
            const delBtn = document.getElementById('btn-delete-task');
            
            if (taskId) {
                const task = state.tasks.find(t => t.id === taskId);
                titleEl.innerHTML = `<i data-lucide="pen" class="text-indigo-600 w-5 h-5"></i> แก้ไขกิจกรรม`;
                delBtn.classList.remove('hidden');
                
                document.getElementById('form-title').value = task.title;
                document.getElementById('form-area').value = task.area;
                document.getElementById('form-frequency').value = task.frequencyType;
                document.getElementById('form-category').value = task.category;
                document.getElementById('form-nextDue').value = task.nextDue || '';
                document.getElementById('form-method').value = task.method || '';
                document.getElementById('form-tips').value = task.tips || '';
                
                state.formSubtasks = task.subTasks.map(st => st.title);
                state.formAgents = [...(task.agents || [])];
            } else {
                titleEl.innerHTML = `<i data-lucide="plus" class="text-indigo-600 w-5 h-5"></i> สร้างกิจกรรมใหม่`;
                delBtn.classList.add('hidden');
                
                document.getElementById('form-title').value = '';
                document.getElementById('form-area').value = AREAS[0];
                document.getElementById('form-frequency').value = FREQUENCIES[0];
                document.getElementById('form-category').value = CATEGORIES[0];
                document.getElementById('form-nextDue').value = '';
                document.getElementById('form-method').value = '';
                document.getElementById('form-tips').value = '';
                
                state.formSubtasks = [''];
                state.formAgents = [];
            }
            
            renderFormSubtasks();
            renderFormAgents();
            
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('task-modal').classList.add('hidden');
        }

        // Subtasks Form
        function renderFormSubtasks() {
            const container = document.getElementById('form-subtasks-container');
            container.innerHTML = '';
            state.formSubtasks.forEach((val, idx) => {
                container.innerHTML += `
                    <div class="flex gap-2">
                        <input type="text" value="${val}" onchange="updateFormSubtask(${idx}, this.value)" class="flex-1 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500" placeholder="เช็คลิสต์ย่อยที่ ${idx + 1}">
                        <button type="button" onclick="removeFormSubtask(${idx})" class="p-2 text-red-500 hover:bg-red-50 rounded-lg"><i data-lucide="trash-2" class="w-4.5 h-4.5"></i></button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function updateFormSubtask(idx, val) { state.formSubtasks[idx] = val; }
        function addSubtaskField() { state.formSubtasks.push(''); renderFormSubtasks(); }
        function removeFormSubtask(idx) { 
            state.formSubtasks.splice(idx, 1); 
            if(state.formSubtasks.length === 0) state.formSubtasks.push('');
            renderFormSubtasks(); 
        }

        // Agents Form
        function renderFormAgents() {
            const container = document.getElementById('form-agents-container');
            container.innerHTML = '';
            state.availableAgents.forEach(agent => {
                const isSelected = state.formAgents.includes(agent);
                const baseClass = "px-3 py-1.5 rounded-full text-xs font-medium border transition-colors flex items-center";
                const stateClass = isSelected 
                    ? "bg-emerald-500 text-white border-emerald-600 shadow-sm" 
                    : "bg-white text-slate-600 border-slate-300 hover:border-emerald-400";
                
                container.innerHTML += `
                    <button type="button" onclick="toggleFormAgent('${agent}')" class="${baseClass} ${stateClass}">
                        ${agent} ${isSelected ? '<i data-lucide="check" class="inline ml-1 w-3 h-3"></i>' : ''}
                    </button>
                `;
            });
            lucide.createIcons();
        }

        function toggleFormAgent(agent) {
            const idx = state.formAgents.indexOf(agent);
            if (idx > -1) state.formAgents.splice(idx, 1);
            else state.formAgents.push(agent);
            renderFormAgents();
        }

        function addNewAgent() {
            const input = document.getElementById('form-new-agent');
            const val = input.value.trim();
            if (val && !state.availableAgents.includes(val)) {
                state.availableAgents.push(val);
                state.formAgents.push(val);
                input.value = '';
                renderFormAgents();
            }
        }

        function saveTask() {
            showError('');
            const title = document.getElementById('form-title').value.trim();
            if (!title) return showError('กรุณาระบุชื่องาน');

            const cleanSubtasksText = state.formSubtasks.filter(st => st.trim() !== '');
            if (cleanSubtasksText.length === 0) return showError('กรุณาระบุเช็คลิสต์ย่อยอย่างน้อย 1 รายการ');

            let cleanSubtasksObjects = [];

            if (state.editingTaskId) {
                const existingTask = state.tasks.find(t => t.id === state.editingTaskId);
                cleanSubtasksObjects = cleanSubtasksText.map((st, i) => ({
                    id: `${state.editingTaskId}-${i}`,
                    title: st,
                    isCompleted: existingTask.subTasks[i] ? existingTask.subTasks[i].isCompleted : false
                }));

                const isAllCompleted = cleanSubtasksObjects.every(st => st.isCompleted);
                
                Object.assign(existingTask, {
                    title: title,
                    area: document.getElementById('form-area').value,
                    frequencyType: document.getElementById('form-frequency').value,
                    category: document.getElementById('form-category').value,
                    nextDue: document.getElementById('form-nextDue').value,
                    method: document.getElementById('form-method').value,
                    tips: document.getElementById('form-tips').value,
                    agents: [...state.formAgents],
                    subTasks: cleanSubtasksObjects,
                    status: isAllCompleted ? 'completed' : 'pending'
                });

            } else {
                const newId = Date.now();
                cleanSubtasksObjects = cleanSubtasksText.map((st, i) => ({
                    id: `new-${newId}-${i}`,
                    title: st,
                    isCompleted: false
                }));

                state.tasks.push({
                    id: newId,
                    title: title,
                    area: document.getElementById('form-area').value,
                    frequencyType: document.getElementById('form-frequency').value,
                    category: document.getElementById('form-category').value,
                    nextDue: document.getElementById('form-nextDue').value,
                    method: document.getElementById('form-method').value,
                    tips: document.getElementById('form-tips').value,
                    agents: [...state.formAgents],
                    subTasks: cleanSubtasksObjects,
                    status: 'pending'
                });
            }

            closeModal();
            renderTasks();
        }

        // Initialize App on load
        window.onload = initApp;

    </script>
</body>
</html>
