<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard มูลค่าหัตถการแผนไทย จ.สมุทรปราการ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --green:#1b5e20; --green2:#2e7d32; --green3:#43a047; --gold:#c79a3c; --gold2:#e8c874;
    --bg:#f4f6f3; --card:#ffffff; --ink:#1f2a24; --muted:#6b7a70; --line:#e2e8e0;
    --tealbtn:#0f766e; --danger:#c0392b; --warn:#d97706; --info:#2563eb;
    --shadow:0 2px 10px rgba(27,94,32,.08); --shadow2:0 8px 30px rgba(27,94,32,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Sarabun","Tahoma","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55}
  h1,h2,h3,h4{line-height:1.3}
  a{color:inherit}
  .app{display:flex;min-height:100vh}
  /* Sidebar */
  .sidebar{width:262px;background:linear-gradient(180deg,#123b16,#1b5e20 40%,#14481a);color:#eaf3ea;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:40;box-shadow:2px 0 14px rgba(0,0,0,.15)}
  .brand{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
  .brand .logo{font-size:26px}
  .brand h1{font-size:16px;font-weight:800;margin-top:6px;color:#fff}
  .brand p{font-size:11.5px;color:#bcd6bd;margin-top:2px}
  .nav{padding:10px 8px;overflow-y:auto;flex:1}
  .nav button{width:100%;text-align:left;background:transparent;border:0;color:#dcecdc;padding:11px 13px;border-radius:10px;font-size:14.5px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:3px;transition:.15s}
  .nav button:hover{background:rgba(255,255,255,.08)}
  .nav button.active{background:linear-gradient(90deg,var(--gold),#b9862e);color:#2a1d05;font-weight:700;box-shadow:0 3px 10px rgba(199,154,60,.35)}
  .nav .ico{font-size:17px;width:22px;text-align:center}
  .side-foot{padding:12px 16px;font-size:11px;color:#9fc0a1;border-top:1px solid rgba(255,255,255,.1)}
  /* Main */
  .main{margin-left:262px;flex:1;min-width:0}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 22px;position:sticky;top:0;z-index:30;box-shadow:var(--shadow)}
  .topbar .row1{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .topbar h2{font-size:18px;color:var(--green)}
  .topbar .sub{font-size:12px;color:var(--muted)}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-top:11px;align-items:flex-end}
  .fitem{display:flex;flex-direction:column;gap:3px}
  .fitem label{font-size:11px;color:var(--muted);font-weight:600;padding-left:2px}
  .fitem select{font-family:inherit;font-size:13.5px;padding:7px 11px;border:1.5px solid var(--line);border-radius:9px;background:#fff;min-width:160px;cursor:pointer;color:var(--ink)}
  .fitem select:focus{outline:none;border-color:var(--green3)}
  .freset{padding:8px 14px;border:0;background:var(--tealbtn);color:#fff;border-radius:9px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:600}
  .freset:hover{background:#0c5d56}
  .filter-chip{display:inline-flex;align-items:center;gap:5px;background:#eef6ee;color:var(--green);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-right:6px}
  .content{padding:22px}
  .page{display:none;animation:fade .35s}
  .page.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  /* Cards */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);border-left:5px solid var(--green3);position:relative;overflow:hidden}
  .kpi .kt{font-size:12.5px;color:var(--muted);font-weight:600}
  .kpi .kv{font-size:26px;font-weight:800;color:var(--green);margin-top:4px}
  .kpi .ks{font-size:11.5px;color:var(--muted);margin-top:3px}
  .kpi.gold{border-left-color:var(--gold)}
  .kpi.gold .kv{color:#a8791f}
  .kpi.teal{border-left-color:var(--tealbtn)}
  .kpi.teal .kv{color:var(--tealbtn)}
  .kpi.blue{border-left-color:var(--info)}
  .kpi.blue .kv{color:var(--info)}
  .kpi .kbg{position:absolute;right:-6px;bottom:-10px;font-size:56px;opacity:.06}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  .card{background:var(--card);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .card h3{font-size:15.5px;color:var(--green);margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .card .hint{font-size:11.5px;color:var(--muted);margin-bottom:12px}
  .chart-wrap{position:relative;height:300px}
  .chart-wrap.tall{height:360px}
  .chart-wrap.short{height:240px}
  /* Table */
  .tbl-wrap{overflow-x:auto;border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
  thead th{background:var(--green);color:#fff;padding:9px 11px;text-align:left;font-weight:600;position:sticky;top:0;white-space:nowrap}
  thead th.r{text-align:right}
  tbody td{padding:8px 11px;border-bottom:1px solid var(--line)}
  tbody td.r{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:nth-child(even){background:#fafcfa}
  tbody tr:hover{background:#eef6ee}
  tbody tr.total{background:#123b16!important;color:#fff;font-weight:700}
  tbody tr.total td{border:0}
  .rankbadge{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;font-size:11px;font-weight:700;color:#fff;background:var(--muted)}
  .rankbadge.g1{background:#c79a3c}.rankbadge.g2{background:#9aa0a6}.rankbadge.g3{background:#b0764a}
  .bar-mini{height:7px;background:#e8f0e8;border-radius:4px;overflow:hidden;min-width:60px}
  .bar-mini>i{display:block;height:100%;background:linear-gradient(90deg,var(--green3),var(--green))}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .pill.ok{background:#e6f4ea;color:#1b7a37}.pill.low{background:#fdecea;color:#c0392b}.pill.mid{background:#fef3e2;color:#b9770a}
  /* Analysis blocks */
  .ab{background:var(--card);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:16px;border-top:4px solid var(--green3)}
  .ab.fin{border-top-color:var(--gold)}
  .ab.warn{border-top-color:var(--warn)}
  .ab.op{border-top-color:var(--info)}
  .ab h3{font-size:16px;color:var(--green);margin-bottom:10px;display:flex;gap:8px;align-items:center}
  .ab p{margin-bottom:9px;font-size:14px}
  .ab ul{margin:6px 0 10px 4px;padding-left:18px}
  .ab li{margin-bottom:7px;font-size:13.8px}
  .callout{background:#f0f7f0;border-left:4px solid var(--green3);padding:11px 14px;border-radius:8px;margin:10px 0;font-size:13.5px}
  .callout.money{background:#fdf6e8;border-left-color:var(--gold)}
  .callout.risk{background:#fdeeed;border-left-color:var(--danger)}
  .kw{font-weight:700;color:var(--green)}
  .kw.money{color:#a8791f}.kw.risk{color:var(--danger)}
  /* SWOT */
  .swot{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .sq{border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);color:#fff}
  .sq h4{font-size:15px;margin-bottom:9px;display:flex;gap:7px;align-items:center}
  .sq ul{padding-left:17px}
  .sq li{margin-bottom:6px;font-size:13px}
  .sq.S{background:linear-gradient(135deg,#2e7d32,#1b5e20)}
  .sq.W{background:linear-gradient(135deg,#c0392b,#8e2b21)}
  .sq.O{background:linear-gradient(135deg,#2563eb,#1e40af)}
  .sq.T{background:linear-gradient(135deg,#b9770a,#8a5a08)}
  .tows{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
  .tq{background:var(--card);border-radius:12px;padding:15px 17px;box-shadow:var(--shadow);border-top:4px solid var(--green3)}
  .tq h4{font-size:14px;color:var(--green);margin-bottom:8px}
  .tq.so{border-top-color:#2e7d32}.tq.wo{border-top-color:#2563eb}.tq.st{border-top-color:#b9770a}.tq.wt{border-top-color:#c0392b}
  .tq ol{padding-left:18px}.tq li{margin-bottom:6px;font-size:13px}
  .sectitle{font-size:20px;color:var(--green);font-weight:800;margin:4px 0 4px;display:flex;align-items:center;gap:9px}
  .secdesc{font-size:13px;color:var(--muted);margin-bottom:16px}
  .note{font-size:12px;color:var(--muted);font-style:italic;margin-top:8px}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  /* mobile */
  .menu-toggle{display:none;background:var(--green);color:#fff;border:0;font-size:20px;padding:6px 12px;border-radius:8px;cursor:pointer}
  .backdrop{display:none}
  @media(max-width:900px){
    .g2,.g3{grid-template-columns:1fr}.swot,.tows{grid-template-columns:1fr}
    .sidebar{transform:translateX(-100%);transition:.25s}
    .sidebar.open{transform:none}
    .main{margin-left:0}
    .menu-toggle{display:block}
    .backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
    .content{padding:14px}
  }
  .print-btn{padding:8px 14px;border:1.5px solid var(--green3);background:#fff;color:var(--green);border-radius:9px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:600}
  .print-btn:hover{background:#eef6ee}
  @media print{.sidebar,.topbar .filters,.menu-toggle,.print-btn,.freset{display:none!important}.main{margin:0}.page{display:block!important}.content{padding:0}}

  /* ===== New feature styles ===== */
  .badge-new{background:var(--gold);color:#3a2c05;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;margin-left:auto}
  .toolrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .btn-sm{padding:6px 12px;border:1.5px solid var(--green3);background:#fff;color:var(--green);border-radius:8px;font-family:inherit;font-size:12.5px;cursor:pointer;font-weight:600}
  .btn-sm:hover{background:#eef6ee}
  .btn-sm.solid{background:var(--tealbtn);color:#fff;border-color:var(--tealbtn)}
  .btn-sm.solid:hover{background:#0c5d56}
  .btn-sm.gold{background:var(--gold);color:#3a2c05;border-color:var(--gold)}
  /* gauge */
  .gauge-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .gauge{position:relative;width:150px;height:150px}
  .gauge svg{transform:rotate(-90deg)}
  .gauge .gtxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .gtxt b{font-size:22px;color:var(--green)}
  .gauge .gtxt span{font-size:10.5px;color:var(--muted)}
  .kpi-edit{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#f7faf7;padding:10px 12px;border-radius:10px;margin-bottom:14px}
  .kpi-edit label{font-size:12.5px;color:var(--muted);font-weight:600}
  .kpi-edit input{font-family:inherit;font-size:14px;padding:6px 10px;border:1.5px solid var(--line);border-radius:8px;width:150px}
  .progress-row{margin-bottom:14px}
  .progress-row .plabel{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;color:var(--muted)}
  .progress-bar{height:14px;background:#e8f0e8;border-radius:8px;overflow:hidden}
  .progress-bar>i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--green3),var(--green))}
  .progress-bar>i.over{background:linear-gradient(90deg,#c79a3c,#a8791f)}
  .progress-bar>i.warn2{background:linear-gradient(90deg,var(--danger),#8e2b21)}
  /* alerts */
  .alert-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:10px;margin-bottom:9px;border-left:4px solid var(--line)}
  .alert-item.high{background:#fdeeed;border-left-color:var(--danger)}
  .alert-item.mid{background:#fef3e2;border-left-color:var(--warn)}
  .alert-item.low{background:#eef6ee;border-left-color:var(--green3)}
  .alert-item .aico{font-size:20px}
  .alert-item .atxt b{font-size:13.5px}
  .alert-item .atxt p{font-size:12.5px;color:var(--muted);margin-top:2px}
  /* map */
  .map-svg-wrap{background:#eaf3ec;border-radius:12px;padding:10px}
  .map-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--muted)}
  .map-legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block}
  /* snapshot */
  .snap-empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}
  /* quadrant */
  .quad-wrap{position:relative}
  /* copy prompt box */
  .prompt-box{background:#1e2b22;color:#d8ecd8;border-radius:10px;padding:14px;font-family:monospace;font-size:11.5px;white-space:pre-wrap;max-height:260px;overflow-y:auto;margin-top:10px}
  .tier-pill{font-size:10.5px;padding:2px 8px;border-radius:10px;background:#eef2ff;color:#3730a3;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">🌿</div>
      <h1>มูลค่าหัตถการแผนไทย</h1>
      <p>จังหวัดสมุทรปราการ · เขตสุขภาพที่ 6<br>ปีงบประมาณ 2569 (สะสม 1 ต.ค.68–ปัจจุบัน)</p>
    </div>
    <nav class="nav" id="nav">
      <button data-page="overview" class="active"><span class="ico">📊</span> ภาพรวมจังหวัด</button>
      <button data-page="unit"><span class="ico">🏥</span> รายหน่วยบริการ</button>
      <button data-page="proc"><span class="ico">💆</span> รายหัตถการ</button>
      <button data-page="right"><span class="ico">🎫</span> รายสิทธิการเบิกจ่าย</button>
      <button data-page="alerts"><span class="ico">🚨</span> แจ้งเตือน & ผิดปกติ<span class="badge-new">NEW</span></button>
      <button data-page="kpi"><span class="ico">🎯</span> เป้าหมาย KPI<span class="badge-new">NEW</span></button>
      <button data-page="trend"><span class="ico">📈</span> แนวโน้ม & Snapshot<span class="badge-new">NEW</span></button>
      <button data-page="map"><span class="ico">🗺️</span> แผนที่รายอำเภอ<span class="badge-new">NEW</span></button>
      <button data-page="smart"><span class="ico">🧠</span> บทวิเคราะห์อัจฉริยะ</button>
      <button data-page="finance"><span class="ico">💰</span> การเงิน & เพิ่มรายรับ</button>
      <button data-page="swot"><span class="ico">🎯</span> SWOT / TOWS</button>
      <button data-page="about"><span class="ico">ℹ️</span> เกี่ยวกับ / วิธีใช้</button>
    </nav>
    <div class="side-foot">กลุ่มงานการแพทย์แผนไทยฯ<br>สสจ.สมุทรปราการ</div>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <div class="main">
    <div class="topbar">
      <div class="row1">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <div>
            <h2 id="pageTitle">ภาพรวมจังหวัด</h2>
            <div class="sub" id="pageSub">สรุปมูลค่าการรับบริการการแพทย์แผนไทย แยกตามมิติต่าง ๆ</div>
          </div>
        </div>
        <button class="print-btn" onclick="window.print()">🖨️ พิมพ์ / บันทึก PDF</button>
      </div>
      <div class="filters">
        <div class="fitem"><label>🏙️ รายอำเภอ</label>
          <select id="fDistrict"><option value="">ทุกอำเภอ</option></select></div>
        <div class="fitem"><label>💆 รายหัตถการ</label>
          <select id="fProc"><option value="">ทุกหัตถการ</option></select></div>
        <div class="fitem"><label>🎫 รายสิทธิ</label>
          <select id="fRight"><option value="">ทุกสิทธิ</option></select></div>
        <button class="freset" id="fReset">↺ ล้างตัวกรอง</button>
      </div>
    </div>

    <div class="content">
      <!-- pages injected/controlled by JS -->
      <section class="page active" id="page-overview"></section>
      <section class="page" id="page-unit"></section>
      <section class="page" id="page-proc"></section>
      <section class="page" id="page-right"></section>
      <section class="page" id="page-alerts"></section>
      <section class="page" id="page-kpi"></section>
      <section class="page" id="page-trend"></section>
      <section class="page" id="page-map"></section>
      <section class="page" id="page-smart"></section>
      <section class="page" id="page-finance"></section>
      <section class="page" id="page-swot"></section>
      <section class="page" id="page-about"></section>
    </div>
  </div>

function filterChips(){
  let c=[];
  if(F.d)c.push(`อำเภอ: ${F.d}`);
  if(F.p)c.push(`หัตถการ: ${F.p}`);
  if(F.r)c.push(`สิทธิ: ${F.r}`);
  if(!c.length)return '<span class="filter-chip">📌 แสดงข้อมูลทั้งจังหวัด (ทุกมิติ)</span>';
  return c.map(x=>`<span class="filter-chip">🔎 ${x}</span>`).join('');
}

function nav(page){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('pageTitle').textContent=TITLES[page][0];
  document.getElementById('pageSub').textContent=TITLES[page][1];
  window.scrollTo(0,0);
  if(window.innerWidth<=900){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('show');}
}
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(b)nav(b.dataset.page);
});
document.getElementById('menuToggle').onclick=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('backdrop').classList.toggle('show');};
document.getElementById('backdrop').onclick=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('show');};

/* ============ shared chart helpers ============ */
function barChart(id,labels,data,{horizontal=false,color=null,money=true,label='มูลค่า'}={}){
  destroyChart(id);
  const ctx=document.getElementById(id); if(!ctx)return;
  const colors = color || labels.map((_,i)=>PALETTE[i%PALETTE.length]);
  charts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label,data,backgroundColor:colors,borderRadius:6,maxBarThickness:46}]},
    options:{indexAxis:horizontal?'y':'x',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${label}: ${money?fmtB(c.parsed[horizontal?'x':'y']):fmtN(c.parsed[horizontal?'x':'y'])}`}}},
      scales:{[horizontal?'x':'y']:{beginAtZero:true,ticks:{callback:v=>money?('฿'+(v>=1e6?(v/1e6).toFixed(1)+'ล':v>=1e3?(v/1e3).toFixed(0)+'พ':v)):fmtN(v)}},
              [horizontal?'y':'x']:{ticks:{font:{size:11}}}}}});
}
function doughnut(id,labels,data){
  destroyChart(id);
  const ctx=document.getElementById(id); if(!ctx)return;
  charts[id]=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:PALETTE,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{position:'right',labels:{font:{size:11.5},boxWidth:13,padding:8}},
        tooltip:{callbacks:{label:c=>{const t=c.dataset.data.reduce((a,b)=>a+b,0);return ` ${c.label}: ${fmtB(c.parsed)} (${(c.parsed/t*100).toFixed(1)}%)`;}}}}}});
}
function stackedChart(id,labels,datasets,{money=true}={}){
  destroyChart(id);
  const ctx=document.getElementById(id); if(!ctx)return;
  charts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12,padding:8}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${money?fmtB(c.parsed.y):fmtN(c.parsed.y)}`}}},
      scales:{x:{stacked:true,ticks:{font:{size:10.5}}},y:{stacked:true,beginAtZero:true,ticks:{callback:v=>money?'฿'+(v>=1e6?(v/1e6).toFixed(1)+'ล':v>=1e3?(v/1e3).toFixed(0)+'พ':v):fmtN(v)}}}}});
}

/* ============ UNIT ============ */
function renderUnit(){
  const f=apply();
  if(!f.length){emptyGuard('page-unit');return;}
  const m=groupSum(f,'u');
  const rows=Object.keys(m).map(u=>{const meta=UNIT_META.find(x=>x[0]===u)||[u,'',''];return{u,d:meta[1],c:meta[2],...m[u]};}).sort((a,b)=>b.va-a.va);
  const tv=sum(f,'va'); const max=rows[0]?rows[0].va:1;
  // participation: how many units in scope have zero
  const scopeUnits = UNIT_META.filter(x=>!F.d||x[1]===F.d);
  const activeSet=new Set(rows.map(r=>r.u));
  const inactive = scopeUnits.filter(x=>!activeSet.has(x[0]));
  const top10=rows.slice(0,10);
  // peer tier grouping
  const tierM={};
  rows.forEach(r=>{const t=tierOf(r.u);(tierM[t]=tierM[t]||[]).push(r);});
  const tierRows=Object.keys(tierM).map(t=>{const arr=tierM[t];const s=arr.reduce((a,b)=>a+b.va,0);return{t,n:arr.length,va:s,avg:s/arr.length};}).sort((a,b)=>b.va-a.va);
  // quadrant data: x=visits, y=value per visit
  const quadPts = rows.map(r=>({u:r.u,x:r.vi,y:r.vi?r.va/r.vi:0,va:r.va,t:tierOf(r.u)}));
  const avgVi = quadPts.length? quadPts.reduce((a,b)=>a+b.x,0)/quadPts.length : 0;
  const avgYield = quadPts.length? quadPts.reduce((a,b)=>a+b.y,0)/quadPts.length : 0;

  document.getElementById('page-unit').innerHTML=`
    <div style="margin-bottom:12px">${filterChips()}</div>
    <div class="toolrow"><button class="btn-sm solid" onclick="exportUnitCSV()">⬇️ Export CSV รายหน่วยบริการ</button></div>
    <div class="kpis">
      <div class="kpi"><div class="kt">หน่วยที่มีมูลค่า</div><div class="kv">${rows.length}</div><div class="ks">จาก ${scopeUnits.length} หน่วยในขอบเขต</div><div class="kbg">🏥</div></div>
      <div class="kpi ${inactive.length?'gold':'teal'}"><div class="kt">หน่วยที่ยังไม่มีข้อมูล</div><div class="kv">${inactive.length}</div><div class="ks">ควรติดตามการรายงาน</div><div class="kbg">⚠️</div></div>
      <div class="kpi teal"><div class="kt">มูลค่าเฉลี่ย/หน่วย</div><div class="kv">${fmtB(rows.length?tv/rows.length:0)}</div><div class="ks">เฉพาะหน่วยที่มีข้อมูล</div><div class="kbg">📊</div></div>
      <div class="kpi blue"><div class="kt">Top 5 คิดเป็น</div><div class="kv">${fmtP(rows.slice(0,5).reduce((a,b)=>a+b.va,0)/tv*100||0)}</div><div class="ks">ของมูลค่ารวม (การกระจุกตัว)</div><div class="kbg">🎯</div></div>
    </div>
    <div class="card" style="margin-bottom:16px"><h3>🏆 10 อันดับหน่วยบริการมูลค่าสูงสุด</h3><div class="hint">ตามตัวกรองปัจจุบัน</div><div class="chart-wrap tall"><canvas id="unitTop"></canvas></div></div>

    <div class="card" style="margin-bottom:16px">
      <h3>👥 การเปรียบเทียบตามกลุ่มประเภทหน่วย (Peer Benchmarking)</h3>
      <div class="hint">จัดกลุ่มตามประเภทหน่วยบริการ เพื่อเทียบผลงานอย่างเป็นธรรม (โรงพยาบาลไม่ควรเทียบตรงกับ รพ.สต.)</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>ประเภทหน่วย</th><th class="r">จำนวนหน่วย</th><th class="r">มูลค่ารวม</th><th class="r">ค่าเฉลี่ย/หน่วย</th></tr></thead>
        <tbody>${tierRows.map(t=>`<tr><td><span class="tier-pill" style="background:${TIER_COLOR[t.t]}22;color:${TIER_COLOR[t.t]}">${t.t}</span></td><td class="r">${t.n}</td><td class="r">${fmtN(t.va)}</td><td class="r"><b>${fmtB(t.avg)}</b></td></tr>`).join('')}</tbody>

    </div>

    <div class="card">
      <h3>📋 ตารางจัดอันดับรายหน่วยบริการ</h3><div class="hint">คลิกหัวเมนู "รายอำเภอ" ด้านบนเพื่อดูเฉพาะอำเภอ</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>#</th><th>หน่วยบริการ</th><th>ประเภท</th><th>อำเภอ</th><th class="r">คน</th><th class="r">ครั้ง</th><th class="r">มูลค่า (บาท)</th><th class="r">สัดส่วน</th><th>ระดับ</th></tr></thead>
        <tbody>
        ${rows.map((r,i)=>{const pct=r.va/tv*100;const lvl=pct>=8?'ok':pct>=3?'mid':'low';const lvlT=pct>=8?'สูง':pct>=3?'กลาง':'ต่ำ';
          return `<tr><td><span class="rankbadge ${i<3?'g'+(i+1):''}">${i+1}</span></td>
          <td>${r.u}</td><td><span class="tier-pill">${tierOf(r.u)}</span></td><td>${r.d}</td><td class="r">${fmtN(r.pe)}</td><td class="r">${fmtN(r.vi)}</td>
          <td class="r"><b>${fmtN(r.va)}</b></td>
          <td class="r">${fmtP(pct)}<div class="bar-mini"><i style="width:${(r.va/max*100).toFixed(1)}%"></i></div></td>
          <td><span class="pill ${lvl}">${lvlT}</span></td></tr>`;}).join('')}
          <tr class="total"><td></td><td>รวมทั้งหมด (${rows.length} หน่วย)</td><td></td><td></td><td class="r">${fmtN(sum(f,'pe'))}</td><td class="r">${fmtN(sum(f,'vi'))}</td><td class="r">${fmtN(tv)}</td><td class="r">100%</td><td></td></tr>
        </tbody></table></div>
      ${inactive.length?`<div class="callout risk" style="margin-top:12px"><b>⚠️ หน่วยที่ยังไม่มีข้อมูล (${inactive.length} หน่วย):</b> ${inactive.slice(0,12).map(x=>x[0]).join(' · ')}${inactive.length>12?` และอีก ${inactive.length-12} หน่วย`:''}</div>`:''}
      </div>`;
  if(top10.length)barChart('unitTop',top10.map(r=>r.u.length>26?r.u.slice(0,26)+'…':r.u),top10.map(r=>r.va),{horizontal:true,color:top10.map((_,i)=>i<3?['#c79a3c','#9aa0a6','#b0764a'][i]:'#2e7d32')});
  if(quadPts.length)renderQuadrant('unitQuad',quadPts,avgVi,avgYield);
}

function renderQuadrant(id,pts,avgX,avgY){
  destroyChart(id);
  const ctx=document.getElementById(id); if(!ctx)return;
  const byTier={};
  pts.forEach(p=>{(byTier[p.t]=byTier[p.t]||[]).push({x:p.x,y:p.y,u:p.u,va:p.va});});
  const maxX=Math.max(...pts.map(p=>p.x),avgX)*1.05;
  const maxY=Math.max(...pts.map(p=>p.y),avgY)*1.05;
  const datasets=Object.keys(byTier).map(t=>({type:'scatter',label:t,data:byTier[t],backgroundColor:TIER_COLOR[t]+'cc',pointRadius:6,pointHoverRadius:8,order:1}));
  // reference lines as thin line-datasets (core Chart.js, no plugin needed)
  datasets.push({type:'line',label:'ค่าเฉลี่ย Yield',data:[{x:0,y:avgY},{x:maxX,y:avgY}],borderColor:'#8e44ad',borderWidth:1.5,borderDash:[6,5],pointRadius:0,order:0,fill:false});
  datasets.push({type:'line',label:'ค่าเฉลี่ยครั้ง',data:[{x:avgX,y:0},{x:avgX,y:maxY}],borderColor:'#8e44ad',borderWidth:1.5,borderDash:[6,5],pointRadius:0,order:0,fill:false});
  charts[id]=new Chart(ctx,{type:'scatter',data:{datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{filter:c=>c.dataset.type!=='line',callbacks:{label:c=>{const p=c.raw;return ` ${p.u}: ${fmtN(p.x)} ครั้ง · ${fmtB(p.y)}/ครั้ง`;}}}},
      scales:{x:{title:{display:true,text:'จำนวนครั้งบริการ'},beginAtZero:true,max:maxX},
               y:{title:{display:true,text:'มูลค่าเฉลี่ย/ครั้ง (บาท)'},beginAtZero:true,max:maxY,ticks:{callback:v=>'฿'+fmtN(v)}}}}});
}

/* ============ PROC ============ */
function renderProc(){
  const f=apply();
  if(!f.length){emptyGuard('page-proc');return;}
  const byP=groupSum(f,'p');
  const pL=PROC_ORDER.filter(p=>byP[p]);
  const tv=sum(f,'va');
  // proc x right stacked
  const rL=RIGHT_ORDER.filter(r=>f.some(x=>x.r===r));
  const ds=rL.map((r,i)=>({label:r,backgroundColor:PALETTE[i%PALETTE.length],data:pL.map(p=>f.filter(x=>x.p===p&&x.r===r).reduce((a,b)=>a+b.va,0))}));

/* ============ FINANCE ============ */
function renderFinance(){
  const f=apply();
  if(!f.length){emptyGuard('page-finance');return;}
  const tv=sum(f,'va'),tvi=sum(f,'vi'),tp=sum(f,'pe');
  const byP=groupSum(f,'p'),byR=groupSum(f,'r'),byU=groupSum(f,'u'),byD=groupSum(f,'d');
  const pL=PROC_ORDER.filter(p=>byP[p]);
  const rL=RIGHT_ORDER.filter(r=>byR[r]);
  const uL=Object.keys(byU).sort((a,b)=>byU[b].va-byU[a].va);
  const avgVisit=tvi?tv/tvi:0, visitPerCap=tp?tvi/tp:0;
  // uplift scenario: bring low-performing units to median
  const vals=uL.map(u=>byU[u].va).sort((a,b)=>a-b);
  const median = vals.length? vals[Math.floor(vals.length/2)]:0;
  const scopeUnits = UNIT_META.filter(x=>!F.d||x[1]===F.d);
  const activeSet=new Set(uL);
  const inactive = scopeUnits.filter(x=>!activeSet.has(x[0]));
  // potential: inactive units earning median + below-median units up to median
  const belowMed = uL.filter(u=>byU[u].va<median);
  const upliftBelow = belowMed.reduce((a,u)=>a+(median-byU[u].va),0);
  const upliftInactive = inactive.length*median;
  const totalPotential = upliftBelow+upliftInactive;
  // best mix: shift 10% of UC visits to civil-servant rate
  const ucAvg = byR['สิทธิบัตรทอง']?(byR['สิทธิบัตรทอง'].vi?byR['สิทธิบัตรทอง'].va/byR['สิทธิบัตรทอง'].vi:0):0;
  const csAvg = byR['สิทธิข้าราชการ']?(byR['สิทธิข้าราชการ'].vi?byR['สิทธิข้าราชการ'].va/byR['สิทธิข้าราชการ'].vi:0):0;

  document.getElementById('page-finance').innerHTML=`

    <div class="kpis">
      <div class="kpi"><div class="kt">มูลค่ารวม (Revenue)</div><div class="kv" style="font-size:22px">${fmtB(tv)}</div><div class="ks">ในขอบเขตที่เลือก</div><div class="kbg">💵</div></div>

/* ---------- safe storage (works standalone; degrades gracefully) ---------- */
const SKEY='sptm_dashboard_v1_';
function storeGet(k,fallback){
  try{const v=localStorage.getItem(SKEY+k);return v?JSON.parse(v):fallback;}catch(e){return fallback;}
}
function storeSet(k,val){
  try{localStorage.setItem(SKEY+k,JSON.stringify(val));return true;}catch(e){return false;}
}

/* ---------- facility tier classifier (proxy for size/type) ---------- */
function tierOf(unitName){
  if(unitName.includes('โรงพยาบาล'))return 'โรงพยาบาล';
  if(unitName.includes('รพสต'))return 'รพ.สต.';
  if(unitName.includes('สถานีอนามัย'))return 'สถานีอนามัย';
  if(unitName.includes('ศูนย์'))return 'ศูนย์บริการสาธารณสุข';
  return 'อื่นๆ';
}
const TIER_COLOR={'โรงพยาบาล':'#1b5e20','รพ.สต.':'#43a047','สถานีอนามัย':'#2563eb','ศูนย์บริการสาธารณสุข':'#c79a3c','อื่นๆ':'#8e44ad'};

/* ---------- CSV export ---------- */
function toCSV(rows){
  return rows.map(r=>r.map(c=>{
    const s=(c===null||c===undefined)?'':String(c);
    return /[",\n]/.test(s)? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\r\n');
}
function downloadCSV(filename,rows){
  const csv='\uFEFF'+toCSV(rows); // BOM for Thai Excel compat
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
function exportUnitCSV(){
  const f=apply();const m=groupSum(f,'u');
  const rows=[['หน่วยบริการ','อำเภอ','จำนวนคน','จำนวนครั้ง','มูลค่า(บาท)']];
  Object.keys(m).sort((a,b)=>m[b].va-m[a].va).forEach(u=>{
    const meta=UNIT_META.find(x=>x[0]===u)||[u,'',''];
    rows.push([u,meta[1],m[u].pe,m[u].vi,m[u].va.toFixed(2)]);
  });
  downloadCSV('รายหน่วยบริการ.csv',rows);
}
function exportProcCSV(){
  const f=apply();const m=groupSum(f,'p');
  const rows=[['หัตถการ','จำนวนคน','จำนวนครั้ง','มูลค่า(บาท)']];
  Object.keys(m).sort((a,b)=>m[b].va-m[a].va).forEach(p=>rows.push([p,m[p].pe,m[p].vi,m[p].va.toFixed(2)]));
  downloadCSV('รายหัตถการ.csv',rows);
}
function exportRightCSV(){
  const f=apply();const m=groupSum(f,'r');
  const rows=[['ประเภทสิทธิ','จำนวนคน','จำนวนครั้ง','มูลค่า(บาท)']];
  Object.keys(m).sort((a,b)=>m[b].va-m[a].va).forEach(r=>rows.push([r,m[r].pe,m[r].vi,m[r].va.toFixed(2)]));
  downloadCSV('รายสิทธิ.csv',rows);
}

/* ---------- AI prompt generator (copy-paste to Claude; works fully offline) ---------- */
function buildAIPrompt(){
  const f=apply();
  const tv=sum(f,'va'),tvi=sum(f,'vi'),tp=sum(f,'pe');
  const byD=groupSum(f,'d'),byP=groupSum(f,'p'),byR=groupSum(f,'r');
  let txt = `ช่วยวิเคราะห์เชิงลึกเพิ่มเติมจากข้อมูลมูลค่าหัตถการแพทย์แผนไทย จ.สมุทรปราการ (ตัวกรอง: ${F.d||'ทุกอำเภอ'} / ${F.p||'ทุกหัตถการ'} / ${F.r||'ทุกสิทธิ'})\n\n`;
  txt += `มูลค่ารวม: ${fmtB(tv)} | จำนวนครั้ง: ${fmtN(tvi)} | จำนวนคน: ${fmtN(tp)}\n\n`;
  txt += `แยกตามอำเภอ:\n`+Object.keys(byD).sort((a,b)=>byD[b].va-byD[a].va).map(d=>`- ${d}: ${fmtB(byD[d].va)}`).join('\n')+'\n\n';
  txt += `แยกตามหัตถการ:\n`+Object.keys(byP).sort((a,b)=>byP[b].va-byP[a].va).map(p=>`- ${p}: ${fmtB(byP[p].va)}`).join('\n')+'\n\n';
  txt += `แยกตามสิทธิ:\n`+Object.keys(byR).sort((a,b)=>byR[b].va-byR[a].va).map(r=>`- ${r}: ${fmtB(byR[r].va)}`).join('\n')+'\n\n';
  txt += `ช่วยหาข้อสังเกตเชิงลึกที่ยังไม่เห็นชัดจากตัวเลขข้างต้น พร้อมข้อเสนอเชิงนโยบายเพิ่มเติม`;
  return txt;
}
function copyAIPrompt(btnId){
  const txt=buildAIPrompt();
  const box=document.getElementById('aiPromptBox');
  if(box)box.textContent=txt;
  const done=()=>{const b=document.getElementById(btnId);if(b){const old=b.textContent;b.textContent='✅ คัดลอกแล้ว!';setTimeout(()=>b.textContent=old,1800);}};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(done);}else{done();}
}

function renderAlerts(){
  const f=apply();
  if(!f.length){emptyGuard('page-alerts');return;}
  const byU=groupSum(f,'u');
  const uL=Object.keys(byU);
  // classify by tier, compute peer averages
  const tierGroups={};
  uL.forEach(u=>{const t=tierOf(u);(tierGroups[t]=tierGroups[t]||[]).push(u);});
  const tierAvg={};
  Object.keys(tierGroups).forEach(t=>{
    const arr=tierGroups[t];
    tierAvg[t]=arr.reduce((a,u)=>a+byU[u].va,0)/arr.length;
  });
  const underperform=[], overOutlier=[];
  uL.forEach(u=>{
    const t=tierOf(u), avg=tierAvg[t], v=byU[u].va;
    if(avg>0 && v < avg*0.4) underperform.push({u,t,v,avg,ratio:v/avg});
    if(avg>0 && v > avg*2.5) overOutlier.push({u,t,v,avg,ratio:v/avg});
  });
  underperform.sort((a,b)=>a.ratio-b.ratio);
  overOutlier.sort((a,b)=>b.ratio-a.ratio);

  // procedure value-per-visit outliers (possible data entry issues)
  const procIssues=[];
  PROC_ORDER.forEach(p=>{
    const rowsP=f.filter(x=>x.p===p && x.vi>0);
    if(rowsP.length<3)return;
    const perU={};
    rowsP.forEach(x=>{perU[x.u]=(perU[x.u]||{va:0,vi:0});perU[x.u].va+=x.va;perU[x.u].vi+=x.vi;});
    const vals=Object.keys(perU).map(u=>perU[u].va/perU[u].vi).filter(v=>v>0);
    if(vals.length<3)return;
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0)/vals.length);
    Object.keys(perU).forEach(u=>{
      const avgUV=perU[u].va/perU[u].vi;
      if(sd>0 && Math.abs(avgUV-mean)>2.2*sd){
        procIssues.push({u,p,avgUV,mean,dir:avgUV>mean?'สูงผิดปกติ':'ต่ำผิดปกติ'});
      }
    });
  });

  // inactive units in scope
  const scopeUnits=UNIT_META.filter(x=>!F.d||x[1]===F.d);
  const activeSet=new Set(uL);
  const inactive=scopeUnits.filter(x=>!activeSet.has(x[0]));

  document.getElementById('page-alerts').innerHTML=`
    <div style="margin-bottom:12px">${filterChips()}</div>
    <div class="kpis">
      <div class="kpi ${underperform.length?'':'teal'}"><div class="kt">หน่วยต่ำกว่าเกณฑ์กลุ่ม</div><div class="kv">${underperform.length}</div><div class="ks">< 40% ค่าเฉลี่ยกลุ่มเดียวกัน</div><div class="kbg">📉</div></div>
      <div class="kpi ${overOutlier.length?'gold':'teal'}"><div class="kt">หน่วยสูงผิดปกติ</div><div class="kv">${overOutlier.length}</div><div class="ks">> 2.5 เท่า ค่าเฉลี่ยกลุ่ม</div><div class="kbg">📈</div></div>
      <div class="kpi ${procIssues.length?'gold':'teal'}"><div class="kt">ข้อมูลควรตรวจสอบ</div><div class="kv">${procIssues.length}</div><div class="ks">มูลค่า/ครั้งเบี่ยงเบินผิดปกติ</div><div class="kbg">🔍</div></div>
      <div class="kpi ${inactive.length?'gold':'teal'}"><div class="kt">หน่วยยังไม่รายงาน</div><div class="kv">${inactive.length}</div><div class="ks">ในขอบเขตที่เลือก</div><div class="kbg">⚠️</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <h3>📉 หน่วยบริการต่ำกว่าเกณฑ์กลุ่มเดียวกัน (Peer Group)</h3>
      <div class="hint">เทียบกับค่าเฉลี่ยของหน่วยประเภทเดียวกัน (โรงพยาบาล / รพ.สต. / สถานีอนามัย / ศูนย์บริการ) — ยุติธรรมกว่าการเทียบทุกหน่วยปนกัน</div>
      ${underperform.length? underperform.slice(0,15).map(x=>`
        <div class="alert-item high"><div class="aico">🔻</div><div class="atxt">
          <b>${x.u}</b> <span class="tier-pill">${x.t}</span>
          <p>มูลค่า ${fmtB(x.v)} เทียบค่าเฉลี่ยกลุ่ม ${fmtB(x.avg)} (คิดเป็นเพียง ${fmtP(x.ratio*100)} ของค่าเฉลี่ยกลุ่ม)</p>
        </div></div>`).join('') : '<div class="empty">✅ ไม่พบหน่วยที่ต่ำกว่าเกณฑ์อย่างมีนัยสำคัญ</div>'}
      ${underperform.length>15?`<p class="note">แสดง 15 จากทั้งหมด ${underperform.length} หน่วย</p>`:''}
    </div>
    <div class="card" style="margin-bottom:16px">
      <h3>📈 หน่วยบริการสูงผิดปกติ (ควรทบทวน/ถอดบทเรียน)</h3>
      <div class="hint">อาจเป็นหน่วยดีเด่นที่ควรถอดบทเรียน หรือมีความคลาดเคลื่อนในการบันทึกข้อมูล ควรตรวจสอบ</div>
      ${overOutlier.length? overOutlier.slice(0,10).map(x=>`
        <div class="alert-item mid"><div class="aico">⭐</div><div class="atxt">
          <b>${x.u}</b> <span class="tier-pill">${x.t}</span>
          <p>มูลค่า ${fmtB(x.v)} สูงกว่าค่าเฉลี่ยกลุ่ม ${x.ratio.toFixed(1)} เท่า (ค่าเฉลี่ยกลุ่ม ${fmtB(x.avg)})</p>
        </div></div>`).join('') : '<div class="empty">ไม่พบหน่วยที่สูงผิดปกติเกินเกณฑ์</div>'}
    </div>
    <div class="card" style="margin-bottom:16px">
      <h3>🔍 ความผิดปกติเชิงมูลค่า/ครั้ง (ตรวจธรรมาภิบาลข้อมูล)</h3>
      <div class="hint">ใช้สถิติ (ค่าเฉลี่ย ± 2.2SD) ต่อหัตถการ เพื่อชี้จุดที่ควรตรวจสอบการบันทึกมูลค่า ไม่ใช่การตัดสินผลงาน</div>
      ${procIssues.length? procIssues.slice(0,15).map(x=>`
        <div class="alert-item ${x.dir==='สูงผิดปกติ'?'mid':'high'}"><div class="aico">${x.dir==='สูงผิดปกติ'?'⬆️':'⬇️'}</div><div class="atxt">
          <b>${x.u}</b> — ${x.p}
          <p>มูลค่า/ครั้ง ${fmtB(x.avgUV)} (${x.dir}) เทียบค่าเฉลี่ยหัตถการนี้ ${fmtB(x.mean)}</p>
        </div></div>`).join('') : '<div class="empty">✅ ไม่พบความผิดปกติเชิงสถิติที่มีนัยสำคัญ</div>'}
    </div>
    ${inactive.length?`<div class="card"><h3>⚠️ หน่วยที่ยังไม่มีข้อมูล</h3><div class="hint">ควรติดตามเร่งด่วนเพื่อความครบถ้วนของข้อมูลระดับเขต</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${inactive.map(x=>`<span class="filter-chip">🏥 ${x[0]}</span>`).join('')}</div></div>`:''}

/* ============ KPI TARGET TRACKING ============ */
function gaugeSVG(pct,color){
  const r=60,c=2*Math.PI*r,clamped=Math.max(0,Math.min(pct,100));
  const dash=c*clamped/100;
  return `<svg width="150" height="150" viewBox="0 0 150 150">
    <circle cx="75" cy="75" r="${r}" fill="none" stroke="#e8f0e8" stroke-width="14"/>
    <circle cx="75" cy="75" r="${r}" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="${dash} ${c}"/>
  </svg>`;
}
function renderKPI(){
  const f=apply();
  const tv=sum(f,'va');
  const byD=groupSum(f,'d');
  const savedTarget=storeGet('kpi_target_total', 35000000);

  const gcolor = pct>=100?'#1b5e20':pct>=70?'#43a047':pct>=40?'#d97706':'#c0392b';

  document.getElementById('page-kpi').innerHTML=`

        <div class="gauge">${gaugeSVG(pct,gcolor)}<div class="gtxt"><b>${fmtP(pct)}</b><span>ของเป้าหมาย</span></div></div>
        <div style="flex:1;min-width:220px">
          <div class="progress-row"><div class="plabel"><span>ผลงานจริง</span><span><b>${fmtB(tv)}</b> / ${fmtB(savedTarget)}</span></div>
          <div class="progress-bar"><i class="${pct>=100?'':pct<40?'warn2':pct<70?'over':''}" style="width:${Math.min(pct,100)}%"></i></div></div>
          <p style="font-size:13px;color:var(--muted)">${pct>=100?'✅ บรรลุเป้าหมายแล้ว':`ต้องทำเพิ่มอีก <b>${fmtB(Math.max(0,savedTarget-tv))}</b> เพื่อถึงเป้าหมาย`}</p>
        </div>

    </div>
    <div class="card">
      <h3>🏙️ ความคืบหน้ารายอำเภอ (เทียบสัดส่วนเป้าหมายตามน้ำหนักประชากร/หน่วยบริการโดยประมาณ)</h3>

      <div class="tbl-wrap"><table>
        <thead><tr><th>อำเภอ</th><th class="r">ผลงานจริง</th><th class="r">เป้าหมาย (แก้ไขได้)</th><th class="r">%</th><th>ความคืบหน้า</th></tr></thead>
        <tbody>${Object.keys(byD).sort((a,b)=>byD[b].va-byD[a].va).map(d=>{
          const actual=byD[d].va;
          const t=distTargets[d]|| (savedTarget * (actual/(tv||1)));
          const p=t? actual/t*100:0;
          const cls=p>=100?'':p<40?'warn2':p<70?'over':'';
          return `<tr><td><b>${d}</b></td><td class="r">${fmtN(actual)}</td>

/* ============ TREND / RUN-RATE PROJECTION / SNAPSHOT COMPARE ============ */
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function renderTrend(){
  const f=apply();
  const tv=sum(f,'va'),tvi=sum(f,'vi');
  const fy=DATA.fiscal;
  const totalDays=daysBetween(fy.start,fy.end);
  const elapsedDays=Math.max(1,Math.min(daysBetween(fy.start,fy.today),totalDays));
  const frac=elapsedDays/totalDays;
  const projected = tv/frac;
  const remainDays = totalDays-elapsedDays;

  const snaps=storeGet('snapshots',[]);
  document.getElementById('page-trend').innerHTML=`
    <div style="margin-bottom:12px">${filterChips()}</div>
    <div class="ab">
      <h3>📈 ประมาณการสิ้นปีงบประมาณ (Run-Rate Projection)</h3>
      <p>วิธีคำนวณ: ใช้อัตราการสะสมมูลค่าถึงปัจจุบันเทียบสัดส่วนวันที่ผ่านไปของปีงบประมาณ (Oct 2568 – Sep 2569) แล้วประมาณการ ณ สิ้นปี — เป็นวิธีประมาณอย่างง่าย (ไม่ใช่แบบจำลองสถิติที่ซับซ้อน) เหมาะสำหรับดูแนวโน้มคร่าวๆ เท่านั้น</p>
      <div class="kpis">
        <div class="kpi"><div class="kt">วันที่ผ่านไปในปีงบ</div><div class="kv" style="font-size:20px">${elapsedDays} วัน</div><div class="ks">จาก ${totalDays} วัน (${fmtP(frac*100)})</div></div>
        <div class="kpi teal"><div class="kt">มูลค่าสะสมปัจจุบัน</div><div class="kv" style="font-size:20px">${fmtB(tv)}</div><div class="ks">ณ วันที่ประเมิน</div></div>
        <div class="kpi gold"><div class="kt">ประมาณการสิ้นปีงบ</div><div class="kv" style="font-size:20px">${fmtB(projected)}</div><div class="ks">หากรักษาอัตราปัจจุบัน</div></div>
        <div class="kpi blue"><div class="kt">เหลืออีก</div><div class="kv" style="font-size:20px">${remainDays} วัน</div><div class="ks">ถึงสิ้นปีงบประมาณ</div></div>
      </div>
      <p class="note">⚠️ วิธีนี้ไม่ใช่การพยากรณ์ทางสถิติ เป็นเพียงการ extrapolate ตามสัดส่วนเวลา หากมีฤดูกาล (เช่น หน้าฝนใช้บริการนวด/ประคบมากกว่า) ตัวเลขจริงอาจต่างจากนี้ได้</p>
    </div>
    <div class="ab op">
      <h3>💾 บันทึกและเปรียบเทียบข้ามรอบ (Snapshot)</h3>
      <p>ทุกครั้งที่อัปเดตข้อมูลใหม่ (เช่น รายเดือน) ให้กด "บันทึก Snapshot" เพื่อเก็บค่า ณ ขณะนั้นไว้เปรียบเทียบแนวโน้มจริงในอนาคต — ข้อมูลเก็บไว้ในเบราว์เซอร์นี้เท่านั้น</p>
      <div class="toolrow">
        <button class="btn-sm gold" id="snapSaveBtn">📸 บันทึก Snapshot ปัจจุบัน (ทั้งจังหวัด)</button>
        <button class="btn-sm" id="snapClearBtn">🗑️ ล้างประวัติ Snapshot</button>
      </div>
      <div id="snapTableWrap"></div>
    </div>`;
  renderSnapTable();
  document.getElementById('snapSaveBtn').onclick=()=>{
    const all=REC; // always snapshot whole-province totals for consistent comparison
    const snap={date:new Date().toISOString().slice(0,10),label:new Date().toLocaleDateString('th-TH'),
      value:sum(all,'va'),visits:sum(all,'vi'),persons:sum(all,'pe')};
    const list=storeGet('snapshots',[]);
    list.push(snap); storeSet('snapshots',list);
    renderTrend();
  };
  document.getElementById('snapClearBtn').onclick=()=>{
    if(confirm('ล้างประวัติ Snapshot ทั้งหมด?')){storeSet('snapshots',[]);renderTrend();}
  };
}
function renderSnapTable(){
  const snaps=storeGet('snapshots',[]);
  const wrap=document.getElementById('snapTableWrap');
  if(!wrap)return;
  if(!snaps.length){wrap.innerHTML=`<div class="snap-empty">ยังไม่มี Snapshot ที่บันทึกไว้ — กดปุ่มด้านบนเพื่อเริ่มเก็บประวัติ</div>`;return;}
  let rows='';
  snaps.forEach((s,i)=>{
    const prev=snaps[i-1];
    const delta=prev? s.value-prev.value:null;
    rows+=`<tr><td>${s.label}</td><td class="r">${fmtN(s.value)}</td><td class="r">${fmtN(s.visits)}</td><td class="r">${fmtN(s.persons)}</td>
      <td class="r">${delta===null?'-':(delta>=0?'📈 +':'📉 ')+fmtN(Math.abs(delta))}</td></tr>`;
  });
  wrap.innerHTML=`<div class="tbl-wrap" style="margin-top:12px"><table>
    <thead><tr><th>วันที่บันทึก</th><th class="r">มูลค่ารวม</th><th class="r">ครั้ง</th><th class="r">คน</th><th class="r">เปลี่ยนแปลงจากรอบก่อน</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

/* ============ GEO MAP (schematic bubble map, offline-safe SVG) ============ */
function renderMap(){
  const f=apply();
  if(!f.length){emptyGuard('page-map');return;}
  const byD=groupSum(f,'d');
  const geo=DATA.district_geo;
  const dL=Object.keys(byD);
  const lats=dL.map(d=>geo[d].lat), lngs=dL.map(d=>geo[d].lng);
  const minLat=Math.min(...lats)-0.03,maxLat=Math.max(...lats)+0.03;
  const minLng=Math.min(...lngs)-0.03,maxLng=Math.max(...lngs)+0.03;
  const W=560,H=360,pad=50;
  const x=lng=>pad+(lng-minLng)/(maxLng-minLng||1)*(W-2*pad);
  const y=lat=>H-pad-(lat-minLat)/(maxLat-minLat||1)*(H-2*pad); // invert lat (north up)
  const maxVal=Math.max(...dL.map(d=>byD[d].va));
  const rScale=v=>10+ (v/maxVal)*38;
  const tv=sum(f,'va');

  let bubbles='';
  dL.forEach(d=>{
    const cx=x(geo[d].lng), cy=y(geo[d].lat), r=rScale(byD[d].va);
    const pct=byD[d].va/tv*100;
    const col = pct>=25?'#1b5e20':pct>=12?'#43a047':pct>=5?'#c79a3c':'#b0764a';
    bubbles+=`<g>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" fill-opacity="0.82" stroke="#fff" stroke-width="2.5">
        <title>${d}: ${fmtB(byD[d].va)} (${fmtP(pct)})</title>
      </circle>
      <text x="${cx}" y="${cy-r-8}" text-anchor="middle" font-size="12" font-weight="700" fill="#123b16">${d}</text>
      <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">${(byD[d].va/1e6).toFixed(1)}M</text>
    </g>`;
  });

  document.getElementById('page-map').innerHTML=`
    <div style="margin-bottom:12px">${filterChips()}</div>
    <div class="card">
      <h3>🗺️ แผนที่มูลค่าตามอำเภอ (Schematic)</h3>
      <div class="hint">แผนที่เชิงสัมพัทธ์แสดงตำแหน่งโดยประมาณของ 6 อำเภอ ขนาดวงกลม = มูลค่า, สี = สัดส่วนเทียบทั้งจังหวัด — ไม่ใช่แผนที่ GIS ความละเอียดสูง ใช้เพื่อดู pattern เชิงพื้นที่คร่าวๆ</div>
      <div class="map-svg-wrap">
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:420px" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="${W}" height="${H}" fill="#eaf3ec" rx="12"/>
          ${bubbles}
        </svg>
      </div>
      <div class="map-legend">
