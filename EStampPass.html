<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>E-STAMP Wellness Passport</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:'Kanit',sans-serif;background:#2d5a27;color:#234;}
.wrap{position:relative;max-width:500px;margin:0 auto;}
.wrap img{display:block;width:100%;height:auto;}
.zone{
  position:absolute;border-radius:999px;cursor:pointer;z-index:5;
  background:rgba(255,255,255,0.01);border:0;outline:none;
  touch-action:manipulation;
}
.zone::before{
  content:"";position:absolute;inset:-7px;border-radius:999px;
  border:3px dashed rgba(93,144,97,.55);animation:pulse 2s infinite;
}
.zone.done::before{display:none;}
.zone:active{transform:scale(.96);}
@keyframes pulse{0%{opacity:.75;transform:scale(.92)}50%{opacity:.2;transform:scale(1.08)}100%{opacity:.75;transform:scale(.92)}}
.zone .mark{
  position:absolute;inset:0;border-radius:999px;display:none;
  align-items:center;justify-content:center;background:rgba(255,255,255,.95);
  border:3px solid #5d9061;transform:rotate(-12deg);
}
.zone.done .mark{display:flex;animation:stamp .45s cubic-bezier(.18,.89,.32,1.28);}
@keyframes stamp{0%{transform:scale(2.2) rotate(-18deg);opacity:0}100%{transform:scale(1) rotate(-12deg);opacity:1}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:18px;z-index:20;}
.overlay.show{display:flex;}
.card{width:min(92vw,360px);background:#b7d1a7;border-radius:24px;border:4px solid #fff;padding:22px;box-shadow:0 18px 45px rgba(0,0,0,.28);}
.title{font-weight:800;font-size:18px;color:#34553a;margin:0 0 8px;}
.sub{font-size:13px;color:#3d6642;margin:0 0 16px;}
.code-row{display:flex;gap:12px;justify-content:center;margin-bottom:14px;}
.digit{
  width:76px;height:76px;border-radius:18px;border:2px solid #e6d9c4;background:#fffaf4;
  font-size:34px;font-weight:800;text-align:center;color:#3f6b46;font-family:'Kanit',sans-serif;
  outline:none;
}
.digit:focus{border-color:#5d9061;box-shadow:0 0 0 4px rgba(93,144,97,.18);}
.err{display:none;text-align:center;color:#b91c1c;font-size:13px;font-weight:700;margin:0 0 14px;}
.btn{
  width:100%;border:0;border-radius:999px;background:#5d9061;color:#fff;padding:14px 16px;
  font-size:16px;font-weight:800;font-family:'Kanit',sans-serif;cursor:pointer;
}
.btn:active{transform:scale(.98);}
.mini{margin-top:10px;background:none;border:0;color:#3f6b46;text-decoration:underline;cursor:pointer;font-family:'Kanit',sans-serif;}
.bigfx{position:fixed;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:30;}
.bigfx.show{display:flex;}
.bigcircle{width:180px;height:180px;border-radius:999px;background:rgba(255,255,255,.96);border:8px solid #5d9061;
display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 50px rgba(93,144,97,.55),0 12px 36px rgba(0,0,0,.28);animation:pop .48s cubic-bezier(.18,.89,.32,1.28);}
@keyframes pop{0%{transform:scale(3.8) rotate(-18deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.success{position:fixed;inset:0;background:rgba(17,24,39,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:40;}
.success.show{display:flex;}
.success .card{text-align:center;}
.trophy{font-size:58px;line-height:1;margin-bottom:10px;}
</style>
</head>

<div class="overlay" id="overlay">
  <div class="card" id="modalCard">
    <h3 class="title" id="title">กรอกรหัส</h3>
    <p class="sub">แตะช่องว่างแล้วใส่รหัส 3 หลัก</p>
    <div class="code-row">
      <input class="digit" id="d1" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off">
      <input class="digit" id="d2" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off">
      <input class="digit" id="d3" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off">
    </div>
    <p class="err" id="err">รหัสไม่ถูกต้อง กรุณาลองใหม่</p>
    <button class="btn" id="stampBtn" type="button">ประทับตรา</button>
    <button class="mini" id="closeBtn" type="button">ปิด</button>
  </div>
</div>

<div class="bigfx" id="bigfx">
  <div class="bigcircle">
    <div style="font-size:66px;line-height:1;">✅</div>
    <div style="font-weight:800;font-size:20px;color:#5d9061;letter-spacing:1px;">STAMPED!</div>
  </div>
</div>

<div class="success" id="success">
  <div class="card">
    <div class="trophy">🏆</div>
    <h2 class="title" style="font-size:24px;">ยินดีด้วยค่ะ</h2>
    <p class="sub" style="font-size:14px;line-height:1.9;">
      คุณทำภาระกิจครบแล้วครับ<br>
      สามารถไปร่วมกิจกรรม ทำสมุนไพรใช้เอง<br>
      หรือรับของรางวัลได้ที่จุดอำนวยการครับ
    </p>
    <button class="btn" id="okBtn" type="button">ตกลง</button>
    <button class="mini" id="resetBtn" type="button">รีเซ็ตสำหรับทดสอบ</button>
  </div>
</div>

<script>
const ZONES = {
  101: {title:'ช่อง 1', code:'101'},
  102: {title:'ช่อง 2', code:'202'},
  103: {title:'ช่อง 3', code:'303'},
  104: {title:'ช่อง 4', code:'404'},
  105: {title:'ช่อง 5', code:'505'}
};

const STORAGE_KEY = 'estamp_stamped_v4';
let stamped = []; // เริ่มรอบใหม่ทุกครั้งที่เปิดไฟล์
try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
let currentId = null;
let audioCtx = null;

const overlay = document.getElementById('overlay');
const success = document.getElementById('success');
const titleEl = document.getElementById('title');
const errEl = document.getElementById('err');
const digits = [document.getElementById('d1'), document.getElementById('d2'), document.getElementById('d3')];

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(ok=true) {
  try {
    const c = getCtx();
    const freqs = ok ? [660,880,1100] : [220,180];
    freqs.forEach((f, i) => {
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = ok ? 'sine' : 'sawtooth';
      const t = c.currentTime + i * 0.08;
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(ok ? 0.22 : 0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + (ok ? 0.35 : 0.18));
      o.start(t); o.stop(t + (ok ? 0.38 : 0.2));
    });
  } catch(e) {}
}

function speakWin() {
  const text = 'ยินดีด้วยคุณทำภาระกิจครบแล้วครับ สามารถไปร่วมกิจกรรม ทำสมุนไพรใช้เอง หรือรับของรางวัลได้ที่จุดอำนวยการครับ';
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'th-TH';
    u.rate = 0.95;
    u.pitch = 1.35;
    const voices = window.speechSynthesis.getVoices();
    const thai = voices.find(v => /th/i.test(v.lang));
    if (thai) u.voice = thai;
    window.speechSynthesis.speak(u);
  }
}

function render() {
  document.querySelectorAll('.zone').forEach(btn => {
    const id = Number(btn.dataset.id);
    if (stamped.includes(id)) btn.classList.add('done');
    else btn.classList.remove('done');
  });
}

function openZone(id) {
  if (stamped.includes(id)) return;
  currentId = id;
  titleEl.textContent = ZONES[id].title + ' : กรุณาใส่รหัส';
  errEl.style.display = 'none';
  digits.forEach(d => d.value = '');
  overlay.classList.add('show');
  setTimeout(() => digits[0].focus(), 50);
}

function closeOverlay() {
  overlay.classList.remove('show');
  currentId = null;
}

function getCode() {
  return digits.map(d => d.value).join('');
}

function validate() {
  if (!currentId) return;
  const ok = getCode() === ZONES[currentId].code;
  if (!ok) {
    errEl.style.display = 'block';
    beep(false);
    digits.forEach(d => d.value = '');
    digits[0].focus();
    return;
  }
  let justCompletedAll = false;
  if (!stamped.includes(currentId)) {
    stamped.push(currentId);
    if (stamped.length === 5) justCompletedAll = true;
  }
  closeOverlay();
  showStampFx();
  render();
  if (justCompletedAll) {
    setTimeout(showFinal, 1100);
  }
}

function showStampFx() {
  const fx = document.getElementById('bigfx');
  fx.classList.add('show');
  beep(true);
  if (window.confetti) {
    confetti({particleCount:90, spread:80, origin:{y:0.62}});
  }
  setTimeout(() => fx.classList.remove('show'), 900);
}

function showFinal() {
  if (window.confetti) {
    confetti({particleCount:180, spread:120, origin:{y:0.58}});
    setTimeout(() => confetti({particleCount:120, spread:160, origin:{y:0.45}}), 250);
  }
  success.classList.add('show');
  beep(true);
  setTimeout(speakWin, 300);
}

document.querySelectorAll('.zone').forEach(btn => {
  btn.addEventListener('click', () => openZone(Number(btn.dataset.id)));
});

digits.forEach((input, idx) => {
  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g, '').slice(0,1);
    errEl.style.display = 'none';
    if (input.value && idx < 2) digits[idx+1].focus();
    if (getCode().length === 3) validate();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !input.value && idx > 0) {
      digits[idx-1].focus();
      digits[idx-1].value = '';
    }
    if (e.key === 'Enter') validate();
  });
  input.addEventListener('click', () => input.focus());
});

document.getElementById('stampBtn').addEventListener('click', validate);
document.getElementById('closeBtn').addEventListener('click', closeOverlay);
document.getElementById('okBtn').addEventListener('click', () => {
  success.classList.remove('show');
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stamped = [];
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  render();
});
document.getElementById('resetBtn').addEventListener('click', () => {
  stamped = [];
  localStorage.removeItem(STORAGE_KEY);
  success.classList.remove('show');
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  render();
});

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeOverlay();
});

document.addEventListener('click', () => {
  try { getCtx().resume(); } catch(e) {}
}, {once:true});

render();
</script>
