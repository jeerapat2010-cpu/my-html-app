<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>🌿 HerbBox Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root{
  --g1:#1a5c36;--g2:#276749;--g3:#40916c;--g4:#52b788;--gp:#d8f3dc;--gd:#b7e4c7;
  --gold:#c9943a;--gold2:#e8b84b;
  --bg:#f5fbf2;--txt:#1a2d1a;--muted:#6e8b6e;--border:#dbeedd;
  --red:#c0392b;--warn:#d97706;
  --HDR:64px;--NAV:68px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--txt)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gd);border-radius:4px}

/* ─── Fixed Layout ─── */
#HDR{position:fixed;top:0;left:0;right:0;height:var(--HDR);z-index:50;
  background:linear-gradient(135deg,#1a5c36 0%,#276749 50%,#40916c 100%);
  box-shadow:0 3px 16px rgba(26,92,54,.4);
  display:flex;align-items:center;padding:0 14px;gap:10px}
#MAIN{position:fixed;top:var(--HDR);left:0;right:0;bottom:var(--NAV);
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#MAIN.no-nav{bottom:0}
#NAV{position:fixed;bottom:0;left:0;right:0;height:var(--NAV);z-index:50;
  background:#fff;border-top:1.5px solid var(--border);
  box-shadow:0 -2px 16px rgba(0,0,0,.09);
  display:flex;align-items:stretch;
  padding-bottom:env(safe-area-inset-bottom,0)}

/* ─── Header parts ─── */
.hbtn{background:rgba(255,255,255,.18);border:none;border-radius:10px;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;color:#fff}
.hbtn:active{background:rgba(255,255,255,.3)}
.htitle{color:#fff;font-size:17px;font-weight:800;flex:1}
.hsubtitle{color:rgba(255,255,255,.65);font-size:11px;font-weight:500}

/* ─── Nav buttons ─── */
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:none;background:none;font-family:'Sarabun',sans-serif;
  font-size:9.5px;font-weight:700;color:#b0b0b0;cursor:pointer;
  padding:6px 2px 10px;position:relative;transition:color .2s}
.nb.on{color:var(--g2)}
.nb.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:22px;height:3px;background:linear-gradient(90deg,var(--g3),var(--gold2));
  border-radius:2px 2px 0 0}
.nb svg{width:20px;height:20px;transition:transform .2s}
.nb.on svg{transform:scale(1.15)}

/* ─── Animation ─── */
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.au{animation:up .28s ease-out both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}
.blink{animation:blink 2s infinite}

/* ─── Cards ─── */
.card{background:#fff;border-radius:18px;border:1px solid var(--border);
  box-shadow:0 2px 10px rgba(26,92,54,.06);padding:14px}
.tap{cursor:pointer;transition:transform .13s,box-shadow .13s;-webkit-user-select:none;user-select:none}
.tap:active{transform:scale(.97)}
.tap:hover{box-shadow:0 4px 16px rgba(26,92,54,.13)}

/* ─── Badges ─── */
.bh{background:#d8f3dc;color:#1a5c36;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-flex}
.bt{background:#ede9fe;color:#5b21b6;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-flex}

/* ─── Status chips ─── */
.s-ok  {background:#d8f3dc;color:#1a5c36}
.s-warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.s-bad {background:#fdecea;color:#991b1b;border:1px solid #fca5a5}
.s-emp {background:#fce7f3;color:#831843;border:1px solid #f9a8d4}
.schip{padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}

/* ─── Inputs ─── */
.inp{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:12px;
  font-family:'Sarabun',sans-serif;font-size:15px;color:var(--txt);background:#fafcfa;
  outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--g3);box-shadow:0 0 0 3px rgba(64,145,108,.1)}

/* ─── Buttons ─── */
.bg{background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff;border:none;
  border-radius:13px;padding:13px 18px;font-family:'Sarabun',sans-serif;font-size:15px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 4px 12px rgba(26,92,54,.28);transition:transform .13s}
.bg:active{transform:scale(.97)}
.bgold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;
  border-radius:12px;padding:10px 16px;font-family:'Sarabun',sans-serif;font-size:14px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
  box-shadow:0 3px 10px rgba(201,148,58,.28);transition:transform .13s}
.bgold:active{transform:scale(.97)}
.bgh{background:#f0f7f0;color:var(--g2);border:1.5px solid var(--border);border-radius:12px;
  padding:10px 16px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s}
.bgh:active{background:#dbeedd}
.bred{background:#fdecea;color:var(--red);border:1.5px solid #fca5a5;border-radius:12px;
  padding:11px 16px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s}
.bred:active{background:#fee2e2}

/* ─── Filter chips ─── */
.fc{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap;
  border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:all .2s}
.fc.on{background:var(--g2);color:#fff;border-color:var(--g2)}

/* ─── Section header ─── */
.sh{font-size:11.5px;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;padding:14px 0 6px;display:flex;align-items:center;gap:6px}

/* ─── Group color ─── */
.gc-fever{border-left:4px solid #ef5350}.gc-resp{border-left:4px solid #42a5f5}
.gc-digest{border-left:4px solid #66bb6a}.gc-skin{border-left:4px solid #ffa726}
.gc-muscle{border-left:4px solid #ab47bc}.gc-tonic{border-left:4px solid #26a69a}
.gc-wind{border-left:4px solid #ffca28}

/* ─── Modal ─── */
#MOD{display:none;position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.5);
  backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
#MOD.on{display:flex}
#MODBOX{background:#fff;border-radius:26px 26px 0 0;padding:24px 18px 36px;
  width:100%;max-width:440px;animation:pop .22s ease-out}

/* ─── Print ─── */
@media print{#HDR,#NAV,.no-print{display:none!important}
  #MAIN{position:static;overflow:visible;height:auto;bottom:0!important}body{background:#fff}}
</style>
</head>
<body>

<div id="HDR">
  <button id="HB" class="hbtn" onclick="goBack()" style="display:none">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div id="LOGO" style="background:rgba(255,255,255,.18);border-radius:10px;width:38px;height:38px;
       display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;cursor:pointer"
       onclick="goHome()">🌿</div>
  <div id="HTXT" style="flex:1">
    <div class="htitle">HerbBox Pro</div>
    <div class="hsubtitle">ตู้ยาสมุนไพรประจำบ้าน</div>
  </div>
  <div id="HPTITLE" style="display:none;flex:1">
    <div id="HPTEXT" class="htitle" style="font-size:15px"></div>
  </div>
</div>

<div id="MAIN"><div id="C" style="padding:16px 14px 24px"></div></div>

<nav id="NAV">
  <button class="nb on" id="N0" onclick="go('home')"><i data-lucide="home"></i>หน้าแรก</button>
  <button class="nb"    id="N1" onclick="go('recommend')"><i data-lucide="book-open"></i>ยาแนะนำ</button>
  <button class="nb"    id="N2" onclick="go('stock')"><i data-lucide="archive"></i>คลังยา</button>
  <button class="nb"    id="N3" onclick="go('report')"><i data-lucide="bar-chart-2"></i>รายงาน</button>
  <button class="nb"    id="N4" onclick="go('about')"><i data-lucide="info"></i>เกี่ยวกับ</button>
</nav>

<div id="MOD" onclick="modBg(event)"><div id="MODBOX"></div></div>

function drug(id){return DRUGS.find(function(d){return d.id===id})||{}}
function stock(id){return INV.find(function(i){return i.id===id})||{}}
var TH=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
var TF=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
function td(s){if(!s)return'—';var d=new Date(s);return d.getDate()+' '+TH[d.getMonth()]+' '+(d.getFullYear()+543)}
function tdf(d){return d.getDate()+' '+TF[d.getMonth()]+' '+(d.getFullYear()+543)}
function today(){return new Date().toISOString().split('T')[0]}
function uid(){return 'i'+Date.now()+Math.random().toString(36).slice(2,5)}
function fmt(n){return(n!=null&&n!=='')? '฿'+Number(n).toLocaleString():'—'}

function expInfo(exp){
  if(!exp)return{code:'ok',label:'ไม่ระบุ',cls:'s-ok'};
  var t=new Date();t.setHours(0,0,0,0);
  var e=new Date(exp);var d=Math.ceil((e-t)/864e5);
  if(d<0)  return{code:'exp', label:'หมดอายุ '+Math.abs(d)+' วัน',cls:'s-bad'};
  if(d<=30)return{code:'near',label:'หมดใน '+d+' วัน',cls:'s-warn'};
  return{code:'ok',label:'ปกติ',cls:'s-ok'};
}
function stInfo(item){
  var ex=expInfo(item.expiry);
  if(ex.code==='exp')return ex;
  if(!item.qty||item.qty<=0)return{code:'empty',label:'หมดแล้ว!',cls:'s-emp'};
  if(item.qty<=(item.minQty||1))return{code:'low',label:'เหลือน้อย',cls:'s-warn'};
  if(ex.code==='near')return ex;
  return{code:'ok',label:'ปกติ',cls:'s-ok'};
}

var MAIN_VIEWS=['home','recommend','stock','report','about'];
var NAV_IDS=['N0','N1','N2','N3','N4'];

function go(v){
  PV=null;
  V=v;
  render();
  document.getElementById('MAIN').scrollTop=0;
}
function goTo(v,did,sid){
  PV=V;
  if(did!==undefined)DID=did;
  if(sid!==undefined)SID=sid;
  V=v;
  render();
  document.getElementById('MAIN').scrollTop=0;
}
function goBack(){
  if(PV){go(PV);}else{go('home');}
}
function goHome(){go('home');}

function render(){
  var isMain=MAIN_VIEWS.indexOf(V)>=0;

  // Header
  document.getElementById('HB').style.display=isMain?'none':'flex';
  document.getElementById('LOGO').style.display=isMain?'flex':'none';
  document.getElementById('HTXT').style.display=isMain?'block':'none';
  document.getElementById('HPTITLE').style.display=isMain?'none':'block';
  var titles={drug:'รายละเอียดยา',stockAdd:'รับยาเข้าคลัง',stockDetail:'รายละเอียดในคลัง'};
  document.getElementById('HPTEXT').textContent=titles[V]||'';

  // Nav
  var nav=document.getElementById('NAV');
  nav.style.display=isMain?'flex':'none';
  document.getElementById('MAIN').className=isMain?'':'no-nav';

  // Active nav tab
  if(isMain){
    var idx=['home','recommend','stock','report','about'].indexOf(V);
    NAV_IDS.forEach(function(id,i){
      document.getElementById(id).className='nb'+(i===idx?' on':'');
    });
  }

  // Render view
  var fn={home:vHome,recommend:vRecommend,drug:vDrug,
          stock:vStock,stockAdd:vStockAdd,stockDetail:vStockDetail,
          report:vReport,about:vAbout}[V]||vHome;
  document.getElementById('C').innerHTML=fn();
  lucide.createIcons();
}

function saPreview(){
  var s=document.getElementById('sa-d');
  if(!s)return;
  DID=s.value;
  var d=drug(s.value);
  var el=document.getElementById('sa-ind');
  if(el)el.textContent=d.indications||'กรุณาเลือกชนิดยา';
}

function doAdd(){
  var drugId=(document.getElementById('sa-d')||{}).value||'';
  var qty=parseInt((document.getElementById('sa-q')||{}).value)||0;
  var unit=(document.getElementById('sa-u')||{}).value||'ชิ้น';
  var expiry=(document.getElementById('sa-e')||{}).value||'';
  var minQty=parseInt((document.getElementById('sa-m')||{}).value)||1;
  var lastPrice=parseFloat((document.getElementById('sa-p')||{}).value)||0;
  var lastPriceDate=(document.getElementById('sa-pd')||{}).value||today();
  var note=(document.getElementById('sa-n')||{}).value||'';
  if(!drugId){alert('กรุณาเลือกชนิดยา');return;}
  if(qty<=0){alert('กรุณาระบุจำนวน');return;}
  if(!expiry){alert('กรุณาระบุวันหมดอายุ');return;}
  var ex=INV.find(function(i){return i.drugId===drugId});
  if(ex){
    ex.qty+=qty;ex.expiry=expiry;
    if(lastPrice){ex.lastPrice=lastPrice;ex.lastPriceDate=lastPriceDate;}
    ex.txns.push({tp:'in',qty:qty,date:today(),note:note||'รับยาเพิ่ม',price:lastPrice||null});
  }else{
    INV.push({id:uid(),drugId:drugId,qty:qty,unit:unit,expiry:expiry,minQty:minQty,
      lastPrice:lastPrice||null,lastPriceDate:lastPrice?lastPriceDate:null,note:note,
      txns:[{tp:'in',qty:qty,date:today(),note:note||'รับยาครั้งแรก',price:lastPrice||null}]});
  }
  save();go('stock');
}

      +'<div style="font-weight:800;font-size:13px;color:'+clr+';margin-bottom:8px">'+icon+' '+title+' ('+items.length+')</div>';

        +'<div style="text-align:right;flex-shrink:0"><div style="font-weight:700;font-size:13px">'+x.i.qty+' '+x.i.unit+'</div>'
        +(x.i.lastPrice?'<div style="font-size:10px;color:var(--muted)">'+fmt(x.i.lastPrice)+'</div>':'')
        +'</div></div>';

      +'<td style="padding:8px 10px;text-align:right;color:var(--gold);font-weight:600">'+(i.lastPrice?fmt(i.lastPrice):'—')+'</td>'
      +'</tr>';
  });

  var orderRows='';
  if(!orderItems.length){
    orderRows='<div style="text-align:center;padding:16px;color:var(--g2)"><div style="font-size:24px">🎉</div><div style="font-weight:700;margin-top:8px">ยังไม่มีรายการที่ต้องสั่งซื้อ</div></div>';

      +'<th style="padding:8px;text-align:center;font-weight:800;color:var(--warn)">สั่งซื้อ</th>'
      +'<th style="padding:8px 10px;text-align:right;font-weight:800;color:var(--warn)">ราคาประมาณ</th>'
      +'</tr></thead><tbody>';

        +'<td style="padding:8px 10px;text-align:right;color:var(--gold);font-weight:700">'+(x.i.lastPrice?fmt(x.sq*x.i.lastPrice):'—')+'</td></tr>';

function showTxn(sid,tp){
  var item=stock(sid);var d=drug(item.drugId);var isIn=tp==='in';
  showMod('<div style="text-align:center;margin-bottom:16px">'
    +'<div style="font-size:36px;margin-bottom:8px">'+(isIn?'📥':'📤')+'</div>'
    +'<div style="font-weight:800;font-size:17px">'+(isIn?'รับยาเข้า':'จ่ายยาออก')+'</div>'
    +'<div style="font-size:13px;color:var(--muted);margin-top:4px">'+d.name+'</div>'
    +'<div style="font-size:13px;font-weight:700;margin-top:4px">คงเหลือ: <b style="color:var(--g2)">'+item.qty+' '+item.unit+'</b></div></div>'
    +'<div style="margin-bottom:12px">'
    +'<div style="font-size:12px;font-weight:700;color:var(--g2);margin-bottom:5px">จำนวน *</div>'
    +'<input type="number" class="inp" id="tx-q" min="1" value="1"></div>'
    +(isIn?'<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:5px">💰 ราคาซื้อครั้งนี้ (บาท)</div><input type="number" class="inp" id="tx-p" min="0" placeholder="เช่น 85" value="'+(item.lastPrice||'')+'"></div>':'')
    +'<div style="margin-bottom:18px"><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px">หมายเหตุ</div>'
    +'<input type="text" class="inp" id="tx-n" placeholder="'+(isIn?'เช่น ซื้อมาใหม่':'เช่น นำมาใช้')+'"></div>'
    +'<button class="'+(isIn?'bg':'bgold')+'" style="width:100%;margin-bottom:10px" onclick="doTxn(\''+sid+'\',\''+tp+'\')">'
    +'ยืนยัน'+(isIn?'รับเข้า':'จ่ายออก')+'</button>'
    +'<button class="bgh" style="width:100%" onclick="closeMod()">ยกเลิก</button>');
}

function doTxn(sid,tp){
  var item=stock(sid);
  var qty=parseInt((document.getElementById('tx-q')||{}).value)||0;
  var note=(document.getElementById('tx-n')||{}).value||'';
  var priceEl=document.getElementById('tx-p');
  var price=priceEl?parseFloat(priceEl.value)||null:null;
  if(qty<=0){alert('กรุณาระบุจำนวน');return;}
  if(tp==='out'&&qty>item.qty){alert('จำนวนจ่ายออก ('+qty+') เกินคงเหลือ ('+item.qty+')');return;}
  item.qty=tp==='in'?item.qty+qty:item.qty-qty;
  if(tp==='in'&&price){item.lastPrice=price;item.lastPriceDate=today();}
  item.txns.push({tp:tp,qty:qty,date:today(),note:note,price:tp==='in'?price:null});
  save();closeMod();
  SID=sid;V='stockDetail';render();
  document.getElementById('MAIN').scrollTop=0;
}

function showEditPrice(sid){
  var item=stock(sid);var d=drug(item.drugId);
  showMod('<div style="text-align:center;margin-bottom:16px">'
    +'<div style="font-size:32px;margin-bottom:8px">💰</div>'
    +'<div style="font-weight:800;font-size:17px">อัปเดตราคาซื้อ</div>'
    +'<div style="font-size:13px;color:var(--muted);margin-top:4px">'+d.name+'</div></div>'
    +'<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:5px">ราคาซื้อล่าสุด (บาท) *</div>'
    +'<input type="number" class="inp" id="ep-p" min="0" value="'+(item.lastPrice||'')+'" placeholder="เช่น 85"></div>'
    +'<div style="margin-bottom:18px"><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px">วันที่ซื้อ</div>'
    +'<input type="date" class="inp" id="ep-d" value="'+(item.lastPriceDate||today())+'"></div>'
    +'<button class="bgold" style="width:100%;margin-bottom:10px" onclick="doEditPrice(\''+sid+'\')">บันทึกราคา</button>'
    +'<button class="bgh" style="width:100%" onclick="closeMod()">ยกเลิก</button>');
}

function doEditPrice(sid){
  var item=stock(sid);
  var price=parseFloat((document.getElementById('ep-p')||{}).value)||null;
  var date=(document.getElementById('ep-d')||{}).value||today();
  if(!price){alert('กรุณาระบุราคา');return;}
  item.lastPrice=price;item.lastPriceDate=date;
  save();closeMod();
  SID=sid;V='stockDetail';render();
  document.getElementById('MAIN').scrollTop=0;
}

function askDel(sid){
  showMod('<div style="text-align:center;margin-bottom:20px">'
    +'<div style="font-size:36px;margin-bottom:10px">🗑️</div>'
    +'<div style="font-weight:800;font-size:17px">ลบรายการนี้?</div>'
    +'<div style="font-size:13px;color:var(--muted);margin-top:6px">การกระทำนี้ไม่สามารถย้อนกลับได้</div></div>'
    +'<button class="bred" style="width:100%;margin-bottom:10px" onclick="doDel(\''+sid+'\')">ยืนยันการลบ</button>'
    +'<button class="bgh" style="width:100%" onclick="closeMod()">ยกเลิก</button>');
}

function doDel(sid){
  INV=INV.filter(function(i){return i.id!==sid});
  save();closeMod();go('stock');
}

load();
render();
</script>
