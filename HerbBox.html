<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HerbBox Pro — ตู้ยาสมุนไพรประจำบ้าน</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --g1:#1b5e20;--g2:#2e7d32;--g3:#388e3c;--g4:#4caf50;--gp:#e8f5e9;
  --a1:#bf360c;--a2:#e64a19;--a3:#ff7043;--ap:#fff3e0;
  --bg:#f1f8f0;--card:#fff;--txt:#1a2d1a;--muted:#6b7e6b;--border:#ddeedd;
  --red:#c62828;--redp:#ffebee;--warn:#e65100;--warnp:#fff8e1;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
::-webkit-scrollbar{width:4px;background:transparent}
::-webkit-scrollbar-thumb{background:#c8e6c9;border-radius:4px}

#app-main{
  position:fixed;top:64px;bottom:72px;left:0;right:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  background:var(--bg);
}
#header-bar{
  position:fixed;top:0;left:0;right:0;height:64px;z-index:50;
  background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%);
  box-shadow:0 2px 12px rgba(27,94,32,.35);
  display:flex;align-items:center;padding:0 16px;gap:10px;
}
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:72px;z-index:50;
  background:#fff;border-top:1px solid var(--border);
  box-shadow:0 -2px 16px rgba(0,0,0,.08);
  display:flex;align-items:center;justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;padding:8px 4px;
  color:#9e9e9e;font-size:10px;font-weight:600;
  border:none;background:none;font-family:'Sarabun',sans-serif;
  transition:color .2s;cursor:pointer;position:relative;
}
.nav-btn.active{color:var(--g3)}
.nav-btn.active::after{
  content:'';position:absolute;bottom:2px;
  width:20px;height:3px;background:var(--g3);border-radius:2px;
}
.nav-icon{width:22px;height:22px;transition:transform .2s}
.nav-btn.active .nav-icon{transform:scale(1.15)}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.fade-up{animation:fadeUp .35s ease-out both}
.slide-in{animation:slideIn .3s ease-out both}
.pop-in{animation:popIn .25s ease-out both}
.s1{animation-delay:.04s}.s2{animation-delay:.08s}.s3{animation-delay:.12s}
.s4{animation-delay:.16s}.s5{animation-delay:.2s}.s6{animation-delay:.24s}
.pulse{animation:pulse 2s infinite}

.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border)}
.pressable{cursor:pointer;transition:transform .15s,box-shadow .15s}
.pressable:active{transform:scale(.97)}
.pressable:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.b-household{background:#e8f5e9;color:#2e7d32}
.b-otc{background:#e3f2fd;color:#1565c0}
.b-herbal{background:#e0f2f1;color:#00695c}
.b-ttm{background:#f3e5f5;color:#6a1b9a}

.s-safe{background:#e8f5e9;color:#1b5e20}
.s-warn{background:#fff3e0;color:#bf360c}
.s-danger{background:#ffebee;color:#c62828}
.s-empty{background:#fce4ec;color:#880e4f}

.input-field{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:12px;
  font-family:'Sarabun',sans-serif;font-size:15px;color:var(--txt);
  background:#fafafa;outline:none;transition:border-color .2s,background .2s;
}
.input-field:focus{border-color:var(--g3);background:#fff}

.btn-primary{
  background:linear-gradient(135deg,var(--g2),var(--g3));
  color:#fff;border:none;border-radius:14px;
  padding:14px 20px;font-family:'Sarabun',sans-serif;
  font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 12px rgba(46,125,50,.35);
  transition:transform .15s,box-shadow .15s;
}
.btn-primary:active{transform:scale(.97);box-shadow:0 2px 8px rgba(46,125,50,.3)}
.btn-amber{
  background:linear-gradient(135deg,var(--a2),var(--a3));
  color:#fff;border:none;border-radius:14px;
  padding:12px 18px;font-family:'Sarabun',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 3px 10px rgba(230,74,25,.3);
  transition:transform .15s;
}
.btn-amber:active{transform:scale(.97)}
.btn-ghost{
  background:#f5f5f5;color:var(--txt);border:1px solid var(--border);
  border-radius:12px;padding:10px 16px;font-family:'Sarabun',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;
}
.btn-ghost:active{background:#e8e8e8}
.btn-danger{
  background:#ffebee;color:var(--red);border:1px solid #ffcdd2;
  border-radius:12px;padding:10px 16px;font-family:'Sarabun',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
}
.btn-danger:active{background:#ffcdd2}

#modal-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  align-items:flex-end;justify-content:center;
}
#modal-overlay.show{display:flex}
#modal-box{
  background:#fff;border-radius:24px 24px 0 0;
  padding:24px 20px 36px;width:100%;max-width:480px;
  animation:popIn .25s ease-out;
}

/* Group color strips */
.grp-fever{border-left:4px solid #ef5350}
.grp-resp{border-left:4px solid #42a5f5}
.grp-digest{border-left:4px solid #66bb6a}
.grp-skin{border-left:4px solid #ffa726}
.grp-muscle{border-left:4px solid #ab47bc}
.grp-tonic{border-left:4px solid #26a69a}
.grp-wind{border-left:4px solid #ffca28}

.dot-fever{background:#ef5350}
.dot-resp{background:#42a5f5}
.dot-digest{background:#66bb6a}
.dot-skin{background:#ffa726}
.dot-muscle{background:#ab47bc}
.dot-tonic{background:#26a69a}
.dot-wind{background:#ffca28}

/* Pill filter */
.pill{
  padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600;
  border:1.5px solid var(--border);background:#fff;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.pill.active{background:var(--g2);color:#fff;border-color:var(--g2)}

/* Section header */
.sec-hdr{
  font-size:13px;font-weight:700;color:var(--muted);
  padding:10px 16px 4px;text-transform:uppercase;letter-spacing:.5px;
}

/* Info row */
.info-row{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.info-row:last-child{border-bottom:none;padding-bottom:0}
.info-icon{flex-shrink:0;margin-top:2px}
.info-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}
.info-val{font-size:14px;color:var(--txt);line-height:1.55}
</style>
</head>
<body>

<!-- ===== HEADER BAR ===== -->
<div id="header-bar">
  <button id="hdr-back" onclick="goBack()" style="display:none;background:rgba(255,255,255,.15);border:none;border-radius:99px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0" class="hidden">
    <i data-lucide="arrow-left" style="color:#fff;width:20px;height:20px"></i>
  </button>
  <div id="hdr-logo" style="display:flex;align-items:center;gap:8px">
    <div style="background:rgba(255,255,255,.2);border-radius:10px;padding:6px;flex-shrink:0">
      <i data-lucide="leaf" style="color:#a5d6a7;width:22px;height:22px"></i>
    </div>
    <div>
      <div style="color:#fff;font-weight:800;font-size:17px;line-height:1.1">HerbBox Pro</div>
      <div style="color:#a5d6a7;font-size:11px;font-weight:500">ตู้ยาสมุนไพรประจำบ้าน</div>
    </div>
  </div>
  <div id="hdr-title" style="display:none;color:#fff;font-weight:700;font-size:17px"></div>
  <div style="flex:1"></div>
  <div id="hdr-badge-alert" style="display:none"></div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<main id="app-main"><div id="app-content" style="padding:16px 16px 8px"></div></main>

<!-- ===== BOTTOM NAV ===== -->
<nav id="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="navigateTo('home')">
    <i data-lucide="home" class="nav-icon"></i><span>หน้าแรก</span>
  </button>
  <button class="nav-btn" id="nav-recommend" onclick="navigateTo('recommend')">
    <i data-lucide="book-open" class="nav-icon"></i><span>ยาแนะนำ</span>
  </button>
  <button class="nav-btn" id="nav-stock" onclick="navigateTo('stock')">
    <i data-lucide="archive" class="nav-icon"></i><span>คลังยา</span>
  </button>
  <button class="nav-btn" id="nav-about" onclick="navigateTo('about')">
    <i data-lucide="info" class="nav-icon"></i><span>เกี่ยวกับ</span>
  </button>
</nav>

<!-- ===== MODAL ===== -->
<div id="modal-overlay" onclick="closeModalOnBg(event)">
  <div id="modal-box"></div>
</div>

function getDrug(id){return DRUGS.find(d=>d.id===id)||{}}
function getStock(id){return state.inventory.find(i=>i.id===id)||{}}

function expiryStatus(exp){
  if(!exp) return{code:'unknown',label:'ไม่ระบุ',cls:'s-safe',days:null};
  const today=new Date(); today.setHours(0,0,0,0);
  const e=new Date(exp);
  const diff=Math.ceil((e-today)/(864e5));
  if(diff<0) return{code:'danger',label:`หมดอายุ ${Math.abs(diff)} วัน`,cls:'s-danger',days:diff};
  if(diff<=30) return{code:'warn',label:`หมดอายุใน ${diff} วัน`,cls:'s-warn',days:diff};
  return{code:'safe',label:'ปกติ',cls:'s-safe',days:diff};
}
function stockStatus(item){
  const exp=expiryStatus(item.expiry);
  if(exp.code==='danger') return{...exp};
  if(item.qty<=0) return{code:'empty',label:'หมดแล้ว!',cls:'s-empty',days:exp.days};
  if(item.qty<=(item.minQty||1)) return{code:'warn',label:`เหลือน้อย (${item.qty})`,cls:'s-warn',days:exp.days};
  if(exp.code==='warn') return{...exp};
  return{code:'safe',label:'ปกติ',cls:'s-safe',days:exp.days};
}

function thaiDate(str){
  if(!str) return '—';
  const d=new Date(str);
  const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()+543}`;
}
function todayStr(){return new Date().toISOString().split('T')[0]}
function uid(){return 'i'+Date.now()+Math.random().toString(36).slice(2,5)}

/* ============================================================
   NAVIGATION
   ============================================================ */
const MAIN_VIEWS=['home','recommend','stock','about'];
function navigateTo(view, params={}){
  if(MAIN_VIEWS.includes(view)){
    state.prevView=null;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    const nb=document.getElementById('nav-'+view);
    if(nb) nb.classList.add('active');
  } else {
    state.prevView=state.view;
  }
  Object.assign(state, params);
  state.view=view;
  render();
  document.getElementById('app-main').scrollTo({top:0,behavior:'instant'});
}
function goBack(){
  if(state.prevView) navigateTo(state.prevView);
  else navigateTo('home');
}

    const q=state.recSearch.toLowerCase();
    const searchOk = !q || d.name.toLowerCase().includes(q) ||
                     (d.sci||'').toLowerCase().includes(q) ||
                     d.indications.toLowerCase().includes(q);
    return typeOk && searchOk;
  });

  // Group them
  const grouped={};
  filtered.forEach(d=>{
    if(!grouped[d.group]) grouped[d.group]=[];
    grouped[d.group].push(d);
  });

  const filterBtns=['all','herbal','ttm'].map(f=>{
    const labels={all:'ทั้งหมด',herbal:'สมุนไพร',ttm:'แผนไทย'};
    return `<button class="pill${state.recFilter===f?' active':''}" onclick="setRecFilter('${f}')">${labels[f]}</button>`;
  }).join('');

  let listHtml='';
  if(filtered.length===0){
    listHtml=`<div style="text-align:center;padding:48px 24px;color:var(--muted)">
      <i data-lucide="search-x" style="width:40px;height:40px;margin:0 auto 12px;display:block"></i>
      <div style="font-size:15px;font-weight:600">ไม่พบรายการที่ค้นหา</div>
    </div>`;
  } else {
    Object.entries(GROUPS).forEach(([grpKey,grp])=>{
      if(!grouped[grpKey]) return;
      const items=grouped[grpKey];
      listHtml+=`
        <div id="grp-${grpKey}" style="margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:8px;padding:10px 4px 6px">
            <div class="dot-${grpKey}" style="width:8px;height:8px;border-radius:50%;flex-shrink:0"></div>
            <span style="font-size:13px;font-weight:700;color:var(--muted)">${grp.emoji} ${grp.label}</span>
            <span style="font-size:11px;background:#f5f5f5;padding:2px 8px;border-radius:99px;color:var(--muted)">${items.length}</span>
          </div>
          ${items.map(d=>`
            <div class="card pressable grp-${d.group} fade-up" onclick="navigateTo('drug',{selDrugId:'${d.id}'})"
                 style="margin-bottom:8px;display:flex;align-items:center;gap:12px">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
                  <span style="font-weight:700;font-size:15px">${d.name}</span>
                </div>
                <div style="font-size:11px;color:var(--muted);font-style:italic;margin-bottom:5px">${d.sci||''}</div>
                <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                  <span class="badge ${TYPES[d.type].cls}">${TYPES[d.type].short}</span>
                  <span style="font-size:11px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.indications}</span>
                </div>
              </div>
              <i data-lucide="chevron-right" style="width:16px;height:16px;color:#bdbdbd;flex-shrink:0"></i>
            </div>`).join('')}
        </div>`;
    });
  }

  return `
  <div>
    <!-- Search -->
    <div class="fade-up" style="position:relative;margin-bottom:12px">
      <i data-lucide="search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)"></i>
      <input class="input-field" style="padding-left:40px" placeholder="ค้นหายาหรืออาการ..."
             value="${state.recSearch}" oninput="setRecSearch(this.value)" id="rec-search">
    </div>
    <!-- Type Filters -->
    <div class="fade-up s1" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none">
      ${filterBtns}
    </div>
    <!-- Drug List -->
    <div>${listHtml}</div>
  </div>`;
}

/* ============================================================
   VIEW: DRUG DETAIL
   ============================================================ */
function renderDrug(){
  const d=getDrug(state.selDrugId);
  if(!d.id) return '<div style="padding:32px;text-align:center;color:var(--muted)">ไม่พบข้อมูล</div>';
  const grp=GROUPS[d.group]||{label:'',emoji:'',cls:''};
  const typ=TYPES[d.type]||{label:'',cls:''};

  // Check if in stock
  const inStock=state.inventory.find(i=>i.drugId===d.id);

  const infoRows=[
    {icon:'pill',label:'รูปแบบยา',val:d.form||'—'},
    {icon:'clock',label:'ขนาดและวิธีใช้',val:d.dosage||'—'},
    {icon:'activity',label:'ข้อบ่งใช้ (สรรพคุณ)',val:d.indications||'—'},
    {icon:'shield-x',label:'ข้อห้ามใช้',val:d.contraindications||'—'},
    {icon:'alert-triangle',label:'ผลข้างเคียง',val:d.sideEffects||'—'},
    {icon:'shield-alert',label:'ข้อควรระวัง',val:d.precautions||'—'},
    {icon:'zap',label:'อันตรกิริยา (Drug Interaction)',val:d.interactions||'—'},
  ];

  const bgColors={fever:'#fff8f8',resp:'#f8fbff',digest:'#f8fff8',skin:'#fff9f0',muscle:'#fdf8ff',wind:'#fffff0',tonic:'#f0fffe'};
  const borderColors={fever:'#ffcdd2',resp:'#bbdefb',digest:'#c8e6c9',skin:'#ffe0b2',muscle:'#e1bee7',wind:'#fff9c4',tonic:'#b2dfdb'};

  return `
  <div>
    <!-- Hero -->
    <div class="fade-up" style="background:${bgColors[d.group]||'#f8f8f8'};border:1px solid ${borderColors[d.group]||'#e0e0e0'};
         border-radius:20px;padding:20px;margin-bottom:16px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
        <span class="badge ${typ.cls}" style="font-size:12px">${typ.label}</span>
        <span style="font-size:18px">${grp.emoji}</span>
        <span style="font-size:12px;color:var(--muted)">${grp.label}</span>
      </div>
      <div style="font-size:22px;font-weight:800;margin-bottom:4px;line-height:1.2">${d.name}</div>
      <div style="font-size:13px;color:var(--muted);font-style:italic">${d.sci||''}</div>
    </div>

    <!-- Info Cards -->
    ${infoRows.map((r,i)=>`
    <div class="card fade-up s${i+1}" style="margin-bottom:10px;padding:14px 16px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="background:var(--gp);border-radius:8px;padding:6px;flex-shrink:0;margin-top:1px">
          <i data-lucide="${r.icon}" style="width:16px;height:16px;color:var(--g2)"></i>
        </div>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">${r.label}</div>
          <div style="font-size:14px;line-height:1.65;white-space:pre-line">${r.val}</div>
        </div>
      </div>
    </div>`).join('')}

    <!-- Reference -->
    <div class="card fade-up" style="margin-bottom:10px;background:#f8fbff;border-color:#bbdefb;padding:14px 16px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <i data-lucide="external-link" style="width:16px;height:16px;color:#1565c0;flex-shrink:0;margin-top:2px"></i>
        <div>
          <div style="font-size:11px;font-weight:700;color:#1565c0;margin-bottom:4px">แหล่งอ้างอิง</div>
          <a href="${d.ref}" target="_blank" style="font-size:13px;color:#1565c0;text-decoration:underline;word-break:break-all">${d.ref}</a>
        </div>
      </div>
    </div>

    <!-- Action -->
    <div class="fade-up" style="margin-top:8px;margin-bottom:8px">
      ${inStock
        ? `<div style="background:#e8f5e9;border-radius:14px;padding:14px;display:flex;align-items:center;gap:10px;border:1px solid #c8e6c9">
             <i data-lucide="check-circle-2" style="width:20px;height:20px;color:var(--g2);flex-shrink:0"></i>
             <div style="flex:1">
               <div style="font-weight:700;font-size:13px;color:var(--g1)">มียานี้ในคลังแล้ว</div>
               <div style="font-size:12px;color:var(--g2)">คงเหลือ ${inStock.qty} ${inStock.unit}</div>
             </div>
             <button class="btn-ghost" style="font-size:12px;padding:8px 12px" onclick="navigateTo('stockDetail',{selStockId:'${inStock.id}'})">ดูรายละเอียด</button>
           </div>`
        : `<button class="btn-primary" style="width:100%" onclick="navigateTo('stockAdd',{selDrugId:'${d.id}'})">
             <i data-lucide="plus" style="width:18px;height:18px;display:inline;vertical-align:middle;margin-right:4px"></i>
             เพิ่มยานี้เข้าคลัง
           </button>`}
    </div>

    <!-- Warning -->
    <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:12px;padding:12px 14px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:#e65100;margin-bottom:4px">⚠️ คำเตือน</div>
      <div style="font-size:12px;color:#5d4037;line-height:1.6">
        ${d.type==='herbal'
          ? 'ยาสมุนไพรในบัญชียาหลักแห่งชาติ ควรปรึกษาแพทย์ แพทย์แผนไทย หรือเภสัชกรก่อนใช้ทุกครั้ง'
          : 'ยาแผนไทยในบัญชียาหลักแห่งชาติ ควรปรึกษาแพทย์ แพทย์แผนไทย หรือเภสัชกรก่อนใช้ทุกครั้ง'}
      </div>
    </div>
  </div>`;
}

/* ============================================================
   VIEW: STOCK
   ============================================================ */
function renderStock(){
  const filtered=state.inventory.filter(item=>{
    const d=getDrug(item.drugId);
    const q=state.stockSearch.toLowerCase();
    const searchOk=!q || (d.name||'').toLowerCase().includes(q);
    const s=stockStatus(item);
    const filterOk=state.stockFilter==='all'||
      (state.stockFilter==='warn'&&(s.code==='warn'))  ||
      (state.stockFilter==='danger'&&(s.code==='danger'||s.code==='empty')) ||
      (state.stockFilter==='ok'&&s.code==='safe');
    return searchOk&&filterOk;
  });

  const filterBtns=[
    {k:'all',label:'ทั้งหมด'},
    {k:'ok',label:'ปกติ'},
    {k:'warn',label:'ใกล้หมด'},
    {k:'danger',label:'วิกฤต'},
  ].map(f=>`<button class="pill${state.stockFilter===f.k?' active':''}" onclick="setStockFilter('${f.k}')">${f.label}</button>`).join('');

  let listHtml='';
  if(filtered.length===0){
    listHtml=`<div style="text-align:center;padding:48px 24px;color:var(--muted)">
      <i data-lucide="package-open" style="width:40px;height:40px;margin:0 auto 12px;display:block"></i>
      <div style="font-weight:600;font-size:15px;margin-bottom:8px">ยังไม่มียาในคลัง</div>
      <button class="btn-primary" onclick="navigateTo('stockAdd')" style="margin:0 auto;display:block">เพิ่มยาเลย</button>
    </div>`;
  } else {
    listHtml=filtered.map(item=>{
      const d=getDrug(item.drugId);
      const s=stockStatus(item);
      const grp=GROUPS[d.group]||{emoji:'💊'};
      return `
        <div class="card pressable fade-up" onclick="navigateTo('stockDetail',{selStockId:'${item.id}'})"
             style="margin-bottom:10px;display:flex;align-items:center;gap:12px;
                    ${s.code==='danger'||s.code==='empty'?'border-color:#ffcdd2':''}
                    ${s.code==='warn'?'border-color:#ffe0b2':''}">
          <div style="width:44px;height:44px;border-radius:12px;background:var(--gp);
               display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${grp.emoji}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.name||'—'}</div>
            <div style="font-size:12px;color:var(--muted)">หมดอายุ: ${thaiDate(item.expiry)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:800;font-size:17px;color:${s.code!=='safe'?'var(--red)':'var(--g2)'}">${item.qty}</div>
            <div style="font-size:11px;color:var(--muted)">${item.unit}</div>
            <span class="badge ${s.cls}" style="font-size:10px;margin-top:3px">${s.label}</span>
          </div>
        </div>`;
    }).join('');
  }

  return `
  <div>
    <div class="fade-up" style="position:relative;margin-bottom:12px">
      <i data-lucide="search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)"></i>
      <input class="input-field" style="padding-left:40px" placeholder="ค้นหายาในคลัง..."
             value="${state.stockSearch}" oninput="setStockSearch(this.value)">
    </div>
    <div class="fade-up s1" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px">
      ${filterBtns}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:13px;color:var(--muted)">รายการทั้งหมด <b>${filtered.length}</b> รายการ</span>
      <button class="btn-amber" onclick="navigateTo('stockAdd')" style="padding:8px 16px;font-size:13px">
        <i data-lucide="plus" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:3px"></i>รับยาเข้า
      </button>
    </div>
    <div>${listHtml}</div>
  </div>`;
}

/* ============================================================

    return `<optgroup label="${g.emoji} ${g.label}">${opts}</optgroup>`;

        <div>
          <div style="font-size:13px;font-weight:700;color:var(--g2);margin-bottom:6px">จำนวนรับเข้า <span style="color:red">*</span></div>
          <input type="number" class="input-field" id="sa-qty" min="1" placeholder="เช่น 2" value="1">

      <input type="date" class="input-field" id="sa-exp">
      <div style="font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:4px">

      </div>
    </div>

    <div class="card fade-up s3" style="margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:var(--g2);margin-bottom:6px">จำนวนขั้นต่ำที่ควรมี</div>
      <input type="number" class="input-field" id="sa-min" min="0" placeholder="เช่น 1" value="1">
      <div style="font-size:11px;color:var(--muted);margin-top:6px">แจ้งเตือนเมื่อเหลือน้อยกว่านี้</div>
    </div>

    <div class="card fade-up s4" style="margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:var(--g2);margin-bottom:6px">หมายเหตุ</div>
      <input type="text" class="input-field" id="sa-note" placeholder="เช่น ซื้อจากร้านยาฟาร์มาซีฮับ">

      <i data-lucide="package-plus" style="width:18px;height:18px;display:inline;vertical-align:middle;margin-right:6px"></i>

            <i data-lucide="${tx.tp==='in'?'arrow-down-circle':'arrow-up-circle'}"

    <button class="btn-danger fade-up s4" style="width:100%;margin-bottom:16px" onclick="confirmDelete('${item.id}')">
      <i data-lucide="trash-2" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:4px"></i>
      ลบรายการนี้ออกจากคลัง
    </button>
  </div>`;
}

/* ============================================================
   EVENT HANDLERS
   ============================================================ */
function setRecFilter(f){ state.recFilter=f; render(); }
function setRecSearch(v){ state.recSearch=v; render(); setTimeout(()=>{const el=document.getElementById('rec-search');if(el){el.focus();el.setSelectionRange(v.length,v.length)}},0); }
function setStockFilter(f){ state.stockFilter=f; render(); }
function setStockSearch(v){ state.stockSearch=v; render(); }
function scrollToGroup(k){ const el=document.getElementById('grp-'+k); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }
function searchSymptom(){ state.recSearch=''; state.recFilter='all'; navigateTo('recommend'); }

function updateStockAddPreview(){
  const sel=document.getElementById('sa-drug');
  if(!sel) return;
  const d=getDrug(sel.value);
  state.selDrugId=sel.value;
  const el=document.getElementById('sa-ind');
  if(el) el.textContent=d.indications||'—';
}

function submitStockAdd(){
  const drugId=(document.getElementById('sa-drug')||{}).value;
  const qty=parseInt((document.getElementById('sa-qty')||{}).value)||0;
  const unit=(document.getElementById('sa-unit')||{}).value||'ชิ้น';
  const expiry=(document.getElementById('sa-exp')||{}).value;
  const minQty=parseInt((document.getElementById('sa-min')||{}).value)||1;
  const note=(document.getElementById('sa-note')||{}).value||'';
  if(!drugId){ alert('กรุณาเลือกชนิดยา'); return; }
  if(qty<=0){ alert('กรุณาระบุจำนวน'); return; }
  if(!expiry){ alert('กรุณาระบุวันหมดอายุ'); return; }
  
  // Check duplicate
  const existing=state.inventory.find(i=>i.drugId===drugId);
  if(existing){
    existing.qty+=qty;
    existing.expiry=expiry;
    existing.txns.push({tp:'in',qty,date:todayStr(),note:note||'รับยาเพิ่ม'});
  } else {
    state.inventory.push({id:uid(),drugId,qty,unit,expiry,minQty,note,
      txns:[{tp:'in',qty,date:todayStr(),note:note||'รับยาครั้งแรก'}]});
  }
  saveState();
  navigateTo('stock');
}

function showTxnModal(stockId, tp){
  const item=getStock(stockId);
  const d=getDrug(item.drugId);
  const isIn=tp==='in';
  document.getElementById('modal-box').innerHTML=`
    <div style="text-align:center;margin-bottom:16px">
      <div style="width:48px;height:48px;border-radius:14px;background:${isIn?'var(--gp)':'#fff3e0'};
           display:flex;align-items:center;justify-content:center;margin:0 auto 10px">
        <i data-lucide="${isIn?'package-plus':'package-minus'}" style="width:24px;height:24px;color:${isIn?'var(--g2)':'var(--a2)'}"></i>
      </div>
      <div style="font-weight:800;font-size:17px">${isIn?'รับยาเข้า':'จ่ายยาออก'}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">${d.name}</div>
      <div style="font-size:13px;font-weight:600;margin-top:4px">คงเหลือ: <b>${item.qty} ${item.unit}</b></div>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:13px;font-weight:700;color:var(--g2);display:block;margin-bottom:6px">จำนวน</label>
      <input type="number" class="input-field" id="txn-qty" min="1" max="${!isIn?item.qty:9999}" value="1" placeholder="ระบุจำนวน">
    </div>
    <div style="margin-bottom:20px">
      <label style="font-size:13px;font-weight:700;color:var(--g2);display:block;margin-bottom:6px">หมายเหตุ</label>
      <input type="text" class="input-field" id="txn-note" placeholder="${isIn?'เช่น ซื้อมาใหม่':'เช่น นำมาใช้'}">
    </div>
    <button class="${isIn?'btn-primary':'btn-amber'}" style="width:100%;margin-bottom:10px" onclick="submitTxn('${stockId}','${tp}')">
      ยืนยัน${isIn?'รับเข้า':'จ่ายออก'}
    </button>
    <button class="btn-ghost" style="width:100%" onclick="closeModal()">ยกเลิก</button>
  `;
  document.getElementById('modal-overlay').classList.add('show');
  lucide.createIcons();
}

function submitTxn(stockId, tp){
  const item=getStock(stockId);
  const qty=parseInt(document.getElementById('txn-qty').value)||0;
  const note=document.getElementById('txn-note').value||'';
  if(qty<=0){ alert('กรุณาระบุจำนวน'); return; }
  if(tp==='out'&&qty>item.qty){ alert(`จำนวนที่จ่ายออก (${qty}) เกินคงเหลือ (${item.qty})`); return; }
  item.qty = tp==='in' ? item.qty+qty : item.qty-qty;
  item.txns.push({tp,qty,date:todayStr(),note});
  saveState();
  closeModal();
  navigateTo('stockDetail',{selStockId:stockId});
}

function confirmDelete(stockId){
  document.getElementById('modal-box').innerHTML=`
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:48px;height:48px;border-radius:14px;background:#ffebee;
           display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <i data-lucide="trash-2" style="width:24px;height:24px;color:var(--red)"></i>
      </div>
      <div style="font-weight:800;font-size:17px">ลบรายการนี้?</div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px">การกระทำนี้ไม่สามารถย้อนกลับได้</div>
    </div>
    <button class="btn-danger" style="width:100%;margin-bottom:10px" onclick="doDelete('${stockId}')">ยืนยันการลบ</button>
    <button class="btn-ghost" style="width:100%" onclick="closeModal()">ยกเลิก</button>
  `;
  document.getElementById('modal-overlay').classList.add('show');
  lucide.createIcons();
}

function doDelete(stockId){
  state.inventory=state.inventory.filter(i=>i.id!==stockId);
  saveState();
  closeModal();
  navigateTo('stock');
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }
function closeModalOnBg(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

/* ============================================================
   INIT
   ============================================================ */
function init(){
  loadState();
  // Set default expiry for stockAdd
  const defaultExp=new Date(); defaultExp.setFullYear(defaultExp.getFullYear()+1);
  state.defaultExp=defaultExp.toISOString().split('T')[0];
  navigateTo('home');
}

// Expose globals
window.navigateTo=navigateTo;
window.goBack=goBack;
window.setRecFilter=setRecFilter;
window.setRecSearch=setRecSearch;
window.setStockFilter=setStockFilter;
window.setStockSearch=setStockSearch;
window.scrollToGroup=scrollToGroup;
window.searchSymptom=searchSymptom;
window.updateStockAddPreview=updateStockAddPreview;
window.submitStockAdd=submitStockAdd;
window.showTxnModal=showTxnModal;
window.submitTxn=submitTxn;
window.confirmDelete=confirmDelete;
window.doDelete=doDelete;
window.closeModal=closeModal;
window.closeModalOnBg=closeModalOnBg;

init();
</script>
