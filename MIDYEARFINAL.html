}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Thai','Lexend',sans-serif;background:var(--bg);color:var(--navy);line-height:1.6}
.font-mono{font-family:'JetBrains Mono',monospace}
.font-display{font-family:'Lexend',sans-serif}

/* NAV */
.navbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,0.06)}
.nav-btn{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;color:var(--slate);transition:all .2s;white-space:nowrap;border:none;background:transparent;cursor:pointer}
.nav-btn:hover{background:var(--bg2);color:var(--navy)}
.nav-btn.active{background:var(--teal);color:#fff}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow)}
.card:hover{box-shadow:var(--shadow-md)}
.card-inner{background:var(--surface2);border:1px solid var(--border);border-radius:12px}

/* SECTION */
.section-wrap{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);margin:20px 0;padding:36px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.badge-pass{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-info{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-sky{background:var(--sky-bg);color:var(--sky);border:1px solid var(--sky-border)}

/* METRIC */
.metric-num{font-family:'JetBrains Mono','Lexend',monospace;font-weight:700;letter-spacing:-0.02em}

/* PROGRESS */
.prog-track{background:#f1f5f9;border-radius:999px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;transition:width .8s ease}

/* TABLE */
.pro-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13.5px}
.pro-table thead th{padding:11px 15px;font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--slate);background:#f8faff;border-bottom:1.5px solid var(--border)}
.pro-table thead th:first-child{border-radius:8px 0 0 0}
.pro-table thead th:last-child{border-radius:0 8px 0 0}
.pro-table tbody tr{transition:background .15s}
.pro-table tbody tr:hover{background:#f8faff}
.pro-table tbody td{padding:12px 15px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.pro-table tfoot td{padding:12px 15px;font-weight:700;background:linear-gradient(135deg,var(--teal-bg),#f0fdfa);border-top:1.5px solid var(--teal-border)}

/* ANALYSIS */
.analysis-box{border-left:3.5px solid var(--teal);background:var(--teal-bg);border-radius:0 14px 14px 0;padding:18px 22px;margin-top:16px}
.analysis-box.warn{border-left-color:var(--amber);background:var(--amber-bg)}
.analysis-box.danger{border-left-color:var(--red);background:var(--red-bg)}
.analysis-box.sky{border-left-color:var(--sky);background:var(--sky-bg)}
.analysis-box.purple{border-left-color:var(--purple);background:var(--purple-bg)}

/* RECOMMEND */
.rec-box{background:linear-gradient(135deg,#fffbeb,#fff7f0);border:1px solid var(--amber-border);border-radius:14px;padding:18px 22px;margin-top:14px}

/* KPI DOT */
.kpi-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}

/* DISTRICT CARD */
.district-card{border-radius:20px;overflow:hidden;transition:all .25s}
.district-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.1)}
.district-score-ring{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;flex-shrink:0}

/* HERO */
.hero-section{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0d4f3c 100%);color:#fff;position:relative;overflow:hidden}

/* MATRIX TABLE */
.matrix-cell-pass{background:var(--green-bg);color:var(--green);text-align:center;padding:10px 8px;font-weight:700;font-size:12px}
.matrix-cell-fail{background:var(--red-bg);color:var(--red);text-align:center;padding:10px 8px;font-weight:700;font-size:12px}
.matrix-cell-warn{background:var(--amber-bg);color:var(--amber);text-align:center;padding:10px 8px;font-weight:700;font-size:12px}

@media print{.navbar,.no-print{display:none!important}body{background:white}
  .section-wrap,.card{box-shadow:none!important;border-color:#ddd!important}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

const fmt = n => n?.toLocaleString('th-TH')||'0';

const Prog = ({val,max=100,color='var(--teal)',h=8}) => {
  const pct = Math.min(100,Math.max(0,(val/max)*100));
  return (<div className="prog-track" style={{height:h}}>
    <div className="prog-fill" style={{width:`${pct}%`,background:color}}/>
  </div>);
};
const SH = ({num,icon,title,sub,color='var(--teal)'}) => (
  <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:28}}>
    <div style={{width:46,height:46,borderRadius:12,background:`${color}15`,border:`1.5px solid ${color}30`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{icon}</div>

      <p style={{fontSize:11.5,color:'var(--slate)',marginTop:2}}>{sub}</p>

  </div>
);
const ABx = ({title,items,type='teal'}) => {
  const cls = {teal:'',warn:' warn',danger:' danger',sky:' sky',purple:' purple'}[type]||'';
  const colors = {teal:'var(--teal)',warn:'var(--amber)',danger:'var(--red)',sky:'var(--sky)',purple:'var(--purple)'};

  return (
    <div className={`analysis-box${cls}`} style={{marginTop:16}}>

};

          {[
            {icon:'🚨',c:'#dc2626',title:'Priority 1 — บางพลี Crisis',text:'จัดทำ Turnaround Plan 90 วัน มีทีม Task Force ระดับจังหวัดลงพื้นที่ช่วยเหลือ ปรับโมเดลบริการเป็น Industrial Community Health'},

          ].map((r,i)=>(

};

// ===== APP =====
function App() {
  const [active, setActive] = useState('');
  const scrollTo = id => {
    const el = document.getElementById(id);
    if(el){window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-58,behavior:'smooth'});setActive(id);}
  };
  useEffect(()=>{
    const obs = new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);}),{threshold:0.15,rootMargin:'-55px 0px -55% 0px'});
    ['district','flagship','access','herb','common','imc','cannabis','licenses'].forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);
  return (
    <div style={{minHeight:'100vh'}}>
      <Navbar active={active} scrollTo={scrollTo}/>
      <Hero/>
      <div style={{maxWidth:1200,margin:'0 auto',padding:'0 20px 60px'}}>
        <DistrictSummary/>
        <Flagship/><AccessSec/><HerbSec/><CDSec/><IMCSec/><CannabisSec/><LicensesSec/>
      </div>
      <footer style={{background:'var(--navy)',color:'rgba(255,255,255,0.5)',textAlign:'center',padding:'36px 20px'}}>
        <div style={{maxWidth:800,margin:'0 auto'}}>
          <div style={{fontSize:12,marginBottom:12}}>แหล่งข้อมูล: HDC (1.20, 1.21, 3.1) • thaipadi.com/kpi • HDC SP กัญชา | ข้อมูล ณ 23 มีนาคม 2569</div>
          <div style={{color:'#64ffda',fontWeight:700,fontSize:15}}>ภก.จีรภัทร พลายงาม</div>
          <div style={{fontSize:12,marginTop:4}}>เภสัชกรชำนาญการ | กลุ่มงานการแพทย์แผนไทยฯ | สสจ.สมุทรปราการ</div>
        </div>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
