/* ── SMALL COMPONENTS ── */
function AnimNum({value,duration=700}){
  const[display,setDisplay]=useState(0);const ref=useRef(null);
  useEffect(()=>{
    const start=Date.now(),from=display;
    const tick=()=>{const p=Math.min((Date.now()-start)/duration,1);
      setDisplay(from+(value-from)*(1-Math.pow(1-p,3)));
      if(p<1)ref.current=requestAnimationFrame(tick);};
    ref.current=requestAnimationFrame(tick);return()=>cancelAnimationFrame(ref.current);
  },[value]);
  return<>{fmt(Math.round(display))}</>;
}

function RadialProgress({value,max=100,size=78,stroke=6,color="#00C896",label,sub}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,offset=circ-(value/max)*circ;
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e0e4ee" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset 1s ease"}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
        fill={color} fontSize={size*0.19} fontWeight="700" fontFamily="'DM Mono',monospace">
        {fmt(value,1)}%
      </text>
    </svg>
    {label&&<div style={{fontSize:11,color:"#7080a0",textAlign:"center"}}>{label}</div>}
    {sub&&<div style={{fontSize:10,color,textAlign:"center"}}>{sub}</div>}
  </div>);
}

function BarChart({data,height=110}){
  const max=Math.max(...data.map(d=>d.value));
  return(<div style={{display:"flex",alignItems:"flex-end",gap:6,height,padding:"0 4px"}}>
    {data.map((d,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,height:"100%"}}>
      <div style={{fontSize:9,color:d.color||"#a0a0b0",fontWeight:700,textAlign:"center"}}>{d.label2||""}</div>
      <div style={{flex:1,display:"flex",alignItems:"flex-end",width:"100%"}}>
        <div style={{width:"100%",borderRadius:"3px 3px 0 0",
          background:d.highlight?`linear-gradient(180deg,${d.color}ff,${d.color}99)`:`linear-gradient(180deg,${d.color}88,${d.color}44)`,
          height:`${(d.value/max)*82}%`,transition:"height 1s ease",
          border:d.highlight?`1px solid ${d.color}`:"none",
          boxShadow:d.highlight?`0 0 10px ${d.color}44`:"none"}}/>
      </div>
      <div style={{fontSize:9,color:"#5060a0",textAlign:"center"}}>{d.label}</div>
    </div>))}
  </div>);
}

function ModeToggle({mode,setMode}){

function App(){

  /* lists */
  let _u=300;const uu=()=>String(++_u);
  const[myInc,setMyInc]=useState([{id:uu(),label:"เงินเดือน",amount:0}]);

  const[spExp,setSpExp]=useState([{id:uu(),label:"ค่าใช้จ่ายส่วนตัว",amount:0}]);

  const[sharedExp,setSharedExp]=useState([{id:uu(),label:"ค่าใช้จ่ายส่วนรวม",amount:0}]);
  const[assets,setAssets]=useState([]);
  const[pets,setPets]=useState([]);

  /* health data per person */
  const initHealth=()=>({htn:-1,dm:-1,ckd:-1,chol:-1,heart:-1,osteo:-1});
  const[healthMe,setHealthMe]=useState({...initHealth()});
  const[healthSp,setHealthSp]=useState({...initHealth()});

  /* activities */
  const[selActs,setSelActs]=useState({});
  const[actFreqs,setActFreqs]=useState({});
  const[travelPlans,setTravelPlans]=useState([]);

  /* helpers */
  const addItem=s=>s(a=>[...a,{id:uu(),label:"รายการใหม่",amount:0}]);
  const updItem=(s,id,k,v)=>s(a=>a.map(x=>x.id===id?{...x,[k]:v}:x));
  const delItem=(s,id)=>s(a=>a.filter(x=>x.id!==id));
  const addAsset=()=>setAssets(a=>[...a,{id:uu(),icon:"💰",label:"สินทรัพย์ใหม่",value:0,paid:true}]);
  const updAsset=(id,k,v)=>setAssets(a=>a.map(x=>x.id===id?{...x,[k]:v}:x));
  const delAsset=id=>setAssets(a=>a.filter(x=>x.id!==id));
  const addPet=()=>setPets(p=>[...p,{id:uu(),name:"สัตว์เลี้ยง",type:"🐕 สุนัข",monthly:1000}]);
  const updPet=(id,k,v)=>setPets(p=>p.map(x=>x.id===id?{...x,[k]:v}:x));
  const delPet=id=>setPets(p=>p.filter(x=>x.id!==id));

  /* totals */
  const sum=a=>a.reduce((s,x)=>s+x.amount,0);
  const myIncT=sum(myInc),spIncT=sum(spInc),kidIncT=sum(kidInc);
  const myExpT=sum(myExp),spExpT=sum(spExp),kidExpT=sum(kidExp),sharedExpT=sum(sharedExp);
  const petTotal=pets.reduce((s,x)=>s+x.monthly,0);
  const assetTotal=assets.reduce((s,x)=>s+x.value,0);

  /* health costs */
  const calcHealthCost=(hd)=>{
    let gov=0,priv=0;
    Object.entries(hd).forEach(([k,st])=>{
      if(st<0||!NCD_DISEASES[k])return;
      const s=NCD_DISEASES[k].stages[st];
      if(s){gov+=s.govMonthly;priv+=s.privMonthly;}
    });
    return{gov,priv};
  };
  const hcMe=calcHealthCost(healthMe);
  const hcSp=calcHealthCost(healthSp);

  /* activity cost */
  const activityMonthly=useMemo(()=>{
    let total=0;
    Object.entries(selActs).forEach(([id,optIdx])=>{
      if(optIdx<0)return;
      const act=ACTIVITIES.find(a=>a.id===id);
      if(!act)return;
      const cost=act.options[optIdx]?.cost||0;
      if(act.freq==="month"){total+=cost;}
      else if(act.freq==="trip"){
        const perMonth=(actFreqs[id]||1);// trips per year / 12
        total+=cost*(perMonth/12);
      } else if(act.freq==="course"){
        total+=cost/6; // amortize 6 months
      }
    });
    return Math.round(total);
  },[selActs,actFreqs]);

  /* mode income/expense */
  const modeIncome=calcMode==="solo"?myIncT:calcMode==="couple"?myIncT+spIncT:myIncT+spIncT+kidIncT;
  const modeExpense=(calcMode==="solo"?myExpT:calcMode==="couple"?myExpT+spExpT+sharedExpT:myExpT+spExpT+kidExpT+sharedExpT)+petTotal+activityMonthly;
  const modeSurplus=modeIncome-modeExpense;

  /* pension */
  const NOW_CE=2026;
  const birthCE=ce(P.birthYear),startCE=ce(P.startYear),spStartCE=ce(P.spouseStartYear);
  const retireCE=birthCE+P.retireAge,retireTH=th(retireCE);
  const yearsLeft=retireCE-NOW_CE,currentAge=NOW_CE-birthCE,serviceNow=NOW_CE-startCE;

  const calc=useMemo(()=>{
    const myRS=grow(P.salary,yearsLeft),spRS=grow(P.spouseSalary,yearsLeft);
    const myYrs=retireCE-startCE,spYrs=retireCE-spStartCE;
    const pfn=pensionType==="gbx"?pensionGBX:pensionOld;
    const ppfn=pensionType==="gbx"?pctGBX:pctOld;
    const myP=pfn(myRS,myYrs),spP=pfn(spRS,spYrs);
    const myPct=ppfn(myRS,myYrs),spPct=ppfn(spRS,spYrs);
    const myGBX=pensionType==="gbx"?gbxSaving(P.salary,myYrs):0;
    const spGBX=pensionType==="gbx"?gbxSaving(P.spouseSalary,spYrs):0;
    const bizIncome=P.selectedBiz.reduce((s,id)=>{
      const b=BIZ_ALL.find(x=>x.id===id);return s+(b?(b.lo+b.hi)/2:0);
    },0);
    const pensionInc=calcMode==="solo"?myP:myP+spP;
    const gbxLump=calcMode==="solo"?myGBX:myGBX+spGBX;
    const kidBonusInc=calcMode==="family"?kidIncT:0;
    const totalIncome=pensionInc+bizIncome+kidBonusInc;
    const surplus=totalIncome-modeExpense;
    const totalBizInvest=P.selectedBiz.reduce((s,id)=>{
      const b=BIZ_ALL.find(x=>x.id===id);return s+(b?b.invest:0);
    },0);
    const scenarios=[57,59,60,62,65].map(age=>{
      const rCE=birthCE+age,yL=rCE-NOW_CE;
      const mS=grow(P.salary,yL),spS=grow(P.spouseSalary,yL);
      const mY=rCE-startCE,spY=rCE-spStartCE;
      const mP=pfn(mS,mY),spPens=pfn(spS,spY);
      const g1=pensionType==="gbx"?gbxSaving(P.salary,mY):0;
      const g2=pensionType==="gbx"?gbxSaving(P.spouseSalary,spY):0;
      return{age,year:th(rCE),total:calcMode==="solo"?mP:mP+spPens,myP:mP,spP:spPens,
        myPct:ppfn(mS,mY),spPct:ppfn(spS,spY),myYrs:mY,gbxLump:(calcMode==="solo"?g1:g1+g2)};
    });
    return{myP,spP,myPct,spPct,myYrs,spYrs,myRS,spRS,bizIncome,pensionInc,gbxLump,
      totalIncome,surplus,scenarios,totalBizInvest,myGBX,spGBX};

  /* ══════ PAGE: ACTIVITIES ══════ */
  const PageActivities=()=>{
    const cats=[...new Set(ACTIVITIES.map(a=>a.cat))];
    const[actCat,setActCat]=useState("ทั้งหมด");
    const filtered=actCat==="ทั้งหมด"?ACTIVITIES:ACTIVITIES.filter(a=>a.cat===actCat);

    const toggleAct=(id,optIdx)=>{
      setSelActs(s=>{const n={...s};
        if(n[id]===optIdx)delete n[id];else n[id]=optIdx;return n;
      });
    };

    const selectedList=ACTIVITIES.filter(a=>selActs[a.id]!==undefined);
    const selectedMonthly=selectedList.reduce((s,a)=>{
      const optIdx=selActs[a.id];const cost=a.options[optIdx]?.cost||0;
      if(a.freq==="month")return s+cost;
      if(a.freq==="trip")return s+cost*((actFreqs[a.id]||1)/12);
      if(a.freq==="course")return s+cost/6;
      return s;
    },0);

    return(<div className="page" style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{padding:"8px 12px",background:"rgba(244,114,182,0.06)",border:"1px solid #e8a0c8",borderRadius:10,fontSize:12,color:"#b02878"}}>
        ✦ เลือกกิจกรรมที่ต้องการ — ค่าใช้จ่ายจะถูกรวมในรายจ่ายโดยอัตโนมัติ
      </div>
      {/* category filter */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {["ทั้งหมด",...cats].map(c=>(
          <button key={c} className={`tab-btn ${actCat===c?"on":"off"}`} onClick={()=>setActCat(c)}>{c}</button>
        ))}
      </div>
      {/* activity grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {filtered.map(act=>{
          const selOpt=selActs[act.id];
          const isOn=selOpt!==undefined;
          return(<div key={act.id} className={`act-toggle ${isOn?"on":""}`}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:20}}>{act.e}</span>
              <span className="tag" style={{background:"#ffe8f5",color:"#b02878",border:"1px solid #e8a0c8"}}>
                {act.cat}
              </span>
            </div>
            <div style={{fontWeight:700,color:isOn?"#F472B6":"#d0d0e0",fontSize:12,marginBottom:3}}>{act.name}</div>
            <div style={{fontSize:10,color:"#5060a0",marginBottom:8,lineHeight:1.5}}>{act.tip}</div>
            {/* option buttons */}
            <div style={{display:"flex",flexDirection:"column",gap:3}}>
              {act.options.map((opt,oi)=>(
                <button key={oi} onClick={()=>toggleAct(act.id,oi)}
                  style={{padding:"4px 8px",borderRadius:7,border:`1.5px solid ${selOpt===oi?"#c0308a":"#d0d4e0"}`,
                    background:selOpt===oi?"#ffe8f5":"#f5f6fa",
                    color:selOpt===oi?"#901060":"#5060a0",cursor:"pointer",fontSize:10,
                    fontFamily:"'Sarabun',sans-serif",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{opt.label}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontWeight:700}}>
                    {opt.cost===0?"ฟรี":`${fmt(opt.cost)} ฿`}
                    {act.freq==="month"?"/เดือน":act.freq==="trip"?"/ทริป":"/คอร์ส"}
                  </span>
                </button>
              ))}
            </div>
            {/* trip frequency */}
            {isOn&&act.freq==="trip"&&(
              <div style={{marginTop:8}}>
                <div style={{fontSize:10,color:"#5060a0",marginBottom:3}}>ไป กี่ครั้ง/ปี</div>
                <input type="range" min={1} max={6} step={1} value={actFreqs[act.id]||1}
                  onChange={e=>setActFreqs(f=>({...f,[act.id]:+e.target.value}))}/>
                <div style={{fontSize:10,color:"#b02878",textAlign:"center"}}>{actFreqs[act.id]||1} ครั้ง/ปี ≈ {fmtB(Math.round((act.options[selOpt]?.cost||0)*(actFreqs[act.id]||1)/12))}/เดือน</div>
              </div>
            )}
          </div>);
        })}
      </div>
      {/* selected summary */}
      {selectedList.length>0&&(<div className="card card-pink" style={{padding:12}}>
        <div style={{fontSize:12,color:"#b02878",fontWeight:700,marginBottom:10}}>✦ กิจกรรมที่เลือก ({selectedList.length} รายการ)</div>
        {selectedList.map(a=>{
          const optIdx=selActs[a.id];const opt=a.options[optIdx];
          const monthly=a.freq==="month"?opt.cost:a.freq==="trip"?opt.cost*((actFreqs[a.id]||1)/12):opt.cost/6;
          return(<div key={a.id} className="stat-row">
            <span style={{color:"#7080a0",fontSize:12}}>{a.e} {a.name}</span>
            <span style={{fontSize:11,color:"#6070a0",marginRight:8}}>{opt.label}</span>
            <span style={{fontFamily:"'DM Mono',monospace",color:"#b02878",fontSize:12}}>~{fmtB(Math.round(monthly))}/เดือน</span>
          </div>);
        })}
        <div style={{marginTop:8,padding:"7px 10px",background:"rgba(244,114,182,0.1)",borderRadius:8,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontWeight:700}}>รวมค่าใช้จ่ายกิจกรรม</span>
          <span style={{fontFamily:"'DM Mono',monospace",color:"#b02878",fontSize:15,fontWeight:700}}>{fmtB(Math.round(selectedMonthly))}/เดือน</span>
        </div>
        <div style={{fontSize:10,color:"#5060a0",marginTop:4}}>= {fmtB(Math.round(selectedMonthly*12))} ต่อปี</div>
      </div>)}
    </div>);

  const VERSION="v3.2.0";
  const BUILD_DATE="มีนาคม 2568";

  const WelcomeScreen=()=>{
    const[fadeOut,setFadeOut]=useState(false);
    const[progress,setProgress]=useState(0);
    useEffect(()=>{
      const t=setTimeout(()=>{setFadeOut(true);setTimeout(()=>setShowWelcome(false),700);},3800);
      const p=setInterval(()=>setProgress(v=>Math.min(v+1.5,100)),55);
      return()=>{clearTimeout(t);clearInterval(p);};
    },[]);
    return(
      <div onClick={()=>{setFadeOut(true);setTimeout(()=>setShowWelcome(false),400);}}
        style={{position:"fixed",inset:0,zIndex:9999,cursor:"pointer",
          background:"linear-gradient(145deg,#0e1628 0%,#162040 40%,#0a1830 70%,#0e2040 100%)",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          opacity:fadeOut?0:1,transition:"opacity .7s ease"}}>

        {/* animated bg particles */}
        {[...Array(18)].map((_,i)=>(
          <div key={i} style={{
            position:"absolute",
            width:i%3===0?3:i%3===1?2:1.5,
            height:i%3===0?3:i%3===1?2:1.5,
            borderRadius:"50%",
            background:["#00c896","#3a90ff","#ffb300","#a78bfa","#f472b6"][i%5],
            left:`${8+i*5.2}%`,top:`${10+Math.sin(i*0.9)*35+i*3}%`,
            opacity:0.4+((i%4)*0.15),
            animation:`float${i%3} ${3+i*0.4}s ease-in-out infinite`,
            animationDelay:`${i*0.3}s`
          }}/>
        ))}

        {/* glow ring */}
        <div style={{
          position:"absolute",width:380,height:380,borderRadius:"50%",
          background:"radial-gradient(circle,rgba(0,200,150,0.08) 0%,transparent 70%)",
          pointerEvents:"none"
        }}/>

        {/* Logo pill */}
        <div style={{
          width:72,height:72,borderRadius:20,marginBottom:24,
          background:"linear-gradient(135deg,#00c896,#0088ff)",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,
          boxShadow:"0 0 0 1px rgba(0,200,150,0.3),0 0 40px rgba(0,200,150,0.25),0 8px 32px rgba(0,0,0,0.4)"
        }}>💊</div>

        {/* Title */}
        <div style={{
          fontFamily:"'Noto Serif Thai',serif",fontSize:30,fontWeight:700,
          color:"#fff",letterSpacing:1,textAlign:"center",marginBottom:6,
          textShadow:"0 2px 20px rgba(0,200,150,0.4)"
        }}>แผนเกษียณ Pro</div>

        <div style={{
          fontFamily:"'Sarabun',sans-serif",fontSize:14,color:"rgba(180,200,220,0.8)",
          marginBottom:28,letterSpacing:2,textAlign:"center"
        }}>Life & Wealth Advisor</div>

        {/* Developer card */}
        <div style={{
          background:"rgba(255,255,255,0.06)",
          border:"1px solid rgba(255,255,255,0.12)",
          borderRadius:16,padding:"16px 28px",textAlign:"center",marginBottom:30,
          backdropFilter:"blur(8px)",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"
        }}>
          <div style={{fontSize:11,color:"rgba(160,185,210,0.7)",letterSpacing:1.5,marginBottom:6,fontFamily:"'DM Mono',monospace"}}>DEVELOPED BY</div>
          <div style={{
            fontFamily:"'Noto Serif Thai',serif",fontSize:18,fontWeight:700,
            color:"#fff",marginBottom:4,
            background:"linear-gradient(90deg,#00c896,#3a90ff)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"
          }}>ภก.จีรภัทร พลายงาม</div>
          <div style={{fontSize:11,color:"rgba(160,185,210,0.65)",letterSpacing:.5}}>
            เภสัชกรชำนาญการ | นักวางแผนการเงิน
          </div>
        </div>

        {/* Version + Features */}
        <div style={{display:"flex",gap:10,marginBottom:28,flexWrap:"wrap",justifyContent:"center"}}>
          {[
            {icon:"🏦",text:"บำนาญ กบข./เดิม"},
            {icon:"♥",text:"NCD Health Planner"},
            {icon:"✦",text:"กิจกรรมหลังเกษียณ"},
            {icon:"◆",text:"12 ธุรกิจหลังเกษียณ"},
          ].map((f,i)=>(
            <div key={i} style={{
              padding:"5px 12px",borderRadius:99,
              background:"rgba(255,255,255,0.07)",
              border:"1px solid rgba(255,255,255,0.12)",
              fontSize:11,color:"rgba(200,220,240,0.8)",
              display:"flex",gap:5,alignItems:"center"
            }}>
              <span>{f.icon}</span><span>{f.text}</span>
            </div>
          ))}
        </div>

        {/* Progress bar */}
        <div style={{width:260,marginBottom:10}}>
          <div style={{height:3,background:"rgba(255,255,255,0.1)",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${progress}%`,borderRadius:99,
              background:"linear-gradient(90deg,#00c896,#3a90ff)",
              transition:"width .06s linear",
              boxShadow:"0 0 8px rgba(0,200,150,0.5)"
            }}/>
          </div>
        </div>

        <div style={{fontSize:10,color:"rgba(140,160,190,0.6)",letterSpacing:1,marginBottom:4,fontFamily:"'DM Mono',monospace"}}>
          {VERSION}{" "}|{" "}{BUILD_DATE}
        </div>
        <div style={{fontSize:10,color:"rgba(120,140,170,0.5)",fontStyle:"italic"}}>
          คลิกที่ใดก็ได้เพื่อเข้าสู่โปรแกรม
        </div>

        <style>{`
          @keyframes float0{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
          @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
          @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
        `}</style>
      </div>
    );
  };

  /* ══════ RENDER ══════ */
  const pages={dashboard:<PageDashboard/>,profile:<PageProfile/>,pension:<PagePension/>,
    scenario:<PageScenario/>,cashflow:<PageCashflow/>,business:<PageBusiness/>,
    health:<PageHealth/>,activities:<PageActivities/>,timeline:<PageTimeline/>,advice:<PageAdvice/>};
  const curMenu=MENUS.find(m=>m.id===active);

  return(<>{showWelcome&&<WelcomeScreen/>}<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"#e8eaf0",color:"#1a1e2e"}}>
    {/* SIDEBAR */}
    <div style={{width:sideW,minWidth:sideW,background:"#f4f5f8",
      borderRight:"1.5px solid #cdd0dc",display:"flex",flexDirection:"column",
      transition:"width .22s ease",overflow:"hidden",zIndex:10,boxShadow:"2px 0 12px rgba(0,0,0,0.08)"}}>
      <div style={{padding:"12px 10px 8px",borderBottom:"1.5px solid #dde0ea"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,overflow:"hidden"}}>
          <div style={{width:28,height:28,borderRadius:8,flexShrink:0,background:"linear-gradient(135deg,#00C896,#008a68)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>💊</div>
          {sideOpen&&<div style={{overflow:"hidden"}}>
            <div style={{fontFamily:"'Noto Serif Thai',serif",fontSize:11,color:"#1a1e2e",fontWeight:700,whiteSpace:"nowrap"}}>แผนเกษียณ Pro</div>
            <div style={{fontSize:9,color:"#7080a0",whiteSpace:"nowrap"}}>Life & Wealth Advisor</div>
          </div>}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"5px"}}>
        {MENUS.map(m=>(<div key={m.id} className={`menu-item mi-c${m.ci} ${active===m.id?"active":""}`}
          onClick={()=>setActive(m.id)} style={{justifyContent:sideOpen?"flex-start":"center",padding:"9px 12px"}}>
          <span className="mi-icon" style={{fontSize:15,flexShrink:0,transition:"color .2s",
            color:active===m.id?"var(--mc)":"#8090b0"}}>{m.icon}</span>
          {sideOpen&&<div style={{overflow:"hidden",flex:1}}>
            <div className="mi-label" style={{fontSize:11,fontWeight:active===m.id?700:500,whiteSpace:"nowrap",transition:"color .2s",
              color:active===m.id?"var(--mt)":"#2a3050"}}>{m.label}</div>
            <div className="mi-sub" style={{fontSize:9,whiteSpace:"nowrap",transition:"color .2s",
              color:active===m.id?"var(--mc)":"#8090b0",fontWeight:active===m.id?600:400,opacity:active===m.id?0.8:1}}>{m.sub}</div>
          </div>}
        </div>))}
      </div>
      {sideOpen&&(<div style={{padding:"9px 10px",borderTop:"1.5px solid #dde0ea",background:"#e8eaf2"}}>
        <div style={{fontSize:9,color:"#8090b0",marginBottom:2}}>สถานะปัจจุบัน</div>
        <div style={{fontSize:10,color:"#1a7040",fontWeight:700}}>อายุ {currentAge} ปี | ราชการ {serviceNow} ปี</div>
        <div style={{fontSize:9,color:"#5060a0",marginTop:1}}>เกษียณ พ.ศ.{retireTH} | อีก {yearsLeft} ปี</div>
        <div style={{fontSize:9,color:"#0878a0",marginTop:2}}>🐾 {pets.length} ตัว | {fmtB(petTotal)}/เดือน</div>
        <div style={{fontSize:9,color:"#903060",marginTop:1}}>✦ กิจกรรม {fmtB(activityMonthly)}/เดือน</div>
        <div style={{fontSize:9,color:"#5038b0",marginTop:1}}>
          {calcMode==="solo"?"👤 เดี่ยว":calcMode==="couple"?"👫 คู่สมรส":"🏠 ครอบครัว"} | {pensionType==="gbx"?"กบข.":"แบบเดิม"}
        </div>
      </div>)}
      <button onClick={()=>setSideOpen(!sideOpen)}
        style={{background:"none",border:"none",color:"#8090b0",cursor:"pointer",padding:"7px",fontSize:12,borderTop:"1px solid #dde0ea",width:"100%"}}
        onMouseOver={e=>e.target.style.color="#1a7040"} onMouseOut={e=>e.target.style.color="#8090b0"}>
        {sideOpen?"◀":"▶"}
      </button>
    </div>

    {/* MAIN */}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"9px 16px",borderBottom:"1.5px solid #cdd0de",
        background:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <div>
          <div style={{fontSize:14,fontFamily:"'Noto Serif Thai',serif",fontWeight:700,color:"#1c2030"}}>{curMenu?.label}</div>
          <div style={{fontSize:9,color:"#8090b0",marginTop:1}}>{curMenu?.sub}</div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{padding:"2px 8px",borderRadius:99,background:"#e8f8f0",border:"1.5px solid #4abf90",fontSize:9,color:"#1a7040",fontWeight:700}}>
            {calcMode==="solo"?"👤 เดี่ยว":calcMode==="couple"?"👫 คู่สมรส":"🏠 ครอบครัว"}
          </div>
          <div style={{padding:"2px 8px",borderRadius:99,background:"#fff8e0",border:"1.5px solid #d4b840",fontSize:9,color:"#7a5000",fontWeight:700}}>
            {pensionType==="gbx"?"🏦 กบข.":"📋 แบบเดิม"}
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#8090b0"}}>บำนาญ/เดือน</div>
            <div className="live" style={{fontFamily:"'DM Mono',monospace",color:"#1a7040",fontSize:12,fontWeight:700}}>{fmtB(Math.round(calc.pensionInc))}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#8090b0"}}>รายได้หลังเกษียณ</div>
            <div className="live" style={{fontFamily:"'DM Mono',monospace",color:"#8a6200",fontSize:12,fontWeight:700}}>{fmtB(Math.round(calc.totalIncome))}</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px",background:"#e8eaf0"}}>
        {pages[active]}
      </div>
    </div>
  </div></>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
