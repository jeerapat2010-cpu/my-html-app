            { month: "มี.ค. 69", detail: "-" },
            { month: "เม.ย. 69", detail: "1. ร้องเรียนกลิ่นกัญชารบกวน (อ.เมือง) / 2. ตรวจยึดลักลอบส่งออก DHL สาขาบางพลี จำนวน 42 ราย (รอสรุปน้ำหนัก)" },
        ];

        // --- UI Components ---
        // Modified to accept 'action' prop for buttons
        const SectionTitle = ({ icon: Icon, title, subtitle, colorClass, iconBgClass, action }) => (
            <div className="flex flex-wrap justify-between items-center mb-8 pb-4 border-b border-stone-200/60 gap-4">
                <div className="flex items-center">
                    <div className={`p-4 ${iconBgClass} rounded-2xl mr-5 shadow-lg shadow-amber-500/20 backdrop-blur-sm`}>
                        <Icon className="w-8 h-8" />
                    </div>
                    <div>
                        <h2 className="text-3xl font-bold text-stone-800 tracking-tight">{title}</h2>
                        <p className="text-stone-500 mt-1 font-medium">{subtitle}</p>
                    </div>
                </div>
                {action && <div>{action}</div>}
            </div>
        );

        const GaugeChart = ({ title, value, max = 100, suffix = "", color = "#f59e0b", status, subLabel }) => {
            // Helper to calculate numeric value for rotation
            const parseVal = (v) => {
                if (typeof v === 'string') {
                    return parseFloat(v.replace(/,/g, '').replace('%', '').replace('+', '').split('/')[0]);
                }
                return v;
            };
            
            const numValue = parseVal(value);
            let percent = numValue / max;
            if (percent > 1) percent = 1;
            if (percent < 0) percent = 0;
            
            const rotation = (percent * 180) - 90;

            // Determine color based on status if not provided explicit hex
            let strokeColor = color; // Default to amber-500
            let statusText = "ข้อมูล";
            let badgeClass = "bg-stone-100 text-stone-600";

            if (status === 'pass') {
                strokeColor = "#14b8a6"; // teal-500
                statusText = "ผ่านเกณฑ์";
                badgeClass = "bg-teal-100 text-teal-700 border border-teal-200";
            } else if (status === 'fail') {
                strokeColor = "#ef4444"; // red-500
                statusText = "ไม่ผ่านเกณฑ์";
                badgeClass = "bg-red-100 text-red-700 border border-red-200";
            } else {
                strokeColor = "#f59e0b"; // amber-500
                badgeClass = "bg-amber-50 text-amber-700 border border-amber-200";
            }

            // Function to create arc path
            const createArc = (start, end) => {
                const radius = 80;
                const center = 100;
                
                // Convert degrees to radians
                const startRad = (start - 180) * Math.PI / 180;
                const endRad = (end - 180) * Math.PI / 180;

                const x1 = center + radius * Math.cos(startRad);
                const y1 = center + radius * Math.sin(startRad);
                const x2 = center + radius * Math.cos(endRad);
                const y2 = center + radius * Math.sin(endRad);

                return `M ${x1} ${y1} A ${radius} ${radius} 0 0 1 ${x2} ${y2}`;
            };

            return (
                <div className="bg-white rounded-2xl p-4 pt-6 shadow-lg border border-amber-100 flex flex-col items-center relative overflow-hidden hover:shadow-xl transition-all duration-300">
                    <h3 className="text-stone-700 font-bold text-sm mb-1 text-center h-10 flex items-center justify-center w-full leading-tight px-2">{title}</h3>
                    
                    <div className="relative w-48 h-28 flex justify-center overflow-hidden">
                        <svg viewBox="0 0 200 110" className="w-full h-full">
                            {/* Background Arc */}
                            <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#fef3c7" strokeWidth="15" strokeLinecap="round" />
                            
                            {/* Value Arc */}
                            <path d={createArc(0, percent * 180)} fill="none" stroke={strokeColor} strokeWidth="15" strokeLinecap="round" />
                            
                            {/* Needle */}
                            <g transform={`translate(100, 100) rotate(${rotation})`}>
                                <path d="M -4 0 L 0 -75 L 4 0 Z" fill="#78350f" />
                                <circle cx="0" cy="0" r="6" fill="#78350f" />
                            </g>
                        </svg>
                        <div className="absolute bottom-0 text-center w-full">
                            <div className="text-2xl font-bold text-stone-800 leading-none">{value}</div>
                            {suffix && <div className="text-xs text-stone-400 font-medium">{suffix}</div>}
                        </div>
                    </div>

                    <div className={`mt-3 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wide ${badgeClass}`}>
                        {statusText}
                    </div>
                    {subLabel && <div className="text-[10px] text-stone-400 mt-2 text-center">{subLabel}</div>}
                </div>
            );
        };

        const AnalysisBox = ({ children, title = "บทวิเคราะห์สำหรับผู้บริหาร (Executive Analysis)", type = "default", colorTheme = "gold" }) => {
            const themes = {
                gold: { bg: "bg-amber-50/90", border: "border-amber-200", borderTop: "border-t-amber-500", text: "text-stone-800", icon: "text-amber-600", badge: "bg-amber-600" },
                orange: { bg: "bg-orange-50/90", border: "border-orange-200", borderTop: "border-t-orange-500", text: "text-stone-800", icon: "text-orange-600", badge: "bg-orange-600" },
                yellow: { bg: "bg-yellow-50/90", border: "border-yellow-200", borderTop: "border-t-yellow-500", text: "text-stone-800", icon: "text-yellow-600", badge: "bg-yellow-600" },
                stone: { bg: "bg-stone-50/90", border: "border-stone-300", borderTop: "border-t-stone-500", text: "text-stone-800", icon: "text-stone-600", badge: "bg-stone-600" },
                critical: { bg: "bg-red-50/90", border: "border-red-200", borderTop: "border-t-red-500", text: "text-stone-800", icon: "text-red-500", badge: "bg-red-600" }
            };
            const currentStyle = themes[colorTheme] || themes.gold;

            return (
                <div className={`${currentStyle.bg} backdrop-blur-sm border-x border-b ${currentStyle.border} border-t-4 ${currentStyle.borderTop} rounded-xl p-6 mt-8 relative shadow-lg shadow-amber-100/50 hover:shadow-xl transition-shadow duration-300`}>
                    <div className={`absolute -top-4 left-6 ${currentStyle.badge} text-white text-[11px] px-4 py-1.5 rounded-full uppercase font-bold tracking-widest shadow-md flex items-center gap-2 ring-4 ring-white`}>
                        <Activity size={12} /> {type === 'critical' ? 'CRITICAL ATTENTION' : 'EXECUTIVE SUMMARY'}
                    </div>
                    <h4 className={`font-bold ${currentStyle.text} mb-4 flex items-center mt-3 text-lg border-b border-dashed border-amber-200 pb-3`}>
                        {title}
                    </h4>
                    <div className="space-y-4 text-base text-stone-600 leading-relaxed font-light">
                        {children}
                    </div>
                </div>
            );
        };

        const SuggestionBox = ({ children, colorClass = "gold" }) => {
             const colors = {
                 gold: "border-amber-400 bg-gradient-to-r from-amber-50/80 to-white/80 text-amber-700 bg-amber-100/50",
                 orange: "border-orange-400 bg-gradient-to-r from-orange-50/80 to-white/80 text-orange-700 bg-orange-100/50",
                 yellow: "border-yellow-400 bg-gradient-to-r from-yellow-50/80 to-white/80 text-yellow-700 bg-yellow-100/50",
                 stone: "border-stone-400 bg-gradient-to-r from-stone-50/80 to-white/80 text-stone-700 bg-stone-200/50",
             }
             const style = colors[colorClass] || colors.gold;

            return (
            <div className={`backdrop-blur-sm border-l-4 p-6 mt-6 rounded-r-xl shadow-md ${style.split(' ')[0]} ${style.split(' ')[1]} ${style.split(' ')[2]} ${style.split(' ')[3]}`}>
                <div className="flex items-start">
                    <div className={`p-2 rounded-lg mr-4 ${style.split(' ').slice(5).join(' ')}`}>
                        <Lightbulb className={`w-6 h-6 ${style.split(' ')[4]}`} />
                    </div>
                    <div>
                        <h5 className={`font-bold text-stone-800 text-base mb-2 uppercase tracking-wide ${style.split(' ')[4]}`}>ข้อเสนอแนะเชิงกลยุทธ์ (Strategic Recommendations)</h5>
                        <div className="text-stone-700 space-y-2 font-medium">{children}</div>
                    </div>
                </div>
            </div>
            );
        };

        const BenchmarkCard = ({ items }) => (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                {items.map((item, idx) => (
                    <div key={idx} className={`p-4 rounded-xl border ${item.color} flex flex-col justify-center items-center text-center shadow-lg relative overflow-hidden group hover:-translate-y-1 transition-transform duration-300 bg-white/90 backdrop-blur-sm`}>
                        <div className="absolute top-0 right-0 w-16 h-16 bg-gradient-to-br from-white/30 to-transparent rounded-bl-full z-0"></div>
                        {item.icon && <item.icon className="absolute top-2 right-2 opacity-10 scale-150 transform group-hover:scale-125 transition-transform" size={32} />}
                        <div className="text-[11px] opacity-70 uppercase tracking-widest font-bold mb-2 flex items-center gap-1 z-10 text-stone-600">
                            {item.label}
                        </div>
                        <div className="text-xl md:text-2xl font-bold z-10 tracking-tight text-stone-800">{item.value}</div>
                    </div>
                ))}
            </div>
        );

        const Navbar = ({ activeSection, scrollToSection, isMenuOpen, setIsMenuOpen }) => {
            const menus = [
                { id: 'dashboard', label: 'Executive Dashboard' },
                { id: 'flagship', label: 'Flagship' },
                { id: 'service', label: 'Service Plan' },
                { id: 'cannabis', label: 'Cannabis' },
                { id: 'licenses', label: 'Licenses' },
                { id: 'postmarket', label: 'Post Market' },
            ];
            return (
                <nav className="sticky top-0 z-50 bg-amber-500/95 backdrop-blur-md shadow-lg border-b border-amber-600 no-print text-white bg-gradient-to-r from-amber-500 to-yellow-600">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="flex justify-between items-center h-20">
                            <div className="flex items-center gap-3 font-bold text-white text-xl tracking-wide">
                                <div className="bg-white/20 text-white p-2 rounded-xl shadow-lg border border-white/20">
                                    <Leaf size={24} />
                                </div>
                                <span className="hidden sm:inline font-display">SamutPrakan <span className="text-yellow-100">TTM Report</span></span>
                                <span className="sm:hidden font-display">TTM Report</span>
                            </div>
                            <div className="hidden md:flex space-x-2">
                                {menus.map((menu) => (
                                    <button
                                        key={menu.id}
                                        onClick={() => scrollToSection(menu.id)}
                                        className={`px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-300 ${
                                            activeSection === menu.id 
                                            ? 'text-amber-900 bg-white shadow-lg transform scale-105' 
                                            : 'text-amber-100 hover:text-white hover:bg-amber-600/50'
                                        }`}
                                    >
                                        {menu.label}
                                    </button>
                                ))}
                            </div>
                            <div className="md:hidden">
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 text-white hover:bg-white/10 rounded-lg">
                                    {isMenuOpen ? <XIcon size={28} /> : <MenuIcon size={28} />}
                                </button>
                            </div>
                        </div>
                    </div>
                    {isMenuOpen && (
                        <div className="md:hidden bg-amber-800 border-t border-amber-700 shadow-2xl absolute w-full z-50">
                            <div className="px-4 pt-4 pb-6 space-y-2">
                                {menus.map((menu) => (
                                    <button
                                        key={menu.id}
                                        onClick={() => {
                                            scrollToSection(menu.id);
                                            setIsMenuOpen(false);
                                        }}
                                        className="block w-full text-left px-4 py-4 rounded-xl text-base font-medium text-white hover:bg-white/20 transition-colors"
                                    >
                                        {menu.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        // --- Main App ---
        function App() {
            const [activeSection, setActiveSection] = useState('header');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    const yOffset = -100;
                    const y = element.getBoundingClientRect().top + window.pageYOffset + yOffset;
                    window.scrollTo({ top: y, behavior: 'smooth' });
                    setActiveSection(id);
                }
            };

            const handlePrint = () => window.print();

            return (
                <div className="min-h-screen font-sans text-stone-800 pb-24">
                    <Navbar activeSection={activeSection} scrollToSection={scrollToSection} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} />
                    
                    <div className="fixed bottom-8 right-8 z-40 no-print">
                        <button onClick={handlePrint} className="bg-gradient-to-r from-amber-500 to-yellow-600 hover:from-amber-400 hover:to-yellow-500 text-white font-bold py-4 px-8 rounded-full shadow-2xl shadow-amber-500/40 flex items-center gap-3 transition-all transform hover:scale-105 active:scale-95 border border-white/20 backdrop-blur-md">
                            <Printer size={22} />
                            <span className="hidden sm:inline tracking-wide">บันทึก PDF / พิมพ์</span>

                    </div>

                    <main className="max-w-7xl mx-auto p-4 md:p-8 space-y-12">
                        {/* HEADER */}
                        <section id="header" className="relative rounded-3xl overflow-hidden shadow-2xl shadow-amber-500/20 text-white mt-8 group">
                            <div className="absolute inset-0 bg-gradient-to-br from-yellow-400 via-amber-500 to-orange-600 z-0"></div>
                            {/* Decorative leaf overlay */}
                            <div className="absolute top-0 right-0 p-0 opacity-10 pointer-events-none transform rotate-180">
                                <Leaf size={400} />
                            </div>
                            
                            <div className="relative z-10 p-10 md:p-16 flex flex-col md:flex-row items-center justify-between gap-12">
                                <div className="text-center md:text-left flex-1 space-y-6">
                                    <div className="inline-block px-4 py-1.5 bg-white/20 backdrop-blur-md rounded-full text-sm font-bold tracking-widest uppercase border border-white/30 text-white shadow-lg">
                                        เดือนเมษายน / ปีงบประมาณ 2569
                                    </div>
                                    <h1 className="text-4xl md:text-6xl font-display font-bold leading-tight drop-shadow-md text-white">
                                        รายงานผลการดำเนินงาน<br/>
                                        <span className="text-yellow-100">การแพทย์แผนไทยและการแพทย์ทางเลือก</span>
                                    </h1>
                                    <h2 className="text-2xl md:text-3xl font-light text-white/90 tracking-wide">สำนักงานสาธารณสุขจังหวัดสมุทรปราการ</h2>
                                    <div className="inline-flex items-center bg-white/10 backdrop-blur-lg px-8 py-3 rounded-full border border-white/40 text-base shadow-xl hover:bg-white/20 transition-colors">
                                        <FileText size={18} className="mr-3 text-yellow-100" />
                                        <span className="text-white">ข้อมูล ณ วันที่ 17 เมษายน 2569</span>
                                    </div>
                                </div>
                                <div className="flex-shrink-0 relative">
                                    <div className="absolute inset-0 bg-white rounded-full blur-3xl opacity-30 animate-pulse"></div>
                                    <div className="relative w-56 h-56 md:w-72 md:h-72 bg-gradient-to-br from-white/10 to-transparent rounded-full flex items-center justify-center backdrop-blur-sm border border-white/30 shadow-2xl p-3">
                                        <div className="w-full h-full rounded-full bg-white/10 flex items-center justify-center overflow-hidden border-4 border-white/40 shadow-inner">
                                            <img src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Thai Herbs" className="w-full h-full object-cover opacity-90 hover:opacity-100 transition-opacity duration-700 scale-110" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* DASHBOARD - EXPANDED */}
                        <section id="dashboard">
                            <div className="flex items-center mb-6">
                                <div className="bg-amber-500 p-2 rounded-lg text-white mr-3 shadow-md"><Activity size={24} /></div>
                                <h2 className="text-2xl font-bold text-stone-800">สรุปสถานการณ์ (Executive Dashboard)</h2>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4 md:gap-6">
                                {/* Service Plan */}
                                <GaugeChart title="1. ร้อยละการเข้าถึงบริการ" value="60.67%" status="pass" subLabel="เป้าหมาย > 50%" />
                                <GaugeChart title="2. มูลค่าการใช้ยาสมุนไพร" value="51.30%" status="pass" subLabel="% ของเป้าหมาย 10 เดือน" />
                                <GaugeChart title="3. การสั่งใช้ยาโรคทั่วไป" value="+17.44%" status="pass" subLabel="Growth Rate (>15%)" />
                                <GaugeChart title="4. การดูแล Intermediate Care" value="5.01%" status="fail" max={10} subLabel="เป้าหมาย > 6%" />
                                
                                {/* Cannabis */}
                                <GaugeChart title="5. Palliative Care (Cannabis)" value="0.83%" status="fail" max={10} subLabel="เป้าหมาย > 10% (วิกฤต)" />

                                {/* Quality */}
                                <GaugeChart title="7. มาตรฐาน GMP" value="95.14%" status="info" subLabel="แหล่งผลิตได้มาตรฐาน" />

                                <GaugeChart title="11. ตรวจสอบหลังการขาย" value="10" status="info" max={20} suffix="เรื่อง" subLabel="ของกลาง 563 กก." />

                                        <div className="overflow-x-auto flex-1">
                                            <table className="w-full text-base text-center">
                                                <thead className="bg-amber-50/50 text-stone-500 font-semibold border-b border-amber-100 uppercase text-xs tracking-wider"><tr><th className="p-4 text-left pl-8">อำเภอ</th><th className="p-4">เป้าหมาย</th><th className="p-4">ผ่านเกณฑ์</th><th className="p-4">ร้อยละ</th></tr></thead>
                                                <tbody className="divide-y divide-amber-50 text-stone-600">
                                                    {PROJECT_DATA.districtTable.map((row, idx) => (
                                                        <tr key={idx} className="hover:bg-amber-50/30 transition-colors"><td className="p-4 text-left pl-8 font-semibold text-stone-800">{row.name}</td><td>{row.target}</td><td className="font-bold text-amber-600">{row.passed}</td><td className="text-teal-600 font-bold bg-teal-50/50 rounded-lg">{row.percent}</td></tr>

                                </div>
                                <AnalysisBox title="บทวิเคราะห์: ความสำเร็จตามเป้าหมาย" colorTheme="gold">

                                    <p>• <b>Gap Analysis:</b> ยังมีความต่างจาก "เป้าหมายตามแผนภาพรวม" ที่ตั้งไว้ 200 คน (Gap = 76 คน)</p>
                                </AnalysisBox>
