        // Known column-name variants used by different courier CSV exports (DHL, Kerry, Flash, EMS, ฯลฯ)
        const WEIGHT_COLUMN_NAMES = [
            'Weight', 'Shp Weight', 'Weight (KG)', 'Weight(KG)', 'Weight (Kg)', 'Gross Weight',
            'GROSS WEIGHT', 'Net Weight', 'NET WEIGHT', 'Shipment Weight', 'Item Weight',
            'Chargeable Weight', 'น้ำหนัก', 'น้ำหนัก (Kg)', 'น้ำหนักรวม'
        ];

        // Returns { weight, needsReview, source } — needsReview flags rows where we had to guess,
        // so a human can double-check before the number is trusted in any total.
        const getWeight = (row) => {
            // 1. Try known column names first (most reliable — order-independent)
            for (const colName of WEIGHT_COLUMN_NAMES) {
                if (row[colName] !== undefined && row[colName] !== '' && !isNaN(parseFloat(row[colName]))) {
                    return { weight: parseFloat(row[colName]), needsReview: false, source: colName };
                }
            }
            // 2. Fallback: scan every column for one that looks numeric AND has a weight-ish header
            const keys = Object.keys(row);
            for (const k of keys) {
                const kLower = k.toLowerCase();
                if ((kLower.includes('weight') || kLower.includes('น้ำหนัก') || kLower.includes('kg')) && !isNaN(parseFloat(row[k])) && row[k] !== '') {
                    return { weight: parseFloat(row[k]), needsReview: false, source: k };
                }

            // 3. Last resort: positional guess at column index 7 — UNRELIABLE, always flagged for manual review
            const values = Object.values(row);
            if (values.length > 7) {

                if (!isNaN(val)) return { weight: val, needsReview: true, source: 'column index 7 (guessed)' };
            }
            return { weight: 0, needsReview: true, source: 'not found' };
        };

        // The date tracked throughout the app is the REGISTRATION date (when the case/parcel was
        // logged into the system) — not EDD (Estimated Delivery Date, a future estimate) or any
        // other date field. Column names below are common variants seen in courier/customs exports.
        const REG_DATE_COLUMN_NAMES = [
            'Reg Date', 'Registration Date', 'Register Date', 'Regist Date', 'Registered Date',

        // string in various formats) into a consistent 'YYYY-MM-DD' string, since every date-based
        // feature in the app (filtering, monthly charts, burst/pattern detection, sorting) compares
        // dates as strings.
        const normalizeDateValue = (val) => {
            if (val === undefined || val === null || val === '') return '';
            if (val instanceof Date && !isNaN(val)) return val.toISOString().slice(0, 10);
            if (typeof val === 'number') {
                // Excel serial date (days since 1899-12-30)
                const d = new Date(Date.UTC(1899, 11, 30) + val * 86400000);
                if (!isNaN(d)) return d.toISOString().slice(0, 10);
            }
            const s = String(val).trim();
            const isoMatch = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
            if (isoMatch) return `${isoMatch[1]}-${isoMatch[2].padStart(2, '0')}-${isoMatch[3].padStart(2, '0')}`;
            const slashMatch = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
            if (slashMatch) {
                // Assume DD/MM/YYYY (Thai convention) rather than US MM/DD/YYYY
                const [, day, month, year] = slashMatch;
                return `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
            }
            const parsed = new Date(s);
            if (!isNaN(parsed)) return parsed.toISOString().slice(0, 10);
            return s; // couldn't confidently parse — keep the raw value rather than silently dropping it

        // case shows up correctly under "วันที่ไม่ระบุ" in the data-quality check instead of being
        // silently assigned a fake date.
        const getRegistrationDate = (row) => {
            for (const col of REG_DATE_COLUMN_NAMES) {
                if (row[col] !== undefined && row[col] !== '') return normalizeDateValue(row[col]);
            }
            const fallback = row['EDD'] || row['Date'] || row['Shipment Date'];

                                        <div key={w.id} className="flex justify-between items-center bg-slate-50 border border-slate-200 rounded-lg px-4 py-3">
                                            <div>
                                                <span className="font-bold text-slate-700 text-sm">{w.value}</span>
                                                {w.note && <span className="text-xs text-slate-400 ml-2">— {w.note}</span>}
                                                <div className="text-[0.65rem] text-slate-400 mt-0.5">เพิ่มเมื่อ {w.addedDate}</div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className={`text-xs font-bold px-2 py-1 rounded-lg ${hitCount > 0 ? 'bg-rose-100 text-rose-700' : 'bg-slate-100 text-slate-400'}`}>{hitCount} เคสตรงกัน</span>
                                                <button onClick={() => onRemove(w.id)} className="text-slate-400 hover:text-rose-600 transition"><Icons.Close /></button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-soft border border-slate-200">
                        <h3 className="text-sm font-bold text-brand-800 uppercase tracking-wider pl-3 border-l-4 border-amber-500 mb-1">เคสที่ตรงกับบัญชีเฝ้าระวัง ({matchedCases.length})</h3>
                        <p className="text-xs text-slate-400 pl-3 mb-4">ในช่วงเวลาที่กำลังดูอยู่ตอนนี้</p>
                        {matchedCases.length === 0 ? (
                            <p className="text-sm text-emerald-600 italic py-6 text-center font-medium">✓ ไม่พบเคสที่ตรงกับบัญชีเฝ้าระวังในช่วงข้อมูลนี้</p>
                        ) : (
                            <div className="overflow-x-auto max-h-[28rem] overflow-y-auto rounded-lg border border-slate-100">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 border-b border-slate-200 sticky top-0">
                                        <tr><th className="custom-table th">HWB / วันที่</th><th className="custom-table th">ผู้ส่ง</th><th className="custom-table th">ผู้รับ</th><th className="custom-table th text-right">น้ำหนัก</th><th className="custom-table th">ตรงกับ</th><th className="custom-table th w-16 text-center">แก้ไข</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {matchedCases.map(({ item, matches }, i) => (
                                            <tr key={i} className="hover:bg-rose-50/40 bg-rose-50/20">
                                                <td className="custom-table td"><div className="font-mono font-bold text-brand-900">{item.hwb}</div><div className="text-xs text-slate-500">{item.date ? item.date.split(' ')[0] : '-'}</div></td>
                                                <td className="custom-table td text-slate-700">{item.shipper}</td>
                                                <td className="custom-table td text-slate-700">{item.receiver}</td>
                                                <td className="custom-table td text-right font-bold text-rose-600">{parseFloat(item.weight || 0).toFixed(2)} Kg</td>
                                                <td className="custom-table td"><div className="flex flex-wrap gap-1">{matches.map((m, mi) => <span key={mi} className="text-[0.65rem] px-1.5 py-0.5 bg-rose-100 text-rose-700 rounded font-bold">{m.value}</span>)}</div></td>
                                                <td className="custom-table td text-center"><button onClick={() => onOpenFull(allData.indexOf(item))} className="text-brand-600 hover:text-brand-800"><Icons.Edit /></button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const DataQualityPanel = ({ quality }) => {
            const scoreColor = quality.qualityScore >= 90 ? 'text-emerald-600' : quality.qualityScore >= 70 ? 'text-amber-600' : 'text-rose-600';
            const items = [
                { label: 'ชื่อผู้ส่งไม่ระบุ', value: quality.missingShipper },
                { label: 'ชื่อผู้รับไม่ระบุ', value: quality.missingReceiver },
                { label: 'ที่อยู่ผู้ส่งไม่ระบุ', value: quality.missingShipperAddr },
                { label: 'ที่อยู่ผู้รับไม่ระบุ', value: quality.missingReceiverAddr },
                { label: 'วันที่ไม่ระบุ', value: quality.missingDate },
            ];
            return (
                <div className="bg-white p-6 rounded-xl shadow-soft border border-slate-200">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                        <div>
                            <h3 className="text-sm font-bold text-brand-800 uppercase tracking-wider pl-3 border-l-4 border-brand-600">คุณภาพข้อมูลโดยรวม (Data Quality)</h3>
                            <p className="text-xs text-slate-400 pl-3 mt-1">ตรวจสอบว่าแต่ละเคสมีข้อมูลครบตามช่องสำคัญหรือไม่ (นอกเหนือจากน้ำหนัก)</p>
                        </div>
                        <div className="text-center shrink-0">
                            <div className={`text-3xl font-extrabold ${scoreColor}`}>{quality.qualityScore}%</div>
                            <div className="text-xs text-slate-400">ข้อมูลครบถ้วน ({quality.cleanCount}/{quality.total} เคส)</div>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                        {items.map((it, i) => (
                            <div key={i} className={`rounded-lg border px-3 py-3 text-center ${it.value > 0 ? 'bg-amber-50 border-amber-200' : 'bg-slate-50 border-slate-200'}`}>
                                <div className={`text-xl font-extrabold ${it.value > 0 ? 'text-amber-600' : 'text-slate-400'}`}>{it.value}</div>
                                <div className="text-[0.7rem] text-slate-500 mt-1">{it.label}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const MissingWeightPage = ({ data, allData, onUpdateWeight, onOpenFull }) => {
            const [sortDir, setSortDir] = useState('asc');

            const missing = (data || [])
                .filter(item => !item.weight || parseFloat(item.weight) === 0)
                .map(item => ({ ...item, _idx: allData.indexOf(item) }))
                .sort((a, b) => {
                    const da = a.date || '';
                    const db = b.date || '';
                    return sortDir === 'asc' ? da.localeCompare(db) : db.localeCompare(da);
                });

            return (
                <div className="bg-white rounded-xl shadow-soft border border-slate-200 overflow-hidden">
                    <div className="p-5 border-b border-slate-200 bg-slate-50 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                        <div>
                            <h3 className="font-bold text-brand-900 flex items-center"><span className="text-rose-500 mr-2"><Icons.AlertTriangle/></span>เคสที่ยังไม่มีน้ำหนัก ({missing.length} จากทั้งหมด {(data || []).length})</h3>
                            <p className="text-xs text-slate-500 mt-1">กรอกน้ำหนัก (Kg) ที่ยึดได้จริงแล้วกดออกจากช่อง (Tab/Enter) เพื่อบันทึกทันที — ยอดรวมในแดชบอร์ดจะอัปเดตให้อัตโนมัติ</p>
                        </div>
                        <button onClick={() => setSortDir(d => d === 'asc' ? 'desc' : 'asc')} className="px-3 py-2 bg-white border border-slate-300 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-100 transition whitespace-nowrap">
                            เรียงตามวันที่: {sortDir === 'asc' ? 'เก่า → ใหม่' : 'ใหม่ → เก่า'} ⇅
                        </button>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b border-slate-200">
                                <tr>
                                    <th className="custom-table th">วันที่</th>
                                    <th className="custom-table th">HWB</th>
                                    <th className="custom-table th">ผู้ส่ง (Shipper)</th>
                                    <th className="custom-table th">ผู้รับ (Receiver)</th>
                                    <th className="custom-table th">รายละเอียดสินค้า</th>
                                    <th className="custom-table th text-right w-44">น้ำหนัก (Kg)</th>
                                    <th className="custom-table th w-20 text-center">แก้ไขเต็ม</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {missing.map(row => (
                                    <tr key={row._idx} className="hover:bg-slate-50">
                                        <td className="custom-table td text-slate-500 whitespace-nowrap">{row.date ? row.date.split(' ')[0] : <span className="text-amber-500 italic">ไม่มีวันที่</span>}</td>
                                        <td className="custom-table td font-mono font-bold text-brand-900">{row.hwb}</td>
                                        <td className="custom-table td">
                                            <div className="font-medium text-slate-700">{row.shipper || '-'}</div>
                                            <div className="text-xs text-slate-400">{row.shipperCity}</div>
                                        </td>
                                        <td className="custom-table td">
                                            <div className="font-medium text-slate-700">{row.receiver || '-'}</div>
                                            <div className="text-xs text-slate-400">{row.receiverCity} ({row.dest})</div>
                                        </td>
                                        <td className="custom-table td text-xs text-slate-500 max-w-xs truncate" title={row.desc}>{row.desc || '-'}</td>
                                        <td className="custom-table td text-right">
                                            <input
                                                type="number" step="0.01" min="0" placeholder="กรอกน้ำหนัก"
                                                defaultValue={row.weight || ''}
                                                onBlur={e => onUpdateWeight(row._idx, e.target.value)}
                                                onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                                                className="w-32 p-2 text-right bg-rose-50 border border-rose-300 rounded-md text-sm font-bold text-rose-700 focus:ring-2 focus:ring-brand-500 focus:bg-white outline-none transition"
                                            />
                                        </td>
                                        <td className="custom-table td text-center">
                                            <button onClick={() => onOpenFull(row._idx)} className="text-brand-600 hover:text-brand-800 hover:bg-brand-50 p-1.5 rounded-md transition" title="แก้ไขข้อมูลทั้งหมด"><Icons.Edit /></button>
                                        </td>
                                    </tr>
                                ))}
                                {missing.length === 0 && <tr><td colSpan="7" className="px-6 py-16 text-center text-emerald-600 italic font-bold">✓ ทุกเคสมีน้ำหนักครบแล้ว ไม่มีรายการที่ต้องแก้ไข</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>

        const RiskBadge = ({ score }) => {
            const tier = score >= 70 ? { label: 'สูง', cls: 'bg-rose-100 text-rose-700 border-rose-300' }
                       : score >= 40 ? { label: 'ปานกลาง', cls: 'bg-amber-100 text-amber-700 border-amber-300' }
                       : { label: 'ต่ำ', cls: 'bg-slate-100 text-slate-600 border-slate-300' };
            return (
                <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-bold border ${tier.cls}`}>
                    <span className="text-sm">{score}</span><span className="opacity-70">/100 · {tier.label}</span>
                </span>
            );
        };

        const NetworkGraphPanel = ({ analytics }) => {
            const { topSenderNodes, topReceiverNodes, networkEdges, hubSenders, hubReceivers } = analytics;
            const width = 800, height = Math.max(420, Math.max(topSenderNodes.length, topReceiverNodes.length) * 34 + 60);
            const leftX = 130, rightX = width - 130;
            const yFor = (i, n) => 40 + (n <= 1 ? (height - 80) / 2 : i * (height - 80) / (n - 1));
            const senderIndex = {}; topSenderNodes.forEach((s, i) => senderIndex[s.name] = i);
            const receiverIndex = {}; topReceiverNodes.forEach((r, i) => receiverIndex[r.name] = i);
            const maxEdgeWeight = Math.max(1, ...networkEdges.map(e => e.weight));
            const maxNodeWeight = Math.max(1, ...topSenderNodes.map(s => s.weight), ...topReceiverNodes.map(r => r.weight));

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-xl shadow-soft border border-slate-200">
                        <h3 className="text-sm font-bold text-brand-800 uppercase tracking-wider pl-3 border-l-4 border-brand-600 mb-1">Network Graph: ผู้ส่ง ↔ ผู้รับ</h3>
                        <p className="text-xs text-slate-400 pl-3 mb-4">แสดง Top 15 ผู้ส่ง/ผู้รับ ตามน้ำหนักรวม · เส้นหนา = น้ำหนักสูง · วงกลมใหญ่ = น้ำหนักสะสมสูง</p>
                        <div className="overflow-x-auto">
                            <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ minWidth: '600px', height: `${height}px` }}>
                                {networkEdges.map((e, i) => {
                                    const y1 = yFor(senderIndex[e.sender], topSenderNodes.length);
                                    const y2 = yFor(receiverIndex[e.receiver], topReceiverNodes.length);
                                    const sw = 0.75 + 4 * (e.weight / maxEdgeWeight);
                                    return <path key={i} d={`M ${leftX + 14} ${y1} C ${width / 2} ${y1}, ${width / 2} ${y2}, ${rightX - 14} ${y2}`} fill="none" stroke="#818cf8" strokeOpacity="0.35" strokeWidth={sw}>
                                        <title>{e.sender} → {e.receiver}: {e.weight.toFixed(2)} Kg ({e.count} เคส)</title>
                                    </path>;
                                })}
                                {topSenderNodes.map((s, i) => {
                                    const y = yFor(i, topSenderNodes.length);
                                    const r = 5 + 8 * (s.weight / maxNodeWeight);
                                    const isHub = s.reach > 1;
                                    return (
                                        <g key={'s' + i}>
                                            <circle cx={leftX} cy={y} r={r} fill={isHub ? '#e11d48' : '#4f46e5'} stroke="#fff" strokeWidth="1.5"><title>{s.name}: {s.weight.toFixed(2)} Kg, {s.count} เคส, เชื่อม {s.reach} ผู้รับ</title></circle>
                                            <text x={leftX - r - 8} y={y + 4} textAnchor="end" fontSize="11" fill="#334155" className="font-medium">{s.name.length > 18 ? s.name.slice(0, 18) + '…' : s.name}</text>
                                        </g>
                                    );
                                })}
                                {topReceiverNodes.map((rNode, i) => {
                                    const y = yFor(i, topReceiverNodes.length);
                                    const r = 5 + 8 * (rNode.weight / maxNodeWeight);
                                    const isHub = rNode.reach > 1;
                                    return (
                                        <g key={'r' + i}>
                                            <circle cx={rightX} cy={y} r={r} fill={isHub ? '#e11d48' : '#059669'} stroke="#fff" strokeWidth="1.5"><title>{rNode.name}: {rNode.weight.toFixed(2)} Kg, {rNode.count} เคส, เชื่อม {rNode.reach} ผู้ส่ง</title></circle>
                                            <text x={rightX + r + 8} y={y + 4} textAnchor="start" fontSize="11" fill="#334155" className="font-medium">{rNode.name.length > 18 ? rNode.name.slice(0, 18) + '…' : rNode.name}</text>
                                        </g>
                                    );
                                })}
                                <text x={leftX} y="20" textAnchor="middle" fontSize="12" fill="#818cf8" className="font-bold uppercase">ผู้ส่ง</text>
                                <text x={rightX} y="20" textAnchor="middle" fontSize="12" fill="#10b981" className="font-bold uppercase">ผู้รับ</text>
                            </svg>
                        </div>
                        <div className="flex items-center gap-4 mt-3 text-xs text-slate-500">
                            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-rose-600 inline-block"></span>ตัวกลาง/นายหน้า (เชื่อมมากกว่า 1 ราย)</span>
                            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-brand-600 inline-block"></span>ผู้ส่งทั่วไป</span>
                            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-emerald-600 inline-block"></span>ผู้รับทั่วไป</span>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-5 rounded-xl shadow-soft border border-slate-200">
                            <h4 className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">🎯 ผู้ส่งที่น่าจะเป็นตัวกลาง (เชื่อมผู้รับหลายราย)</h4>
                            {hubSenders.length === 0 && <p className="text-xs text-slate-400 italic">ไม่พบผู้ส่งที่เชื่อมกับผู้รับมากกว่า 1 ราย</p>}
                            <div className="space-y-2">
                                {hubSenders.slice(0, 10).map((s, i) => (
                                    <div key={i} className="flex justify-between items-center text-xs bg-rose-50/60 rounded-lg px-3 py-2">
                                        <span className="font-medium text-slate-700">{s.name}</span>
                                        <span className="text-rose-600 font-bold">เชื่อม {s.reach} ผู้รับ · {s.weight.toFixed(1)} Kg</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-white p-5 rounded-xl shadow-soft border border-slate-200">
                            <h4 className="text-xs font-bold text-rose-600 uppercase tracking-wider mb-3">🎯 ผู้รับที่น่าจะเป็นตัวกลาง (รับจากผู้ส่งหลายราย)</h4>
                            {hubReceivers.length === 0 && <p className="text-xs text-slate-400 italic">ไม่พบผู้รับที่รับจากผู้ส่งมากกว่า 1 ราย</p>}
                            <div className="space-y-2">
                                {hubReceivers.slice(0, 10).map((r, i) => (
                                    <div key={i} className="flex justify-between items-center text-xs bg-rose-50/60 rounded-lg px-3 py-2">
                                        <span className="font-medium text-slate-700">{r.name}</span>
                                        <span className="text-rose-600 font-bold">เชื่อม {r.reach} ผู้ส่ง · {r.weight.toFixed(1)} Kg</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AliasGroupTable = ({ title, groups }) => {
            const [expanded, setExpanded] = useState(new Set());
            const toggle = (k) => setExpanded(prev => { const n = new Set(prev); n.has(k) ? n.delete(k) : n.add(k); return n; });
            return (
                <div className="bg-white p-6 rounded-xl shadow-soft border border-slate-200">
                    <h3 className="text-sm font-bold text-brand-800 uppercase tracking-wider pl-3 border-l-4 border-amber-500 mb-1">{title}</h3>
                    <p className="text-xs text-slate-400 pl-3 mb-4">ที่อยู่/พิกัดเดียวกัน แต่พบชื่อผู้ส่ง-ผู้รับมากกว่า 1 ชื่อ — อาจเป็นบุคคล/เครือข่ายเดียวกันที่สลับชื่อ</p>
                    {(!groups || groups.length === 0) ? (
                        <p className="text-sm text-emerald-600 italic font-medium py-6 text-center">✓ ไม่พบรูปแบบที่อยู่ซ้ำ/นามแฝงในข้อมูลปัจจุบัน</p>
                    ) : (
                        <div className="space-y-2 max-h-[28rem] overflow-y-auto">
                            {groups.map((g, i) => (
                                <div key={i} className="border border-amber-200 bg-amber-50/50 rounded-lg overflow-hidden">
                                    <button onClick={() => toggle(g.key)} className="w-full flex justify-between items-center px-4 py-3 text-left hover:bg-amber-50 transition">
                                        <div>
                                            <div className="text-sm font-bold text-slate-700">{g.addr}</div>
                                            <div className="flex flex-wrap gap-1.5 mt-1.5">
                                                {g.names.map((n, ni) => <span key={ni} className="px-2 py-0.5 bg-white border border-amber-300 rounded-md text-[0.7rem] font-bold text-amber-700">{n}</span>)}
                                            </div>
                                        </div>
                                        <div className="text-right shrink-0 ml-3">
                                            <div className="text-sm font-bold text-rose-600">{g.weight.toFixed(2)} Kg</div>
                                            <div className="text-xs text-slate-400">{g.count} เคส · {expanded.has(g.key) ? '▲' : '▼'}</div>
                                        </div>
                                    </button>
                                    {expanded.has(g.key) && (
                                        <div className="px-4 pb-3 bg-white border-t border-amber-100">
                                            <table className="w-full text-xs mt-2">
                                                <thead><tr className="text-slate-400 uppercase text-[0.65rem]"><th className="text-left pb-1">HWB</th><th className="text-left pb-1">ชื่อที่ใช้</th><th className="text-left pb-1">วันที่</th><th className="text-right pb-1">น้ำหนัก</th></tr></thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {g.cases.map((c, ci) => (
                                                        <tr key={ci}><td className="py-1 font-mono font-bold text-brand-800">{c.hwb}</td><td className="py-1">{c.name}</td><td className="py-1 text-slate-500">{c.date ? c.date.split(' ')[0] : '-'}</td><td className="py-1 text-right font-bold text-rose-600">{c.weight.toFixed(2)} Kg</td></tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            {g.lat && g.lng && <button onClick={() => openGoogleMaps(g.lat, g.lng, g.addr)} className="mt-2 text-xs font-bold text-brand-600 hover:underline">📍 ดูพิกัดที่อยู่นี้</button>}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const RiskScoreTable = ({ title, rows, role }) => (
            <div className="bg-white p-6 rounded-xl shadow-soft border border-slate-200">
                <h3 className="text-sm font-bold text-brand-800 uppercase tracking-wider pl-3 border-l-4 border-rose-500 mb-1">{title}</h3>
                <p className="text-xs text-slate-400 pl-3 mb-4">คะแนน = 40% น้ำหนัก + 25% ความถี่ + 20% ที่อยู่ซ้ำ/นามแฝง + 15% ปลายทางเสี่ยงสูง</p>
                <div className="overflow-x-auto max-h-[30rem] overflow-y-auto rounded-lg border border-slate-100">

        const LeafletMap = ({ center, zoom, markers, color }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersLayerRef = useRef(null);

            useEffect(() => {
                if (mapRef.current && !mapInstanceRef.current) {
                    mapInstanceRef.current = L.map(mapRef.current).setView(center, zoom);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors', maxZoom: 19 }).addTo(mapInstanceRef.current);
                    markersLayerRef.current = L.layerGroup().addTo(mapInstanceRef.current);
                }
                if (mapInstanceRef.current && markersLayerRef.current) {
                    markersLayerRef.current.clearLayers();
                    markers.forEach(m => {
                        // Bubble Map Logic
                        const baseRadius = 6;
                        const factor = 2.5;
                        const maxRadius = 50;
                        const radius = Math.min(baseRadius + (m.count * factor), maxRadius);

                        const fillColor = color === 'red' ? '#f43f5e' : '#f59e0b'; // Rose for origin, Amber for dest
                        const strokeColor = color === 'red' ? '#e11d48' : '#d97706';

                        const circle = L.circleMarker(m.latlng, {
                            color: strokeColor,
                            fillColor: fillColor,
                            fillOpacity: 0.6,
                            radius: radius,
                            weight: 1.5
                        });
                        const popup = `
                            <div style="font-family:Sarabun, sans-serif; color:#1e293b; padding:4px;">
                                <div style="font-weight:700; font-size:1.1em; margin-bottom:4px;">${m.name}</div>
                                <div style="font-size:0.9em; color:#334155;">Total Cases: <span style="font-weight:600; color:#334155;">${m.count}</span></div>
                                <div style="font-size:0.9em; color:#334155;">Total Weight: <span style="font-weight:600; color:#e11d48;">${parseFloat(m.weight).toFixed(2)} Kg</span></div>
                            </div>`;
                        circle.bindPopup(popup);
                        circle.bindTooltip(`${m.name} (${m.count})`, {direction:'top', offset:[0,-radius], opacity:0.9, className: 'font-sans'});
                        markersLayerRef.current.addLayer(circle);
                    });
                }
            }, [markers, center, zoom]);
            return <div ref={mapRef} className="h-full w-full" style={{ minHeight: '500px' }} />;
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [data, setData] = useState(MOCK_SHIPMENTS);
            const [fileStatus, setFileStatus] = useState({ loaded: false });
            const [selectedProvince, setSelectedProvince] = useState('ALL');
            const [selectedCountry, setSelectedCountry] = useState('ALL');
            const [editingIndex, setEditingIndex] = useState(null);
            const [uploadSummary, setUploadSummary] = useState(null);
            const [dateRange, setDateRange] = useState({ start: '', end: '' });
            const [watchlist, setWatchlist] = useState([]);
            const [globalSearch, setGlobalSearch] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [isDirty, setIsDirty] = useState(false);
            const isFirstRender = useRef(true);
            const contentRef = useRef(null);

            // Track unsaved changes (skip the very first render, which is just initial mock/empty state)
            useEffect(() => {
                if (isFirstRender.current) { isFirstRender.current = false; return; }
                setIsDirty(true);
            }, [data]);

            // Warn before closing/refreshing the tab if there's unsaved work — everything lives only
            // in browser memory, so a closed tab with no JSON backup means the data is gone for good.
            useEffect(() => {
                const handler = (e) => {
                    if (!isDirty) return;
                    e.preventDefault();
                    e.returnValue = '';
                    return '';
                };
                window.addEventListener('beforeunload', handler);
                return () => window.removeEventListener('beforeunload', handler);
            }, [isDirty]);

            const addToWatchlist = (value, type = 'name', note = '') => {
                const trimmed = (value || '').trim();
                if (!trimmed) return;
                setWatchlist(prev => {
                    if (prev.some(w => w.value.toLowerCase() === trimmed.toLowerCase())) return prev; // no duplicates
                    return [...prev, { id: Date.now() + Math.random(), value: trimmed, type, note, addedDate: new Date().toISOString().slice(0, 10) }];
                });
            };
            const removeFromWatchlist = (id) => setWatchlist(prev => prev.filter(w => w.id !== id));

            const watchlistMatchCount = useMemo(() => (data || []).filter(d => getWatchlistMatches(d, watchlist).length > 0).length, [data, watchlist]);
            const watchlistMatchCountFiltered = useMemo(() => (filteredData || []).filter(d => getWatchlistMatches(d, watchlist).length > 0).length, [filteredData, watchlist]);

            const globalSearchResults = useMemo(() => {
                const q = globalSearch.trim().toLowerCase();
                if (!q) return [];
                return (data || [])
                    .map((item, idx) => ({ item, idx }))
                    .filter(({ item }) =>
                        (item.hwb || '').toLowerCase().includes(q) ||
                        (item.shipper || '').toLowerCase().includes(q) ||
                        (item.receiver || '').toLowerCase().includes(q) ||
                        (item.shipperAddr || '').toLowerCase().includes(q) ||
                        (item.receiverAddr || '').toLowerCase().includes(q)
                    )
                    .slice(0, 8);
            }, [data, globalSearch]);

            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts || {};

            // Global date-range filter + chronological sort. Registration date is the foundation the
            // whole app is organized around, so every downstream list/table/report (Case Data, Origin/
            // Dest Intel reports, etc.) inherits newest-first ordering from here rather than each
            // component re-sorting independently. Still returns the SAME object references (not
            // copies) so components can resolve an item's true index in the original `data` array via
            // indexOf — needed for editing/deleting to keep working correctly while filtered/sorted.
            const filteredData = useMemo(() => {
                let result = data || [];
                if (dateRange.start || dateRange.end) {
                    result = result.filter(d => {
                        const dt = (d.date || '').toString().split(' ')[0];
                        if (!dt) return false;
                        if (dateRange.start && dt < dateRange.start) return false;
                        if (dateRange.end && dt > dateRange.end) return false;
                        return true;
                    });
                }
                return [...result].sort((a, b) => {
                    const da = (a.date || '').toString().split(' ')[0];
                    const db = (b.date || '').toString().split(' ')[0];
                    if (!da && !db) return 0;
                    if (!da) return 1;   // cases with no date sink to the bottom, not the top
                    if (!db) return -1;
                    return db.localeCompare(da); // descending — newest registration first
                });
            }, [data, dateRange]);

            const applyRecentPreset = (days) => {
                const validDates = (data || []).map(d => (d.date || '').toString().split(' ')[0]).filter(Boolean).sort();
                const maxDateStr = validDates[validDates.length - 1];
                if (!maxDateStr) return;
                const end = new Date(maxDateStr);
                const start = new Date(end);
                start.setDate(end.getDate() - days + 1);
                const fmt = (d) => d.toISOString().slice(0, 10);
                setDateRange({ start: fmt(start), end: fmt(end) });
            };

            const stats = useMemo(() => {
                const data = filteredData;
                const totalShipments = (data || []).length;
                const totalWeight = (data || []).reduce((acc, curr) => acc + parseFloat(curr.weight || 0), 0);
                const groupBy = (keyFn) => (data || []).reduce((acc, curr) => { const k = keyFn(curr); if (!acc[k]) acc[k] = { name: k, count: 0, weight: 0 }; acc[k].count += 1; acc[k].weight += parseFloat(curr.weight || 0); return acc; }, {});
                
                // 1. Monthly — range is derived dynamically from the data's own date span,
                // so it keeps working correctly as new months/years are added (previously hardcoded to Oct-Jan only).
                const byMonthObj = groupBy(curr => curr.date ? curr.date.substring(0, 7) : 'Unknown');
                const validMonthKeys = Object.keys(byMonthObj).filter(k => /^\d{4}-\d{2}$/.test(k)).sort();
                let orderedMonths = [];
                if (validMonthKeys.length > 0) {
                    let [y, m] = validMonthKeys[0].split('-').map(Number);
                    const [ey, em] = validMonthKeys[validMonthKeys.length - 1].split('-').map(Number);
                    while (y < ey || (y === ey && m <= em)) {
                        orderedMonths.push(`${y}-${String(m).padStart(2, '0')}`);
                        m++; if (m > 12) { m = 1; y++; }
                    }
                }
                const monthLabel = (key) => { const [y, m] = key.split('-').map(Number); return `${THAI_MONTHS_ABBR[m - 1]} ${String(y + 543).slice(-2)}`; };
                const chartData = orderedMonths.map(key => ({
                    name: monthLabel(key),
                    weight: byMonthObj[key] ? byMonthObj[key].weight : 0,
                    count: byMonthObj[key] ? byMonthObj[key].count : 0
                }));
                
                // 2. Top 10 Dest
                const byCountryObj = groupBy(curr => curr.dest || 'Unknown');
                const topDestData = Object.values(byCountryObj).sort((a,b) => b.count - a.count).slice(0, 10);
                
                // 3. Top 10 Origin
                const byProvinceObj = groupBy(curr => { let c = (curr.shipperCity || 'Unknown').toUpperCase().trim(); if(c.includes('BANGKOK')) c='BANGKOK'; if(c.includes('SAMUT')) c='SAMUTPRAKARN'; return c; });
                const topOriginData = Object.values(byProvinceObj).sort((a,b) => b.count - a.count).slice(0, 10);
                
                // Bubble Map Data
                const provinceMapData = Object.values(byProvinceObj).map(p => ({ ...p, latlng: PROVINCE_COORDS[p.name] })).filter(p => p.latlng);
                const countryMapData = Object.values(byCountryObj).map(c => ({ ...c, latlng: COUNTRY_COORDS[c.name] })).filter(c => c.latlng);
                
                const byTypeObj = groupBy(curr => { const desc = (curr.desc || '').toLowerCase(); if (desc.includes('tea')||desc.includes('food')) return 'Tea/Food'; if (desc.includes('cosmetic')||desc.includes('cream')) return 'Cosmetics'; if (desc.includes('toy')||desc.includes('gift')) return 'Toys/Gifts'; return 'Others'; });
                const byTypeData = Object.keys(byTypeObj).map(k => ({ name: k, value: byTypeObj[k].count }));

                // Senders / Receivers — grouped by individual name (not just city/country), carrying
                // total seized weight, case count, and the FULL history of every address+GPS used by
                // that person/entity (not just the latest) so the UI can show/expand full detail.
                const buildEntityRanking = (nameFn, addrFn, cityFn, latFn, lngFn) => {
                    const obj = (data || []).reduce((acc, curr) => {
                        const key = (nameFn(curr) || 'Unknown').trim() || 'Unknown';
                        if (!acc[key]) acc[key] = { name: key, count: 0, weight: 0, addr: '-', city: '-', lat: null, lng: null, lastDate: '', cases: [] };
                        const d = curr.date || '';
                        const caseAddr = addrFn(curr) || cityFn(curr) || '-';
                        const caseCity = cityFn(curr) || '-';
                        const caseLat = latFn(curr) ?? null;
                        const caseLng = lngFn(curr) ?? null;
                        acc[key].count += 1;
                        acc[key].weight += parseFloat(curr.weight || 0);
                        acc[key].cases.push({ hwb: curr.hwb, date: d, weight: parseFloat(curr.weight || 0), addr: caseAddr, city: caseCity, lat: caseLat, lng: caseLng });
                        if (d >= acc[key].lastDate) {
                            acc[key].addr = caseAddr;
                            acc[key].city = caseCity;
                            acc[key].lat = caseLat ?? acc[key].lat;
                            acc[key].lng = caseLng ?? acc[key].lng;
                            acc[key].lastDate = d;
                        }
                        return acc;
                    }, {});
                    const list = Object.values(obj);
                    list.forEach(e => e.cases.sort((a, b) => (b.date || '').localeCompare(a.date || '')));
                    return list; // full list — sorting/top-20 slicing happens in the UI so it can switch modes live
                };
                const allSenders = buildEntityRanking(
                    c => c.shipper, c => c.shipperAddr, c => c.shipperCity, c => c.originLat, c => c.originLng
                );
                const allReceivers = buildEntityRanking(
                    c => c.receiver, c => c.receiverAddr, c => c.receiverCity, c => c.destLat, c => c.destLng
                );

                const needsReviewCount = (data || []).filter(d => d.needsReview).length;
                return { totalShipments, totalWeight: totalWeight.toFixed(2), chartData, topDestData, topOriginData, provinceMapData, countryMapData, byTypeData, allSenders, allReceivers, provincesList: ['ALL', ...Object.keys(byProvinceObj).sort()], countriesList: ['ALL', ...Object.keys(byCountryObj).sort()], topCountryCode: topDestData[0]?.name || '-', needsReviewCount };
            }, [filteredData]);

            // ===================== CRIME ANALYTICS =====================
            // Network graph, alias/same-address detection, risk scoring, burst/regularity
            // patterns, and origin→destination corridor risk — all derived from the current
            // date-filtered view.
            const crimeAnalytics = useMemo(() => {
                const list = filteredData;

                // -- Corridor totals + "high risk destination" set (data-driven: top ~30% of
                //    destination countries by cumulative seized weight are treated as high-risk) --
                const corridorMap = {};
                const countryWeightTotals = {};
                list.forEach(c => {
                    const o = (c.shipperCity || 'Unknown').trim().toUpperCase() || 'UNKNOWN';
                    const d = (c.dest || 'Unknown').trim().toUpperCase() || 'UNKNOWN';
                    const w = parseFloat(c.weight || 0);
                    const key = o + ' → ' + d;
                    if (!corridorMap[key]) corridorMap[key] = { origin: o, dest: d, weight: 0, count: 0 };
                    corridorMap[key].weight += w; corridorMap[key].count += 1;
                    if (d) countryWeightTotals[d] = (countryWeightTotals[d] || 0) + w;
                });
                const grandTotalWeight = list.reduce((s, c) => s + parseFloat(c.weight || 0), 0) || 1;
                const corridors = Object.values(corridorMap).map(x => ({ ...x, share: (x.weight / grandTotalWeight) * 100 })).sort((a, b) => b.weight - a.weight);
                const sortedCountryTotals = Object.entries(countryWeightTotals).sort((a, b) => b[1] - a[1]);
                const highRiskCountrySet = new Set(sortedCountryTotals.slice(0, Math.max(1, Math.ceil(sortedCountryTotals.length * 0.3))).map(x => x[0]));

                // -- Single pass: build sender/receiver network + collect dates/dest-country sets --
                const edgeMap = {}, senderTotals = {}, receiverTotals = {};
                list.forEach(c => {
                    const s = (c.shipper || 'Unknown').trim() || 'Unknown';
                    const r = (c.receiver || 'Unknown').trim() || 'Unknown';
                    const w = parseFloat(c.weight || 0);
                    const destCode = (c.dest || '').toUpperCase();
                    const dateStr = c.date || '';

                    const ekey = s + '|||' + r;
                    if (!edgeMap[ekey]) edgeMap[ekey] = { sender: s, receiver: r, weight: 0, count: 0 };
                    edgeMap[ekey].weight += w; edgeMap[ekey].count += 1;

                    if (!senderTotals[s]) senderTotals[s] = { name: s, weight: 0, count: 0, receivers: new Set(), destSet: new Set(), dates: [] };
                    senderTotals[s].weight += w; senderTotals[s].count += 1;
                    senderTotals[s].receivers.add(r); senderTotals[s].destSet.add(destCode); senderTotals[s].dates.push(dateStr);

                    if (!receiverTotals[r]) receiverTotals[r] = { name: r, weight: 0, count: 0, senders: new Set(), destSet: new Set(), dates: [] };
                    receiverTotals[r].weight += w; receiverTotals[r].count += 1;
                    receiverTotals[r].senders.add(s); receiverTotals[r].destSet.add(destCode); receiverTotals[r].dates.push(dateStr);
                });
                const edges = Object.values(edgeMap);
                const senderNodes = Object.values(senderTotals).map(s => ({ ...s, reach: s.receivers.size }));
                const receiverNodes = Object.values(receiverTotals).map(r => ({ ...r, reach: r.senders.size }));
                const hubSenders = senderNodes.filter(s => s.reach > 1).sort((a, b) => b.reach - a.reach || b.weight - a.weight);
                const hubReceivers = receiverNodes.filter(r => r.reach > 1).sort((a, b) => b.reach - a.reach || b.weight - a.weight);
                const topSenderNodes = [...senderNodes].sort((a, b) => b.weight - a.weight).slice(0, 15);
                const topReceiverNodes = [...receiverNodes].sort((a, b) => b.weight - a.weight).slice(0, 15);
                const topSenderNameSet = new Set(topSenderNodes.map(s => s.name));
                const topReceiverNameSet = new Set(topReceiverNodes.map(r => r.name));
                const networkEdges = edges.filter(e => topSenderNameSet.has(e.sender) && topReceiverNameSet.has(e.receiver));

                // -- Alias / same-address-different-name detection (keyed by GPS when available, else address text) --
                const buildAliasGroups = (nameFn, addrFn, latFn, lngFn) => {
                    const groups = {};
                    list.forEach(c => {
                        const lat = latFn(c), lng = lngFn(c);
                        const addr = (addrFn(c) || '').trim();
                        const key = (lat != null && lng != null) ? `${lat.toFixed(3)},${lng.toFixed(3)}` : addr.toUpperCase();
                        if (!key) return;
                        if (!groups[key]) groups[key] = { key, addr: addr || '-', lat, lng, names: new Set(), cases: [] };
                        const nm = (nameFn(c) || 'Unknown').trim() || 'Unknown';
                        groups[key].names.add(nm);
                        groups[key].cases.push({ hwb: c.hwb, name: nm, date: c.date || '', weight: parseFloat(c.weight || 0) });
                    });
                    return Object.values(groups)
                        .filter(g => g.names.size > 1)
                        .map(g => ({ ...g, names: Array.from(g.names), count: g.cases.length, weight: g.cases.reduce((s, x) => s + x.weight, 0) }))
                        .sort((a, b) => b.names.length - a.names.length || b.weight - a.weight);
                };
                const senderAliasGroups = buildAliasGroups(c => c.shipper, c => c.shipperAddr, c => c.originLat, c => c.originLng);
                const receiverAliasGroups = buildAliasGroups(c => c.receiver, c => c.receiverAddr, c => c.destLat, c => c.destLng);
                const aliasFlaggedSenderNames = new Set(senderAliasGroups.flatMap(g => g.names));
                const aliasFlaggedReceiverNames = new Set(receiverAliasGroups.flatMap(g => g.names));

                // -- Risk scoring: 40% weight-share + 25% frequency-share + 20% alias flag + 15% high-risk destination --
                const maxSenderWeight = Math.max(1, ...senderNodes.map(s => s.weight));
                const maxSenderCount = Math.max(1, ...senderNodes.map(s => s.count));
                const maxReceiverWeight = Math.max(1, ...receiverNodes.map(r => r.weight));
                const maxReceiverCount = Math.max(1, ...receiverNodes.map(r => r.count));
                const scoreEntity = (node, isAlias, isHighRiskDest, maxW, maxC) => {
                    const wScore = 40 * (node.weight / maxW);
                    const cScore = 25 * (node.count / maxC);
                    const aScore = isAlias ? 20 : 0;
                    const dScore = isHighRiskDest ? 15 : 0;
                    const reasons = [];
                    if (wScore >= 20) reasons.push('น้ำหนักสะสมสูง');
                    if (cScore >= 12) reasons.push('ส่งถี่/หลายเคส');
                    if (isAlias) reasons.push('ที่อยู่ซ้ำ/นามแฝง');
                    if (isHighRiskDest) reasons.push('ปลายทางกลุ่มเสี่ยงสูง');
                    return { score: Math.min(100, Math.round(wScore + cScore + aScore + dScore)), reasons };
                };
                const riskSenders = senderNodes.map(s => {
                    const isAlias = aliasFlaggedSenderNames.has(s.name);
                    const isHighRiskDest = [...s.destSet].some(d => highRiskCountrySet.has(d));
                    const { score, reasons } = scoreEntity(s, isAlias, isHighRiskDest, maxSenderWeight, maxSenderCount);
                    return { name: s.name, weight: s.weight, count: s.count, reach: s.reach, score, reasons };
                }).sort((a, b) => b.score - a.score);
                const riskReceivers = receiverNodes.map(r => {
                    const isAlias = aliasFlaggedReceiverNames.has(r.name);
                    const isHighRiskDest = [...r.destSet].some(d => highRiskCountrySet.has(d));
                    const { score, reasons } = scoreEntity(r, isAlias, isHighRiskDest, maxReceiverWeight, maxReceiverCount);
                    return { name: r.name, weight: r.weight, count: r.count, reach: r.reach, score, reasons };
                }).sort((a, b) => b.score - a.score);

                // -- Burst / regular-cycle pattern detection (entities with 2+ cases) --
                const analyzePattern = (entity) => {
                    const sortedDates = [...entity.dates].filter(Boolean).sort();
                    if (sortedDates.length < 2) return { hasBurst: false, isRegular: false, avgGapDays: null };
                    const gaps = [];
                    for (let i = 1; i < sortedDates.length; i++) {
                        const diffDays = Math.round((new Date(sortedDates[i]) - new Date(sortedDates[i - 1])) / 86400000);
                        gaps.push(diffDays);
                    }
                    const avgGap = gaps.reduce((a, b) => a + b, 0) / gaps.length;
                    const variance = gaps.reduce((a, b) => a + Math.pow(b - avgGap, 2), 0) / gaps.length;
                    const stdDev = Math.sqrt(variance);
                    const hasBurst = gaps.some(g => g <= 2);
                    const isRegular = avgGap >= 3 && (stdDev / (avgGap || 1)) < 0.35;
                    return { hasBurst, isRegular, avgGapDays: Math.round(avgGap * 10) / 10, firstDate: sortedDates[0], lastDate: sortedDates[sortedDates.length - 1] };
                };
                const patternSenders = senderNodes.filter(s => s.count >= 2)
                    .map(s => ({ name: s.name, count: s.count, weight: s.weight, ...analyzePattern(s) }))
                    .filter(s => s.hasBurst || s.isRegular)
                    .sort((a, b) => (b.hasBurst - a.hasBurst) || (b.weight - a.weight));
                const patternReceivers = receiverNodes.filter(r => r.count >= 2)
                    .map(r => ({ name: r.name, count: r.count, weight: r.weight, ...analyzePattern(r) }))
                    .filter(r => r.hasBurst || r.isRegular)
                    .sort((a, b) => (b.hasBurst - a.hasBurst) || (b.weight - a.weight));

                return {
                    networkEdges, topSenderNodes, topReceiverNodes, hubSenders, hubReceivers,
                    senderAliasGroups, receiverAliasGroups,
                    riskSenders, riskReceivers,
                    patternSenders, patternReceivers,
                    corridors, highRiskCountries: Array.from(highRiskCountrySet)
                };
            }, [filteredData]);

            const originReportData = useMemo(() => {
                const filtered = selectedProvince === 'ALL' ? filteredData : (filteredData || []).filter(d => { let c = (d.shipperCity||'').toUpperCase(); if(c.includes('BANGKOK')) c='BANGKOK'; if(c.includes('SAMUT')) c='SAMUTPRAKARN'; return c === selectedProvince; });
                return { data: filtered, count: filtered.length, weight: filtered.reduce((acc, c) => acc + parseFloat(c.weight||0), 0).toFixed(2) };
            }, [filteredData, selectedProvince]);

            const destReportData = useMemo(() => {
                const filtered = selectedCountry === 'ALL' ? filteredData : (filteredData || []).filter(d => d.dest === selectedCountry);
                return { data: filtered, count: filtered.length, weight: filtered.reduce((acc, c) => acc + parseFloat(c.weight||0), 0).toFixed(2) };
            }, [filteredData, selectedCountry]);

            const missingWeightCount = useMemo(() => (filteredData || []).filter(d => !d.weight || parseFloat(d.weight) === 0).length, [filteredData]);

            const dataQuality = useMemo(() => {
                const list = filteredData || [];
                const total = list.length;
                let missingShipper = 0, missingReceiver = 0, missingShipperAddr = 0, missingReceiverAddr = 0, missingDate = 0, cleanCount = 0, nonWeightIssueCount = 0;
                list.forEach(d => {
                    let issues = 0, nonWeightIssues = 0;
                    if (!d.shipper || d.shipper === 'Unknown') { missingShipper++; issues++; nonWeightIssues++; }
                    if (!d.receiver || d.receiver === 'Unknown') { missingReceiver++; issues++; nonWeightIssues++; }
                    if (!d.shipperAddr || d.shipperAddr.trim() === '') { missingShipperAddr++; issues++; nonWeightIssues++; }
                    if (!d.receiverAddr || d.receiverAddr.trim() === '') { missingReceiverAddr++; issues++; nonWeightIssues++; }
                    if (!d.date) { missingDate++; issues++; nonWeightIssues++; }
                    if (!d.weight || parseFloat(d.weight) === 0) { issues++; }
                    if (issues === 0) cleanCount++;
                    if (nonWeightIssues > 0) nonWeightIssueCount++;
                });
                const qualityScore = total > 0 ? Math.round((cleanCount / total) * 100) : 100;
                return { total, missingShipper, missingReceiver, missingShipperAddr, missingReceiverAddr, missingDate, cleanCount, qualityScore, nonWeightIssueCount };
            }, [filteredData]);

            // Period-over-period comparison: only meaningful when a specific date range is selected —
            // compares against the immediately preceding period of equal length.
            const comparisonStats = useMemo(() => {
                if (!dateRange.start || !dateRange.end) return null;
                const start = new Date(dateRange.start);
                const end = new Date(dateRange.end);
                if (isNaN(start) || isNaN(end) || end < start) return null;
                const rangeDays = Math.round((end - start) / 86400000) + 1;
                const prevEnd = new Date(start); prevEnd.setDate(start.getDate() - 1);
                const prevStart = new Date(prevEnd); prevStart.setDate(prevEnd.getDate() - rangeDays + 1);
                const fmt = (d) => d.toISOString().slice(0, 10);
                const prevStartStr = fmt(prevStart), prevEndStr = fmt(prevEnd);
                const prevData = (data || []).filter(d => {
                    const dt = (d.date || '').toString().split(' ')[0];
                    return dt && dt >= prevStartStr && dt <= prevEndStr;
                });
                const prevWeight = prevData.reduce((a, c) => a + parseFloat(c.weight || 0), 0);
                const prevCount = prevData.length;
                const curWeight = parseFloat(stats.totalWeight);
                const weightChange = prevWeight > 0 ? ((curWeight - prevWeight) / prevWeight * 100) : null;
                const countChange = prevCount > 0 ? ((stats.totalShipments - prevCount) / prevCount * 100) : null;
                return { prevWeight, prevCount, weightChange, countChange, prevStartStr, prevEndStr };
            }, [data, dateRange, stats.totalWeight, stats.totalShipments]);

            const executiveSummary = useMemo(() => {
                const periodLabel = (dateRange.start || dateRange.end)
                    ? `ช่วงวันที่ ${dateRange.start || '(ไม่ระบุ)'} ถึง ${dateRange.end || '(ไม่ระบุ)'}`
                    : 'ข้อมูลทั้งหมดในระบบ ณ ปัจจุบัน';
                const topOrigin = stats.topOriginData && stats.topOriginData[0] ? stats.topOriginData[0].name : null;
                const topDest = stats.topCountryCode && stats.topCountryCode !== '-' ? stats.topCountryCode : null;
                const topCorridor = crimeAnalytics.corridors && crimeAnalytics.corridors[0];
                const topRiskSender = crimeAnalytics.riskSenders && crimeAnalytics.riskSenders[0];

                let text = `สรุปสถานการณ์การลักลอบส่งออกช่อดอกกัญชาผ่านขนส่งเอกชน จังหวัดสมุทรปราการ สำหรับ${periodLabel} พบการตรวจยึดทั้งหมด ${stats.totalShipments} เคส น้ำหนักรวม ${stats.totalWeight} กิโลกรัม`;
                if (comparisonStats && comparisonStats.weightChange != null && Math.abs(comparisonStats.weightChange) >= 1) {
                    const dir = comparisonStats.weightChange > 0 ? 'เพิ่มขึ้น' : 'ลดลง';
                    text += ` ${dir} ${Math.abs(comparisonStats.weightChange).toFixed(0)}% เมื่อเทียบกับช่วงเวลาก่อนหน้าที่มีความยาวเท่ากัน`;
                }
                text += '. ';
                if (topOrigin) text += `พื้นที่ต้นทางที่พบมากที่สุดคือ ${topOrigin} `;
                if (topDest) text += `และปลายทางที่พบมากที่สุดคือรหัสประเทศ ${topDest}. `;
                if (topCorridor) text += `เส้นทางที่มีความเสี่ยงสูงสุดคือ ${topCorridor.origin} → ${topCorridor.dest} คิดเป็นสัดส่วน ${topCorridor.share.toFixed(1)}% ของน้ำหนักรวมทั้งหมด. `;
                if (topRiskSender) text += `ผู้ส่งที่มีคะแนนความเสี่ยงสูงสุดคือ "${topRiskSender.name}" (คะแนนความเสี่ยง ${topRiskSender.score}/100). `;
                if (stats.needsReviewCount > 0) text += `มีเคสที่น้ำหนักยังไม่ชัดเจนต้องตรวจสอบเพิ่มเติม ${stats.needsReviewCount} เคส. `;
                if (watchlistMatchCountFiltered > 0) text += `พบเคสที่ตรงกับบัญชีเฝ้าระวัง ${watchlistMatchCountFiltered} เคส ควรติดตามอย่างใกล้ชิด. `;
                return text.trim();
            }, [stats, crimeAnalytics, comparisonStats, dateRange, watchlistMatchCountFiltered]);

            const updateWeight = (idx, newWeightStr) => {
                const val = parseFloat(newWeightStr);
                if (isNaN(val) || val < 0) return; // ignore invalid/empty input — leave the case flagged for now
                setData(prevData => {
                    const newData = [...prevData];
                    newData[idx] = { ...newData[idx], weight: val, needsReview: false, weightSource: 'กรอกด้วยมือ (แก้ไขแล้ว)' };
                    return newData;
                });
            };

            const updateStatus = (idx, newStatus) => {
                if (idx < 0) return;
                setData(prevData => {
                    const newData = [...prevData];
                    newData[idx] = { ...newData[idx], status: newStatus };
                    return newData;
                });
            };

            // Shared by both CSV and Excel upload: maps raw parsed rows (array of plain objects with
            // courier-export column names) into our internal case shape, then merges (upsert by HWB).
            const processRows = (rawRows, fileName) => {
                const newDocs = (rawRows || []).map(row => {
                    const dateVal = getRegistrationDate(row);
                    const w = getWeight(row);
                    const [oLat, oLng] = lookupProvinceCoords(row['Shpr City'] || row['Shpr Province']);
                    const [dLat, dLng] = lookupCountryCoords(row['Dest Ctry']);
                    return {
                        hwb: row['HWB No'], origin: row['Orig Ctry']||'TH', dest: row['Dest Ctry'],
                        weight: w.weight, needsReview: w.needsReview, weightSource: w.source, desc: row['Description'],
                        shipperCity: row['Shpr City']||row['Shpr Province']||'Unknown',
                        shipper: row['Shipper Name']||row['Shipper']||'Unknown',
                        shipperAddr: [row['Shpr Addr 1'], row['Shpr Addr 2'], row['Shpr City']].filter(Boolean).join(', '),
                        receiver: row['Receiver Name']||'Unknown',
                        receiverCity: row['Rcvr City']||'Unknown',
                        receiverAddr: [row['Rcvr Addr 1'], row['Rcvr Addr 2'], row['Rcvr City']].filter(Boolean).join(', '),
                        date: dateVal,
                        originLat: oLat, originLng: oLng, destLat: dLat, destLng: dLng
                    };
                }).filter(r => r.hwb);

                // MERGE (upsert by HWB) instead of replacing the whole dataset.
                setData(prevData => {
                    const merged = [...prevData];
                    const indexByHwb = new Map(merged.map((r, i) => [String(r.hwb).trim(), i]));
                    let added = 0, updated = 0;
                    newDocs.forEach(doc => {
                        const key = String(doc.hwb).trim();
                        if (indexByHwb.has(key)) {
                            merged[indexByHwb.get(key)] = { ...merged[indexByHwb.get(key)], ...doc };
                            updated++;
                        } else {
                            merged.push(doc);
                            indexByHwb.set(key, merged.length - 1);
                            added++;
                        }
                    });
                    const flagged = newDocs.filter(d => d.needsReview).length;
                    setUploadSummary({ added, updated, total: newDocs.length, flagged, fileName });
                    return merged;
                });
                setFileStatus({ loaded: true });
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    Papa.parse(file, {
                        header: true, skipEmptyLines: true,
                        complete: (results) => {
                            processRows(results.data, file.name);
                            e.target.value = ''; // allow re-selecting the same file later
                        }
                    });
                }
            };

            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'array', cellDates: true });
                        const firstSheet = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
                        processRows(rows, file.name);
                    } catch (err) {
                        alert('ไม่สามารถอ่านไฟล์ Excel นี้ได้ กรุณาตรวจสอบว่าเป็นไฟล์ .xlsx/.xls ที่ถูกต้อง');
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            };

            const clearAllData = () => {
                if (window.confirm('ยืนยันลบข้อมูลทั้งหมดในระบบ? การกระทำนี้ไม่สามารถย้อนกลับได้ (แนะนำให้ Export JSON สำรองไว้ก่อน)')) {
                    setData([]);
                    setFileStatus({ loaded: false });
                    setUploadSummary(null);
                }
            };

            const exportJSON = () => {
                const backup = { version: 2, cases: data, watchlist };
                const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const ts = new Date().toISOString().slice(0,10);
                a.href = url; a.download = `CIU_backup_${ts}.json`; a.click();
                URL.revokeObjectURL(url);
                setIsDirty(false);
            };

            const exportCSV = () => {
                const csv = Papa.unparse(filteredData || []);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const ts = new Date().toISOString().slice(0,10);
                const rangeLabel = (dateRange.start || dateRange.end) ? `_${dateRange.start || 'start'}_to_${dateRange.end || 'end'}` : '';
                a.href = url; a.download = `CIU_case_data${rangeLabel}_${ts}.csv`; a.click();
                URL.revokeObjectURL(url);
            };

            const importJSONBackup = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const parsed = JSON.parse(evt.target.result);
                        // Accept both the new bundled format ({ cases, watchlist }) and older
                        // plain-array backups exported before the watchlist feature existed.
                        const restoredCases = Array.isArray(parsed) ? parsed : parsed.cases;
                        const restoredWatchlist = Array.isArray(parsed) ? [] : (parsed.watchlist || []);
                        if (!Array.isArray(restoredCases)) throw new Error('Invalid backup format');
                        setData(restoredCases);
                        setWatchlist(restoredWatchlist);
                        setFileStatus({ loaded: true });
                        setUploadSummary({ added: restoredCases.length, updated: 0, total: restoredCases.length, flagged: restoredCases.filter(d => d.needsReview).length, fileName: file.name, isRestore: true });
                        setIsDirty(false);
                    } catch (err) {
                        alert('ไม่สามารถโหลดไฟล์สำรองนี้ได้ กรุณาตรวจสอบว่าเป็นไฟล์ JSON ที่ Export จากระบบนี้');
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const generateCaseDossier = (caseItem) => {
                const container = document.createElement('div');
                container.style.position = 'fixed';
                container.style.top = '-9999px';
                container.style.left = '-9999px';
                container.style.width = '794px';
                container.style.background = '#fff';
                container.style.fontFamily = "'Sarabun', sans-serif";
                container.style.padding = '48px';
                container.style.color = '#1e293b';
                const statusColor = { 'รอตรวจสอบ': '#64748b', 'อยู่ระหว่างสอบสวน': '#d97706', 'ส่งดำเนินคดี': '#e11d48', 'ปิดเคส': '#059669' }[caseItem.status || 'รอตรวจสอบ'] || '#64748b';
                container.innerHTML = `
                    <div style="border-bottom:3px solid #4f46e5; padding-bottom:16px; margin-bottom:24px; display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <div style="font-size:12px; color:#64748b; font-weight:600; letter-spacing:0.05em;">CANNABIS INTERDICTION UNIT (C.I.U.)</div>
                            <div style="font-size:20px; font-weight:800; color:#312e81; margin-top:4px;">ใบสรุปข้อมูลเคสตรวจยึด</div>
                            <div style="font-size:12px; color:#94a3b8; margin-top:2px;">สำนักงานสาธารณสุขจังหวัดสมุทรปราการ</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:11px; color:#94a3b8;">เลขที่เอกสาร</div>
                            <div style="font-size:16px; font-weight:800; color:#4f46e5; font-family:monospace;">${caseItem.hwb || '-'}</div>
                            <div style="display:inline-block; margin-top:6px; padding:4px 10px; border-radius:8px; font-size:11px; font-weight:700; color:#fff; background:${statusColor};">${caseItem.status || 'รอตรวจสอบ'}</div>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:20px;">
                        <div style="border:1px solid #e2e8f0; border-radius:12px; padding:16px;">
                            <div style="font-size:11px; font-weight:700; color:#4f46e5; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px; border-left:3px solid #4f46e5; padding-left:8px;">ข้อมูลผู้ส่ง (Shipper)</div>
                            <div style="font-size:14px; font-weight:700;">${caseItem.shipper || 'Unknown'}</div>
                            <div style="font-size:12px; color:#64748b; margin-top:4px;">${caseItem.shipperAddr || '-'}</div>
                            <div style="font-size:12px; color:#64748b;">${caseItem.shipperCity || '-'}</div>
                            ${caseItem.originLat && caseItem.originLng ? `<div style="font-size:11px; color:#94a3b8; margin-top:6px; font-family:monospace;">GPS: ${caseItem.originLat}, ${caseItem.originLng}</div>` : ''}
                        </div>
                        <div style="border:1px solid #e2e8f0; border-radius:12px; padding:16px;">
                            <div style="font-size:11px; font-weight:700; color:#059669; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px; border-left:3px solid #059669; padding-left:8px;">ข้อมูลผู้รับ (Receiver)</div>
