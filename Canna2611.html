                                <SectionHeader number="03" title="Risk Rankings (Top 10)" />
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-6 rounded-xl shadow-soft border border-slate-200"><h3 className="text-sm font-bold text-brand-800 mb-4 uppercase tracking-wider pl-3 border-l-4 border-amber-500">Top 10 Destinations</h3><div className="h-96"><ResponsiveContainer><BarChart data={stats.topDestData} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" horizontal={true} vertical={false} /><XAxis type="number" stroke="#64748b" fontSize={11} axisLine={false} tickLine={false} /><YAxis dataKey="name" type="category" width={40} stroke="#64748b" fontSize={12} axisLine={false} tickLine={false} /><Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{backgroundColor:'#fff', border:'1px solid #e2e8f0', borderRadius:'8px'}} /><Bar dataKey="count" fill="#f59e0b" radius={[0,4,4,0]} barSize={20} /></BarChart></ResponsiveContainer></div></div>
                                    <div className="bg-white p-6 rounded-xl shadow-soft border border-slate-200"><h3 className="text-sm font-bold text-brand-800 mb-4 uppercase tracking-wider pl-3 border-l-4 border-rose-500">Top 10 Origins</h3><div className="h-96"><ResponsiveContainer><BarChart data={stats.topOriginData} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" horizontal={true} vertical={false} /><XAxis type="number" stroke="#64748b" fontSize={11} axisLine={false} tickLine={false} /><YAxis dataKey="name" type="category" width={80} stroke="#64748b" fontSize={11} axisLine={false} tickLine={false} /><Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{backgroundColor:'#fff', border:'1px solid #e2e8f0', borderRadius:'8px'}} /><Bar dataKey="count" fill="#f43f5e" radius={[0,4,4,0]} barSize={20} /></BarChart></ResponsiveContainer></div></div>
                                </div>
                                <SectionHeader number="04" title="Top 20 ผู้ต้องสงสัยรายบุคคล (เลือกเรียงตามน้ำหนัก/จำนวนเคสได้)" />
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <TopEntityTable
                                        title="Top 20 ผู้ส่ง (Senders)"
                                        subtitle="คลิกที่อยู่หรือปุ่มดูพิกัดเพื่อเปิด Google Maps ทันที · กด ▼ เพื่อดูที่อยู่ทุกเคสของบุคคลนี้"
                                        entities={stats.allSenders}
                                        accent="rose"
                                        role="sender"
                                    />
                                    <TopEntityTable
                                        title="Top 20 ผู้รับ (Receivers)"
                                        subtitle="คลิกที่อยู่หรือปุ่มดูพิกัดเพื่อเปิด Google Maps ทันที · กด ▼ เพื่อดูที่อยู่ทุกเคสของบุคคลนี้"
                                        entities={stats.allReceivers}
                                        accent="brand"
                                        role="receiver"
                                    />
                                </div>
                            </div>
                        )}

                        {activeTab === 'case_data' && (
                            <div className="space-y-6 animate-fade-in"><SectionHeader number="02" title="Case Data Management" /><CaseDataTable data={filteredData} allData={data} onEdit={setEditingIndex} onDelete={(idx) => { const newData = [...data]; newData.splice(idx, 1); setData(newData); }} onUpdateStatus={updateStatus} onGenerateDossier={generateCaseDossier} /></div>
                        )}

                        {activeTab === 'origin_report' && (
                            <div className="space-y-6 animate-fade-in">
                                <SectionHeader number="03" title="Origin Intelligence" />
                                <div className="bg-white p-8 rounded-xl shadow-soft border border-slate-200 mb-8">
                                    <div className="flex justify-between items-center mb-8"><h2 className="text-xl font-bold text-brand-800">Origin Summary Report</h2><div className="w-72"><select value={selectedProvince} onChange={e => setSelectedProvince(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 focus:ring-2 focus:ring-brand-500 outline-none transition">{stats.provincesList.map(p => <option key={p} value={p}>{p}</option>)}</select></div></div>
                                    <div className="grid grid-cols-2 gap-6 mb-8"><div className="p-6 bg-rose-50 rounded-xl border border-rose-100 text-center"><h3 className="text-4xl font-extrabold text-rose-600">{originReportData.count}</h3><p className="text-xs font-bold text-rose-400 uppercase mt-2 tracking-widest">Total Cases</p></div><div className="p-6 bg-rose-50 rounded-xl border border-rose-100 text-center"><h3 className="text-4xl font-extrabold text-rose-600">{originReportData.weight}</h3><p className="text-xs font-bold text-rose-400 uppercase mt-2 tracking-widest">Total Weight (Kg)</p></div></div>
                                    <ReportTable data={originReportData.data} type="origin" />
                                </div>
                            </div>
                        )}

                        {activeTab === 'origin' && (
                            <div className="space-y-6 animate-fade-in"><SectionHeader number="04" title="Geospatial: Origin Clusters" /><div className="h-[75vh] bg-white rounded-xl border border-slate-200 shadow-soft p-1"><LeafletMap center={[13.7563, 100.5018]} zoom={6} markers={stats.provinceMapData} color="red" /></div></div>
                        )}

                        {activeTab === 'dest_report' && (
                            <div className="space-y-6 animate-fade-in">
                                <SectionHeader number="05" title="Destination Intelligence" />
                                <div className="bg-white p-8 rounded-xl shadow-soft border border-slate-200 mb-8">
                                    <div className="flex justify-between items-center mb-8"><h2 className="text-xl font-bold text-brand-800">Destination Summary Report</h2><div className="w-72"><select value={selectedCountry} onChange={e => setSelectedCountry(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 focus:ring-2 focus:ring-brand-500 outline-none transition">{stats.countriesList.map(c => <option key={c} value={c}>{c}</option>)}</select></div></div>
                                    <div className="grid grid-cols-2 gap-6 mb-8"><div className="p-6 bg-amber-50 rounded-xl border border-amber-100 text-center"><h3 className="text-4xl font-extrabold text-amber-600">{destReportData.count}</h3><p className="text-xs font-bold text-amber-400 uppercase mt-2 tracking-widest">Total Cases</p></div><div className="p-6 bg-amber-50 rounded-xl border border-amber-100 text-center"><h3 className="text-4xl font-extrabold text-amber-600">{destReportData.weight}</h3><p className="text-xs font-bold text-amber-400 uppercase mt-2 tracking-widest">Total Weight (Kg)</p></div></div>
                                    <ReportTable data={destReportData.data} type="dest" />
                                </div>
                            </div>
                        )}

                        {activeTab === 'dest' && (
                            <div className="space-y-6 animate-fade-in"><SectionHeader number="06" title="Geospatial: Destination Clusters" /><div className="h-[75vh] bg-white rounded-xl border border-slate-200 shadow-soft p-1"><LeafletMap center={[20, 0]} zoom={2} markers={stats.countryMapData} color="orange" /></div></div>
                        )}

                        {activeTab === 'fix_weight' && (
                            <div className="space-y-6 animate-fade-in">
                                <SectionHeader number="07" title="คุณภาพข้อมูล & Fix Weight" />
                                <DataQualityPanel quality={dataQuality} />
                                <MissingWeightPage data={filteredData} allData={data} onUpdateWeight={updateWeight} onOpenFull={setEditingIndex} />
                            </div>
                        )}

                        {activeTab === 'crime' && (
                            <div className="space-y-6 animate-fade-in">
                                <SectionHeader number="08" title="วิเคราะห์เชิงอาชญวิทยา (Crime Analytics)" />
                                <CrimeAnalyticsPage analytics={crimeAnalytics} />
                            </div>
                        )}

                        {activeTab === 'watchlist' && (
                            <div className="space-y-6 animate-fade-in">
                                <SectionHeader number="09" title="บัญชีเฝ้าระวัง (Watchlist)" />
                                <WatchlistPage data={filteredData} allData={data} watchlist={watchlist} onAdd={addToWatchlist} onRemove={removeFromWatchlist} onOpenFull={setEditingIndex} />
                            </div>
                        )}
                    </main>
                    <footer className="bg-white border-t border-slate-200 text-slate-500 text-center py-8 text-xs"><p className="font-semibold text-slate-700 mb-1">&copy; 2026 Cannabis Interdiction Unit (C.I.U.) Samut Prakan</p><p>System Developed by Pharm. Jeerapat Plaingam</p></footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
