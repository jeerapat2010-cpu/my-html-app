// ==========================================
// 🎵 Sound Effects System
// ==========================================
const playSound = (type) => {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.connect(gainNode); gainNode.connect(ctx.destination);

    if (type === 'success') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'error') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(250, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start(); osc.stop(ctx.currentTime + 0.2);
    } else if (type === 'pop') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      osc.start(); osc.stop(ctx.currentTime + 0.1);
    } else if (type === 'splash') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      osc.start(); osc.stop(ctx.currentTime + 0.1);
    } else if (type === 'slice') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(1200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } else if (type === 'fanfare') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.setValueAtTime(554.37, ctx.currentTime + 0.2);
      osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.4);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.6);
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.0);
      osc.start(); osc.stop(ctx.currentTime + 1.0);
    }
  } catch (e) {}
};

const JellyButton = ({ children, onClick, color="green", className="", disabled=false }) => {
  const colorMap = {
    green: "bg-gradient-to-b from-green-300 to-green-500 border-green-600 text-white shadow-[0_6px_0_rgb(5,150,105)]",
    pink: "bg-gradient-to-b from-pink-300 to-pink-500 border-pink-600 text-white shadow-[0_6px_0_rgb(219,39,119)]",
    blue: "bg-gradient-to-b from-sky-300 to-sky-500 border-sky-600 text-white shadow-[0_6px_0_rgb(2,132,199)]",
    yellow: "bg-gradient-to-b from-yellow-200 to-yellow-400 border-yellow-500 text-yellow-900 shadow-[0_6px_0_rgb(202,138,4)]",
    white: "bg-white border-gray-200 text-gray-700 shadow-[0_6px_0_rgb(209,213,219)]",
    orange: "bg-gradient-to-b from-orange-400 to-orange-600 border-orange-700 text-white shadow-[0_6px_0_rgb(194,65,12)]"
  };
  return (
    <button 
      disabled={disabled}
      onClick={() => { if(!disabled){ playSound('pop'); onClick(); } }} 
      className={`relative w-full rounded-full border-4 font-black text-xl py-4 transition-all duration-100 ${disabled ? 'opacity-50 cursor-not-allowed grayscale' : 'hover:brightness-110 active:translate-y-[6px] active:shadow-none'} flex items-center justify-center gap-2 ${colorMap[color]} ${className}`}
    >
      {!disabled && <div className="absolute top-1 left-4 right-4 h-3 bg-white/30 rounded-full pointer-events-none"></div>}
      {children}
    </button>
  );
};

// ==========================================
// 🎮 Mini-Game 1: Catch Falling Herbs
// ==========================================
const CatchGame = ({ level, onComplete }) => {
  const containerRef = useRef(null);
  const requestRef = useRef();
  const basketX = useRef(50);
  const items = useRef([]);
  const caughtSet = useRef(new Set()); 
  const mistakesRef = useRef(0);
  
  const [uiBasketX, setUiBasketX] = useState(50);
  const [uiItems, setUiItems] = useState([]);
  const [inventory, setInventory] = useState([]);
  const [flashMsg, setFlashMsg] = useState({ text: '', type: '' });
  const [shake, setShake] = useState(false);

  const spawnPool = useRef([...level.requiredHerbs, ...level.decoys, 'honey', 'lime'].map(id => HERBS_DB[id] || HERBS_DB['plai']));

  const showFeedback = (text, type) => {
    setFlashMsg({ text, type });
    if(type === 'error') {
       playSound('error');
       setShake(true); setTimeout(() => setShake(false), 300);
    } else if (type === 'success') { playSound('success'); }
    setTimeout(() => setFlashMsg({ text: '', type: '' }), 1000);
  };

  const gameLoop = useCallback(() => {
    if (Math.random() < 0.04 && items.current.length < 5) {
      const randomHerb = spawnPool.current[Math.floor(Math.random() * spawnPool.current.length)];
      items.current.push({
        uid: Math.random().toString(36), herb: randomHerb,
        x: 10 + Math.random() * 80, y: -10, speed: 1.5 + Math.random() * 2,
        rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 6
      });
    }

    const basketArea = { left: basketX.current - 16, right: basketX.current + 16, yThreshold: 75 }; 
    let newInventory = [...inventory];
    let newlyCaught = false;

    items.current = items.current.filter(item => {
      item.y += item.speed; item.rot += item.rotSpeed;
      if (item.y > basketArea.yThreshold && item.y < 95) {
        if (item.x > basketArea.left && item.x < basketArea.right) {
          if (item.herb.isDecoy) {
             mistakesRef.current += 1;
             showFeedback("ว้าย! ผิดสูตรน้า~ 💥 (-150pt)", "error");
          }
          else if (level.requiredHerbs.includes(item.herb.id)) {
            if (!caughtSet.current.has(item.herb.id)) {
              caughtSet.current.add(item.herb.id);
              newInventory.push(item.herb.id); newlyCaught = true;
              showFeedback(`เก็บ ${item.herb.name} ได้แล้ว! ✨`, "success");
            } else {
               mistakesRef.current += 1;
               showFeedback("อันนี้มีแล้วน้า (-150pt)", "warning");
            }
          } else {
             mistakesRef.current += 1;
             showFeedback("อันนี้ไม่ได้ใช้จ้า (-150pt)", "error");
          }
          return false; 
        }
      }
      return item.y < 110; 
    });

    if (newlyCaught) setInventory(newInventory);
    setUiItems([...items.current]); setUiBasketX(basketX.current);

    if (caughtSet.current.size === level.requiredHerbs.length) {
       setTimeout(() => onComplete(newInventory, mistakesRef.current), 1000); return; 
    }
    requestRef.current = requestAnimationFrame(gameLoop);
  }, [inventory, level, onComplete]);

  useEffect(() => {
    requestRef.current = requestAnimationFrame(gameLoop);
    return () => cancelAnimationFrame(requestRef.current);
  }, [gameLoop]);

  const handleMove = (clientX) => {
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    basketX.current = Math.max(10, Math.min(90, ((clientX - rect.left) / rect.width) * 100));
  };

  return (
    <div ref={containerRef} className={`flex-1 relative overflow-hidden select-none touch-none ${shake ? 'animate-[shake_0.2s_ease-in-out_infinite]' : ''}`} onTouchMove={(e) => handleMove(e.touches[0].clientX)} onMouseMove={(e) => { if(e.buttons === 1) handleMove(e.clientX); }} onMouseDown={(e) => handleMove(e.clientX)}>
      <div className="absolute inset-0 bg-sky-200/50" style={{backgroundImage: 'radial-gradient(#ffffff 20%, transparent 20%)', backgroundSize: '30px 30px', opacity: 0.5}}></div>
      <div className="absolute top-6 left-0 w-full z-20 px-6">
        <div className="bg-white/90 backdrop-blur-md rounded-[2rem] p-4 border-4 border-white shadow-xl">
          <span className="text-sm font-black text-sky-500 block mb-2 text-center">🎯 ตามหาสมุนไพร ({inventory.length}/{level.requiredHerbs.length})</span>
          <div className="flex gap-4 justify-center">
            {level.requiredHerbs.map(id => (
              <div key={id} className={`w-14 h-14 rounded-2xl border-4 flex items-center justify-center transition-all ${inventory.includes(id) ? 'border-green-400 bg-green-100 scale-110 shadow-lg' : 'border-sky-100 bg-sky-50 grayscale opacity-40'}`}>
                <div className="w-10 h-10">{HERBS_DB[id]?.icon && React.createElement(HERBS_DB[id].icon)}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      {flashMsg.text && (
        <div className="absolute top-40 w-full flex justify-center z-30 pointer-events-none">
           <div className={`px-6 py-3 rounded-full border-4 text-base font-black shadow-2xl animate-[bounce_0.2s_infinite] ${flashMsg.type === 'error' ? 'bg-red-100 border-red-400 text-red-600' : flashMsg.type === 'success' ? 'bg-green-100 border-green-400 text-green-600' : 'bg-yellow-100 border-yellow-400 text-yellow-600'}`}>{flashMsg.text}</div>
        </div>
      )}
      {uiItems.map(item => (
        <div key={item.uid} className="absolute w-16 h-16 z-10 drop-shadow-xl" style={{ left: `${item.x}%`, top: `${item.y}%`, transform: `translateX(-50%) rotate(${item.rot}deg)` }}>
          {item.herb.icon && <item.herb.icon />}
        </div>
      ))}
      <div className="absolute bottom-10 w-48 h-24 z-20 transition-transform duration-75 ease-out" style={{ left: `${uiBasketX}%`, transform: 'translateX(-50%)' }}>
        <div className="absolute bottom-0 w-full h-12 bg-amber-400 rounded-b-[2rem] rounded-t-xl border-4 border-amber-600 shadow-[0_8px_0_rgb(180,83,9)] flex items-center justify-center overflow-hidden">
           <div className="w-full flex gap-2 px-4 justify-center">{inventory.map((id, i) => <div key={i} className="w-8 h-8 drop-shadow-md animate-[bounce_0.5s_ease-out]">{HERBS_DB[id]?.icon && React.createElement(HERBS_DB[id].icon)}</div>)}</div>
        </div>
        <div className="absolute -top-6 w-full text-center text-amber-700 font-black text-sm animate-pulse bg-white/70 px-4 py-1 rounded-full w-max left-1/2 -translate-x-1/2">👈 ลากรับของ 👉</div>
      </div>
    </div>
  );
};

// ==========================================
// 🎮 Mini-Game 2: Swipe to Chop
// ==========================================
const ChopGame = ({ inventory, onComplete }) => {
  const [progress, setProgress] = useState(0);
  const [herbIndex, setHerbIndex] = useState(0);
  const [slash, setSlash] = useState(null);
  const boardRef = useRef();
  const startPoint = useRef(null);

  const handleStart = (e) => {
     const touch = e.touches ? e.touches[0] : e;
     startPoint.current = { x: touch.clientX, y: touch.clientY };
  }

  const handleEnd = (e) => {
     if (!startPoint.current) return;
     const touch = e.changedTouches ? e.changedTouches[0] : e;
     const endPoint = { x: touch.clientX, y: touch.clientY };
     const dx = endPoint.x - startPoint.current.x;
     const dy = endPoint.y - startPoint.current.y;
     const distance = Math.sqrt(dx*dx + dy*dy);

     if (distance > 60) { 
        const angle = Math.atan2(dy, dx) * (180 / Math.PI);
        setSlash({ angle });
        playSound('slice');
        
        setTimeout(() => setSlash(null), 200);

        const newProg = progress + 20;
        setProgress(newProg);
        setHerbIndex((prev) => (prev + 1) % inventory.length);

        if (newProg >= 100) {
           playSound('success');
           setTimeout(onComplete, 600);
        }
     }
     startPoint.current = null;
  }

  const HerbIcon = HERBS_DB[inventory[herbIndex]]?.icon;

  return (
     <div 
        ref={boardRef}
        onMouseDown={handleStart} onMouseUp={handleEnd}
        onTouchStart={handleStart} onTouchEnd={handleEnd}
        className="flex-1 bg-amber-50 relative overflow-hidden select-none touch-none flex flex-col items-center justify-center"
     >
        <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/food.png')] opacity-10 pointer-events-none"></div>
        <div className="bg-white px-6 py-2 rounded-full shadow-sm text-amber-500 font-black mb-6 text-sm relative z-10 border-2 border-amber-100 pointer-events-none">Step 1: หั่นตัวยา 🔪</div>
        <h2 className="text-3xl font-black text-amber-800 mb-8 text-center bg-amber-200 px-8 py-3 rounded-3xl transform rotate-[-2deg] shadow-md relative z-10 pointer-events-none">
           ปัดนิ้วเพื่อหั่น!<br/><span className="text-amber-600 text-lg animate-pulse">Swipe อย่างรวดเร็ว!</span>
        </h2>
        
        <div className="w-64 h-64 bg-orange-300 rounded-[3rem] border-8 border-orange-400 flex items-center justify-center shadow-[0_15px_0_rgb(194,65,12)] relative overflow-hidden z-10 pointer-events-none">
           <div className="absolute inset-0 opacity-20" style={{backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 20px, #000 20px, #000 40px)'}}></div>
           
           <div className={`w-32 h-32 drop-shadow-2xl transition-transform ${slash ? 'scale-125 opacity-0 duration-200' : 'scale-100 duration-100'}`}>
              {HerbIcon && <HerbIcon />}
           </div>

           {slash && (
              <div 
                 className="absolute w-[150%] h-4 bg-white/90 shadow-[0_0_20px_#fff] rounded-full z-20"
                 style={{ transform: `rotate(${slash.angle}deg)` }}
              ></div>
           )}
        </div>
        
        <div className="w-full mt-12 px-8 relative z-10 pointer-events-none">
           <div className="h-6 bg-white rounded-full overflow-hidden border-4 border-orange-200 p-1 shadow-inner">
              <div className="h-full bg-gradient-to-r from-orange-400 to-amber-400 rounded-full transition-all duration-200" style={{ width: `${progress}%` }}></div>
           </div>
        </div>
     </div>
  );
}

// 🎮 Mini-Game 3: Timing Pound
// ==========================================
const PoundGame = ({ onComplete }) => {
  const [progress, setProgress] = useState(0);
  const [pointer, setPointer] = useState(50);
  const [feedback, setFeedback] = useState('');
  const requestRef = useRef();
  const timeRef = useRef(0);

  const animate = () => {
     timeRef.current += 0.05;
     const pos = 50 + Math.sin(timeRef.current) * 45; 
     setPointer(pos);
     requestRef.current = requestAnimationFrame(animate);
  };

  useEffect(() => {
     requestRef.current = requestAnimationFrame(animate);
     return () => cancelAnimationFrame(requestRef.current);
  }, []);

  const handlePound = () => {
     let score = 0;
     if (pointer >= 40 && pointer <= 60) {
        score = 25; setFeedback('Perfect! ✨'); playSound('success');
     } else if (pointer >= 20 && pointer <= 80) {
        score = 10; setFeedback('Good! 👍'); playSound('pop');
     } else {
        score = -5; setFeedback('Miss! ❌'); playSound('error');
     }

     setProgress(p => {
        const np = Math.min(100, Math.max(0, p + score));
        if (np >= 100) {
           playSound('success');
           setTimeout(onComplete, 600);
        }
        return np;
     });

     setTimeout(() => setFeedback(''), 500);
  };

  return (
     <div className="flex-1 bg-orange-50 relative flex flex-col items-center justify-center p-6 overflow-hidden select-none">
        <div className="bg-white px-6 py-2 rounded-full shadow-sm text-orange-500 font-black mb-6 text-sm z-10 border-2 border-orange-100">Step 2: สกัดตัวยา 🥣</div>
        <h2 className="text-3xl font-black text-orange-800 mb-8 text-center bg-orange-200 px-8 py-3 rounded-3xl transform rotate-[2deg] shadow-md z-10">
           กะจังหวะตำยา!<br/><span className="text-orange-600 text-lg">กดตอนขีดอยู่ตรงกลางสีเขียว</span>
        </h2>
        
        <div className="relative w-48 h-48 flex flex-col items-center justify-end z-10 mb-6">
           <span className={`absolute -top-12 text-[7rem] drop-shadow-xl transition-transform duration-75 ${feedback ? 'rotate-[10deg] translate-y-6' : 'rotate-[25deg]'}`}>🏏</span>
           <span className="text-[8rem] drop-shadow-lg relative z-10">🥣</span>
           {feedback && <div className="absolute -top-4 font-black text-2xl animate-bounce drop-shadow-md z-20 text-orange-600">{feedback}</div>}
        </div>

        <div className="w-full px-4 mb-8 z-10">
           <div className="relative h-10 bg-gray-200 rounded-full border-4 border-gray-300 overflow-hidden flex">
              <div className="w-1/5 h-full bg-red-400"></div>
              <div className="w-1/5 h-full bg-yellow-400"></div>
              <div className="w-1/5 h-full bg-green-500"></div>
              <div className="w-1/5 h-full bg-yellow-400"></div>
              <div className="w-1/5 h-full bg-red-400"></div>
              
              <div 
                 className="absolute top-0 bottom-0 w-2 bg-black shadow-[0_0_10px_#fff]"
                 style={{ left: `${pointer}%`, transform: 'translateX(-50%)' }}
              ></div>
           </div>
        </div>

        <div className="w-full z-10 mb-4">
           <JellyButton onClick={handlePound} color="orange" className="py-6 text-3xl">💥 ตำเลย! 💥</JellyButton>
        </div>

        <div className="w-full mt-4 px-8 z-10">
           <div className="h-6 bg-white rounded-full overflow-hidden border-4 border-orange-200 p-1 shadow-inner">
              <div className="h-full bg-gradient-to-r from-orange-500 to-red-400 rounded-full transition-all duration-200" style={{ width: `${progress}%` }}></div>
           </div>
        </div>
     </div>
  );
};

// ==========================================
// 🚀 Main Application
// ==========================================
function App() {
  const [phase, setPhase] = useState('menu'); 
  const [activeLevel, setActiveLevel] = useState(null);
  const [unlockedHerbs, setUnlockedHerbs] = useState(['plai']); 
  const [inventory, setInventory] = useState([]);
  
  // Progression State
  const [levelProgress, setLevelProgress] = useState({}); 
  const [currentScore, setCurrentScore] = useState(1000); 
  const [showSuperGlory, setShowSuperGlory] = useState(false);

  // Minigame states
  const [actionCount, setActionCount] = useState(0);
  const [heatTemp, setHeatTemp] = useState(0);
  const [healProgress, setHealProgress] = useState(0);
  const [showAcademic, setShowAcademic] = useState(false);
  const [waterDrops, setWaterDrops] = useState([]); 

  // Calculate Total Score
  const totalScore = Object.values(levelProgress).reduce((acc, curr) => acc + curr.score, 0);

  const startLevel = (level) => {
    playSound('pop'); 
    setActiveLevel(level); 
    setInventory([]); 
    setCurrentScore(1000); 
    setPhase('dialogue');
  };

  useEffect(() => {
    let heatTimer;
    if ((phase === 'steam' || phase === 'boil') && heatTemp > 0 && heatTemp < 100) {
      heatTimer = setInterval(() => setHeatTemp(prev => Math.max(0, prev - 3)), 300);
    } else if (heatTemp >= 100 && (phase === 'steam' || phase === 'boil')) {
      playSound('success'); setTimeout(() => setPhase(activeLevel.mode === 'compress' ? 'apply' : 'stir'), 1000);
    }
    return () => clearInterval(heatTimer);
  }, [phase, heatTemp, activeLevel]);

  const handleAction = (target, nextPhase, isSplash=false) => {
    if(isSplash) {
      playSound('splash');
      const newDrop = { id: Math.random(), left: 20+Math.random()*60, top: 20+Math.random()*60 };
      setWaterDrops(prev => [...prev, newDrop]);
      setTimeout(() => setWaterDrops(prev => prev.filter(d => d.id !== newDrop.id)), 500);
    } else {
      playSound('pop');
    }
    
    const newCount = actionCount + (isSplash ? 10 : 15);
    setActionCount(newCount);
    if (newCount >= target) {
      playSound('success'); 
      setTimeout(() => { setActionCount(0); setWaterDrops([]); setPhase(nextPhase); }, 500);
    }
  };

  const handleWinLevel = () => {
    const newHerbs = new Set([...unlockedHerbs, ...activeLevel.requiredHerbs]);
    setUnlockedHerbs(Array.from(newHerbs));
    playSound('success'); 
    
    const finalScore = Math.max(100, currentScore);
    const stars = finalScore >= 900 ? 3 : finalScore >= 700 ? 2 : 1;

    setLevelProgress(prev => {
       const newProgress = { ...prev };
       const oldData = prev[activeLevel.id];
       if (!oldData || finalScore > oldData.score) {
          newProgress[activeLevel.id] = { score: finalScore, stars: stars };
       }
       
       if (Object.keys(newProgress).length === LEVELS.length) {
          setTimeout(() => { playSound('fanfare'); setShowSuperGlory(true); }, 1500);
       }
       return newProgress;
    });

    setPhase('reward');
  };

  const renderHerbIcon = (id, className="w-16 h-16") => {
    if(!HERBS_DB[id]) return null;
    const IconComponent = HERBS_DB[id].icon;
    return <div className={className}><IconComponent /></div>;
  };

  const getStepProgress = (current) => `Step ${current}/${activeLevel?.mode === 'compress' ? 4 : 3}`;

  return (

      {/* SUPER GLORY OVERLAY */}
      {showSuperGlory && (
        <div className="absolute inset-0 z-[100] bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center animate-[fadeIn_1s_ease-out]">

               <span className="absolute top-10 left-10 animate-[bounce_1s_infinite]">🏆</span>
               <span className="absolute top-20 right-10 animate-[bounce_1.5s_infinite]">✨</span>
               <span className="absolute bottom-32 left-20 animate-[bounce_1.2s_infinite]">🌟</span>
               <span className="absolute top-40 right-20 animate-[bounce_1.8s_infinite]">👑</span>

              <span className="text-[10rem] drop-shadow-xl">👑</span>
           </div>
           <p className="text-2xl text-white font-bold mb-2">ยินดีด้วย! คุณคือปรมาจารย์สมุนไพร!</p>
           <p className="text-yellow-300 font-black text-xl mb-10">คะแนนรวมทั้งหมด: {totalScore} แต้ม</p>
           <JellyButton onClick={() => setShowSuperGlory(false)} color="yellow" className="w-full max-w-sm">รับถ้วยรางวัลกลับบ้าน 🏠</JellyButton>

        {/* Header */}
        <div className="bg-gradient-to-r from-pink-300 via-rose-300 to-pink-300 p-4 text-center z-20 flex justify-between items-center shadow-md shrink-0">
          {phase !== 'menu' && !showAcademic ? (
             <button onClick={() => {playSound('pop'); setPhase('menu');}} className="w-12 h-12 bg-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition shadow-[0_4px_0_rgb(244,114,182)] text-2xl text-rose-500 font-black">◀</button>
          ) : <span className="w-12"></span>}
          <div className="bg-white/80 px-4 py-2 rounded-full border-2 border-white shadow-sm flex items-center gap-2">
            <span className="text-rose-500 font-black tracking-wide text-sm">🌸 เกมส์สมุนไพรน่ารู้ 🌿</span>
          </div>
          {phase === 'menu' ? (
             <button onClick={() => {playSound('pop'); setPhase('encyclopedia');}} className="w-12 h-12 bg-yellow-300 rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition shadow-[0_4px_0_rgb(202,138,4)] text-2xl" title="สมุดสะสม">📖</button>

        </div>

        {/* 1. เมนูหลัก */}
        {phase === 'menu' && (
          <div className="flex-1 bg-gradient-to-b from-sky-100 via-pink-50 to-orange-50 flex flex-col items-center justify-center p-6 text-center relative overflow-hidden">

               <span className="animate-[bounce_3s_infinite]">☁️</span><span className="animate-[bounce_4s_infinite]">☁️</span>
            </div>
            <div className="bg-white px-8 py-4 rounded-[2rem] shadow-[0_8px_0_rgb(251,146,60)] border-4 border-orange-100 transform -rotate-2 mt-4 z-10">

            {/* โชว์คะแนนรวมในหน้าแรก */}
            {totalScore > 0 && (
               <div className="mt-4 bg-yellow-100 px-6 py-2 rounded-full border-2 border-yellow-300 shadow-sm z-10 font-black text-yellow-700 flex items-center gap-2">
                  <span>🏆 คะแนนรวม: {totalScore}</span>
               </div>

            <div className="relative my-6 w-full flex justify-center z-10">

            <div className="w-full z-10 mt-auto mb-4 space-y-4">

              <div className="bg-white/60 backdrop-blur-sm text-rose-400 text-xs font-black py-2 rounded-full border-2 border-white/80 shadow-sm w-max mx-auto px-6">

            <JellyButton onClick={() => {playSound('pop'); setPhase('catch')}} color="yellow" className="mt-auto z-10">

            </JellyButton>

        {/* 4. เกมรับสมุนไพร (พร้อมระบบลบคะแนน) */}
        {phase === 'catch' && activeLevel && (
          <CatchGame level={activeLevel} onComplete={(inv, mistakes) => { 
             setInventory(inv); 
             // หักคะแนนครั้งละ 150 คะแนนต่อข้อผิดพลาด (ต่ำสุด 100 คะแนน)
             setCurrentScore(prev => Math.max(100, prev - (mistakes * 150)));
             setPhase('wash'); 
             playSound('success'); 
          }} />
        )}

        {/* 4.5 ล้างสมุนไพร (NEW PHASE - Wash) */}
        {phase === 'wash' && (
          <div className="flex-1 bg-cyan-50 p-6 flex flex-col items-center justify-center relative overflow-hidden">
             <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/wet-snow.png')] opacity-20"></div>
             <div className="bg-white px-6 py-2 rounded-full shadow-sm text-cyan-600 font-black mb-6 text-sm z-10 border-2 border-cyan-100">{getStepProgress(1)}: ล้างสมุนไพร 💦</div>
             <h2 className="text-3xl font-black text-cyan-800 mb-8 text-center bg-cyan-200 px-8 py-3 rounded-3xl transform rotate-[2deg] shadow-md z-10">ล้างให้สะอาด!<br/><span className="text-cyan-600 text-lg">แตะกะละมังเพื่อล้างคราบดิน</span></h2>
             
             <button onClick={() => handleAction(100, 'chop', true)} className="relative w-64 h-64 bg-cyan-300 rounded-full border-8 border-cyan-400 shadow-[0_15px_0_rgb(6,182,212)] flex items-center justify-center active:scale-95 transition-all z-10 overflow-hidden group">
               <div className="absolute bottom-0 w-full h-1/2 bg-cyan-500/50 rounded-b-full"></div>
               <div className="flex gap-2 flex-wrap justify-center w-3/4 z-10 relative">
                 {inventory.map((id, i) => (
                    <div key={i} className="relative group-active:translate-y-2 transition-transform">
                      {renderHerbIcon(id, "w-12 h-12")}
                      <div className="absolute inset-0 bg-[#8B4513] rounded-full mix-blend-multiply transition-opacity duration-300" style={{opacity: Math.max(0, 0.8 - actionCount/100)}}></div>
                    </div>
                 ))}
               </div>
               {/* Water Splash Effects */}
               {waterDrops.map(drop => (
                 <span key={drop.id} className="absolute text-3xl animate-[ping_0.5s_ease-out]" style={{left: `${drop.left}%`, top: `${drop.top}%`}}>💦</span>
               ))}
             </button>

             <div className="w-full mt-14 px-8 z-10"><div className="h-6 bg-white rounded-full overflow-hidden border-4 border-cyan-200 p-1 shadow-inner"><div className="h-full bg-cyan-400 rounded-full transition-all duration-200" style={{ width: `${actionCount}%` }}></div></div></div>
          </div>
        )}

        {/* 5. หั่นสมุนไพร (NEW MINIGAME: Swipe) */}
        {phase === 'chop' && activeLevel && (
          <ChopGame 
            inventory={inventory} 
            onComplete={() => setPhase(activeLevel.mode === 'compress' ? 'pound' : 'boil')} 
          />
        )}

        {/* --- โหมดประคบ (Pound -> Wrap -> Steam -> Apply) --- */}
        {phase === 'pound' && activeLevel?.mode === 'compress' && (
          <PoundGame onComplete={() => setPhase('wrap')} />
        )}
        
        {/* NEW PHASE: Wrap Compress */}
        {phase === 'wrap' && activeLevel?.mode === 'compress' && (
          <div className="flex-1 bg-slate-50 p-6 flex flex-col items-center justify-center relative">
            <div className="bg-white px-6 py-2 rounded-full shadow-sm text-slate-500 font-black mb-6 text-sm z-10 border-2 border-slate-200">{getStepProgress(3)}: ห่อผ้าประคบ ◻️</div>
            <h2 className="text-3xl font-black text-slate-700 mb-10 text-center bg-slate-200 px-8 py-3 rounded-3xl transform rotate-[-1deg] shadow-md z-10">ห่อให้แน่นหนา!<br/><span className="text-slate-500 text-lg">แตะเพื่อรวบผ้ามัดเชือก🎀</span></h2>
            
            <button onClick={() => handleAction(100, 'steam')} className="w-64 h-64 bg-white rounded-[2rem] border-8 border-dashed border-gray-300 flex flex-col items-center justify-center text-[7rem] active:scale-95 transition-all shadow-xl relative z-10 overflow-hidden">
               <div className="flex gap-2 flex-wrap justify-center w-full px-4" style={{ opacity: Math.max(0, 1 - actionCount/80), transform: `scale(${1 - actionCount/200})` }}>
                 {inventory.map((id, i) => <div key={i}>{renderHerbIcon(id, "w-10 h-10")}</div>)}
               </div>
               <div className="absolute bottom-0 w-full bg-slate-100/80 rounded-t-[50%] transition-all duration-300" style={{ height: `${actionCount}%` }}></div>
               {actionCount >= 80 && <span className="absolute text-[8rem] animate-[bounce_0.5s_ease-out] drop-shadow-xl z-20">🎀</span>}

            <div className="w-full mt-14 px-8 z-10"><div className="h-6 bg-white rounded-full overflow-hidden border-4 border-slate-200 p-1 shadow-inner"><div className="h-full bg-slate-400 rounded-full transition-all duration-200" style={{ width: `${actionCount}%` }}></div></div></div>

        {phase === 'steam' && activeLevel?.mode === 'compress' && (
          <div className="flex-1 bg-rose-50 p-6 flex flex-col items-center justify-center relative overflow-hidden">

                  {heatTemp > 70 && <div className="absolute bottom-10 right-1/4 w-3 h-3 bg-white/50 rounded-full animate-[ping_0.8s_infinite]"></div>}
               </div>
               <div className="text-[10rem] absolute -bottom-16 transition-transform origin-bottom drop-shadow-xl z-10" style={{ transform: `scale(${0.3 + heatTemp/120})` }}>🔥</div>
            </button>
          </div>
        )}

        {/* NEW PHASE: Stir Drink */}
        {phase === 'stir' && activeLevel?.mode === 'drink' && (
          <div className="flex-1 bg-indigo-50 p-6 flex flex-col items-center justify-center relative">
            <div className="bg-white px-6 py-2 rounded-full shadow-sm text-indigo-500 font-black mb-6 text-sm z-10 border-2 border-indigo-100">{getStepProgress(3)}: ผสมให้เข้ากัน 🥄</div>
            <h2 className="text-3xl font-black text-indigo-700 mb-10 text-center bg-indigo-200 px-8 py-3 rounded-3xl transform rotate-[1deg] shadow-md z-10">คนน้ำสมุนไพร!<br/><span className="text-indigo-500 text-lg">แตะรัวๆ เพื่อใช้ช้อนคนให้ทั่ว🌀</span></h2>
            
            <button onClick={() => handleAction(100, 'serve')} className="w-64 h-64 bg-white rounded-[4rem] border-8 border-indigo-200 flex items-center justify-center text-[7rem] active:scale-95 transition-all shadow-[0_15px_0_rgb(199,210,254)] relative z-10 overflow-hidden">
               <div className={`absolute bottom-0 w-full h-full bg-gradient-to-t ${activeLevel.bg} opacity-80`} style={{transform: `rotate(${actionCount * 10}deg) scale(1.5)`}}></div>
               <span className="absolute z-20 drop-shadow-xl transition-transform" style={{transform: `rotate(${-actionCount * 8}deg) translateX(${actionCount % 20}px)`}}>🥄</span>
               {actionCount > 50 && <span className="absolute z-20 text-5xl mix-blend-overlay animate-pulse">🌀</span>}
            </button>
            <div className="w-full mt-14 px-8 z-10"><div className="h-6 bg-white rounded-full overflow-hidden border-4 border-indigo-200 p-1 shadow-inner"><div className="h-full bg-indigo-400 rounded-full transition-all duration-200" style={{ width: `${actionCount}%` }}></div></div></div>
          </div>
        )}

        {phase === 'serve' && activeLevel?.mode === 'drink' && (
          <div className={`flex-1 bg-gradient-to-b ${activeLevel.bg} p-6 flex flex-col items-center justify-center relative`}>
            <div className="absolute inset-0 bg-white/20 backdrop-blur-sm pointer-events-none"></div>
            <h2 className="text-3xl font-black text-gray-800 mb-10 text-center bg-white px-8 py-4 rounded-[2rem] shadow-lg z-10 transform -rotate-2">เสิร์ฟน้ำสมุนไพร!<br/><span className="text-blue-500 text-xl">แตะแก้วให้คนไข้ดื่ม 🍹</span></h2>
            <div className="w-full px-10 mb-14 z-10"><div className="h-8 bg-white rounded-full overflow-hidden shadow-inner p-1 border-4 border-blue-200"><div className={`h-full bg-gradient-to-r ${activeLevel.bg} rounded-full transition-all duration-300`} style={{ width: `${Math.max(10, healProgress)}%` }}></div></div></div>
            <div className="flex items-end justify-center gap-8 relative z-10">
              <div className="text-[10rem] relative z-10 drop-shadow-2xl">{activeLevel.patientIcon}</div>
              <button onClick={() => setHealProgress(p => { playSound('pop'); const n = p+25; if(n>=100) setTimeout(handleWinLevel, 800); return Math.min(100, n); })} className="relative active:scale-90 transition-transform bg-white/70 p-8 rounded-[2.5rem] border-8 border-white shadow-[0_0_40px_rgba(255,255,255,0.8)] backdrop-blur-lg">
                 <div className="text-[7rem] drop-shadow-md">🍹</div>
                 {healProgress > 0 && <span className="absolute -top-12 left-0 text-6xl animate-[ping_0.5s_infinite]">✨</span>}
              </button>
            </div>
          </div>
        )}

        {/* 7. สรุปผล + โชว์ Glory (Stars) */}
        {phase === 'reward' && !showAcademic && (
          <div className="flex-1 bg-gradient-to-b from-yellow-100 to-pink-100 p-6 flex flex-col items-center justify-center text-center relative overflow-hidden">
            <div className="absolute inset-0 pointer-events-none text-4xl opacity-50">
               <span className="absolute top-10 left-10 animate-[bounce_2s_infinite]">🎉</span>
               <span className="absolute top-20 right-10 animate-[bounce_3s_infinite]">✨</span>
            </div>
            
            <div className="bg-white/90 backdrop-blur-md p-8 rounded-[3rem] shadow-2xl border-4 border-yellow-300 w-full mb-8 relative z-10">
               <h2 className="text-3xl font-black text-rose-500 mb-2">ภารกิจสำเร็จ!</h2>
               <p className="text-gray-600 font-bold mb-6">{activeLevel.patientName} อาการดีขึ้นแล้ว!</p>
               
               {/* คะแนนและดาว */}
               <div className="bg-yellow-50 rounded-2xl p-4 mb-6 border-2 border-yellow-200">
                 <div className="text-5xl drop-shadow-md mb-2">
                    {currentScore >= 900 ? '⭐⭐⭐' : currentScore >= 700 ? '⭐⭐☆' : '⭐☆☆'}
                 </div>
                 <div className="text-xl font-black text-yellow-700">คะแนน: {currentScore}</div>
               </div>

               <h3 className="text-sm font-black text-green-600 mb-4 bg-green-100 py-1 rounded-full w-max mx-auto px-4">✨ ปลดล็อกสมุนไพร ✨</h3>
               <div className="flex justify-center gap-4 flex-wrap">
                  {activeLevel.requiredHerbs.map(id => (
                     <div key={id} className="text-center flex flex-col items-center">
                       <div className="w-16 h-16 bg-white border-2 border-green-200 rounded-[1rem] flex items-center justify-center mb-1 shadow-sm">{renderHerbIcon(id, "w-10 h-10")}</div>
                       <span className="font-bold text-green-800 text-[10px]">{HERBS_DB[id].name}</span>
                     </div>
                  ))}
               </div>
            </div>

            <div className="w-full space-y-4 relative z-10">
              <JellyButton onClick={() => setShowAcademic(true)} color="blue"><span className="text-2xl">📖</span> เปิดคัมภีร์ความรู้</JellyButton>
              <JellyButton onClick={() => { setPhase('menu'); setActiveLevel(null); }} color="white">ดำเนินการต่อ ➡️</JellyButton>
            </div>
          </div>
        )}

        {/* 📚 Modal: สมุดคัมภีร์เวทมนตร์ */}
        {phase === 'reward' && showAcademic && (
          <div className="absolute inset-0 z-50 bg-black/50 backdrop-blur-md flex flex-col justify-end p-2 sm:p-4 animate-[fadeIn_0.3s_ease-out]">
             <style>{`@keyframes slideUp { from { transform: translateY(100%) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }`}</style>
             <div className="bg-gradient-to-br from-amber-50 to-orange-50 w-full max-h-[90vh] rounded-[3rem] shadow-[0_0_50px_rgba(0,0,0,0.3)] flex flex-col overflow-hidden animate-[slideUp_0.4s_cubic-bezier(0.175,0.885,0.32,1.275)] border-8 border-white relative min-h-0">
               <div className="absolute left-4 top-0 bottom-0 w-4 border-l-4 border-dashed border-amber-200 opacity-50"></div>
               <div className="p-6 pb-2 text-center relative shrink-0">
                 <h2 className="text-amber-700 font-black text-2xl flex items-center justify-center gap-3 drop-shadow-sm"><span className="text-3xl">✨</span> คัมภีร์ลับสมุนไพร <span className="text-3xl">✨</span></h2>
                 <p className="text-amber-600 font-bold text-sm mt-1 bg-white/50 inline-block px-4 py-1 rounded-full">เคส: {activeLevel.title}</p>
                 <button onClick={() => {playSound('pop'); setShowAcademic(false)}} className="absolute top-4 right-4 w-10 h-10 bg-white rounded-full text-amber-400 font-black text-xl shadow-md hover:scale-110 transition">&times;</button>
               </div>
               <div className="flex-1 overflow-y-auto p-6 scrollbar-thin scrollbar-thumb-amber-200 space-y-5 min-h-0 pr-2">
                  <div className="bg-white border-4 border-green-200 rounded-[2rem] p-5 shadow-sm relative overflow-hidden">
                     <h4 className="text-green-600 font-black text-base mb-2 flex items-center gap-2"><span className="bg-green-100 p-2 rounded-full text-xl">🌟</span> พลังวิเศษ (ประโยชน์)</h4>
                     <p className="text-gray-600 font-bold text-sm leading-relaxed">{activeLevel.academicInfo.benefits}</p>
                  </div>
                  <div className="bg-white border-4 border-blue-200 rounded-[2rem] p-5 shadow-sm relative overflow-hidden">
                     <h4 className="text-blue-600 font-black text-base mb-2 flex items-center gap-2"><span className="bg-blue-100 p-2 rounded-full text-xl">🧪</span> วิธีปรุงยา (วิธีใช้)</h4>
                     <p className="text-gray-600 font-bold text-sm leading-relaxed">{activeLevel.academicInfo.usage}</p>
                  </div>
                  <div className="bg-white border-4 border-red-200 rounded-[2rem] p-5 shadow-sm relative overflow-hidden">
                     <h4 className="text-red-500 font-black text-base mb-2 flex items-center gap-2"><span className="bg-red-100 p-2 rounded-full text-xl">🚨</span> ข้อควรระวังนะ!</h4>
                     <p className="text-gray-600 font-bold text-sm leading-relaxed">{activeLevel.academicInfo.precautions}</p>
                  </div>
                  <div className="bg-white border-4 border-purple-200 rounded-[2rem] p-5 shadow-sm relative overflow-hidden">
                     <h4 className="text-purple-600 font-black text-base mb-2 flex items-center gap-2"><span className="bg-purple-100 p-2 rounded-full text-xl">💖</span> ดูแลตัวเองด้วยนะ</h4>
                     <p className="text-gray-600 font-bold text-sm leading-relaxed">{activeLevel.academicInfo.selfCare}</p>
                  </div>
               </div>
               <div className="p-6 bg-white/50 border-t-4 border-white backdrop-blur-md shrink-0">
                 <JellyButton onClick={() => { setShowAcademic(false); setPhase('menu'); setActiveLevel(null); }} color="green">จำได้แล้ว! ปิดคัมภีร์ 📕</JellyButton>
               </div>
             </div>
          </div>
        )}

        {/* 9. สมุดภาพ (Encyclopedia) */}
        {phase === 'encyclopedia' && (
          <div className="flex-1 bg-gradient-to-b from-yellow-50 to-orange-50 p-5 flex flex-col relative overflow-hidden min-h-0">
            <h2 className="text-2xl font-black text-orange-500 mb-6 text-center bg-white py-3 rounded-full shadow-[0_4px_0_rgb(254,215,170)] border-2 border-orange-100 relative z-10 shrink-0">📖 สมุดสะสมสมุนไพร</h2>
            <div className="flex-1 overflow-y-auto space-y-4 pb-6 scrollbar-thin scrollbar-thumb-orange-200 z-10 min-h-0 pr-2">
               {Object.values(HERBS_DB).filter(h => !h.isDecoy).map(herb => {
                 const isUnlocked = unlockedHerbs.includes(herb.id);
                 return (
                   <div key={herb.id} className={`bg-white p-4 rounded-[2rem] border-4 flex gap-4 items-center transition-all ${isUnlocked ? 'border-amber-200 shadow-md' : 'border-gray-100 opacity-60'}`}>
                     <div className={`w-20 h-20 shrink-0 flex items-center justify-center rounded-[1.5rem] shadow-inner ${isUnlocked ? 'bg-gradient-to-br from-yellow-100 to-amber-100' : 'bg-gray-100'}`}>
                       {isUnlocked ? renderHerbIcon(herb.id, "w-14 h-14 drop-shadow-md") : <span className="text-gray-300 text-3xl">🔒</span>}
                     </div>
                     <div className="flex-1 min-w-0">
                       <h3 className={`text-lg font-black mb-1 truncate ${isUnlocked ? 'text-amber-700' : 'text-gray-400'}`}>{isUnlocked ? herb.name : '???'}</h3>
                       <p className="text-xs font-bold text-gray-500 leading-relaxed line-clamp-2">{isUnlocked ? herb.desc : 'เล่นเกมเพื่อตามหาสมุนไพรชนิดนี้กันเถอะ!'}</p>
                     </div>
                   </div>
                 );
               })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
