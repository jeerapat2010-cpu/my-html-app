<style>
:root{
  --bg:#07150d; --bg2:#0d2d18; --card:#ffffff; --ink:#132017; --muted:#647368;
  --green:#2E7D32; --green2:#43A047; --leaf:#76B852; --lime:#A5D65E;
  --gold:#F0B742; --gold2:#FFD774; --teal:#1AA196; --clay:#C5673D; --red:#C0392B;
  --violet:#6A5AE0; --sky:#3FA7F5; --line:#DDE9D8;

}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Sarabun',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.disp{font-family:'IBM Plex Sans Thai',sans-serif}
#viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(900px 520px at 80% 10%,rgba(80,190,93,.34),transparent 60%),
  radial-gradient(600px 440px at 18% 88%,rgba(240,183,66,.18),transparent 65%),
  linear-gradient(145deg,#06120a,#0b2a14 52%,#06160b);perspective:1600px}
#stage{width:1280px;height:720px;position:relative;overflow:hidden;border-radius:24px;box-shadow:0 40px 110px rgba(0,0,0,.58);transform-origin:center center;background:#08150d}
.slide{position:absolute;inset:0;background:#f9fcf6;opacity:0;visibility:hidden;transform:translate3d(90px,0,-160px) rotateY(-10deg) scale(.94);transition:opacity .55s ease,transform .70s cubic-bezier(.18,.88,.22,1);display:flex;flex-direction:column;overflow:hidden}
.slide.active{opacity:1;visibility:visible;transform:translate3d(0,0,0) rotateY(0) scale(1);z-index:4}
.slide.dark{background:radial-gradient(900px 500px at 92% 10%,#1e6b33 0%,#0b3016 48%,#07180d 100%);color:#fff}
.slide.deep{background:linear-gradient(135deg,#07150d,#0b2a14 54%,#111b0c);color:#fff}
.slide.tint{background:#F1F7ED}
.pad{position:relative;z-index:3;flex:1;padding:42px 54px;display:flex;flex-direction:column;min-height:0}
.kicker{display:inline-flex;align-items:center;gap:8px;width:max-content;border-radius:999px;padding:8px 18px;background:var(--green);color:#fff;font-weight:700;font-size:14px;letter-spacing:.15px;box-shadow:0 8px 18px rgba(46,125,50,.18)}
.dark .kicker,.deep .kicker{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.20);box-shadow:none;color:#d8f5cf}
.title{font-family:'IBM Plex Sans Thai',sans-serif;font-size:36px;line-height:1.15;font-weight:700;letter-spacing:-.3px;margin-top:14px;color:var(--ink)}
.title.sm{font-size:31px}.dark .title,.deep .title{color:#fff}.body{flex:1;margin-top:22px;min-height:0}
.card{border-radius:20px;background:#fff;box-shadow:var(--shadow2);padding:20px 22px;position:relative;overflow:hidden}.dark .card,.deep .card{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);box-shadow:none;color:#fff;backdrop-filter:blur(10px)}
.glass{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(12px);box-shadow:0 18px 50px rgba(0,0,0,.18)}
.row{display:flex}.col{display:flex;flex-direction:column}.center{align-items:center}.between{justify-content:space-between}.grow{flex:1}.muted{color:var(--muted)}.dark .muted,.deep .muted{color:#c8ddc2}.sub{font-size:13px;color:var(--muted);line-height:1.35}.dark .sub,.deep .sub{color:#cfe6c8}
.stat{font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;line-height:1;letter-spacing:-1px}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700}.pill.ok{background:#E7F4DF;color:#1d7228}.pill.bad{background:#FCE6DE;color:#A64728}.pill.gold{background:#FFF2CC;color:#8a610a}
/* animation */
.anim{opacity:0;transform:translateY(18px);transition:opacity .56s ease,transform .56s ease}.active .anim{opacity:1;transform:none;transition-delay:calc(var(--d,0)*75ms)}
.floaty{animation:floaty 4.5s ease-in-out infinite}@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pulse{animation:pulse 2.2s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,183,66,.35)}50%{box-shadow:0 0 0 12px rgba(240,183,66,0)}}
/* global controls */

.topbar{position:fixed;right:18px;top:16px;z-index:90;display:flex;gap:8px}.ctrl{height:42px;min-width:42px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.10);color:#fff;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;backdrop-filter:blur(8px);transition:.2s;padding:0 12px}.ctrl:hover{background:rgba(255,255,255,.22);transform:translateY(-1px)}.ctrl svg{width:20px;height:20px;fill:#fff}
.nav{position:fixed;right:18px;bottom:20px;z-index:90;display:flex;gap:10px;align-items:center}.nav button{width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}.nav svg{width:22px;height:22px;fill:#fff}#counter{color:#fff;font-weight:800;border-radius:999px;padding:12px 18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);cursor:pointer}#counter b{color:var(--gold2)}
.hint{position:fixed;left:22px;bottom:26px;z-index:90;color:rgba(255,255,255,.62);font-size:12.5px}.hint kbd{background:rgba(255,255,255,.14);border-radius:5px;padding:2px 7px;margin:0 2px;font-family:inherit}
#overview{position:fixed;inset:0;z-index:120;background:rgba(4,12,7,.96);display:none;padding:48px;overflow:auto}#overview.show{display:block}#overview h3{text-align:center;color:#DDF4D4;font-family:'IBM Plex Sans Thai';font-size:24px;margin-bottom:24px}.ov-grid{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr);gap:14px}.thumb{aspect-ratio:16/9;border-radius:14px;background:linear-gradient(135deg,#143c1e,#07150d);border:1px solid rgba(255,255,255,.15);color:#d8f5cf;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:10px;cursor:pointer;transition:.2s}.thumb:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 18px 34px rgba(0,0,0,.35)}.thumb b{font-family:'IBM Plex Sans Thai';font-size:24px;color:var(--gold2)}.thumb span{font-size:11.2px;line-height:1.25;margin-top:5px}

#aiPresenter{position:absolute;right:22px;bottom:22px;z-index:20;display:flex;align-items:flex-end;gap:10px;pointer-events:none}.avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#ffffff,#e0f2d8);box-shadow:0 10px 30px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:34px;border:2px solid rgba(255,255,255,.6)}.bubble{max-width:360px;background:rgba(7,21,13,.82);color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:18px 18px 4px 18px;padding:12px 15px;box-shadow:0 16px 36px rgba(0,0,0,.25);font-size:13.3px;line-height:1.35;backdrop-filter:blur(10px)}.bubble b{color:var(--gold2)}
/* decorative */
.sprig{position:absolute;right:-28px;top:-34px;width:300px;height:300px;opacity:.10;pointer-events:none}.dark .sprig,.deep .sprig{opacity:.16}.sprig svg{width:100%;height:100%}.orb{position:absolute;border-radius:50%;filter:blur(2px);opacity:.35}.orb.o1{width:220px;height:220px;background:#6cbc48;right:60px;top:50px}.orb.o2{width:150px;height:150px;background:#f2ba45;left:90px;bottom:55px}.leaf-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}.leaf-particles span{position:absolute;top:-30px;font-size:20px;opacity:.55;animation:leafFall linear infinite}.leaf-particles span:nth-child(1){left:8%;animation-duration:10s;animation-delay:.2s}.leaf-particles span:nth-child(2){left:21%;animation-duration:13s;animation-delay:1.8s}.leaf-particles span:nth-child(3){left:38%;animation-duration:9s;animation-delay:.8s}.leaf-particles span:nth-child(4){left:62%;animation-duration:12s;animation-delay:2.4s}.leaf-particles span:nth-child(5){left:80%;animation-duration:11s;animation-delay:1.1s}.leaf-particles span:nth-child(6){left:93%;animation-duration:14s;animation-delay:3s}@keyframes leafFall{0%{transform:translateY(-40px) rotate(0deg)}100%{transform:translateY(780px) rotate(300deg)}}
.coin-rain{position:absolute;inset:0;pointer-events:none;overflow:hidden}.coin-rain i{position:absolute;top:-50px;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff8bb,#f0b742 55%,#b87a0f);box-shadow:0 0 8px rgba(240,183,66,.6);animation:coinFall linear infinite}.coin-rain i:nth-child(1){left:12%;animation-duration:7s;animation-delay:.3s}.coin-rain i:nth-child(2){left:35%;animation-duration:8.5s;animation-delay:1.3s}.coin-rain i:nth-child(3){left:54%;animation-duration:7.8s;animation-delay:.9s}.coin-rain i:nth-child(4){left:72%;animation-duration:9s;animation-delay:2.1s}.coin-rain i:nth-child(5){left:86%;animation-duration:8s;animation-delay:1.7s}@keyframes coinFall{0%{transform:translateY(-60px) rotateY(0)}100%{transform:translateY(780px) rotateY(960deg)}}
/* hero */
.hero-title{font-family:'IBM Plex Sans Thai';font-weight:700;font-size:58px;line-height:1.08;letter-spacing:-.8px}.hero-title .gold{color:var(--gold2)}.hero-sub{font-size:18px;line-height:1.45;color:#d8f5cf;max-width:900px}.command-card{border-radius:24px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);padding:22px 24px;backdrop-filter:blur(12px);box-shadow:0 20px 56px rgba(0,0,0,.23)}.kpi-wall{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.wall-card{position:relative;border-radius:24px;overflow:hidden;padding:24px;background:#fff;box-shadow:var(--shadow2);min-height:210px}.wall-card:before{content:"";position:absolute;right:-55px;top:-55px;width:180px;height:180px;border-radius:50%;background:var(--c);opacity:.12}.wall-card .label{font-weight:800;font-size:16px}.wall-card .big{font-family:'IBM Plex Sans Thai';font-weight:700;font-size:64px;line-height:1;color:var(--c);letter-spacing:-2px;margin:18px 0 8px}.wall-card .big small{font-size:27px}.mini{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.mini div{border-radius:12px;background:#F3F8F0;padding:9px 11px;font-size:12.5px}.mini b{display:block;color:var(--ink);font-size:16px;font-family:'IBM Plex Sans Thai'}
/* 3D intro */
.universe{position:absolute;inset:0;overflow:hidden}.stars{position:absolute;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:42px 42px;opacity:.16;animation:starMove 18s linear infinite}@keyframes starMove{to{transform:translateY(42px)}}.globe-wrap{position:absolute;right:80px;top:90px;width:380px;height:380px;perspective:900px}.globe{width:340px;height:340px;border-radius:50%;margin:20px;background:radial-gradient(circle at 30% 30%,#87e07e,#176b35 42%,#06230f 78%);box-shadow:inset -35px -45px 60px rgba(0,0,0,.35),0 0 80px rgba(105,221,92,.35);position:relative;animation:spin 12s linear infinite}.globe:after{content:"";position:absolute;inset:35px;border:1px solid rgba(255,255,255,.12);border-radius:50%;box-shadow:0 0 0 36px rgba(255,255,255,.06),0 0 0 74px rgba(255,255,255,.035)}@keyframes spin{to{transform:rotateY(360deg) rotateZ(7deg)}}.zoom-rings{position:absolute;inset:0}.zoom-rings span{position:absolute;border-radius:50%;border:2px solid rgba(255,215,116,.5);animation:ring 3.2s ease-in-out infinite}.zoom-rings span:nth-child(1){inset:40px}.zoom-rings span:nth-child(2){inset:5px;animation-delay:.5s}.zoom-rings span:nth-child(3){inset:-30px;animation-delay:1s}@keyframes ring{0%,100%{transform:scale(.92);opacity:.3}50%{transform:scale(1.06);opacity:.8}}
.path-steps{display:flex;gap:10px;margin-top:24px}.path-steps span{border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);color:#d8f5cf;padding:10px 16px;font-weight:700}.path-steps i{color:var(--gold2);font-style:normal;padding-top:9px}
/* gauge */
.gauge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.gauge-card{border-radius:24px;background:#fff;padding:18px;box-shadow:var(--shadow2);text-align:center;position:relative;overflow:hidden}.gauge-svg{width:250px;height:160px;max-width:100%}.gauge-bg{fill:none;stroke:#E7EFE0;stroke-width:18;stroke-linecap:round}.gauge-val{fill:none;stroke:var(--c);stroke-width:18;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:283;transition:stroke-dashoffset 1.1s ease}.active .gauge-val{stroke-dashoffset:calc(283 - (283 * var(--pct) / 100))}.needle{transform-origin:125px 125px;transition:transform 1.1s cubic-bezier(.18,.8,.25,1)}.active .needle{transform:rotate(calc(-90deg + (180deg * var(--pct) / 100)))}.gauge-num{font-family:'IBM Plex Sans Thai';font-size:42px;font-weight:700;color:var(--c);line-height:1}.gauge-num small{font-size:20px}

.podium-wrap{height:420px;display:grid;grid-template-columns:1fr 1.25fr 1fr;align-items:end;gap:24px}.podium{border-radius:24px 24px 10px 10px;background:linear-gradient(180deg,var(--c),#183b1d);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;padding:20px;box-shadow:0 26px 48px rgba(0,0,0,.26);position:relative;transform-style:preserve-3d}.podium:after{content:"";position:absolute;inset:auto 18px -16px 18px;height:24px;border-radius:0 0 24px 24px;background:rgba(0,0,0,.18);transform:translateZ(-20px)}.podium.first{height:360px}.podium.second{height:300px}.podium.third{height:260px}.medal{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fff6b0,#f0b742 50%,#a86d0a);display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 10px 20px rgba(0,0,0,.25)}.podium .province{font-family:'IBM Plex Sans Thai';font-size:24px;font-weight:700;margin-top:16px}.podium .pct{font-family:'IBM Plex Sans Thai';font-size:46px;font-weight:700;color:#fff2aa;margin-top:12px}
/* map/drill */
.map-board{display:grid;grid-template-columns:1.1fr 1fr;gap:26px;height:100%}.district-map{width:100%;height:430px;border-radius:24px;background:linear-gradient(145deg,#eaf6e5,#fff);box-shadow:var(--shadow2);padding:18px}.district{cursor:pointer;filter:drop-shadow(0 6px 8px rgba(0,0,0,.10));transition:.2s}.district:hover{transform:translateY(-3px);filter:drop-shadow(0 10px 16px rgba(0,0,0,.18))}.district.active polygon,.district.active path{stroke:#111;stroke-width:4}.district text{font-family:'Sarabun';font-size:15px;font-weight:800;fill:#132017;pointer-events:none}.detail-panel{border-radius:24px;background:#fff;padding:22px;box-shadow:var(--shadow2);min-height:430px}.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}.metric{background:#F3F8F0;border-radius:15px;padding:13px}.metric span{font-size:12px;color:var(--muted)}.metric b{display:block;font-family:'IBM Plex Sans Thai';font-size:27px;color:var(--c)}.district-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.d-btn{border:none;border-radius:14px;background:#fff;box-shadow:var(--shadow2);padding:14px 12px;cursor:pointer;text-align:left;transition:.2s}.d-btn:hover,.d-btn.active{background:#153d1e;color:#fff;transform:translateY(-2px)}.d-btn small{display:block;color:inherit;opacity:.72}.d-btn b{font-family:'IBM Plex Sans Thai';font-size:18px}
/* interactive swot */
.swot-grid{display:grid;grid-template-columns:.9fr 1.4fr;gap:26px;height:100%}.swot-buttons{display:grid;gap:13px}.swot-btn{border:none;border-radius:18px;background:#fff;box-shadow:var(--shadow2);padding:16px 18px;text-align:left;cursor:pointer;transition:.2s;border-left:7px solid var(--c)}.swot-btn:hover,.swot-btn.active{transform:translateX(5px);background:#102d17;color:#fff}.swot-btn b{font-family:'IBM Plex Sans Thai';font-size:20px}.mindmap{position:relative;border-radius:24px;background:radial-gradient(circle at center,#fff,#eef8e8);box-shadow:var(--shadow2);padding:26px;height:100%;overflow:hidden}.mind-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:190px;height:190px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--gold));color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'IBM Plex Sans Thai';font-weight:700;font-size:22px;box-shadow:0 18px 38px rgba(0,0,0,.18);z-index:2}.mind-item{position:absolute;width:250px;background:#fff;border-radius:18px;box-shadow:var(--shadow2);padding:14px 16px;border-top:5px solid var(--c);opacity:0;transform:scale(.8);transition:.35s}.active .mind-item.show{opacity:1;transform:scale(1)}.mind-item h4{font-family:'IBM Plex Sans Thai';font-size:17px}.mind-item p{font-size:13px;line-height:1.35;color:var(--muted);margin-top:4px}.mind-line{position:absolute;height:2px;background:rgba(46,125,50,.22);transform-origin:left center;z-index:1}.mi1{left:30px;top:36px}.mi2{right:30px;top:56px}.mi3{left:36px;bottom:48px}.mi4{right:36px;bottom:42px}
/* quality/list */
.bar-row{margin-bottom:15px}.bar-row .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}.bar-row .head b{font-size:14.5px}.bar-row .head span{font-family:'IBM Plex Sans Thai';font-weight:700;font-size:22px;color:var(--c)}.track{height:14px;background:#E8F0E2;border-radius:999px;overflow:hidden}.fill{height:100%;width:0;border-radius:999px;background:var(--c);transition:width 1s ease}.active .fill{width:var(--w)}

.footer{position:absolute;left:54px;right:54px;bottom:17px;z-index:5;display:flex;justify-content:space-between;color:#718071;font-size:12px}.dark .footer,.deep .footer{color:rgba(255,255,255,.60)}
canvas{max-width:100%}
@media(max-width:700px){.hint{display:none}.ov-grid{grid-template-columns:repeat(2,1fr)}.bubble{max-width:250px}.topbar{right:8px}.nav{right:8px}}
/* case detail cards */
.case-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.case-tile{border-radius:16px;padding:12px 13px;background:linear-gradient(145deg,#ffffff,#F0F7EC);border:1px solid #E0EBDD;box-shadow:0 8px 18px rgba(18,58,24,.07)}
.case-tile .case-label{font-size:12.2px;color:var(--muted);line-height:1.25;font-weight:700}
.case-tile .case-value{font-family:'IBM Plex Sans Thai';font-size:29px;font-weight:700;line-height:1;color:var(--c);margin-top:5px;letter-spacing:-.5px}
.case-tile .case-unit{font-size:12px;font-weight:600;margin-left:2px;color:var(--muted)}
.case-tile .case-sub{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.25}
.deep .case-tile,.dark .case-tile{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.15);box-shadow:none}.deep .case-tile .case-label,.deep .case-tile .case-unit,.deep .case-tile .case-sub,.dark .case-tile .case-label,.dark .case-tile .case-unit,.dark .case-tile .case-sub{color:#cfe6c8}
.case-table{width:100%;border-collapse:separate;border-spacing:0 6px}.case-table th{font-size:11.6px;text-align:left;color:var(--muted);font-weight:800;padding:0 8px 2px}.case-table td{background:#F3F8F0;padding:7px 8px;font-size:12.3px;line-height:1.15}.case-table td:first-child{border-radius:10px 0 0 10px;font-weight:700}.case-table td:last-child{border-radius:0 10px 10px 0;text-align:right}.case-table .rate{font-family:'IBM Plex Sans Thai';font-weight:800;color:var(--c);font-size:15px}.case-table .pass{color:var(--green);font-weight:800}.case-table .risk{color:var(--clay);font-weight:800}.deep .case-table td,.dark .case-table td{background:rgba(255,255,255,.10);color:#fff}.deep .case-table th,.dark .case-table th{color:#cfe6c8}.deep .case-table .pass,.dark .case-table .pass{color:#a5f2a0}.deep .case-table .risk,.dark .case-table .risk{color:#ffb083}
.case-note{border-radius:14px;padding:10px 12px;font-size:12.4px;line-height:1.35;background:#FFF6D8;color:#684b07;border:1px solid #F3D77E}.deep .case-note,.dark .case-note{background:rgba(255,215,116,.13);color:#ffe9a4;border-color:rgba(255,215,116,.28)}

</style>

Chart.defaults.font.family="'Sarabun',sans-serif"; Chart.defaults.color='#33433a'; Chart.defaults.font.size=13; const charts={}; const grid={grid:{color:'#E4EDDE'},border:{display:false}};
function chartBarLabelPlugin(id){return {id,afterDatasetsDraw(c){const{ctx,scales:{x,y}}=c;ctx.save();ctx.fillStyle=id==='iLbl'?'#FFFFFF':'#132017';ctx.font='800 12px Sarabun';ctx.textBaseline='middle';c.data.datasets[0].data.forEach((v,i)=>{const px=x.getPixelForValue(v),py=y.getPixelForValue(i);ctx.fillText((+v).toFixed(2)+'%',px+7,py)});ctx.restore();}}}
function buildChart(id){if(charts[id]) return; const el=document.getElementById(id); if(!el) return; const anim={duration:950,easing:'easeOutQuart'};
 if(id==='regionChart'){const r=[...D.kpi1.region6].reverse();charts[id]=new Chart(el,{type:'bar',data:{labels:r.map(x=>x[0]),datasets:[{data:r.map(x=>x[1]),backgroundColor:r.map(x=>x[0]==='สมุทรปราการ'?'#DFA537':'#5A9E3F'),borderRadius:8,barThickness:24}]},options:{indexAxis:'y',animation:anim,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x.toFixed(2)+'%'}}},scales:{x:{...grid,max:60,ticks:{callback:v=>v+'%'}},y:{...grid,grid:{display:false}}}},plugins:[chartBarLabelPlugin('rLbl')]});}
 if(id==='districtUCChart'){const d=D.kpi1.districts;charts[id]=new Chart(el,{type:'bar',data:{labels:d.map(x=>x.name),datasets:[{label:'เป้า 10 เดือน',data:d.map(x=>x.ach10m),backgroundColor:'#2E7D32',borderRadius:7},{label:'เป้า 12 เดือน',data:d.map(x=>x.pct12m),backgroundColor:'#DFA537',borderRadius:7}]},options:{animation:anim,plugins:{legend:{position:'top'}},scales:{y:{...grid,max:110,ticks:{callback:v=>v+'%'}},x:{...grid,grid:{display:false}}}}});}
 if(id==='topDrugChart'){const d=[...D.kpi1.topDrugs].reverse();charts[id]=new Chart(el,{type:'bar',data:{labels:d.map(x=>x[0]),datasets:[{data:d.map(x=>+(x[1]/1e6).toFixed(2)),backgroundColor:d.map(x=>x[0]==='ยาไพล'?'#DFA537':'#76B852'),borderRadius:7,barThickness:20}]},options:{indexAxis:'y',animation:anim,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x.toFixed(2)+' ล้านบาท'}}},scales:{x:{...grid,ticks:{color:'#0B1F12',font:{size:13,weight:'800'},callback:v=>v+' ล.'},title:{display:true,text:'มูลค่า (ล้านบาท)',color:'#0B1F12',font:{size:13,weight:'800'}}},y:{...grid,grid:{display:false},ticks:{color:'#0B1F12',font:{size:11,weight:'700'}}}}}});}
 if(id==='trainingChart'){const c=[...D.training.courses].reverse();charts[id]=new Chart(el,{type:'bar',data:{labels:c.map(x=>x[0]),datasets:[{data:c.map(x=>x[2]),backgroundColor:c.map(x=>x[2]>=60?'#2E7D32':x[2]>=40?'#DFA537':'#C5673D'),borderRadius:8,barThickness:30}]},options:{indexAxis:'y',animation:anim,plugins:{legend:{display:false}},scales:{x:{...grid,max:100,ticks:{callback:v=>v+'%'}},y:{...grid,grid:{display:false}}}},plugins:[chartBarLabelPlugin('tLbl')]});}
 if(id==='primaryDistrictChart'){const d=[...D.kpi2.districts].sort((a,b)=>a.y69-b.y69);charts[id]=new Chart(el,{type:'bar',data:{labels:d.map(x=>x.name),datasets:[{data:d.map(x=>x.y69),backgroundColor:d.map(x=>x.y69>=50?'#1AA196':'#C5673D'),borderRadius:8,barThickness:26}]},options:{indexAxis:'y',animation:anim,plugins:{legend:{display:false}},scales:{x:{...grid,max:80,ticks:{callback:v=>v+'%'}},y:{...grid,grid:{display:false}}}},plugins:[chartBarLabelPlugin('pLbl')]});}
 if(id==='primaryTrendChart'){const d=D.kpi2.districts, cols=['#2E7D32','#DFA537','#1AA196','#C5673D','#76B852','#6A5AE0'];charts[id]=new Chart(el,{type:'line',data:{labels:['ปี 67','ปี 68','ปี 69'],datasets:d.map((x,i)=>({label:x.name,data:[x.y67,x.y68,x.y69],borderColor:cols[i],backgroundColor:cols[i],tension:.35,borderWidth:3,pointRadius:4}))},options:{animation:anim,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},scales:{y:{...grid,min:25,max:75,ticks:{callback:v=>v+'%'}},x:{...grid,grid:{display:false}}}}});}
 if(id==='imcChart'){const d=[...D.kpi3.districts].sort((a,b)=>a.pct-b.pct);charts[id]=new Chart(el,{type:'bar',data:{labels:d.map(x=>x.name),datasets:[{data:d.map(x=>x.pct),backgroundColor:d.map(x=>x.name==='พระสมุทรเจดีย์'?'#DFA537':'#C5673D'),borderRadius:8,barThickness:26}]},options:{indexAxis:'y',animation:anim,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.24)'},border:{display:false},max:15,ticks:{color:'#FFE9A4',font:{size:13,weight:'800'},callback:v=>v+'%'},title:{display:true,text:'ร้อยละผู้ป่วย IMC ที่ได้รับบริการ',color:'#FFE9A4',font:{size:13,weight:'800'}}},y:{grid:{display:false},border:{display:false},ticks:{color:'#FFFFFF',font:{size:12,weight:'700'}}}}},plugins:[chartBarLabelPlugin('iLbl')]});}

// render / navigation
const slidesEl=document.getElementById('slides'); slidesEl.innerHTML=slides.map(s=>s.html()).join(''); const slideEls=[...document.querySelectorAll('.slide')]; let cur=0, timer=null; document.getElementById('tot').textContent=slideEls.length;
function scaleStage(){const s=Math.min(window.innerWidth/1280,window.innerHeight/720);document.getElementById('stage').style.transform=`scale(${s})`} window.addEventListener('resize',scaleStage); scaleStage();
function animateCounts(root){root.querySelectorAll('.count').forEach(el=>{const to=parseFloat(el.dataset.to||'0'),dec=+(el.dataset.decimals||0),suf=el.dataset.suffix||'',pre=el.dataset.prefix||'',comma=el.dataset.format==='comma';let st=null;const dur=1150;function step(ts){if(!st)st=ts;const p=Math.min((ts-st)/dur,1);const eased=1-Math.pow(1-p,3);let val=to*eased;let out=dec?val.toFixed(dec):Math.round(val).toString();if(comma) out=Number(Math.round(val)).toLocaleString('en-US');el.textContent=pre+out+suf;if(p<1)requestAnimationFrame(step)}requestAnimationFrame(step)})}
function show(i){i=Math.max(0,Math.min(slideEls.length-1,i));slideEls[cur]?.classList.remove('active');cur=i;const el=slideEls[cur];el.classList.add('active');document.getElementById('cur').textContent=cur+1;document.getElementById('progress').style.width=((cur+1)/slideEls.length*100)+'%';document.getElementById('aiBubble').innerHTML='<b>AI Summary</b><br>'+slides[cur].summary;animateCounts(el);if(slides[cur].chart)setTimeout(()=>buildChart(slides[cur].chart),250);setTimeout(()=>{if(cur===5)updateDistrict('พระสมุทรเจดีย์'); if(cur===6)updateDrill('บางเสาธง'); if(cur===12)updateSwot('s');},100)}
function next(){show(cur+1)} function prev(){show(cur-1)} document.getElementById('next').onclick=next;document.getElementById('prev').onclick=prev;document.getElementById('home').onclick=()=>show(0);
document.getElementById('fs').onclick=()=>!document.fullscreenElement?document.documentElement.requestFullscreen?.():document.exitFullscreen?.();document.getElementById('theme').onclick=()=>document.body.classList.toggle('light-mode');
function toggleStory(){const b=document.getElementById('story'); if(timer){clearInterval(timer);timer=null;b.textContent='▶ Story';return} b.textContent='Ⅱ Story'; timer=setInterval(()=>{if(cur>=slideEls.length-1){clearInterval(timer);timer=null;b.textContent='▶ Story'}else next()},7000)}document.getElementById('story').onclick=toggleStory;
const ov=document.getElementById('overview'), ovGrid=document.getElementById('ovGrid');ovGrid.innerHTML=slides.map((s,i)=>`<div class="thumb" data-i="${i}"><b>${i+1}</b><span>${s.label}</span></div>`).join('');ovGrid.onclick=e=>{const t=e.target.closest('.thumb');if(t){show(+t.dataset.i);ov.classList.remove('show')}};document.getElementById('counter').onclick=()=>ov.classList.toggle('show');
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}else if(e.key==='ArrowLeft'){e.preventDefault();prev()}else if(e.key==='o'||e.key==='O'){ov.classList.toggle('show')}else if(e.key==='f'||e.key==='F'){document.getElementById('fs').click()}else if(e.key==='s'||e.key==='S'){toggleStory()}else if(e.key==='Escape'){ov.classList.remove('show')}});

function updateMorph(idx){const l=D.kpi1.levels[idx];document.getElementById('morphName').textContent=l.name;document.getElementById('morphValue').textContent=fmt(l.value)+' บาท';document.getElementById('morphTarget').textContent='เป้าหมาย '+fmt(l.target)+' บาท';const pct=document.getElementById('morphPct');pct.dataset.to=l.pct;pct.textContent='0%';document.getElementById('morphFill').style.setProperty('--w',Math.min(l.pct,100)+'%');document.getElementById('morphPill').className='pill '+(l.pct>=50?'ok':'bad');document.getElementById('morphPill').textContent=l.pct>=50?'ผ่านเกณฑ์':'ต่ำกว่าเกณฑ์';animateCounts(document.querySelector('.slide.active'))}
document.addEventListener('click',e=>{const lt=e.target.closest('[data-level]'); if(lt){document.querySelectorAll('[data-level]').forEach(b=>b.classList.remove('active'));lt.classList.add('active');updateMorph(+lt.dataset.level)} const dg=e.target.closest('.district'); if(dg){document.querySelectorAll('.district').forEach(x=>x.classList.remove('active'));dg.classList.add('active');updateDistrict(dg.dataset.d)} const db=e.target.closest('[data-dd]'); if(db){document.querySelectorAll('[data-dd]').forEach(x=>x.classList.remove('active'));db.classList.add('active');updateDrill(db.dataset.dd)} const sw=e.target.closest('[data-swot]'); if(sw){document.querySelectorAll('[data-swot]').forEach(x=>x.classList.remove('active'));sw.classList.add('active');updateSwot(sw.dataset.swot)}});
function updateDistrict(name){const d=districtDetails[name];const el=document.getElementById('mapDetail');if(!el||!d)return;el.innerHTML=`<div class="sub">อำเภอที่เลือก</div><h3 class="disp" style="font-size:34px;color:var(--green);font-weight:700">${name}</h3><p style="margin-top:8px;line-height:1.45">${d.note}</p><div class="metric-grid"><div class="metric" style="--c:var(--green)"><span>UC 10 เดือน</span><b>${d.uc10.toFixed(2)}%</b></div><div class="metric" style="--c:var(--teal)"><span>ปฐมภูมิ</span><b>${d.primary.toFixed(2)}%</b></div><div class="metric" style="--c:var(--clay)"><span>IMC</span><b>${d.imc.toFixed(2)}%</b></div></div><div class="card" style="margin-top:18px;background:#102d17;color:#fff;box-shadow:none"><b style="color:var(--gold2)">AI วิเคราะห์พื้นที่:</b><br>${d.uc12<50?'เร่งปิดเป้าทั้งปี UC ':'ต่อยอดพื้นที่ทำได้ดี '}และ ${d.imc<6?'ต้องจัด Case list IMC เชิงรุก':'ใช้เป็นต้นแบบ IMC ได้'}.</div>`}
function updateDrill(name){const d=districtDetails[name];const el=document.getElementById('drillPanel');if(!el||!d)return;const ucGap10=Math.max(D.kpi1.province.target10m-D.kpi1.province.value,0),ucGap12=Math.max(D.kpi1.province.target12m-D.kpi1.province.value,0);el.innerHTML=`<div class="row between center"><div><div class="sub">Drill-down อำเภอ</div><h3 class="disp" style="font-size:34px;color:var(--green);font-weight:700">${name}</h3></div><div class="pill ${d.uc10>=50?'ok':'bad'}">UC 10 เดือน ${d.uc10.toFixed(2)}%</div></div><div class="metric-grid" style="margin-top:10px"><div class="metric" style="--c:var(--green)"><span>UC 10 เดือน</span><b>${d.uc10.toFixed(2)}%</b></div><div class="metric" style="--c:var(--gold)"><span>UC 12 เดือน</span><b>${d.uc12.toFixed(2)}%</b></div><div class="metric" style="--c:var(--teal)"><span>ปฐมภูมิ</span><b>${d.primary.toFixed(2)}%</b></div><div class="metric" style="--c:var(--clay)"><span>IMC Stroke</span><b>${d.imc.toFixed(2)}%</b></div><div class="metric" style="--c:var(--violet)"><span>Priority</span><b>${d.imc<5||d.primary<50?'สูง':'กลาง'}</b></div><div class="metric" style="--c:var(--sky)"><span>Action</span><b>${d.uc12<50?'เร่ง':'ต่อยอด'}</b></div></div><div class="card" style="margin-top:12px;padding:14px 16px;background:#F3F8F0"><div class="row between center"><b>มูลค่า UC จังหวัด: เป้า 10 / 12 เดือน</b><span class="sub">หน่วย: บาท</span></div><div class="metric-grid" style="grid-template-columns:repeat(4,1fr);gap:8px;margin-top:9px"><div class="metric" style="--c:var(--green);padding:10px"><span>ผลงานสะสม</span><b style="font-size:21px">${fmt(D.kpi1.province.value)}</b></div><div class="metric" style="--c:var(--gold);padding:10px"><span>เป้า 10 เดือน</span><b style="font-size:21px">${fmt(D.kpi1.province.target10m)}</b></div><div class="metric" style="--c:var(--clay);padding:10px"><span>Gap 10 เดือน</span><b style="font-size:21px">${fmt(ucGap10)}</b></div><div class="metric" style="--c:var(--violet);padding:10px"><span>เป้า 12 เดือน</span><b style="font-size:21px">${fmt(D.kpi1.province.target12m)}</b><div class="sub" style="font-size:10.5px">Gap ${fmt(ucGap12)} บาท</div></div></div></div><div class="card" style="margin-top:10px;padding:14px 16px"><div class="row between center"><b>จำนวนคน/เคส/ครั้งบริการ: Primary + IMC</b><span class="sub">ภาพรวมจังหวัด</span></div><div class="case-grid" style="grid-template-columns:repeat(4,1fr);gap:8px;margin-top:9px"><div class="case-tile" style="--c:var(--teal);padding:10px"><div class="case-label">Primary รับบริการ</div><div class="case-value" style="font-size:23px">${fmt(D.kpi2.detail.tmt)}<span class="case-unit">ครั้ง</span></div><div class="case-sub">ตัวตั้ง</div></div><div class="case-tile" style="--c:var(--green);padding:10px"><div class="case-label">OPD ทั้งหมด</div><div class="case-value" style="font-size:23px">${fmt(D.kpi2.detail.total)}<span class="case-unit">ครั้ง</span></div><div class="case-sub">ตัวหาร</div></div><div class="case-tile" style="--c:var(--clay);padding:10px"><div class="case-label">IMC รับบริการ</div><div class="case-value" style="font-size:23px">${fmt(D.kpi3.province.received)}<span class="case-unit">ราย</span></div><div class="case-sub">จาก ${fmt(D.kpi3.province.total)} ราย</div></div><div class="case-tile" style="--c:var(--gold);padding:10px"><div class="case-label">IMC ต้องเพิ่ม</div><div class="case-value" style="font-size:23px">${fmt(D.kpi3.province.need)}<span class="case-unit">ราย</span></div><div class="case-sub">เพื่อแตะ 25%</div></div></div></div><div class="card" style="margin-top:10px;background:#F3F8F0;padding:13px 16px"><b>ข้อแนะนำรายพื้นที่</b><p class="sub" style="margin-top:5px">${d.note}</p></div><div class="bar-row" style="margin-top:10px"><div class="head"><b>Gap เทียบ IMC เกณฑ์ 25%</b><span style="--c:var(--clay)">${(25-d.imc).toFixed(2)} จุด</span></div><div class="track"><div class="fill" style="--w:${Math.min(d.imc/25*100,100)}%;--c:var(--clay)"></div></div></div><div class="case-note" style="margin-top:8px;padding:8px 10px;font-size:11.5px"><b>หมายเหตุ:</b> จำนวนเคสที่ยืนยันได้ในไฟล์เป็นภาพรวมจังหวัด ส่วนรายอำเภอมีร้อยละ จึงแสดงเป็น % รายอำเภอ + จำนวนจริงระดับจังหวัด</div>`}
const swotData={s:['อันดับ 1 เขต 6','ทุกอำเภอผ่านเป้า 10 เดือน','คะแนนคุณภาพสูง','ยาไพลเป็น Hero Product'],w:['เมือง/บางพลีฐานใหญ่ยังต่ำเมื่อเทียบเป้าทั้งปี','IMC ต่ำกว่าเกณฑ์มาก','บางพลีปฐมภูมิต่ำ','รหัสข้อมูลยังต้องตรวจซ้ำ'],o:['ขยายยาทดแทนยาแผนปัจจุบัน','ใช้พื้นที่ต้นแบบเป็นพี่เลี้ยง','ทำ Dashboard รายสัปดาห์','เชื่อม CPG กับการสั่งใช้ยา'],t:['Stock ยาหลักส่งผลต่อผลงาน','รอบข้อมูล HDC อาจ lag','กำลังคนต่างกันตามพื้นที่','เป้าหมายรายปีสูง']};
function updateSwot(k){const map={s:'Strength',w:'Weakness',o:'Opportunity',t:'Threat / Limit'};const colors={s:'var(--green)',w:'var(--gold)',o:'var(--teal)',t:'var(--clay)'};document.getElementById('mindCenter').innerHTML=map[k]+'<br><span style="font-size:14px">Service Plan</span>';['mi1','mi2','mi3','mi4'].forEach((id,i)=>{const el=document.getElementById(id);el.style.setProperty('--c',colors[k]);el.classList.remove('show');setTimeout(()=>{el.innerHTML=`<h4>${swotData[k][i]}</h4><p>${k==='s'?'ใช้เป็นทุนต่อยอดเชิงนโยบาย':k==='w'?'ตั้งแผนแก้ไขรายพื้นที่':k==='o'?'ต่อยอดเป็นระบบจังหวัด':'บริหารความเสี่ยงเชิงระบบ'}</p>`;el.classList.add('show')},80*i)})}
show(0);
</script>
