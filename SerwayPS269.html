  <tr><td>CAR</td><td>แก้หน่วย KPI14 ต่ำกว่า 50%, Common ต่ำกว่า 25%, IMC ต่ำกว่า 20%, UC ต่ำกว่า 75%</td><td>Micro-plan รายหน่วยพร้อมชื่อผู้รับผิดชอบ</td><td>ภายใน 14 วัน</td></tr>

 </tbody></table></div>
 <div class="card"><h3>10) คำถามเปิดห้องนิเทศแบบมืออาชีพ</h3><ol><li>ผลลัพธ์ใดสะท้อนศักยภาพจริง และผลลัพธ์ใดสะท้อนช่องว่างข้อมูล?</li><li>หน่วยใดต้องการ “คน” มากกว่า “งบ” และหน่วยใดต้องการ “ระบบข้อมูล” มากกว่า “ยา”?</li><li>ถ้าต้องผ่านเกณฑ์ใน 90 วัน จะเลือกแก้ 3 หน่วยแรกและ 3 process แรกคืออะไร?</li><li>หลักฐานใดพิสูจน์ว่าการใช้สมุนไพรเป็นไปตาม CPG ไม่ใช่แค่เพิ่มยอด?</li><li>นวัตกรรม 5 รายการจะเชื่อมกับบริการจริงและเศรษฐกิจสุขภาพอย่างไร?</li></ol></div>`
}
function recommendFocus(u){let a=[];if(u.kpi14<50)a.push('เร่ง KPI14');if(u.herbPct<75&&u.herbTarget>0)a.push('ปิด gap UC');if(u.commonChange<25)a.push('Common/CPG');if(u.imc_pct<20&&u.imc_b>0)a.push('IMC registry');if(!a.length)a.push('ถอดบทเรียน');return a.join(' + ')}
function renderQuestion(scope,id,q,unitCode=''){const key=unitCode?unitCode+'_'+id:id;const obj=scope==='system'?(state.system[key]||{}):(((state.units[unitCode]||{}).questions||{})[id]||{});return `<div class="question"><div class="qhead">${id}. ${q}</div><div class="qrow"><select data-scope="${scope}" data-unit="${unitCode}" data-id="${id}" data-field="score"><option value="">เลือกสถานะ</option>${['ดี/ครบถ้วน','บางส่วน/ต้องติดตาม','ไม่พร้อม/ต้องแก้ไข','ไม่เกี่ยวข้อง'].map(x=>`<option ${obj.score===x?'selected':''}>${x}</option>`).join('')}</select><textarea data-scope="${scope}" data-unit="${unitCode}" data-id="${id}" data-field="evidence" placeholder="หลักฐานที่พบ/ข้อมูลสนับสนุน">${obj.evidence||''}</textarea><textarea data-scope="${scope}" data-unit="${unitCode}" data-id="${id}" data-field="comment" placeholder="คอมเมนต์ผู้นิเทศ/ข้อสั่งการ/ผู้รับผิดชอบ">${obj.comment||''}</textarea></div></div>`}
function renderSystemQuestions(){document.getElementById('systemQuestions').innerHTML=`<div class="card"><h2>แบบนิเทศระบบเชิงวิเคราะห์</h2><p>เพิ่มจำนวนข้อคำถามเป็น ${APP.questions.reduce((a,g)=>a+g.items.length,0)} ข้อ ครอบคลุมคน งบ สถานที่ ระบบบริการ ข้อมูล ผลลัพธ์ และนวัตกรรม โดยให้กรอกทั้งสถานะ หลักฐาน และคอมเมนต์ผู้นิเทศ</p></div>`+APP.questions.map(g=>`<div class="card"><h2>${g.group}</h2>${g.items.map(([id,q])=>renderQuestion('system',id,q)).join('')}</div>`).join('');bindQuestionInputs()}
function bindQuestionInputs(){document.querySelectorAll('[data-scope]').forEach(el=>{el.oninput=()=>{const {scope,unit,id,field}=el.dataset;if(scope==='system'){state.system[id]=state.system[id]||{};state.system[id][field]=el.value}else{state.units[unit]=state.units[unit]||{questions:{}};state.units[unit].questions=state.units[unit].questions||{};state.units[unit].questions[id]=state.units[unit].questions[id]||{};state.units[unit].questions[id][field]=el.value}localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}})}
function renderUnits(){
 const box=document.getElementById('unitList');
 box.innerHTML=D.units.map(u=>{
   const code=String(u.code);
   let s=unitScore(u),pc=s>=3?'priority-good':s>=2?'priority-mid':'priority-high';
   const isActive=String(state.selectedUnit)===code;
   return `<button type="button" class="unitbtn ${isActive?'active':''} ${pc}" data-code="${code}"><b>${u.name}</b><span class="small">${s}/4 · KPI14 ${pct(u.kpi14)} · UC ${pct(u.herbPct)} · Common ${u.commonChange>=0?'+':''}${pct(u.commonChange)} · IMC ${pct(u.imc_pct)}</span></button>`
 }).join('');
 box.querySelectorAll('.unitbtn').forEach(btn=>{btn.addEventListener('click',()=>selectUnit(btn.dataset.code))});
 renderUnitDetail();
}
function selectUnit(code){
 state.selectedUnit=String(code);
 if(!D.units.some(u=>String(u.code)===state.selectedUnit)){state.selectedUnit='00979'}
 localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
 renderUnits();
}
function selectUnitByName(name){
 const found=D.units.find(u=>(u.name||'').replace(/\s+/g,'').includes(String(name).replace(/\s+/g,'')));
 if(found)selectUnit(found.code);
}
function renderUnitInputs(code){const x=state.units[code]||{};return `<table><tr><td>แพทย์แผนไทย/ประยุกต์ปัจจุบัน</td><td><input data-unitmeta="${code}" data-field="ttmStaff" value="${x.ttmStaff||''}" placeholder="คน"></td></tr><tr><td>ผู้ช่วย/นวดไทย/พนักงานบริการ</td><td><input data-unitmeta="${code}" data-field="assistStaff" value="${x.assistStaff||''}" placeholder="คน"></td></tr><tr><td>บุคลากรที่ต้องการเพิ่ม</td><td><input data-unitmeta="${code}" data-field="needStaff" value="${x.needStaff||''}" placeholder="จำนวน/ตำแหน่ง"></td></tr><tr><td>งบประมาณ/วัสดุที่ต้องการ</td><td><input data-unitmeta="${code}" data-field="budgetNeed" value="${x.budgetNeed||''}" placeholder="บาท/รายการ"></td></tr><tr><td>สถานที่</td><td><select data-unitmeta="${code}" data-field="facility"><option></option>${['พร้อม','บางส่วน','ไม่พร้อม'].map(o=>`<option ${x.facility===o?'selected':''}>${o}</option>`).join('')}</select></td></tr><tr><td>ความต้องการ 3 อันดับ</td><td><textarea data-unitmeta="${code}" data-field="topNeeds">${x.topNeeds||''}</textarea></td></tr><tr><td>คำสั่งการ 30-60-90 วัน</td><td><textarea data-unitmeta="${code}" data-field="actionPlan">${x.actionPlan||''}</textarea></td></tr></table>`}
function bindUnitMetaInputs(code){document.querySelectorAll(`[data-unitmeta="${code}"]`).forEach(el=>{el.oninput=()=>{if(!state.units[code]||typeof state.units[code]!=='object')state.units[code]={questions:{}};state.units[code][el.dataset.field]=el.value;localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}})}
function unitAutoInsight(u){let lines=[];if(u.kpi14>=70)lines.push('KPI14 เด่น เหมาะเป็นพี่เลี้ยงด้าน flow OPD→TTM และการบันทึกข้อมูล');else if(u.kpi14<50)lines.push('KPI14 ต่ำกว่าเกณฑ์ ต้องตรวจคน/เวลาเปิดบริการ/สถานที่/การส่งต่อ/ข้อมูล HDC');if(u.herbPct>=100)lines.push('UC เกินเป้า ควรถอดบทเรียนการใช้ Product Champion และระบบ stock');else if(u.herbPct<75&&u.herbTarget>0)lines.push(`UC ต่ำกว่า 75% ต้องเติม gap ประมาณ ${fmt(Math.max(0,u.herbTarget-u.herbUC))} บาท พร้อมคุม CPG`);if(u.commonChange>=25)lines.push('Common ผ่านเกณฑ์ ให้ตรวจคุณภาพการสั่งใช้และ ADR ไม่ใช่ดูเฉพาะยอด');else lines.push('Common ต่ำกว่าเกณฑ์ ต้องวิเคราะห์รายโรค ผู้สั่งใช้ stock และระบบ alert');if(u.imc_pct<20&&u.imc_b>0)lines.push(`IMC ต่ำ ต้องเพิ่ม ${Math.max(0,Math.ceil((u.imc_b||0)*0.2-(u.imc_a||0)))} ราย ด้วย registry รายชื่อจริง`);else if(u.imc_pct>=20)lines.push('IMC ผ่านเกณฑ์ ควรถอดบทเรียน case management และติดตาม outcome');if(u.name.includes('พระสมุทรเจดีย์สวาทยานนท์'))lines.push('โรงพยาบาลควรเป็น anchor ด้าน UC/วิชาการ/IMC discharge planning และตรวจ mapping KPI14 0/0');return '<ul>'+lines.map(x=>`<li>${x}</li>`).join('')+'</ul>'}
function renderUnitDetail(){const selected=String(state.selectedUnit||'00979');const u=D.units.find(x=>String(x.code)===selected)||D.units[0];state.selectedUnit=String(u.code);if(!state.units[u.code]||typeof state.units[u.code]!=='object')state.units[u.code]={questions:{}};state.units[u.code].questions=state.units[u.code].questions||{};const type=u.name.includes('รพ.')&&!u.name.includes('รพสต')?'โรงพยาบาล':'รพ.สต.';document.getElementById('unitDetail').innerHTML=`<div class="card"><h2>${type}: ${u.name}</h2><div class="grid kpi"><div class="insight"><b>KPI14</b><br>${pct(u.kpi14)}<br><span class="small">${fmt(u.ttm)}/${fmt(u.opd)} ครั้ง</span></div><div class="insight"><b>UC</b><br>${fmt(u.herbUC)} บาท<br><span class="small">${pct(u.herbPct)} ของเป้า 10 เดือน</span></div><div class="insight"><b>Common</b><br>${u.commonChange>=0?'+':''}${pct(u.commonChange)}<br><span class="small">${pct(u.common68)} → ${pct(u.common69)}</span></div><div class="insight"><b>IMC</b><br>${pct(u.imc_pct)}<br><span class="small">${fmt(u.imc_a)}/${fmt(u.imc_b)} ราย ต้องเพิ่ม ${Math.max(0,Math.ceil((u.imc_b||0)*0.2-(u.imc_a||0)))} ราย</span></div></div><div class="grid two"><div><h3>ข้อมูลทรัพยากรของหน่วย</h3>${renderUnitInputs(u.code)}</div><div><h3>ข้อวิเคราะห์อัตโนมัติจากฐานข้อมูล</h3>${unitAutoInsight(u)}<h3>Micro-focus ที่ควรถาม</h3><p>${recommendFocus(u)}</p></div></div></div><div class="card"><h2>ข้อคำถามนิเทศรายหน่วยแบบละเอียด (${APP.unitQuestions.length} ข้อ)</h2>${APP.unitQuestions.map(([id,q])=>renderQuestion('unit',id,q,u.code)).join('')}</div>`;bindUnitMetaInputs(u.code);bindQuestionInputs()}
function renderInnovation(){const avg=APP.innovation.reduce((a,x)=>a+x.total,0)/APP.innovation.length;const rows=APP.innovation.map(x=>`<tr><td>${x.districtRank}</td><td>${x.overallRank}</td><td><b>${x.name}</b></td><td>${x.unit}</td><td>${x.category}</td><td>${x.scores.join(' / ')}</td><td class="heat-good">${x.total}</td><td>${x.analysis}</td></tr>`).join('');const cards=APP.innovation.map(x=>`<div class="card"><h3>#${x.districtRank} ${x.name}</h3><p><b>หน่วยงาน:</b> ${x.unit}<br><b>หมวด:</b> ${x.category}<br><b>คะแนน:</b> ${x.total}/100 · อันดับจังหวัด ${x.overallRank}</p><div class="bar"><span style="width:${x.total}%"></span></div><p>${x.analysis}</p><p><b>คำถามนิเทศ:</b> มีสูตรตำรับชัดเจนหรือไม่? มีเอกสารความปลอดภัย/วิธีใช้/ข้อห้ามหรือยัง? มีแผน packaging, costing, user test, stability และช่องทางใช้จริงในบริการหรือไม่?</p></div>`).join('');document.getElementById('innovationBox').innerHTML=`<div class="card deep"><h2>ข้อมูลนวัตกรรมภูมิปัญญาแพทย์แผนไทย อำเภอพระสมุทรเจดีย์</h2><div class="grid three"><div class="insight"><b>จำนวนนวัตกรรม</b><br>${APP.innovation.length} รายการ</div><div class="insight"><b>คะแนนเฉลี่ย</b><br>${fmt(avg,1)} คะแนน</div><div class="insight"><b>กลุ่มเด่น</b><br>บรรเทาปวด/อักเสบ และ wellness</div></div><p>ข้ออ่านเชิงนิเทศ: นวัตกรรมส่วนใหญ่สัมพันธ์กับบริการแผนไทยที่เป็นฐานของ KPI14 และ IMC โดยเฉพาะกลุ่มปวดเมื่อย/ฟื้นฟู จึงควรใช้เป็นเครื่องมือเชื่อมบริการจริงกับเศรษฐกิจสุขภาพ ไม่ใช่แค่ผลงานประกวด</p></div><div class="card"><h3>ตารางนวัตกรรมเรียงตามคะแนนเฉพาะอำเภอ</h3><table><thead><tr><th>อันดับอำเภอ</th><th>อันดับจังหวัด</th><th>รายการ</th><th>หน่วยงาน</th><th>หมวด</th><th>ค.1-ค.5</th><th>รวม</th><th>ข้อวิเคราะห์</th></tr></thead><tbody>${rows}</tbody></table></div><div class="grid two">${cards}</div><div class="card"><h3>Roadmap พัฒนานวัตกรรม 90 วัน</h3><table><tr><th>ช่วง</th><th>งานที่ควรทำ</th><th>หลักฐาน</th></tr><tr><td>0-30 วัน</td><td>คัดเลือก flagship 1-2 รายการ เช่น สเปรย์เย็นรางจืด และลูกประคบผักเสี้ยนผี</td><td>ทะเบียนผลิตภัณ function collectComments(){const sys=Object.entries(state.system||{}).filter(([k,v])=>v.comment||v.evidence).map(([k,v])=>`${k}: ${(v.evidence||'')} ${(v.comment||'')}`);const unit=[];Object.entries(state.units||{}).forEach(([code,u])=>{const name=(D.units.find(x=>x.code===code)||{}).name||code;if(u.topNeeds)unit.push(`${name}: ${u.topNeeds}`);if(u.actionPlan)unit.push(`${name} แผน: ${u.actionPlan}`);Object.entries(u.questions||{}).forEach(([qid,v])=>{if(v.comment||v.evidence)unit.push(`${name} ${qid}: ${(v.evidence||'')} ${(v.comment||'')}`)})});return{sys,unit}}

function exportJSON(){downloadBlob(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),'ข้อมูลแบบนิเทศพระสมุทรเจดีย์.json')}
function importJSON(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));location.reload()}catch(err){alert('ไฟล์ JSON ไม่ถูกต้อง')}};r.readAsText(file)}
function downloadOnepage(){renderOnepage();const content='<!doctype html><html><head><meta charset="utf-8"><title>OnePage พระสมุทรเจดีย์</title><style>'+document.querySelector('style').innerHTML+'</style></head><body>'+document.getElementById('onepageBox').innerHTML+'</body></html>';downloadBlob(new Blob([content],{type:'text/html'}),'OnePage_นิเทศพระสมุทรเจดีย์_ฉบับขยาย.html')}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function renderHelp(){document.getElementById('helpContent').innerHTML=`<div class="card"><h2>วิธีใช้</h2><ol><li>เมนูภาพวิเคราะห์รวม: ใช้เปิดประชุม/ชี้จุดนิเทศจากฐานข้อมูล</li><li>เมนูแบบนิเทศระบบ: กรอกสถานะ หลักฐาน และคอมเมนต์ของผู้นิเทศ ครบทุกมิติ</li><li>เมนูนิเทศรายหน่วยงาน: เลือกหน่วย กรอกข้อมูลทรัพยากรและตอบข้อคำถามรายหน่วย</li><li>เมนูข้อมูลนวัตกรรม: ใช้ประเมินและวางแผนต่อยอดผลิตภัณฑ์</li><li>เมนู One Page: สร้างสรุปฉบับขยาย พิมพ์หรือบันทึก PDF ได้</li></ol><p class="small">ข้อมูลที่กรอกถูกเก็บในเครื่องผู้ใช้ด้วย localStorage</p></div>`}
